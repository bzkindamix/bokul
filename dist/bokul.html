  .home-doors .door-main { padding: 9px 8px; font-size: 17px; }
}

/* === v0.51 — Karakterim ekranı + rozet koleksiyonu === */
.char-wrap { flex: 1; overflow-y: auto; padding: 8px 16px 20px; max-width: 720px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }
.char-card { display: flex; gap: 16px; align-items: center; background: var(--bg-panel); border: 1px solid var(--line);
  border-radius: 20px; padding: 16px; box-shadow: inset 0 1px 0 rgba(255,255,255,.06), 0 6px 20px rgba(8,4,22,.3); }
.char-av { flex: none; width: 108px; height: 108px; }
.char-av .avatar-holder, .char-av svg { width: 108px; height: 108px; }
.char-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 6px; }
.char-name { font-size: 22px; font-weight: 900; }
.char-rank { font-size: 14px; color: var(--xp); font-weight: 800; }
.char-xp { display: flex; align-items: center; gap: 8px; }
.char-lvl { font-size: 12px; font-weight: 700; color: var(--ink-dim); white-space: nowrap; }
.char-xpbar { flex: 1; height: 8px; background: var(--bg-deep); border-radius: 99px; overflow: hidden; }
.char-xpbar i { display: block; height: 100%; background: linear-gradient(90deg, var(--xp), var(--action)); }
.char-stats { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
.char-stats .chip { font-size: 12px; }
@media (max-width: 520px) { .char-card { flex-direction: column; text-align: center; } .char-stats { justify-content: center; } }

.char-badges-head { font-size: 16px; font-weight: 900; display: flex; align-items: center; gap: 10px; margin-top: 4px; }
.char-badges-count { font-size: 13px; font-weight: 800; color: var(--xp); background: rgba(255,213,46,.12);
  border: 1px solid rgba(255,213,46,.35); border-radius: 99px; padding: 2px 10px; }
.badge-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(104px, 1fr)); gap: 10px; }
.badge-card { display: flex; flex-direction: column; align-items: center; gap: 4px; text-align: center;
  background: var(--bg-raised); border: 1px solid var(--line); border-radius: 16px; padding: 12px 8px; transition: transform .12s ease; }
.badge-ic { font-size: 36px; line-height: 1; }
.badge-nm { font-size: 13px; font-weight: 800; }
.badge-sub { font-size: 10px; color: var(--ink-dim); line-height: 1.3; }
.badge-got { border-color: var(--accent); box-shadow: 0 0 14px rgba(255,79,216,.25), inset 0 1px 0 rgba(255,255,255,.08); }
.badge-got .badge-ic { filter: drop-shadow(0 2px 6px rgba(255,79,216,.4)); animation: badgePop .4s ease; }
.badge-unit { border-color: var(--legendary); box-shadow: 0 0 16px rgba(61,242,210,.3); }
.badge-unit .badge-nm { color: var(--legendary); }
.badge-locked { opacity: .5; filter: grayscale(.6); }
.badge-locked .badge-ic { font-size: 30px; }
@keyframes badgePop { 0% { transform: scale(.4); } 60% { transform: scale(1.2); } 100% { transform: scale(1); } }
@media (hover: hover) and (pointer: fine) { .badge-got:hover { transform: translateY(-3px); } }
.char-hint { font-size: 12px; color: var(--ink-dim); text-align: center; background: rgba(157,107,255,.08);
  border-radius: 10px; padding: 8px 12px; }

/* === v0.52 — Odam (oda editörü) === */
.room-wrap { flex: 1; overflow-y: auto; padding: 10px 14px 18px; max-width: 640px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }
.room-view { position: relative; width: 100%; aspect-ratio: 5 / 3; border-radius: 18px; overflow: hidden;
  border: 2px solid var(--line); box-shadow: inset 0 2px 12px rgba(0,0,0,.35); touch-action: none; user-select: none; }
.room-wall { position: absolute; inset: 0 0 34% 0; background: #2A1F55; transition: background .2s; }
.room-floor { position: absolute; inset: 66% 0 0 0; background: #4A3690; transition: background .2s;
  box-shadow: inset 0 3px 8px rgba(0,0,0,.25); border-top: 2px solid rgba(0,0,0,.2); }
.room-items { position: absolute; inset: 0; }
/* Oda eşyası: yer eşyası tabanından zemine oturur, duvar eşyası ortadan asılır (v0.59) */
.room-obj { position: absolute; line-height: 1; cursor: grab; background: none; padding: 0;
  touch-action: none; transition: transform .06s; }
.room-obj .obj-em { display: block; filter: drop-shadow(0 3px 3px rgba(0,0,0,.45)); }
.obj-floor { transform: translate(-50%, -100%); }  /* taban y noktasında oturur */
.obj-wall  { transform: translate(-50%, -50%); }    /* duvarda ortalı asılı */
.obj-shadow { position: absolute; left: 50%; bottom: -0.06em; transform: translateX(-50%);
  width: 0.78em; height: 0.2em; border-radius: 50%; background: radial-gradient(ellipse, rgba(0,0,0,.45), transparent 72%); }
.room-obj.dragging { z-index: 6; }
.obj-floor.dragging { transform: translate(-50%, -100%) scale(1.12); }
.obj-wall.dragging { transform: translate(-50%, -50%) scale(1.12); }
.room-obj.dragging .obj-em { filter: drop-shadow(0 8px 8px rgba(0,0,0,.55)); }
.room-hint2 { position: absolute; left: 8px; bottom: 6px; font-size: 11px; color: rgba(255,255,255,.55);
  background: rgba(0,0,0,.25); border-radius: 8px; padding: 2px 8px; pointer-events: none; }

.room-tabs { display: flex; gap: 8px; justify-content: center; }
.rtab { font-weight: 800; }
.rtab-on { background: var(--accent); color: #fff; box-shadow: 0 0 10px var(--accent); }
.room-panel { min-height: 60px; }
.room-shelf-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
.room-shelf { background: var(--bg-raised); border: 1px solid var(--line); border-radius: 14px; padding: 10px 8px;
  display: flex; flex-direction: column; align-items: center; gap: 6px; }
.room-shelf.shelf-on { border-color: var(--success); box-shadow: 0 0 12px rgba(82,232,140,.25); }
.room-shelf.shelf-junk { border-style: dashed; opacity: .92; }
.shelf-item { display: flex; flex-direction: column; align-items: center; gap: 3px; width: 100%; }
.shelf-ic { font-size: 32px; }
.shelf-nm { font-size: 12px; font-weight: 800; text-align: center; }
.shelf-act { font-size: 11px; font-weight: 700; color: var(--accent); }
.shelf-on .shelf-act { color: var(--success); }
.shelf-sell { font-size: 11px; background: rgba(255,213,46,.14); border: 1px solid rgba(255,213,46,.4); color: var(--xp); }
.room-swatch-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(56px, 1fr)); gap: 10px; }
.room-swatch { height: 52px; border-radius: 12px; border: 2px solid var(--line); cursor: pointer; transition: transform .1s; }
.room-swatch:active { transform: scale(.94); }
.room-swatch.sw-on { border-color: var(--xp); box-shadow: 0 0 0 2px var(--xp), 0 0 12px rgba(255,213,46,.4); }

/* === v0.53 — Sandık kademeleri (Bronz/Gümüş/Altın/Elmas) === */
.chest-tier { display: inline-block; font-size: 13px; font-weight: 900; letter-spacing: .08em; text-transform: uppercase;
  border: 2px solid #FFD52E; border-radius: 99px; padding: 3px 14px; margin-bottom: 6px;
  background: rgba(0,0,0,.25); box-shadow: 0 0 14px var(--chest-frame, #FFD52E); }
.chest-overlay .chest3d { filter: drop-shadow(0 0 18px var(--chest-frame, #FFD52E)); }
.chest-overlay .chest-glow { box-shadow: 0 0 40px 10px var(--chest-frame, #FFD52E); }

/* === v0.54 — Ana ekran KESİN sığma: alt butonlar sabit, orta bölge kayar === */
.screen-home { display: flex !important; flex-direction: column; overflow: hidden !important; }
.home-scroll { flex: 1 1 auto; min-height: 0; overflow-y: auto; overflow-x: hidden;
  display: flex; flex-direction: column; }
/* Orta bölge kaydığı için öğrenme yolları iç-kapağını kaldır (tek kaydırma) */
.dash-paths { max-height: none; overflow: visible; }
/* Alt navigasyon her zaman görünür (ekranın altına sabit) */
.screen-home .home-doors { flex: 0 0 auto; margin-top: auto; }
.screen-home .home-footer { flex: 0 0 auto; }
/* Kısa/geniş ekranlarda daha da derli toplu */
@media (max-height: 780px) {
  .screen-home .home-mid { padding: 3px 14px; }
  .screen-home .home-mid .commander-face { width: 64px; height: 78px; font-size: 34px; }
  .home-doors .door-main { padding: 8px 8px; font-size: 16px; }
  .home-doors .door-side { padding: 8px 6px; font-size: 13px; }
  .home-doors .door-ic, .home-doors .door-main .door-ic, .home-doors .door-side .door-ic { font-size: 22px; }
}

/* === v0.55 — Footer çiplerini topla + öğrenme yolları grid + masaüstü genişlik === */
/* Saçılan çipleri (Hikâye/Dilek/Çıkış) footer satırına çek — eski absolute konumu iptal */

/* Öğrenme yolları: geniş ekranda çok sütun — yatay alanı kullan, dikeyde kısal */
.dash-paths { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 8px; }
/* İçerik kolonu masaüstünde genişlesin (yanlar boş kalmasın) */
.home-dash { max-width: 960px; }
.home-reasons { max-width: 960px; }
.screen-home .home-doors { max-width: 960px; }
.home-scroll { width: 100%; align-items: stretch; }
/* HAREKÂT ölçülü */
.home-doors .door-main { padding: 12px 8px; font-size: 18px; }

/* === v0.55b — flex kolonda width:100% ki max-width devreye girsin (grid çok sütun olsun) === */
.home-dash, .home-reasons, .home-footer { width: 100%; }
.screen-home .home-doors { width: 100%; }
.home-scroll { align-items: stretch; }

.rtb-btns { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

.rtb-small, .rtb-big { background: var(--bg-raised); }

.wishes-wrap { max-width: 920px; margin: 0 auto; width: 100%; }

/* Parça gridi geniş ekranda çok dağılmasın (daha okunur kartlar) */

/* === v0.63 — Craft oda dekoru + Başarı Vitrini (rozet sergileme) === */
.obj-vitrin .vit-box { display: flex; flex-direction: column; align-items: center; gap: .3em;
  width: 9.5em; padding: .5em .5em .6em; background: linear-gradient(180deg, #3a2470, #201640);
  border: 0.14em solid #B8890A; border-radius: .55em; box-shadow: 0 .25em .5em rgba(0,0,0,.55), inset 0 .1em 0 rgba(255,255,255,.06); }
.vit-cap { font-size: .8em; font-weight: 800; color: var(--xp); white-space: nowrap; }
.vit-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: .22em; width: 100%; }
.vit-b { font-size: 1.5em; text-align: center; filter: drop-shadow(0 1px 1px rgba(0,0,0,.5)); }
.vit-empty { font-size: .72em; color: var(--ink-dim); grid-column: 1 / -1; text-align: center; line-height: 1.2; }

/* === v0.64 — Tam vücut avatar önizleme (portre kutular) === */
.avatar-full svg { width: 100%; height: 100%; display: block; }
.locker-preview { width: 158px !important; height: 236px !important; }
.evim-avatar { width: 118px !important; height: 200px !important; }
.char-av { width: 100px !important; height: 172px !important; }
.char-av .avatar-holder, .char-av svg { width: 100% !important; height: 100% !important; }

/* === v0.65 — Üst/Alt kıyafet için tam vücut parça önizlemesi === */

.locker-shop { display: block; width: 100%; margin: 14px 0 4px; background: linear-gradient(135deg,#3DF2D2,#3E7BFF); color: #08131f; font-weight: 800; border: none; }
.locker-empty { grid-column: 1 / -1; text-align: center; padding: 18px 10px; opacity: .8; font-size: 14px; }
.part-grid-empty { display: block; }
.cos-prev { width: 72px; height: 72px; margin: 0 auto 4px; }
.cos-prev svg { width: 100%; height: 100%; }
.cos-prev-tall { width: 100%; height: 116px; display: flex; align-items: center; justify-content: center; }
.cos-prev-tall svg { width: auto; height: 100%; max-width: 100%; }
.cos-grid { grid-template-columns: repeat(auto-fill, minmax(104px, 1fr)); }
.store-sub { font-size: 11px; opacity: .6; }

<script>
/* === src/core/events.js === */
/* BOKUL — Olay Sözlüğü
 * Modüller arası TÜM iletişimin isimli sözleşmesi.
 * Yeni olay eklerken buraya kaydet; EventBus bilinmeyen olaya uyarı basar. */
(function (B) {
  B.Events = Object.freeze({
    // Soru akışı
    QUESTION_STARTED:   'question:started',
    STEP_ANSWERED:      'step:answered',      // { stepType, correct, attempt, value }

    BOSS_ATTACKED:     'boss:attacked',  // { armorLeft } — sadece Ünite Boss'u
    BOSS_DEFEATED:     'boss:defeated',  // { bossId, tier }

    // Sistem

    GAME_LOADED:    'game:loaded',

  });

  // Hızlı doğrulama için ters küme
  B._eventSet = new Set(Object.values(B.Events));
})(window.BOKUL = window.BOKUL || {});

/* === src/core/event-bus.js === */
/* BOKUL — EventBus
 * Modüller birbirini asla doğrudan çağırmaz; buradan konuşur (pub/sub). */
(function (B) {
  const listeners = new Map(); // eventName -> Set<fn>

  B.Bus = {
    on(event, fn) {
      if (!B._eventSet.has(event)) console.warn('[BOKUL] Bilinmeyen olay dinleniyor:', event);
      if (!listeners.has(event)) listeners.set(event, new Set());
      listeners.get(event).add(fn);
      return () => B.Bus.off(event, fn);
    },
    off(event, fn) {
      const set = listeners.get(event);
      if (set) set.delete(fn);
    },
    emit(event, payload) {
      if (!B._eventSet.has(event)) console.warn('[BOKUL] Bilinmeyen olay yayınlanıyor:', event);
      const set = listeners.get(event);
      if (!set) return;
      // Kopya üzerinde dolaş: dinleyici kendini kaldırabilsin
      [...set].forEach(fn => {
        try { fn(payload); }
        catch (e) { console.error('[BOKUL] Olay dinleyicisi hata verdi (' + event + '):', e); }
      });
    },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/core/auth.js === */
/* BOKUL — Auth (Oyuncu Profilleri)
 * Çok oyunculu yerel profil sistemi: her oyuncunun kullanıcı adı + şifresi
 * ve kendi kayıt dosyası vardır. Tamamen çevrimdışı çalışır; sunucu YOKTUR.
 *
 * GÜVENLİK NOTU: Bu bir aile içi yerel profil kilididir, banka düzeyinde
 * güvenlik DEĞİLDİR. Şifreler basit bir karma (hash) ile saklanır — düz metin
 * tutulmaz — ama aynı cihaza fiziksel erişimi olan biri kayıtları görebilir.
 * Çocuk için "kim oynuyor + ilerlemem bana ait" hissini verir. */
(function (B) {
  const USERS_KEY = 'bokul.users';
  const SESSION_KEY = 'bokul.session';
  const ADMIN_KEY = 'bokul.admin';

  /* Basit, tersine çevrilemez karma (kriptografik değil) — düz metin saklamamak için */
  function hash(s) {
    let h = 5381;
    s = String(s);
    for (let i = 0; i < s.length; i++) h = ((h << 5) + h) ^ s.charCodeAt(i);
    return (h >>> 0).toString(16);
  }

  function readUsers() { try { return JSON.parse(localStorage.getItem(USERS_KEY)) || {}; } catch (e) { return {}; } }
  function writeUsers(u) { try { localStorage.setItem(USERS_KEY, JSON.stringify(u)); } catch (e) {} }
  function keyOf(name) { return String(name || '').trim().toLowerCase(); }

  let current = null; // aktif profilin anahtarı (küçük harf)

  B.Auth = {
    /* Kayıtlı profil anahtarları */
    users() { return Object.keys(readUsers()); },
    hasAny() { return B.Auth.users().length > 0; },
    exists(name) { return !!readUsers()[keyOf(name)]; },
    current() { return current; },
    displayName(key) { const u = readUsers()[key || current]; return u ? u.name : (key || ''); },
    saveKey() { return current ? 'bokul.save.' + current : null; },

    /* Profil kartında göstermek için kayıttan avatarı ve adı çek (tam yüklemeden) */
    peek(key) {
      try {
        const s = JSON.parse(localStorage.getItem('bokul.save.' + key));
        return { name: B.Auth.displayName(key), avatar: (s && s.player) ? s.player.avatar : null,
                 level: (s && s.player) ? s.player.level : 1 };
      } catch (e) { return { name: B.Auth.displayName(key), avatar: null, level: 1 }; }
    },

    register(name, pass) {
      name = String(name || '').trim();
      if (name.length < 2) return { ok: false, err: 'İsim en az 2 harf olmalı.' };
      const key = keyOf(name);
      const users = readUsers();
      if (users[key]) return { ok: false, err: 'Bu isim alınmış. Başka bir isim dene.' };
      // Çocuk profilleri şifresizdir (profile dokunarak girilir); ebeveyn PIN'i/e-postası korur.
      users[key] = { name, pass: pass ? hash(pass) : '', created: new Date().toISOString() };
      writeUsers(users);
      current = key;
      return { ok: true };
    },

    /* Profili yeniden adlandır (anahtar sabit kalır; yalnızca görünen ad + kayıttaki ad değişir) */
    renameUser(key, newName) {
      newName = String(newName || '').trim();
      if (newName.length < 2) return { ok: false, err: 'İsim en az 2 harf olmalı.' };
      const users = readUsers();
      if (!users[key]) return { ok: false, err: 'Profil bulunamadı.' };
      users[key].name = newName;
      writeUsers(users);
      try {
        const sk = 'bokul.save.' + key;
        const s = JSON.parse(localStorage.getItem(sk));
        if (s && s.player) { s.player.name = newName; localStorage.setItem(sk, JSON.stringify(s)); }
      } catch (e) {}
      return { ok: true };
    },

    /* Profili ve kaydını sil */
    deleteUser(key) {
      const users = readUsers();
      if (!users[key]) return { ok: false, err: 'Profil bulunamadı.' };
      delete users[key];
      writeUsers(users);
      try { localStorage.removeItem('bokul.save.' + key); } catch (e) {}
      try { localStorage.removeItem('bokul.save.' + key + '.corrupt'); } catch (e) {}
      if (current === key) current = null;
      if (B.Auth.remembered() === key) { try { localStorage.removeItem(SESSION_KEY); } catch (e) {} }
      return { ok: true };
    },

    /* Profile dokunarak giriş (şifresiz) — çocuk profilleri için */
    loginByKey(key) {
      if (!readUsers()[key]) return { ok: false, err: 'Profil bulunamadı.' };
      current = key;
      return { ok: true };
    },

    login(name, pass) {
      const key = keyOf(name);
      const u = readUsers()[key];
      if (!u) return { ok: false, err: 'Böyle bir oyuncu yok.' };
      if (u.pass && u.pass !== hash(pass)) return { ok: false, err: 'Şifre yanlış. Tekrar dene!' };
      current = key;
      return { ok: true };
    },

    /* "Beni hatırla": bir sonraki açılışta şifre sormadan devam */
    setRemember(on) {
      if (on && current) { try { localStorage.setItem(SESSION_KEY, current); } catch (e) {} }
      else { try { localStorage.removeItem(SESSION_KEY); } catch (e) {} }
    },
    remembered() { try { return localStorage.getItem(SESSION_KEY); } catch (e) { return null; } },
    resume(key) { if (readUsers()[key]) { current = key; return true; } return false; },

    logout() { current = null; try { localStorage.removeItem(SESSION_KEY); } catch (e) {} },

    /* ---- Ebeveyn (admin) PIN'i ---- */
    adminExists() { try { return !!localStorage.getItem(ADMIN_KEY); } catch (e) { return false; } },
    setAdminPin(pin) {
      if (String(pin || '').length < 4) return { ok: false, err: 'PIN en az 4 haneli olmalı.' };
      try { localStorage.setItem(ADMIN_KEY, JSON.stringify({ pin: hash(pin) })); } catch (e) {}
      return { ok: true };
    },
    checkAdmin(pin) {
      try { return JSON.parse(localStorage.getItem(ADMIN_KEY)).pin === hash(pin); }
      catch (e) { return false; }
    },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/core/curriculum.js === */
/* BOKUL — Curriculum (Yaş / Sınıf Uyarlaması)
 * Onboarding'de sorulan "kaç yaşındasın / kaçıncı sınıfı bitirdin" bilgisine göre
 * içeriği (özellikle matematik zorluğunu) çocuğun seviyesine göre ayarlar. */
(function (B) {

  /* Bitirilen sınıfa göre matematik üretici tavanları */
  function mathCaps(grade) {
    grade = grade == null ? 5 : grade;
    if (grade <= 2) return { maxDigits: 2, maxDivisor: 5 };
    if (grade === 3) return { maxDigits: 3, maxDivisor: 6 };
    if (grade === 4) return { maxDigits: 3, maxDivisor: 9 };
    return { maxDigits: 4, maxDivisor: 9 }; // 5 ve üzeri
  }

  /* Çocuğun ŞU AN bulunduğu sınıf (bitirdiği + 1). Bilinmiyorsa hepsi açık. */
  function currentGrade() {
    const g = B.State.data.player.grade;
    if (g == null) return 6;
    return g === 0 ? 1 : g + 1;
  }

  /* Yaş/zorluk bandı: 1=küçük (6-8/≤2. sınıf), 2=orta (9-10/3-4), 3=büyük (11+/5+).
   * Matematik dışı dersler bu banda göre uyarlanır (küçüklere daha az şık = kolay).
   * Bilinmiyorsa 3 (en geniş) — hiçbir şey kısıtlanmaz. */
  function ageBand() {
    const p = B.State.data.player || {};
    if (p.grade != null) return p.grade <= 2 ? 1 : p.grade <= 4 ? 2 : 3;
    if (p.age != null) return p.age <= 8 ? 1 : p.age <= 10 ? 2 : 3;
    return 3;
  }

  B.Curriculum = {
    mathCaps,
    currentGrade,
    ageBand,

    /* Bölüm çocuğun sınıfına uygun mu? (section.minGrade) */
    gradeOk(section) {
      return !section || !section.minGrade || currentGrade() >= section.minGrade;
    },

    /* Soru tipine göre üreticiyi uyarla (uzun bölme sınıfa göre kısıtlanır) */
    forType(itype, gen) {
      return itype === 'long-division' ? B.Curriculum.forMath(gen) : gen;
    },

    /* Uzun bölme üreticisini sınıfa göre kısıtla (çok küçükler zorlanmasın) */
    forMath(gen) {
      if (!gen) return gen;
      const caps = mathCaps(B.State.data.player.grade);
      const g = Object.assign({}, gen);
      if (Array.isArray(g.dividendDigits))
        g.dividendDigits = [Math.min(g.dividendDigits[0], caps.maxDigits), Math.min(g.dividendDigits[1], caps.maxDigits)];
      else if (typeof g.dividendDigits === 'number')
        g.dividendDigits = Math.min(g.dividendDigits, caps.maxDigits);
      if (Array.isArray(g.divisorRange))
        g.divisorRange = [g.divisorRange[0], Math.min(g.divisorRange[1], caps.maxDivisor)];
      return g;
    },

    /* Etkin ders matematikse üreticiyi uyarlar, değilse dokunmaz */
    adjust(lesson, gen) {
      return (lesson && lesson.interactionType === 'long-division') ? B.Curriculum.forMath(gen) : gen;
    },

    gradeLabel() {
      const gr = B.State.data.player.grade;
      if (gr == null) return '';
      return gr === 0 ? 'okul öncesi' : (gr + '. sınıfı bitirmiş');
    },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/core/save-manager.js === */
/* BOKUL — SaveManager
 * LocalStorage kayıt: debounce'lu otomatik kayıt + şema migrasyonu.
 * Bozuk kayıt asla sessizce silinmez; yedeğe kopyalanır. */
(function (B) {
  // Kayıt anahtarı artık AKTİF PROFİLE göre (bkz. Auth.saveKey()).
  // Eski tek-oyunculu kayıt anahtarı (v0.10 öncesi) göç için okunur.
  const LEGACY_KEY = 'bokul.save.v1';
  const SETTINGS_KEY = 'bokul.settings';
  let timer = null;

  /* Eski şemaları yeniye taşıyan zincir: migrations[eskiSürüm] = fn(data) => data */
  const migrations = {
    // Örnek: 1: (d) => { d.yeniAlan = ...; d.meta.schemaVersion = 2; return d; }
  };

  function key() { return B.Auth ? B.Auth.saveKey() : LEGACY_KEY; }

  B.Save = {
    /* Aktif profilin kaydını yükle; yoksa taze durum. Eski tek kayıt varsa
     * ilk profile bir kez taşınır (legacyImport). */
    load() {
      const k = key();
      if (!k) { B.State.data = B.State.fresh(); return false; }
      let raw = null;
      try { raw = localStorage.getItem(k); } catch (e) { /* gizli mod vb. */ }
      if (!raw) { B.State.data = B.State.fresh(); return false; }
      try {
        let data = JSON.parse(raw);
        while (data.meta.schemaVersion < B.State.SCHEMA_VERSION) {
          const fn = migrations[data.meta.schemaVersion];
          if (!fn) throw new Error('Migrasyon eksik: ' + data.meta.schemaVersion);
          data = fn(data);
        }
        B.State.data = Object.assign(B.State.fresh(), data);
        B.Bus.emit(B.Events.GAME_LOADED, {});
        return true;
      } catch (e) {
        console.error('[BOKUL] Kayıt okunamadı, yedeğe alınıyor:', e);
        try { localStorage.setItem(k + '.corrupt', raw); localStorage.removeItem(k); } catch (e2) {}
        B.State.data = B.State.fresh();
        return false;
      }
    },

    /* v0.10 öncesi tek kayıt varsa, yeni bir profile içeriğini taşı */
    legacyImport() {
      try {
        const raw = localStorage.getItem(LEGACY_KEY);
        if (!raw) return false;
        B.State.data = Object.assign(B.State.fresh(), JSON.parse(raw));
        return true;
      } catch (e) { return false; }
    },
    hasLegacy() { try { return !!localStorage.getItem(LEGACY_KEY); } catch (e) { return false; } },

    saveNow() {
      const k = key();
      if (!k) return; // profil seçilmeden yazma
      B.State.touch();
      try {
        localStorage.setItem(k, JSON.stringify(B.State.data));
        B.Bus.emit(B.Events.GAME_SAVED, {});
      } catch (e) { console.error('[BOKUL] Kayıt yazılamadı:', e); }
    },

    /* Debounce: art arda olaylarda tek yazım (config: autoSaveDebounceMs) */
    saveSoon() {
      clearTimeout(timer);
      const ms = (B.Content && B.Content.get('config') || {}).autoSaveDebounceMs || 2000;
      timer = setTimeout(() => B.Save.saveNow(), ms);
    },

    settings: {
      get() {
        try { return JSON.parse(localStorage.getItem(SETTINGS_KEY)) || {}; }
        catch (e) { return {}; }
      },
      set(patch) {
        const cur = B.Save.settings.get();
        Object.assign(cur, patch);
        try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(cur)); } catch (e) {}
        return cur;
      },
    },

    /* Önemli olaylarda otomatik kayıt bağla */
    init() {
      const E = B.Events;
      [E.QUESTION_COMPLETED, E.MISSION_COMPLETED, E.LEVEL_UP,
       E.BOSS_DEFEATED, E.BOSS_RETREAT, E.XP_GAINED]
        .forEach(ev => B.Bus.on(ev, () => B.Save.saveSoon()));
      window.addEventListener('beforeunload', () => B.Save.saveNow());
    },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/core/cloud-sync.js === */
/* BOKUL — Bulut Senkron (Firebase Firestore REST)
 * Çok-aileli senkron: her aile bir "aile kodu" ile ayrılır.
 * - Çocuğun cihazı ilerlemeyi buluta yazar (fotoğraf HARİÇ — cihazda kalır).
 * - Ebeveyn kendi cihazından, aynı aile koduyla tüm çocukları görür ve
 *   dilek hedefi/not (directives) yazar; çocuğun cihazı bir sonraki açılışta çeker.
 * SDK yok; doğrudan Firestore REST (fetch). Anahtar istemci içindir (public).
 * Yapılandırma yoksa modül sessizce devre dışıdır (çevrimdışı tek dosya bozulmaz). */
(function (B) {
  // Firebase istemci yapılandırması (public — dağıtılan dosyada olması normaldir)
  const CFG = {
    projectId: 'bokul-bc2c4',
    apiKey: 'AIzaSyCe9-6Dl_fcx1q8WxiX_MoGM7dpHc7YJeY',
  };
  const CODE_KEY = 'bokul.familyCode'; // cihaz düzeyinde (tüm profiller ortak)

  function base() {
    return 'https://firestore.googleapis.com/v1/projects/' + CFG.projectId + '/databases/(default)/documents';
  }
  function configured() { return !!(CFG.projectId && CFG.apiKey); }

  function getCode() { try { return localStorage.getItem(CODE_KEY) || ''; } catch (e) { return ''; } }
  function setCode(c) { try { c ? localStorage.setItem(CODE_KEY, c) : localStorage.removeItem(CODE_KEY); } catch (e) {} }
  function enabled() { return configured() && !!getCode(); }

  /* Rastgele, tahmin edilemez aile kodu (karışabilen harfler yok) */
  function genCode() {
    const abc = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789';
    let s = '';
    const arr = new Uint32Array(10);
    (window.crypto || window.msCrypto).getRandomValues(arr);
    for (let i = 0; i < 10; i++) s += abc[arr[i] % abc.length];
    return s;
  }

  /* Firestore alanı: her şeyi stringValue olarak tutuyoruz (basit) */
  function sv(s) { return { stringValue: String(s == null ? '' : s) }; }

  /* Kaydı buluta uygun hale getir: fotoğrafı çıkar (gizlilik) */
  function stripForCloud(state) {
    const copy = JSON.parse(JSON.stringify(state));
    if (copy.player && copy.player.avatar) { copy.player.avatar.photo = null; copy.player.avatar.usePhoto = false; }
    return copy;
  }

  async function req(url, opts) {
    const res = await fetch(url + (url.includes('?') ? '&' : '?') + 'key=' + CFG.apiKey, opts);
    if (!res.ok) throw new Error('Firestore ' + res.status);
    return res.status === 200 ? res.json() : null;
  }

  function playerDoc(code, key) { return base() + '/families/' + encodeURIComponent(code) + '/players/' + encodeURIComponent(key); }

  B.Cloud = {
    configured, enabled, getCode, setCode, genCode,
    apiKey() { return CFG.apiKey; },
    projectId() { return CFG.projectId; },

    /* Oyun fikrini GELİŞTİRİCİ kutusuna gönder (ebeveyne değil).
     * Merkezi koleksiyon: families/dev-ideas/ideas — mevcut families kuralıyla uyumlu.
     * (NOT: Firestore __x__ desenli ID'leri rezerve eder; bu yüzden "dev-ideas".)
     * Aile kodu olmasa da (kodsuz oyuncu) çalışır; sadece apiKey yeter. */
    async sendDevIdea(idea) {
      if (!configured()) return { ok: false, err: 'offline' };
      try {
        const body = { fields: {
          text: sv((idea && idea.text) || ''),
          player: sv((idea && idea.player) || ''),
          family: sv((idea && idea.family) || getCode() || ''),
          version: sv((idea && idea.version) || ''),
          createdAt: sv(new Date().toISOString()),
        } };
        await req(base() + '/families/dev-ideas/ideas', {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body),
        });
        return { ok: true };
      } catch (e) { return { ok: false, err: String(e) }; }
    },

    /* Aktif profilin kaydını buluta yaz (directives'e DOKUNMAZ) */
    async pushSave() {
      if (!enabled() || !B.Auth || !B.Auth.current()) return;
      const code = getCode(), key = B.Auth.current();
      const body = { fields: {
        name: sv(B.State.data.player.name),
        save: sv(JSON.stringify(stripForCloud(B.State.data))),
        updatedAt: sv(new Date().toISOString()),
      } };
      const mask = 'updateMask.fieldPaths=name&updateMask.fieldPaths=save&updateMask.fieldPaths=updatedAt';
      try {
        await req(playerDoc(code, key) + '?' + mask, {
          method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body),
        });
      } catch (e) { /* çevrimdışıysa sessiz geç, sonra tekrar denenir */ }
    },

    /* Ebeveyn direktiflerini çek ve yerel dileklere uygula */
    async pullDirectives() {
      if (!enabled() || !B.Auth || !B.Auth.current()) return;
      try {
        const doc = await req(playerDoc(getCode(), B.Auth.current()), { method: 'GET' });
        const d = doc && doc.fields && doc.fields.directives ? JSON.parse(doc.fields.directives.stringValue) : null;
        if (d) B.Cloud.applyDirectives(d);
      } catch (e) { /* yoksa/çevrimdışıysa geç */ }
    },

    /* Directives'i yerel wishes/ideas'e uygula (ebeveyn otoritedir) */
    applyDirectives(d) {
      let changed = false;
      (B.State.data.wishes || []).forEach(w => {
        const dw = d.wishes && d.wishes[w.id];
        if (dw) {
          if (dw.goal !== undefined) w.goal = dw.goal;
          if (dw.note !== undefined) w.note = dw.note;
          if (dw.status && dw.status !== w.status && !(w.status === 'earned' && dw.status === 'assigned')) w.status = dw.status;
          changed = true;
        }
      });
      // NOT: Oyun fikirleri artık ebeveyne değil GELİŞTİRİCİYE gidiyor (v0.58);
      // ebeveyn directive'leri fikir durumunu ARTIK değiştirmez.
      // Ebeveyn izinleri (ders/özellik kilitleri) uzaktan uygulanır — ebeveyn otoritedir
      if (d.perms && typeof d.perms === 'object') {
        B.State.data.perms = { lessons: d.perms.lessons || {}, features: d.perms.features || {} };
        changed = true;
      }
      if (changed) { B.Save.saveSoon(); if (B.Wish) B.Wish.checkEarned(); }
    },

    /* Ebeveyn: aile kodundaki tüm oyuncuları listele (uzaktan görüntüleme) */
    async listPlayers() {
      if (!enabled()) return [];
      try {
        const res = await req(base() + '/families/' + encodeURIComponent(getCode()) + '/players', { method: 'GET' });
        const docs = (res && res.documents) || [];
        return docs.map(doc => {
          const key = doc.name.split('/').pop();
          const f = doc.fields || {};
          let save = null; try { save = JSON.parse(f.save.stringValue); } catch (e) {}
          return { key, name: f.name ? f.name.stringValue : key, save, updatedAt: f.updatedAt ? f.updatedAt.stringValue : '' };
        }).filter(p => p.save);
      } catch (e) { return []; }
    },

    /* Ebeveyn: bir oyuncunun bulut kaydını sil (eski/silinmiş oyuncuları temizle) */
    async deletePlayer(playerKey) {
      if (!enabled()) return false;
      try {
        const res = await fetch(playerDoc(getCode(), playerKey) + '?key=' + CFG.apiKey, { method: 'DELETE' });
        return res.ok;
      } catch (e) { return false; }
    },

    /* Ebeveyn: bir oyuncuya directives yaz (save'e DOKUNMAZ) */
    async writeDirectives(playerKey, directives) {
      if (!enabled()) return false;
      const body = { fields: { directives: sv(JSON.stringify(directives)) } };
      try {
        await req(playerDoc(getCode(), playerKey) + '?updateMask.fieldPaths=directives', {
          method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body),
        });
        return true;
      } catch (e) { return false; }
    },

    /* Mevcut directives'i oku (ebeveyn düzenlerken üstüne eklesin diye) */
    async readDirectives(playerKey) {
      if (!enabled()) return {};
      try {
        const doc = await req(playerDoc(getCode(), playerKey), { method: 'GET' });
        return doc && doc.fields && doc.fields.directives ? JSON.parse(doc.fields.directives.stringValue) : {};
      } catch (e) { return {}; }
    },

    init() {
      if (!configured()) return;
      // Kaydedince buluta gönder (debounce'lu)
      let t = null;
      B.Bus.on(B.Events.GAME_SAVED, () => {
        if (!enabled()) return;
        clearTimeout(t); t = setTimeout(() => B.Cloud.pushSave(), 1500);
      });
    },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/core/auth-cloud.js === */
/* BOKUL — Ebeveyn E-posta Hesabı (Firebase Authentication, REST — SDK yok)
 * Ebeveyn kendi e-postasıyla kayıt olur; Firebase doğrulama ve "şifremi unuttum"
 * e-postalarını ücretsiz gönderir. Çocuklar e-postasız kalır (profillere dokunur).
 * Oturum bilgisi cihazda saklanır (bokul.parent). */
(function (B) {
  const SESS = 'bokul.parent';
  const IDT = 'https://identitytoolkit.googleapis.com/v1/accounts:';
  const TOK = 'https://securetoken.googleapis.com/v1/token';

  function key() { return B.Cloud ? B.Cloud.apiKey() : ''; }
  function available() { return !!key(); }

  function readSess() { try { return JSON.parse(localStorage.getItem(SESS)); } catch (e) { return null; } }
  function writeSess(s) { try { localStorage.setItem(SESS, JSON.stringify(s)); } catch (e) {} }

  const ERR = {
    EMAIL_EXISTS: 'Bu e-posta zaten kayıtlı. Giriş yapmayı dene.',
    INVALID_EMAIL: 'Geçersiz e-posta adresi.',
    MISSING_PASSWORD: 'Şifre gir.',
    WEAK_PASSWORD: 'Şifre en az 6 karakter olmalı.',
    EMAIL_NOT_FOUND: 'Bu e-posta kayıtlı değil.',
    INVALID_PASSWORD: 'Şifre yanlış.',
    INVALID_LOGIN_CREDENTIALS: 'E-posta veya şifre hatalı.',
    USER_DISABLED: 'Bu hesap devre dışı.',
    TOO_MANY_ATTEMPTS_TRY_LATER: 'Çok fazla deneme. Biraz sonra tekrar dene.',
  };
  function trErr(msg) { return ERR[(msg || '').split(' ')[0]] || ('Bir hata oldu: ' + (msg || '')); }

  async function post(url, body) {
    const res = await fetch(url + (url.includes('?') ? '&' : '?') + 'key=' + key(), {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body),
    });
    const data = await res.json();
    if (!res.ok) throw new Error((data.error && data.error.message) || 'HATA');
    return data;
  }

  /* idToken süresi dolduysa refresh et (1 saat) */
  async function freshToken() {
    const s = readSess();
    if (!s) return null;
    if (Date.now() < (s.expiresAt || 0) - 60000) return s.idToken;
    try {
      const r = await fetch(TOK + '?key=' + key(), {
        method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'grant_type=refresh_token&refresh_token=' + encodeURIComponent(s.refreshToken),
      });
      const d = await r.json();
      if (d.id_token) {
        s.idToken = d.id_token; s.refreshToken = d.refresh_token;
        s.expiresAt = Date.now() + (parseInt(d.expires_in) || 3600) * 1000;
        writeSess(s);
        return s.idToken;
      }
    } catch (e) {}
    return s.idToken;
  }

  function store(d, extra) {
    const s = Object.assign({
      idToken: d.idToken, refreshToken: d.refreshToken, localId: d.localId, email: d.email,
      expiresAt: Date.now() + (parseInt(d.expiresIn) || 3600) * 1000, emailVerified: false,
    }, extra || {});
    writeSess(s);
    return s;
  }

  /* Hesaba bağlı, deterministik DAVET KODU (uid'den türer; hep aynı) */
  function deriveCode(uid) {
    const abc = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789';
    let h1 = 5381, h2 = 52711;
    for (let i = 0; i < uid.length; i++) { const c = uid.charCodeAt(i); h1 = ((h1 << 5) + h1) ^ c; h2 = (h2 * 33 ^ c) >>> 0; }
    h1 = h1 >>> 0; h2 = h2 >>> 0;
    let s = '', a = h1, b = h2;
    for (let i = 0; i < 4; i++) { s += abc[a % abc.length]; a = Math.floor(a / abc.length); }
    for (let i = 0; i < 4; i++) { s += abc[b % abc.length]; b = Math.floor(b / abc.length); }
    return s;
  }
  /* Giriş yapan ebeveynin bu cihazını kendi ailesine bağla */
  function linkFamily() {
    const s = readSess();
    if (s && s.localId && B.Cloud) B.Cloud.setCode(deriveCode(s.localId));
  }

  B.AuthCloud = {
    available,
    current() { return readSess(); },
    email() { const s = readSess(); return s ? s.email : ''; },
    name() { const s = readSess(); return s && s.name ? s.name : ''; },
    firstName() { const n = B.AuthCloud.name(); return (n || '').trim().split(/\s+/)[0] || ''; },
    isVerified() { const s = readSess(); return !!(s && s.emailVerified); },
    inviteCode() { const s = readSess(); return s && s.localId ? deriveCode(s.localId) : ''; },
    logout() { try { localStorage.removeItem(SESS); } catch (e) {} },

    async register(email, pass, name) {
      try {
        const d = await post(IDT + 'signUp', { email: (email || '').trim(), password: pass, returnSecureToken: true });
        store(d, { name: (name || '').trim() });
        linkFamily(); // davet kodu = bu hesap
        if (name) await B.AuthCloud.setDisplayName(name); // Firebase profiline de yaz
        await B.AuthCloud.sendVerify();
        return { ok: true, needVerify: true };
      } catch (e) { return { ok: false, err: trErr(e.message) }; }
    },

    /* Ebeveynin görünen adını (ad soyad) Firebase profiline ve yerel oturuma yaz */
    async setDisplayName(name) {
      const t = await freshToken();
      if (!t || !name) return { ok: false };
      try {
        await post(IDT + 'update', { idToken: t, displayName: (name || '').trim(), returnSecureToken: false });
        const s = readSess(); if (s) { s.name = (name || '').trim(); writeSess(s); }
        return { ok: true };
      } catch (e) { return { ok: false }; }
    },

    async login(email, pass) {
      try {
        const d = await post(IDT + 'signInWithPassword', { email: (email || '').trim(), password: pass, returnSecureToken: true });
        store(d);
        linkFamily(); // davet kodu = bu hesap
        const v = await B.AuthCloud.refreshVerified();
        return { ok: true, verified: v };
      } catch (e) { return { ok: false, err: trErr(e.message) }; }
    },

    async sendVerify() {
      const t = await freshToken();
      if (!t) return { ok: false };
      try { await post(IDT + 'sendOobCode', { requestType: 'VERIFY_EMAIL', idToken: t }); return { ok: true }; }
      catch (e) { return { ok: false, err: trErr(e.message) }; }
    },

    async sendReset(email) {
      try { await post(IDT + 'sendOobCode', { requestType: 'PASSWORD_RESET', email: (email || '').trim() }); return { ok: true }; }
      catch (e) { return { ok: false, err: trErr(e.message) }; }
    },

    /* Ebeveyn hesabını Firebase'den kalıcı sil (yalnızca kullanıcının kendi isteğiyle) */
    async deleteAccount() {
      const t = await freshToken();
      if (!t) return { ok: false, err: 'Oturum bulunamadı.' };
      try {
        await post(IDT + 'delete', { idToken: t });
        B.AuthCloud.logout();
        return { ok: true };
      } catch (e) {
        const m = e.message || '';
        if (/CREDENTIAL_TOO_OLD|LOGIN_AGAIN|TOKEN_EXPIRED/i.test(m))
          return { ok: false, err: 'Güvenlik için önce çıkış yapıp tekrar giriş yap, sonra sil.' };
        return { ok: false, err: trErr(m) };
      }
    },

    /* Google ile giriş (Firebase Web SDK popup; talep anında yüklenir) */
    async googleSignIn() {
      try {
        const appMod = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js');
        const authMod = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js');
        const app = appMod.initializeApp({
          apiKey: key(), authDomain: B.Cloud.projectId() + '.firebaseapp.com', projectId: B.Cloud.projectId(),
        }, 'bokul-google');
        const auth = authMod.getAuth(app);
        const res = await authMod.signInWithPopup(auth, new authMod.GoogleAuthProvider());
        const u = res.user;
        const idToken = await u.getIdToken();
        writeSess({ idToken, refreshToken: u.refreshToken, localId: u.uid, email: u.email,
          name: u.displayName || '', // Google profil adı (Binbaşı hitabı için)
          emailVerified: !!u.emailVerified, expiresAt: Date.now() + 3600000 });
        linkFamily();
        return { ok: true };
      } catch (e) {
        const c = e && (e.code || e.message) || '';
        if (/popup-closed|cancelled/i.test(c)) return { ok: false, err: 'Google penceresi kapatıldı.' };
        return { ok: false, err: 'Google girişi olmadı: ' + c };
      }
    },

    /* E-posta doğrulandı mı? (kullanıcı linke tıkladıysa) */
    async refreshVerified() {
      const t = await freshToken();
      if (!t) return false;
      try {
        const d = await post(IDT + 'lookup', { idToken: t });
        const u = d.users && d.users[0];
        const v = !!(u && u.emailVerified);
        const s = readSess(); if (s) { s.emailVerified = v; if (u && u.displayName) s.name = u.displayName; writeSess(s); }
        return v;
      } catch (e) { return B.AuthCloud.isVerified(); }
    },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/core/consent.js === */
/* BOKUL — KVKK / Sözleşme Onayı
 * Kayıt işleminden ÖNCE zorunlu onay. Onaylamayan kayıt olamaz.
 * Onay cihazda saklanır (bokul.consent); metin sürümü değişirse yeniden istenir. */
(function (B) {
  const KEY = 'bokul.consent';
  function legal() { return B.Content.get('legal') || { version: 1, kvkk: '', terms: '', items: [] }; }

  B.Consent = {
    accepted() {
      try { const c = JSON.parse(localStorage.getItem(KEY)); return !!(c && c.version === legal().version); }
      catch (e) { return false; }
    },
    store() {
      try { localStorage.setItem(KEY, JSON.stringify({ version: legal().version, ts: new Date().toISOString() })); } catch (e) {}
    },
    /* Kayıtlı onay bilgisi (tarih/sürüm) veya null */
    info() { try { return JSON.parse(localStorage.getItem(KEY)) || null; } catch (e) { return null; } },
    /* Rızayı geri çek — bir sonraki kayıt yeniden onay ister */
    withdraw() { try { localStorage.removeItem(KEY); } catch (e) {} },
    /* Onay varsa hemen devam; yoksa metni göster, onayda çalıştır */
    require(onAccepted) {
      if (B.Consent.accepted()) return onAccepted();
      B.Consent.show(onAccepted);
    },
    show(onAccepted) {
      const L = legal();
      const ov = document.createElement('div');
      ov.className = 'overlay consent-ov';
      ov.innerHTML =
        '<div class="consent-card">' +
          '<h2>📋 Onay Gerekli</h2>' +
          '<p class="consent-lead">Devam etmek için aşağıdaki metinleri okuyup onaylaman gerekir.</p>' +
          '<div class="consent-tabs"><button class="chip ctab ctab-on" data-t="kvkk">📄 KVKK Aydınlatma</button>' +
          '<button class="chip ctab" data-t="terms">📜 Kullanıcı Sözleşmesi</button></div>' +
          '<div class="consent-body"></div>' +
          '<div class="consent-checks">' +
            (L.items || []).map((it, i) => '<label class="consent-check"><input type="checkbox" data-i="' + i + '"><span>' + it + '</span></label>').join('') +
          '</div>' +
          '<div class="consent-btns"><button class="btn btn-quiet consent-reject">Reddet</button>' +
          '<button class="btn btn-action consent-accept" disabled>✓ KABUL ET VE DEVAM ET</button></div>' +
        '</div>';
      document.body.appendChild(ov);
      const body = ov.querySelector('.consent-body');
      function render(t) { body.innerHTML = (t === 'terms' ? L.terms : L.kvkk); body.scrollTop = 0; }
      render('kvkk');
      ov.querySelectorAll('.ctab').forEach(b => b.onclick = () => {
        ov.querySelectorAll('.ctab').forEach(x => x.classList.toggle('ctab-on', x === b));
        render(b.dataset.t);
      });
      const checks = ov.querySelectorAll('.consent-check input');
      const accept = ov.querySelector('.consent-accept');
      checks.forEach(c => c.onchange = () => { accept.disabled = !Array.prototype.every.call(checks, x => x.checked); });
      accept.onclick = () => { B.Consent.store(); ov.remove(); onAccepted(); };
      ov.querySelector('.consent-reject').onclick = () => { ov.remove(); B.UI.toast('Onaylamadan kayıt olunamaz.'); };
    },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/core/perms.js === */
/* BOKUL — İzinler (Ebeveyn Kilitleri)
 * Ebeveyn her çocuk için hangi derslere (cephe) ve hangi bölümlere
 * erişilebileceğini belirler. İzinler kayıtta tutulur (save.perms) ve
 * bulutta "directives" ile uzaktan da ayarlanabilir.
 * Kural: KAYIT YOKSA = SERBEST (varsayılan açık). Yalnızca engellenenler saklanır. */
(function (B) {
  function P(save) {
    const s = save || (B.State && B.State.data) || {};
    if (!s.perms) s.perms = {};
    if (!s.perms.lessons) s.perms.lessons = {};
    if (!s.perms.features) s.perms.features = {};
    return s.perms;
  }

  B.Perms = {
    /* Kilitlenebilir oyun bölümleri (derslerin dışında) */
    FEATURES: [
      { key: 'shop', icon: '🏠', name: 'Evim / Kıyafet Dükkânı' },
      { key: 'store', icon: '📦', name: 'Eşya Mağazası / Depom' },
      { key: 'pets', icon: '🐾', name: 'Evcil Hayvanlar' },
      { key: 'quests', icon: '📋', name: 'Günlük Görevler' },
      { key: 'wishes', icon: '🎁', name: 'Dilek Kutusu' },
      { key: 'story', icon: '🎬', name: 'Hikâye Sineması' },
    ],

    ensure(save) { return P(save); },

    /* Ders erişilebilir mi? (kayıt yoksa serbest) */
    lesson(id, save) { return P(save).lessons[id] !== false; },
    /* Özellik erişilebilir mi? */
    feature(name, save) { return P(save).features[name] !== false; },

    /* Ebeveyn: dersi aç/kapa (açıksa kaydı sil — varsayılan açık kalsın) */
    setLesson(id, allowed, save) {
      const p = P(save);
      if (allowed) delete p.lessons[id]; else p.lessons[id] = false;
    },
    setFeature(name, allowed, save) {
      const p = P(save);
      if (allowed) delete p.features[name]; else p.features[name] = false;
    },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/core/items.js === */
/* BOKUL — Eşya Sistemi (Mağaza + Depo)
 * Çocuk altınla "gerçek dünya" eşyaları alır (konsol, tablet, akvaryum malzemesi…)
 * ve bunları Evim'deki Depom'da saklar. Bazı eşyalar tekildir (unique), bazıları
 * (evcil hayvan malzemeleri) adetlidir ve ileride craft'ta kullanılır.
 * Envanter: B.State.data.inventory.items = { itemId: adet } */
(function (B) {
  function inv() {
    const i = B.State.data.inventory;
    if (!i.items) i.items = {};
    return i.items;
  }
  function data() { return B.Content.get('items') || { categories: [], items: [] }; }

  B.Items = {
    ensure() { inv(); },
    catalog() { return data().items; },
    categories() { return data().categories; },
    get(id) { return data().items.find(x => x.id === id) || null; },
    catName(cat) { const c = data().categories.find(x => x.id === cat); return c ? c.name : cat; },

    count(id) { return inv()[id] || 0; },
    have(id, n) { return (inv()[id] || 0) >= (n || 1); },
    total() { return Object.values(inv()).reduce((t, n) => t + n, 0); },
    ownedList() {
      const m = inv();
      return Object.keys(m).filter(k => m[k] > 0)
        .map(k => ({ item: B.Items.get(k), count: m[k] }))
        .filter(x => x.item);
    },

    /* Craft ve ödül sistemleri için düşük seviye ekle/çıkar */
    add(id, n) { const m = inv(); m[id] = (m[id] || 0) + (n || 1); B.Save.saveSoon(); },
    remove(id, n) {
      const m = inv(); m[id] = Math.max(0, (m[id] || 0) - (n || 1));
      if (!m[id]) delete m[id]; B.Save.saveSoon();
    },

    /* Mağazadan satın al */
    buy(id) {
      const it = B.Items.get(id);
      if (!it) return { ok: false, err: 'Eşya bulunamadı.' };
      if (it.unique && B.Items.count(id) > 0) return { ok: false, err: 'Bu eşya zaten sende var.' };
      if (!B.Reward.spendCoins(it.price)) return { ok: false, err: 'Altının yetmiyor! Görev ve harekâtlardan kazan.' };
      B.Items.add(id, 1);
      B.Bus.emit(B.Events.ITEM_BOUGHT || 'item-bought', { itemId: id });
      return { ok: true, item: it };
    },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/core/craft.js === */
/* BOKUL — Craft (Atölye)
 * Ham malzeme → parça → büyük eşya → ev/depo geliştirme zinciri.
 * Bir üretim birden fazla adet malzeme isteyebilir. Ürettiğin parçalar
 * başka tariflerde malzeme olur (kademeli craft). Öğretici: her tarifin
 * bir "teach" açıklaması vardır; Baba Komutan örnekle anlatır. */
(function (B) {
  function data() { return B.Content.get('recipes') || { recipes: [], tiers: [] }; }

  B.Craft = {
    intro() { return data().intro || ''; },
    tiers() { return data().tiers || []; },
    recipes() { return data().recipes || []; },
    get(id) { return data().recipes.find(r => r.id === id) || null; },

    /* Bu tarif için eksik malzemeler: [{ id, name, icon, have, need }] */
    missing(r) {
      const out = [];
      Object.keys(r.needs || {}).forEach(k => {
        const need = r.needs[k], have = B.Items.count(k);
        if (have < need) {
          const it = B.Items.get(k) || { name: k, icon: '❔' };
          out.push({ id: k, name: it.name, icon: it.icon, have, need });
        }
      });
      return out;
    },
    canCraft(r) { return B.Craft.missing(r).length === 0; },

    /* Üret: malzemeleri harca, ürünü ekle (eşya) veya seviyeyi yükselt (upgrade) */
    craft(id) {
      const r = B.Craft.get(id);
      if (!r) return { ok: false, err: 'Tarif bulunamadı.' };
      if (!B.Craft.canCraft(r)) return { ok: false, err: 'Malzemen eksik.' };
      Object.keys(r.needs).forEach(k => B.Items.remove(k, r.needs[k]));
      const p = r.produces || {};
      if (p.type === 'item') B.Items.add(p.id, p.qty || 1);
      else if (p.type === 'upgrade') {
        const pl = B.State.data.player;
        pl[p.id] = (pl[p.id] || 1) + (p.qty || 1);
      }
      B.Bus.emit(B.Events.ITEM_CRAFTED, { recipeId: id });
      B.Save.saveSoon();
      return { ok: true, recipe: r };
    },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/core/pets.js === */
/* BOKUL — Evcil Hayvanlar
 * Ön koşul (craft'lanmış/satın alınmış eşyalar) sağlanınca hayvan sahiplenilir;
 * sahiplenme ön koşul eşyalarını HARCAR (o hayvanın kurulumuna adanır).
 * Her hayvan zamanla acıkır (tokluk) ve üzülür (mutluluk); bakımla düzelir.
 * Her tür farklı bakım aksiyonlarına sahiptir (besle/gezdir/oynat/şarkı...).
 * Durum: B.State.data.pets = [ { uid, type, name, tokluk, mutluluk, lastTick, cooldowns:{}, adoptedAt } ] */
(function (B) {
  function data() { return B.Content.get('pets') || { pets: [], decayPerHour: { tokluk: 6, mutluluk: 4 } }; }
  function list() { const s = B.State.data; if (!s.pets) s.pets = []; return s.pets; }
  function clamp(v) { return Math.max(0, Math.min(100, Math.round(v))); }
  function now() { return Date.now(); }
  let uidSeq = 0;

  function capCfg() { return data().capture || { afterHours: 24, freeAt: 50 }; }

  /* Zaman geçtikçe stat düşür (çürüme); okuma/bakım öncesi çağrılır.
   * Kaçırılmışsa çürüme DURUR (Bulanık'ta donmuş). Uzun süre ihmal edilirse
   * (statlar dipte + afterHours bakımsız) Bulanık kaçırır. */
  function refresh(pet) {
    const t = now();
    if (pet.captured) { pet.lastTick = t; return pet; } // donmuş
    const d = data().decayPerHour || { tokluk: 6, mutluluk: 4 };
    const h = (t - (pet.lastTick || t)) / 3600000;
    if (h > 0) {
      pet.tokluk = clamp((pet.tokluk == null ? 100 : pet.tokluk) - h * d.tokluk);
      pet.mutluluk = clamp((pet.mutluluk == null ? 100 : pet.mutluluk) - h * d.mutluluk);
      pet.lastTick = t;
    }
    // İhmal → kaçırma: statlar dipte VE afterHours boyunca bakım yapılmadı
    if (pet.tokluk <= 2 && pet.mutluluk <= 2) {
      const since = t - (pet.lastCared || pet.adoptedTs || pet.lastTick || t);
      if (since >= (capCfg().afterHours || 24) * 3600000) {
        pet.captured = true; pet.capturedAt = t;
        B.Bus.emit(B.Events.PET_CAPTURED, { petId: pet.uid, type: pet.type });
        B.Save.saveSoon();
      }
    }
    return pet;
  }

  B.Pets = {
    ensure() { list(); },
    intro() { return data().intro || ''; },
    types() { return data().pets || []; },
    typeDef(typeId) { return (data().pets || []).find(p => p.id === typeId) || null; },

    adopted() { return list().map(refresh); },
    get(uid) { const p = list().find(x => x.uid === uid); return p ? refresh(p) : null; },
    hasType(typeId) { return list().some(p => p.type === typeId); },

    /* Ön koşulda eksik eşyalar: [{item,name,icon,have,need}] */
    missingPrereq(typeId) {
      const def = B.Pets.typeDef(typeId); if (!def) return [];
      const out = [];
      (def.prereq || []).forEach(r => {
        const have = B.Items.count(r.item);
        if (have < r.n) {
          const it = B.Items.get(r.item) || { name: r.item, icon: '❔' };
          out.push({ item: r.item, name: it.name, icon: it.icon, have, need: r.n });
        }
      });
      return out;
    },
    canAdopt(typeId) { return !B.Pets.hasType(typeId) && B.Pets.missingPrereq(typeId).length === 0; },

    /* Sahiplen: ön koşulları HARCA, hayvanı ekle */
    adopt(typeId, name) {
      const def = B.Pets.typeDef(typeId);
      if (!def) return { ok: false, err: 'Tür bulunamadı.' };
      if (B.Pets.hasType(typeId)) return { ok: false, err: 'Bu türden zaten var.' };
      if (B.Pets.missingPrereq(typeId).length) return { ok: false, err: 'Ön koşul eşyaların eksik.' };
      (def.prereq || []).forEach(r => B.Items.remove(r.item, r.n)); // kurulum harcanır
      const pet = {
        uid: 'p' + now().toString(36) + (uidSeq++), type: typeId,
        name: (name || def.name).trim().slice(0, 14) || def.name,
        tokluk: 100, mutluluk: 100, lastTick: now(), lastCared: now(), captured: false,
        cooldowns: {}, adoptedAt: new Date().toISOString(), adoptedTs: now(),
      };
      list().push(pet);
      B.Bus.emit(B.Events.PET_ADOPTED, { petId: pet.uid, type: typeId });
      B.Save.saveSoon();
      return { ok: true, pet, def };
    },

    /* Bir bakım aksiyonu kaç saat sonra tekrar yapılabilir (0 = şimdi) */
    cooldownLeft(pet, action) {
      if (!action.cooldownH) return 0;
      const last = (pet.cooldowns || {})[action.id] || 0;
      const left = (last + action.cooldownH * 3600000) - now();
      return left > 0 ? left : 0;
    },

    /* Bakım aksiyonu uygula */
    care(uid, actionId) {
      const pet = B.Pets.get(uid); if (!pet) return { ok: false, err: 'Hayvan yok.' };
      const def = B.Pets.typeDef(pet.type); if (!def) return { ok: false, err: 'Tür yok.' };
      const act = (def.care || []).find(a => a.id === actionId);
      if (!act) return { ok: false, err: 'Aksiyon yok.' };
      if (B.Pets.cooldownLeft(pet, act) > 0) return { ok: false, err: 'Biraz bekle, sonra tekrar yap.' };
      // İşe yarar mı? İlgili statlar zaten doluysa malzeme boşa harcanmasın
      if (act.restore) {
        const useful = Object.keys(act.restore).some(s => act.restore[s] > 0 && (pet[s] || 0) < 100);
        if (!useful) return { ok: false, err: (pet.name || 'O') + ' zaten gayet iyi — şimdi gerek yok.' };
      }
      // Malzeme gerekiyor mu?
      if (act.consume) {
        for (const k in act.consume) if (!B.Items.have(k, act.consume[k])) {
          const it = B.Items.get(k) || { name: k };
          return { ok: false, err: it.name + ' yok — Mağaza\'dan al.' };
        }
        for (const k in act.consume) B.Items.remove(k, act.consume[k]);
      }
      // Stat düzelt
      if (act.restore) for (const s in act.restore) pet[s] = clamp((pet[s] || 0) + act.restore[s]);
      if (act.cooldownH) { pet.cooldowns = pet.cooldowns || {}; pet.cooldowns[actionId] = now(); }
      pet.lastCared = now(); // ihmal sayacını sıfırla
      // Kaçırılmışsa: bakım = KURTARMA. Ortalama freeAt'e ulaşınca serbest kalır.
      let rescued = false;
      if (pet.captured) {
        const avg = ((pet.tokluk || 0) + (pet.mutluluk || 0)) / 2;
        if (avg >= (capCfg().freeAt || 50)) {
          pet.captured = false; delete pet.capturedAt; rescued = true;
          B.Bus.emit(B.Events.PET_RESCUED, { petId: uid });
        }
      }
      // Ödül
      if (act.xp) B.Reward.addXp(act.xp, 'pet');
      if (act.coin) B.Reward.addCoins(act.coin, 'pet');
      B.Bus.emit(B.Events.PET_CARED, { petId: uid, action: actionId });
      B.Save.saveSoon();
      return { ok: true, pet, act, rescued };
    },

    villain() { return data().villain || 'Bulanık'; },
    isCaptured(pet) { return !!(pet && pet.captured); },

    /* Ruh hali emojisi (kaçırılmışsa karanlık) */
    mood(pet) {
      if (pet && pet.captured) return '😈';
      const avg = ((pet.tokluk || 0) + (pet.mutluluk || 0)) / 2;
      return avg >= 75 ? '😀' : avg >= 50 ? '🙂' : avg >= 25 ? '😐' : '😢';
    },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/core/daily.js === */
/* BOKUL — Günlük Ödül (retention motoru, REKLAMSIZ)
 * Her gün giriş yapınca artan ödül; ardışık günlerde seri büyür, gün kaçırılırsa
 * sıfırlanır. 7 günlük döngü. Amaç: çocuğu her gün ekrana geri getirmek — hiçbir
 * zaman reklam izletmeden, sadece öğrenme+oyun döngüsüyle. */
(function (B) {
  const REWARDS = [
    { coins: 20 }, { coins: 30 }, { coins: 40, chest: 'esya' }, { coins: 50 },
    { coins: 60 }, { coins: 80 }, { coins: 120, chest: 'nadir' },
  ];
  function state() { const s = B.State.data; if (!s.daily) s.daily = { lastClaim: '', streak: 0 }; return s.daily; }
  function today() { return new Date().toISOString().slice(0, 10); }
  function yesterday() { return new Date(Date.now() - 86400000).toISOString().slice(0, 10); }

  B.Daily = {
    ensure() { state(); },
    REWARDS,
    canClaim() { return state().lastClaim !== today(); },
    streak() { return state().streak || 0; },
    /* Bu sefer alınırsa seri kaç olacak (görüntü için) */
    nextStreak() { const s = state(); return (s.lastClaim === yesterday()) ? (s.streak || 0) + 1 : 1; },
    /* Bugünkü döngü günü (0..6) */
    todayIndex() { return (B.Daily.nextStreak() - 1) % 7; },

    claim() {
      if (!B.Daily.canClaim()) return { ok: false };
      const s = state();
      s.streak = (s.lastClaim === yesterday()) ? (s.streak || 0) + 1 : 1;
      s.lastClaim = today();
      const idx = (s.streak - 1) % 7;
      const r = REWARDS[idx];
      B.Reward.addCoins(r.coins, 'daily');
      if (r.chest && B.Chest) B.Chest.earn(r.chest);
      B.Save.saveNow();
      return { ok: true, reward: r, streak: s.streak, dayIndex: idx };
    },

    /* Günlük ödül takvimi (7 kutu) — claimable ise "AL" düğmesiyle */
    show() {
      const claimable = B.Daily.canClaim();
      const todayIdx = B.Daily.todayIndex();
      const streakNow = claimable ? B.Daily.nextStreak() - 1 : B.Daily.streak(); // bu döngüde alınmış gün sayısı
      const claimedInCycle = streakNow % 7; // bugünden önce bu döngüde alınanlar
      const tiles = REWARDS.map((r, i) => {
        const isToday = claimable && i === todayIdx;
        const isClaimed = i < claimedInCycle || (!claimable && i <= todayIdx);
        const cls = isToday ? ' day-today' : isClaimed ? ' day-claimed' : ' day-locked';
        return '<div class="daily-day' + cls + '"><span class="dd-n">' + (i + 1) + '. gün</span>' +
          '<span class="dd-r">💰' + r.coins + (r.chest ? ' 🎁' : '') + '</span>' +
          (isClaimed ? '<span class="dd-ok">✓</span>' : '') + '</div>';
      }).join('');
      const body = '<div class="ov-baba">🎁</div><h2>Günlük Ödül</h2>' +
        '<p class="ov-quote">' + (claimable ? '🔥 ' + B.Daily.nextStreak() + '. gün serisi! Ödülünü al ve yarın yine gel.' : '✅ Bugünkü ödülü aldın. Serin: ' + B.Daily.streak() + ' gün. Yarın devam!') + '</p>' +
        '<div class="daily-cal">' + tiles + '</div>';
      const ov = B.UI.overlay(body, claimable
        ? [{ label: '🎁 ÖDÜLÜ AL', onClick: null }]
        : [{ label: 'Kapat', cls: 'btn-quiet', onClick: null }]);
      if (claimable) {
        ov.querySelector('.overlay-btns .btn').onclick = () => {
          const r = B.Daily.claim(); ov.remove();
          if (!r.ok) return;
          B.Audio.play('fanfare'); if (B.Anim.confetti) B.Anim.confetti(50);
          B.UI.toast('🎁 +' + r.reward.coins + ' Altın' + (r.reward.chest ? ' + sandık!' : '') + ' · 🔥 ' + r.streak + '. gün');
        };
      }
      return ov;
    },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/core/badges.js === */
/* BOKUL — Rozet (nişan) sistemi
 * Her ünite/konu boss'unu yenince bir rozet kazanılır. Rozet kaydı inventory.badges'e
 * yazılır (kazanma anı/tören için), AMA görüntüleme kaynağı sectionProgress.bossDefeated'tir
 * (geriye dönük çalışır — eski oyuncular da bitirdikleri bölümlerin rozetini görür). */
(function (B) {
  function invBadges() {
    const inv = B.State.data.inventory;
    if (!inv.badges) inv.badges = [];
    return inv.badges;
  }

  /* Tüm cephelerin (oyuncuya görünür) boss'larından rozet kataloğu */
  function catalog() {
    const out = [];
    const lessons = (B.Lesson && B.Lesson.forPlayer) ? B.Lesson.forPlayer() : (B.Lesson.all ? B.Lesson.all() : []);
    lessons.forEach(l => (l.units || []).forEach(u => (u.sections || []).forEach(s => {
      const bo = s.boss;
      if (!bo) return;
      out.push({
        id: (bo.rewards && bo.rewards.badge) || bo.id,
        name: bo.name || 'Nişan', icon: bo.icon || '🎖️', tier: bo.tier || 'topic',
        lesson: l.title || '', lessonId: l.id, section: s.title || '', sectionId: s.id,
      });
    })));
    return out;
  }

  /* Bu rozet kazanıldı mı? (boss yenildi mi — otoriter kaynak) */
  function earned(rec) {
    try { return !!B.State.sectionProgress(rec.lessonId, rec.sectionId).bossDefeated; }
    catch (e) { return false; }
  }

  function has(id) { return invBadges().some(b => b.id === id); }

  /* Rozeti kayda geçir (kazanma anı) — bir kez; görüntüleme yine bossDefeated'e dayanır */
  function grant(rec) {
    if (!rec || !rec.id || has(rec.id)) return false;
    invBadges().push({
      id: rec.id, name: rec.name || 'Nişan', icon: rec.icon || '🎖️', tier: rec.tier || 'topic',
      lesson: rec.lesson || '', section: rec.section || '', ts: Date.now(),
    });
    if (B.Bus && B.Events && B.Events.BADGE_EARNED) B.Bus.emit(B.Events.BADGE_EARNED, { id: rec.id, name: rec.name });
    if (B.Save) B.Save.saveSoon();
    return true;
  }

  /* Kazanılmış rozetler (katalogdan, boss yenilmiş olanlar) */
  function ownedList() { return catalog().filter(earned); }
  function stats() { const c = catalog(); return { earned: c.filter(earned).length, total: c.length }; }

  B.Badges = { catalog, earned, has, grant, ownedList, stats };
})(window.BOKUL = window.BOKUL || {});

/* === src/core/tour.js === */
/* BOKUL — Onboarding Turu (Baba Komutan anlatır)
 * Çok adımlı tanıtım overlay'i: her adımda Baba + başlık + metin + İleri.
 * İlk girişte mekanikleri tanıtmak için (ebeveyn akışı, çocuk ekran turu). */
(function (B) {
  B.Tour = {
    /* steps: [{ icon, title, text }] */
    run(steps, onDone) {
      if (!steps || !steps.length) { if (onDone) onDone(); return; }
      let i = 0;
      function show() {
        const s = steps[i];
        const last = i === steps.length - 1;
        const ov = B.UI.overlay(
          '<div class="ov-baba">' + (s.icon || '🧑‍✈️') + '</div>' +
          '<div class="tour-step">Baba Komutan · ' + (i + 1) + '/' + steps.length + '</div>' +
          '<h2>' + s.title + '</h2><p class="ov-quote">' + s.text + '</p>',
          [{ label: last ? 'Anladım! ✓' : 'İleri ▶', onClick: null }].concat(
            last ? [] : [{ label: 'Geç', cls: 'btn-quiet', onClick: null }]));
        const btns = ov.querySelectorAll('.overlay-btns .btn');
        btns[0].onclick = () => { ov.remove(); i++; if (i < steps.length) show(); else if (onDone) onDone(); };
        if (btns[1]) btns[1].onclick = () => { ov.remove(); if (onDone) onDone(); }; // tümünü geç
      }
      show();
    },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/core/content-registry.js === */
/* BOKUL — ContentRegistry
 * JSON içerik paketlerini yükler: önce sayfaya gömülü blok (dist/tek dosya modu),
 * yoksa fetch (geliştirme modu). Hafif şema doğrulaması yapar. */
(function (B) {
  const store = new Map(); // ad -> veri

  /* İçerik adı → gömülü blok id'si: lessons/math-5-division → bokul-content-lessons-math-5-division */
  function embedId(name) { return 'bokul-content-' + name.replace(/\//g, '-'); }

  /* Zorunlu alan kontrolü — hatalı paket oyunu kırmasın, atlansın */
  const validators = {
    'config':    d => ['starThresholds', 'adaptive', 'unitBoss'].every(k => k in d),
    'dialogues': d => d.pools && typeof d.pools === 'object',
    'rewards':   d => d.xp && d.levels && Array.isArray(d.ranks),
    'lesson':    d => d.id && Array.isArray(d.units) && Array.isArray(d.skills),
  };

  B.Content = {
    async load(name) {
      if (store.has(name)) return store.get(name);
      let data = null;
      const el = document.getElementById(embedId(name));
      if (el) {
        data = JSON.parse(el.textContent);
      } else {
        const res = await fetch('content/' + name + '.json');
        if (!res.ok) throw new Error('İçerik yüklenemedi: ' + name);
        data = await res.json();
      }
      const kind = name.startsWith('lessons/') ? 'lesson' : name;
      const check = validators[kind];
      if (check && !check(data)) {
        console.error('[BOKUL] İçerik paketi şemaya uymuyor, atlanıyor: ' + name);
        return null;
      }
      store.set(name, data);
      return data;
    },

    async loadAll(names) {
      for (const n of names) await B.Content.load(n); // sıralı: hata ayıklaması kolay
    },

    get(name) { return store.get(name) || null; },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/engines/audio-manager.js === */
/* BOKUL — AudioManager
 * Harici ses dosyası YOK: tüm efektler Web Audio API ile sentezlenir.
 * Olayları dinler; kimse "ses çal" demez. */
(function (B) {
  let ctx = null;
  let enabled = true;

  function ac() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }

  /* Tek nota: tip, frekans, süre, ses düzeyi, gecikme */
  function tone(type, freq, dur, vol, delay) {
    if (!enabled) return;
    try {
      const a = ac(), t = a.currentTime + (delay || 0);
      const o = a.createOscillator(), g = a.createGain();
      o.type = type; o.frequency.setValueAtTime(freq, t);
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(vol, t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.connect(g); g.connect(a.destination);
      o.start(t); o.stop(t + dur + 0.05);
    } catch (e) { /* ses yoksa oyun devam */ }
  }

  const sfx = {
    tick:    () => tone('square', 720, 0.06, 0.05),
    correct: () => { tone('sine', 660, 0.12, 0.14); tone('sine', 880, 0.16, 0.12, 0.07); },
    wrong:   () => tone('triangle', 220, 0.25, 0.12),               // yumuşak, cezasız
