<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>BOKUL — Baba Okulu Eğitim Üssü</title>

<!-- Geliştirme modu: ayrı dosyalar. build.js bunları tek dosyaya gömer. -->
<style>
/* === src/styles/base.css === */
/* BOKUL — Temel stiller ve "Galaksi Üssü" tasarım token'ları */
:root {
  --bg-deep: #160F2E;
  --bg-panel: #231A48;
  --bg-raised: #31245F;
  --line: #4A3690;
  --ink: #F2EDFF;
  --ink-dim: #A79BC8;
  --accent: #FF4FD8;
  --action: #FF9F1C;
  --xp: #FFD52E;
  --success: #52E88C;
  --warn: #FFB35C;
  --epic: #9D6BFF;
  --legendary: #3DF2D2;
  --mono: Consolas, 'Courier New', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg-deep);
  color: var(--ink);
  font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
  user-select: none;
}

#app {
  height: 100dvh;
  width: 100vw;
  display: flex;
  flex-direction: column;
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  /* Yıldızlı galaksi zemini (saf CSS — dosya yok) */
  background:
    radial-gradient(1px 1px at 15% 25%, #fff8 0, transparent 50%),
    radial-gradient(1px 1px at 65% 15%, #fff6 0, transparent 50%),
    radial-gradient(1.5px 1.5px at 85% 65%, #fff7 0, transparent 50%),
    radial-gradient(1px 1px at 35% 85%, #fff5 0, transparent 50%),
    radial-gradient(1px 1px at 50% 45%, #fff4 0, transparent 50%),
    radial-gradient(ellipse at 70% -10%, #2C1E63 0, transparent 60%),
    var(--bg-deep);
}

button { font-family: inherit; color: inherit; border: none; background: none; cursor: pointer; }

.btn {
  border-radius: 16px;
  font-weight: 800;
  letter-spacing: .5px;
  padding: 12px 22px;
  color: #fff;
  box-shadow: inset 0 -4px 0 rgba(0, 0, 0, .35);
  transition: transform .08s;
}
.btn:active { transform: translateY(2px); box-shadow: inset 0 -2px 0 rgba(0, 0, 0, .35); }
.btn-action { background: linear-gradient(180deg, #FFB443, #F07E00); color: #3a2600; }
.btn-quiet { background: var(--bg-raised); color: var(--ink-dim); }

.chip {
  background: var(--bg-raised);
  border-radius: 99px;
  padding: 5px 12px;
  font-weight: 700;
  font-size: 13px;
  white-space: nowrap;
}

/* === src/styles/components.css === */
/* BOKUL — Ortak bileşenler: HUD, Komutan, ped, bölme tahtası, overlay, efektler */

/* ---------- HUD ---------- */
.hud { display: flex; align-items: center; gap: 10px; padding: 12px 14px; }
.hud-avatar {
  width: 42px; height: 42px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--epic));
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; border: 2px solid var(--xp);
}
.hud-xpbar { flex: 1; height: 18px; background: var(--bg-raised); border-radius: 99px; position: relative; }
.hud-xpbar i {
  display: block; height: 100%; width: 0; border-radius: 99px;
  background: linear-gradient(90deg, var(--xp), var(--action));
  box-shadow: 0 0 8px rgba(255, 213, 46, .5);
  transition: width .4s;
}
.hud-lvl {
  position: absolute; left: -6px; top: -7px; z-index: 1;
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--xp); color: #4a3600; font-weight: 800; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  border: 2px solid #ffe98f;
}

/* ---------- Komutan ---------- */
.commander-wrap { display: flex; flex-direction: column; gap: 8px; align-items: flex-start; }
.commander-face {
  width: 84px; height: 84px; border-radius: 18px; font-size: 46px;
  background: linear-gradient(160deg, #3F2E7E, var(--bg-panel));
  border: 2px solid var(--accent);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 16px rgba(255, 79, 216, .25);
}
.commander-compact .commander-face { width: 60px; height: 60px; font-size: 32px; }
.commander-balloon {
  background: var(--bg-panel); border: 1px solid var(--line);
  border-radius: 14px; padding: 10px 12px;
  font-size: 14px; line-height: 1.4; min-height: 58px; width: 100%;
}

/* ---------- Sayı pedi ---------- */
.numpad {
  display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px;
  padding: 10px 0 4px; max-width: 560px; margin: 0 auto; width: 100%;
}
.numpad .key {
  background: var(--bg-raised); border-radius: 12px;
  padding: 13px 0; font-weight: 800; font-size: 20px; min-height: 48px;
  box-shadow: inset 0 -3px 0 rgba(0, 0, 0, .35);
}
.numpad .key:active { transform: translateY(2px); }
.numpad .key-back { color: var(--warn); }
.numpad .key-go {
  grid-column: span 2;
  background: linear-gradient(180deg, #FFB443, #F07E00);
  color: #3a2600; font-size: 16px;
}
/* SEÇ adımı: rakam tuşları kapalı ama ONAYLA tam parlak — "bozuk" gibi görünmesin */
.numpad-dim .key { opacity: .3; pointer-events: none; }
.numpad-dim .key-go { opacity: 1; pointer-events: auto; animation: goPulse 1.4s infinite; }
@keyframes goPulse { 50% { box-shadow: inset 0 -3px 0 rgba(0,0,0,.35), 0 0 16px rgba(255,159,28,.8); } }
.numpad-mini { grid-template-columns: repeat(6, 1fr); max-width: 400px; }

/* ---------- Uzun bölme tahtası ---------- */
.ld-root { display: flex; flex-direction: column; gap: 10px; height: 100%; }
.ld-problem {
  background: var(--bg-panel); border: 1px dashed var(--epic);
  border-radius: 12px; padding: 10px 14px; font-size: 14.5px; line-height: 1.45;
}
.ld-board {
  flex: 1; display: flex; justify-content: center; align-items: flex-start;
  gap: 0; padding: 14px 6px; background: var(--bg-panel); border-radius: 16px;
  font-family: var(--mono); font-size: clamp(24px, 5vw, 36px); font-weight: 700;
  overflow: auto;
}
.ld-left { display: flex; flex-direction: column; }
.ld-right {
  display: flex; flex-direction: column; align-items: flex-start;
  border-left: 3px solid var(--ink); padding-left: 12px; margin-left: 8px;
}
.ld-divisor { padding: 0 6px 2px; }
.ld-qline { height: 3px; background: var(--ink); align-self: stretch; }
.ld-quotient { display: flex; padding-top: 4px; min-height: 1.3em; color: var(--accent); }
.ld-row { display: flex; }
.ld-cell {
  width: 1.35ch; height: 1.45em; text-align: center;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 8px; margin: 1px 0;
}
.ld-digit { cursor: pointer; }
.ld-select { background: rgba(255, 79, 216, .22); box-shadow: inset 0 -3px 0 var(--accent); }
.ld-pulse { animation: ldPulse 1.1s infinite; }
@keyframes ldPulse { 50% { background: rgba(255, 213, 46, .3); } }
.ld-active {
  border: 2px solid var(--accent);
  box-shadow: 0 0 10px rgba(255, 79, 216, .55);
  color: var(--accent); min-width: 1.35ch;
}
.ld-ghost { border-style: dashed; opacity: .8; }
.ld-done { color: var(--ink); }
.ld-sep .ld-cell { color: var(--ink-dim); }
.ld-product .ld-cell, .ld-rem .ld-cell { color: var(--ink); }
.ld-sign-cell { color: var(--ink-dim); }
.ld-quotient .ld-cell.ld-done { color: var(--accent); }
.ld-shake { animation: ldShake .32s; }
@keyframes ldShake {
  20% { transform: translateX(-6px); } 40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); } 80% { transform: translateX(4px); }
}

/* ---------- Overlay / tören ---------- */
.overlay {
  position: fixed; inset: 0; z-index: 50;
  background: rgba(10, 6, 26, .82);
  display: flex; align-items: center; justify-content: center;
  animation: ovIn .25s;
}
@keyframes ovIn { from { opacity: 0; } }
.overlay-card {
  background: var(--bg-panel); border: 2px solid var(--line);
  border-radius: 24px; padding: 28px 34px; text-align: center;
  max-width: min(480px, 92vw);
  box-shadow: 0 20px 60px rgba(0, 0, 0, .6);
  animation: cardPop .35s cubic-bezier(.2, 1.6, .4, 1);
}
@keyframes cardPop { from { transform: scale(.7); opacity: 0; } }
.overlay-card h2 { margin: 8px 0; letter-spacing: 1px; }
.overlay-btns { display: flex; gap: 10px; justify-content: center; margin-top: 18px; flex-wrap: wrap; }
.ov-big { font-size: 54px; }
.ov-rank { font-size: 44px; margin-top: 6px; }
.ov-ranktitle { color: var(--xp); font-weight: 800; }
.ov-quote { color: var(--ink-dim); font-style: italic; margin-top: 10px; font-size: 14px; }
.ov-xp { color: var(--xp); font-weight: 800; margin-top: 8px; }
.ov-stars { font-size: 46px; letter-spacing: 6px; }
.ov-star { color: var(--bg-raised); display: inline-block; }
.ov-star.lit { color: var(--xp); animation: starPop .5s cubic-bezier(.2, 1.8, .4, 1) both; text-shadow: 0 0 18px rgba(255, 213, 46, .8); }
@keyframes starPop { from { transform: scale(0) rotate(-40deg); } }
.name-input {
  margin-top: 12px; padding: 12px 16px; border-radius: 12px; border: 2px solid var(--line);
  background: var(--bg-deep); color: var(--ink); font-size: 18px; font-weight: 700;
  text-align: center; width: 100%; outline: none;
}
.name-input:focus { border-color: var(--accent); }

/* ---------- Toast ---------- */
.toast {
  position: fixed; top: -60px; left: 50%; transform: translateX(-50%);
  background: var(--bg-raised); border: 1px solid var(--line);
  border-radius: 99px; padding: 10px 20px; font-weight: 700; font-size: 14px;
  z-index: 60; transition: top .35s cubic-bezier(.2, 1.4, .4, 1);
}
.toast-show { top: 16px; }

/* ---------- Efektler ---------- */
.fx-xp {
  position: fixed; z-index: 55; pointer-events: none;
  color: var(--xp); font-weight: 800; font-size: 18px;
  text-shadow: 0 0 10px rgba(255, 213, 46, .8);
  transition: transform .8s cubic-bezier(.3, 0, .6, 1), opacity .8s;
}
.fx-confetti {
  position: fixed; top: 40vh; z-index: 55; pointer-events: none;
  width: 10px; height: 14px; border-radius: 3px;
  animation: confFall 1.9s ease-in forwards;
}
@keyframes confFall {
  to { transform: translate(var(--dx), 70vh) rotate(var(--dr)); opacity: 0; }
}

/* ---------- v0.7: Avatar / Komutan SVG ---------- */
.avatar-holder { display: inline-block; width: 100%; height: 100%; position: relative; }
.avatar-holder svg { width: 100%; height: 100%; display: block; }
.avatar-photo {
  width: 100%; height: 100%; object-fit: cover; border-radius: 50%;
  border: 2px solid var(--xp); display: block;
}
.avatar-ring-svg { position: absolute; inset: -4px; width: calc(100% + 8px) !important; height: calc(100% + 8px) !important; }
.hud-avatar { width: 44px; height: 44px; flex: none; }
.commander-face svg { width: 100%; height: 100%; display: block; }
.commander-face { background: linear-gradient(160deg, #3F2E7E, var(--bg-panel)); overflow: hidden; }
.boss-face svg { width: 88%; height: 88%; }
.boss-face.boss-enter { animation: bossEnter .8s cubic-bezier(.2, 1.4, .4, 1), bossIdle 2.6s ease-in-out .8s infinite; }
@keyframes bossEnter { from { transform: scale(.2) translateY(-40px); filter: blur(6px); opacity: 0; } }

/* ---------- v0.7: Sandık töreni (CSS 3D) ---------- */
.chest-overlay { perspective: 900px; }
.chest-scene { display: flex; flex-direction: column; align-items: center; gap: 14px; text-align: center; }
.chest-title { font-weight: 800; letter-spacing: 2px; color: var(--xp); }
.chest3d { position: relative; width: 150px; height: 130px; cursor: pointer; transform-style: preserve-3d; }
.chest-body {
  position: absolute; inset: 30px 0 0 0; border-radius: 16px;
  background: linear-gradient(180deg, #7a5217, #59390c);
  border: 3px solid #FFD52E; font-size: 56px;
  display: flex; align-items: center; justify-content: center;
}
.chest-lid {
  position: absolute; top: 0; left: -4px; right: -4px; height: 42px; border-radius: 14px 14px 6px 6px;
  background: linear-gradient(180deg, #96682199, #6b4610); background-color: #966821;
  border: 3px solid #FFD52E; transform-origin: top center;
  transition: transform .5s cubic-bezier(.3, 1.6, .4, 1); z-index: 2;
}
.chest-glow {
  position: absolute; inset: -20px; border-radius: 50%; opacity: 0;
  background: radial-gradient(circle, rgba(255,213,46,.55) 0%, transparent 70%);
  transition: opacity .4s;
}
.chest-shake { animation: chestShake 1.2s infinite; }
@keyframes chestShake {
  0%, 100% { transform: rotate(0); } 8% { transform: rotate(-5deg); }
  16% { transform: rotate(5deg); } 24% { transform: rotate(-3deg); } 32% { transform: rotate(0); }
}
.chest-open .chest-lid { transform: rotateX(-115deg); }
.chest-open .chest-glow { opacity: 1; }
.chest-hint { color: var(--ink-dim); font-size: 13px; min-height: 18px; }
.loot-card {
  background: var(--bg-panel); border: 3px solid var(--rar, #A79BC8); border-radius: 18px;
  padding: 14px 22px; min-width: 170px;
  box-shadow: 0 0 24px color-mix(in srgb, var(--rar) 55%, transparent);
  animation: lootIn .6s cubic-bezier(.2, 1.5, .4, 1);
}
@keyframes lootIn { from { transform: rotateY(90deg) scale(.6); opacity: 0; } }
.loot-rarity { font-size: 11px; font-weight: 800; letter-spacing: 2px; color: var(--rar); }
.loot-art { width: 100px; height: 100px; margin: 8px auto; }
.loot-art svg { width: 100%; height: 100%; }
.loot-xp { display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: 900; color: var(--xp); }
.loot-name { font-weight: 800; }
.loot-title-art { font-size: 54px; text-align: center; }
.loot-coins { color: var(--xp); font-weight: 800; }

/* ---------- v0.7: Dolap / Dükkân ---------- */
.locker-layout { flex: 1; display: grid; grid-template-columns: 240px 1fr; gap: 14px; padding: 8px 16px 16px; min-height: 0; }
.locker-left { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.locker-preview { width: 170px; height: 170px; }
.locker-name { font-weight: 900; font-size: 20px; letter-spacing: 1px; }
.locker-right { display: flex; flex-direction: column; min-height: 0; }
.locker-tabs { display: flex; gap: 8px; flex-wrap: wrap; padding-bottom: 10px; }
.tab-btn.tab-on { background: var(--accent); color: #3a0a2e; }
.locker-parts { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
.part-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(96px, 1fr)); gap: 10px; }
.part-card {
  background: var(--bg-panel); border: 2px solid var(--line); border-radius: 14px;
  padding: 8px 6px; display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.part-card:active { transform: scale(.96); }
.part-on { border-color: var(--success); box-shadow: 0 0 10px rgba(82, 232, 140, .4); }
.part-locked .part-prev { filter: grayscale(.9) brightness(.6); }
.part-prev { width: 64px; height: 64px; }
.part-prev svg { width: 100%; height: 100%; }
.part-name { font-size: 11px; font-weight: 700; color: var(--ink-dim); }
.part-price { font-size: 11px; font-weight: 800; color: var(--xp); }
.photo-panel { text-align: center; display: flex; flex-direction: column; gap: 12px; padding: 14px; background: var(--bg-panel); border-radius: 14px; }
.photo-input { display: none; }
.photo-btns { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
.chest-float {
  position: absolute; right: 20px; bottom: 120px; z-index: 5;
  font-size: 40px; background: none; text-align: center;
  filter: drop-shadow(0 0 12px rgba(255, 213, 46, .8));
  animation: chestShake 1.4s infinite;
}
.chest-float small { display: block; font-size: 11px; color: var(--xp); font-weight: 800; }

/* ---------- v0.7.1: Canlı karakterler ---------- */
.commander-idle { animation: cmdBreath 3.2s ease-in-out infinite; }
@keyframes cmdBreath {
  0%, 100% { transform: translateY(0) rotate(0); }
  50% { transform: translateY(-3px) rotate(-1deg); }
}
.boss-face { animation: bossIdle 2.6s ease-in-out infinite; }
@keyframes bossIdle {
  0%, 100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-4px) scale(1.03); }
}

/* === src/styles/screens.css === */
/* BOKUL — Ekran yerleşimleri: splash, üs, harita, harekât, boss, teach */

.screen { flex: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }

/* ---------- Splash ---------- */
#splash {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 14px; text-align: center; height: 100dvh;
}
.splash-logo { font-size: 64px; animation: floatY 3s ease-in-out infinite; }
@keyframes floatY { 50% { transform: translateY(-10px); } }
.splash-title { font-size: 56px; font-weight: 900; letter-spacing: 6px; }
.splash-title span { color: var(--accent); text-shadow: 0 0 24px rgba(255, 79, 216, .6); }
.splash-sub { color: var(--ink-dim); letter-spacing: 3px; font-size: 14px; margin-bottom: 14px; }
.splash-note { color: var(--ink-dim); font-size: 11px; margin-top: 22px; opacity: .7; }
.splash-error { color: var(--warn); margin-top: 16px; font-size: 14px; }
#splash-start { font-size: 20px; padding: 16px 38px; }

/* ---------- Üs (home) ---------- */
.home-mid { flex: 1; display: flex; align-items: center; justify-content: center; padding: 10px 18px; }
.home-mid .commander-wrap { max-width: 620px; flex-direction: row; align-items: center; }
.home-mid .commander-face { width: 110px; height: 130px; font-size: 60px; flex: none; }
.home-mid .commander-balloon { font-size: 16px; }
.home-doors { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 12px; padding: 0 18px 20px; max-width: 760px; width: 100%; margin: 0 auto; }
.door { font-size: 15px; line-height: 1.5; padding: 18px 8px; }
.door-main { background: linear-gradient(180deg, #FFB443, #F07E00); color: #3a2600; font-size: 19px; }
.door-side { background: linear-gradient(180deg, #43318C, var(--bg-raised)); }
.door-locked { opacity: .6; }

/* ---------- Harita ---------- */
.map-title { text-align: center; font-weight: 800; letter-spacing: 1px; padding: 2px 12px 10px; }
.map-scroll { flex: 1; overflow-y: auto; padding: 0 14px 24px; display: flex; flex-direction: column; gap: 12px; }
.map-unit { color: var(--xp); font-weight: 800; letter-spacing: 2px; font-size: 13px; margin-top: 8px; }
.map-section {
  background: var(--bg-panel); border: 1px solid var(--line);
  border-radius: 18px; padding: 12px 14px;
}
.map-locked { opacity: .55; }
.map-sec-head { display: flex; align-items: center; gap: 10px; }
.map-sec-head b { flex: 1; }
.map-stars { color: var(--xp); font-size: 13px; font-weight: 700; }
.map-path { display: flex; gap: 10px; margin-top: 12px; overflow-x: auto; padding: 6px 2px 14px; align-items: center; }
.map-node {
  flex: none; width: 60px; height: 60px; border-radius: 50%;
  background: var(--bg-raised); border: 3px solid var(--line);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-size: 22px; position: relative;
}
.map-node small { font-size: 8.5px; color: var(--xp); letter-spacing: 1px; margin-top: -2px; white-space: nowrap; }
.node-done { border-color: var(--success); }
.node-active { border-color: var(--accent); animation: nodePulse 1.6s infinite; }
@keyframes nodePulse { 50% { box-shadow: 0 0 20px rgba(255, 79, 216, .9); } }
.node-locked { opacity: .4; filter: grayscale(1); pointer-events: none; }
.map-boss { width: 76px; height: 76px; border-radius: 20px; border-color: var(--epic); font-size: 28px; }
.map-uboss { width: 88px; height: 88px; border-color: var(--legendary); font-size: 34px; }
.map-boss small { font-size: 8px; color: var(--epic); }
.map-uboss small { color: var(--legendary); }
.map-soon {
  text-align: center; color: var(--ink-dim); font-size: 13px;
  border: 1px dashed var(--line); border-radius: 14px; padding: 14px;
}

/* ---------- Harekât / Boss ortak yerleşim ---------- */
.mission-title { text-align: center; font-weight: 800; font-size: 14px; letter-spacing: 1px; color: var(--ink-dim); }
.mission-layout {
  flex: 1; display: grid; grid-template-columns: 200px 1fr;
  gap: 12px; padding: 10px 14px 14px; min-height: 0;
}
.mission-left { display: flex; flex-direction: column; gap: 8px; min-width: 0; }
.mission-stage { display: flex; flex-direction: column; min-height: 0; min-width: 0; }

/* Dar ekran: komutan üste, tek kolon */
@media (max-width: 720px) {
  .mission-layout { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
  .mission-left .commander-wrap { flex-direction: row; align-items: center; }
  .mission-left .commander-face { width: 48px; height: 48px; font-size: 26px; }
  .commander-balloon { min-height: 44px; font-size: 13px; }
}

/* ---------- Boss ---------- */
.boss-head {
  display: flex; align-items: center; gap: 12px; padding: 6px 16px;
}
.boss-face {
  width: 64px; height: 64px; border-radius: 16px; font-size: 36px; flex: none;
  background: linear-gradient(160deg, #5A3E9E, #2A1D52);
  border: 2px solid var(--epic);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 16px rgba(157, 107, 255, .5);
}
.boss-unit .boss-face { border-color: var(--legendary); box-shadow: 0 0 16px rgba(61, 242, 210, .4); }
.boss-info { flex: 1; }
.boss-name { font-weight: 800; letter-spacing: 1px; font-size: 13px; color: var(--epic); margin-bottom: 5px; }
.boss-unit .boss-name { color: var(--legendary); }
.boss-hp { height: 18px; background: var(--bg-raised); border-radius: 99px; overflow: hidden; }
.boss-hp i {
  display: block; height: 100%; width: 100%;
  background: linear-gradient(180deg, var(--accent), #A62B8C);
  transition: width .45s;
}
.boss-shield { font-size: 12px; color: var(--warn); font-weight: 700; min-width: 90px; text-align: right; }
.boss-hit .boss-face { animation: bossHit .35s; }
@keyframes bossHit { 30% { transform: scale(.9) rotate(-6deg); filter: brightness(1.8); } }
.boss-quake { animation: quake .4s; }
@keyframes quake {
  20% { transform: translate(-7px, 3px); } 40% { transform: translate(7px, -3px); }
  60% { transform: translate(-5px, 2px); } 80% { transform: translate(5px, -2px); }
}
.boss-armor { text-align: center; font-size: 13px; color: var(--ink-dim); padding: 2px 0 4px; }
.armor-plate { font-size: 22px; margin: 0 3px; filter: drop-shadow(0 0 6px rgba(61, 242, 210, .7)); }
.armor-plate.broken { opacity: .3; filter: grayscale(1); }
.boss-armor small { display: block; font-size: 10px; margin-top: 2px; }

/* ---------- Teach sahnesi ---------- */
.teach-stage {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 16px; background: var(--bg-panel); border-radius: 16px; padding: 18px; overflow: auto;
}
.teach-say { font-size: 70px; }
.teach-next { align-self: center; margin-top: 10px; }
.deal-supply { font-size: 22px; font-weight: 800; }
.deal-count { color: var(--xp); }
.deal-groups { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
.deal-group {
  min-width: 120px; min-height: 110px; background: var(--bg-raised);
  border: 2px dashed var(--line); border-radius: 16px; padding: 10px; cursor: pointer;
  transition: border-color .15s;
}
.deal-group:hover { border-color: var(--accent); }
.deal-group-title { font-weight: 800; font-size: 12px; color: var(--ink-dim); text-align: center; margin-bottom: 6px; }
.deal-crates { display: flex; flex-wrap: wrap; gap: 2px; justify-content: center; font-size: 18px; max-width: 130px; }
.pv-number { font-size: 30px; font-weight: 800; font-family: var(--mono); }
.pv-table { display: flex; gap: 24px; }
.pv-col { text-align: center; }
.pv-title { font-size: 11px; letter-spacing: 2px; color: var(--ink-dim); margin-bottom: 8px; }
.pv-blocks { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; max-width: 220px; }
.pv-ten {
  background: var(--epic); color: #fff; border-radius: 8px;
  padding: 14px 8px; font-weight: 800; font-size: 14px;
}
.pv-one {
  background: var(--xp); color: #4a3600; border-radius: 6px;
  padding: 6px 8px; font-weight: 800; font-size: 12px;
}
.ask-display {
  font-family: var(--mono); font-size: 42px; font-weight: 800;
  min-width: 120px; text-align: center; color: var(--accent);
  border: 2px solid var(--line); border-radius: 14px; padding: 8px 18px;
}

/* ---------- v0.8: Giriş Sinematiği ---------- */
.cine-root { align-items: center; justify-content: center; gap: 18px; padding: 20px; }
.cine-stage { width: min(420px, 82vw); }
.cine-svg { width: 100%; height: auto; display: block; }
.cine-in { animation: cineIn .6s cubic-bezier(.2, 1.3, .4, 1); }
@keyframes cineIn { from { transform: scale(.85); opacity: 0; } }
.cine-text {
  max-width: 560px; text-align: center; font-size: clamp(15px, 2.4vw, 19px);
  line-height: 1.6; min-height: 5.2em; font-weight: 600;
}
.cine-controls { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; justify-content: center; }
.cine-dots { display: flex; gap: 6px; }
.cine-dots i { width: 9px; height: 9px; border-radius: 50%; background: var(--bg-raised); }
.cine-dots i.on { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
.cine-float { animation: cineFloat 3s ease-in-out infinite; transform-origin: center; }
@keyframes cineFloat { 50% { transform: translateY(-6px); } }
.cine-swirl { animation: cineSwirl 7s linear infinite; transform-origin: 100px 80px; }
@keyframes cineSwirl { to { transform: rotate(360deg); } }
.cine-shard { animation: cineShard 1.6s ease-in-out infinite alternate; }
.cine-shard.s2 { animation-delay: .3s; } .cine-shard.s3 { animation-delay: .6s; } .cine-shard.s4 { animation-delay: .9s; }
@keyframes cineShard { to { transform: translate(4px, -5px) rotate(8deg); } }
.cine-tilt { animation: cineTilt 2.4s ease-in-out infinite; transform-origin: 100px 120px; }
@keyframes cineTilt { 0%, 100% { transform: rotate(-3deg); } 50% { transform: rotate(3deg); } }
.cine-beacon { animation: cineBeacon 1.6s ease-in-out infinite; }
@keyframes cineBeacon { 50% { opacity: .45; } }
.cine-blink1 { animation: cineBlink 1.4s infinite; }
.cine-blink2 { animation: cineBlink 1.4s .7s infinite; }
@keyframes cineBlink { 50% { opacity: .2; } }
.home-story { position: absolute; left: 16px; bottom: 16px; z-index: 5; color: var(--ink-dim); }
.ov-crystal { color: var(--legendary); font-weight: 800; margin-top: 6px; }

/* ---------- v0.8: Karakter Yaratma ---------- */
.creator-root { align-items: center; justify-content: center; gap: 14px; padding: 24px; }
.creator-title { font-size: 26px; font-weight: 900; letter-spacing: 1px; text-align: center; }
.creator-sub { color: var(--ink-dim); font-size: 16px; text-align: center; }
.gender-row { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; margin-top: 10px; }
.gender-card {
  width: min(200px, 40vw); background: var(--bg-panel); border: 3px solid var(--line);
  border-radius: 22px; padding: 18px 14px; display: flex; flex-direction: column;
  align-items: center; gap: 10px; transition: transform .12s, border-color .12s;
}
.gender-card:hover, .gender-card:active { border-color: var(--accent); transform: translateY(-4px) scale(1.03); }
.gender-prev { width: 130px; height: 130px; display: block; }
.gender-prev svg { width: 100%; height: 100%; }
.gender-name { font-weight: 900; letter-spacing: 3px; font-size: 17px; }
.creator-mini { display: inline-block; width: 110px; height: 110px; }
.creator-name { max-width: 320px; }
.creator-go { margin-top: 6px; }
.part-label { font-size: 12px; font-weight: 800; letter-spacing: 2px; color: var(--xp); margin-top: 4px; }

/* ---------- v0.9: Dünya Haritası + Çoktan Seçmeli ---------- */
.world-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding: 0 16px 20px; max-width: 640px; width: 100%; margin: 0 auto; }
.world-card {
  display: flex; align-items: center; gap: 14px; text-align: left;
  background: var(--bg-panel); border: 2px solid var(--line); border-radius: 18px;
  padding: 14px 16px; transition: transform .12s, border-color .12s;
}
.world-card:hover, .world-card:active { border-color: var(--accent); transform: translateY(-2px); }
.world-icon { font-size: 38px; flex: none; }
.world-info { flex: 1; display: flex; flex-direction: column; gap: 2px; }
.world-info b { font-size: 16px; }
.world-info small { color: var(--ink-dim); font-size: 12px; }
.world-progress { color: var(--xp); font-size: 12px; font-weight: 700; }
.world-go { font-size: 20px; color: var(--accent); }

.mc-root { flex: 1; display: flex; flex-direction: column; gap: 14px; justify-content: center; }
.mc-question {
  background: var(--bg-panel); border-radius: 16px; padding: 18px 20px;
  font-size: clamp(16px, 2.6vw, 20px); font-weight: 700; line-height: 1.5; text-align: center;
}
.mc-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
@media (max-width: 620px) { .mc-options { grid-template-columns: 1fr; } }
.mc-opt {
  background: var(--bg-raised); border: 2px solid var(--line); border-radius: 14px;
  padding: 14px 12px; font-size: 15px; font-weight: 600; line-height: 1.4;
  min-height: 56px; transition: border-color .12s, transform .1s;
}
.mc-opt:hover { border-color: var(--accent); }
.mc-opt:active { transform: scale(.98); }
.mc-opt.mc-right { border-color: var(--success); background: rgba(82, 232, 140, .15); box-shadow: 0 0 14px rgba(82, 232, 140, .5); }
.mc-opt.mc-wrong { opacity: .35; border-color: var(--warn); text-decoration: line-through; }
.boss-emoji { font-size: 36px; }

/* ---------- v0.10: Evim + Görevler ---------- */
.evim-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; padding: 20px; }
.evim-hero { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.evim-avatar { width: 150px; height: 150px; }
.evim-avatar .avatar-holder { width: 100%; height: 100%; }
.evim-name { font-size: 22px; font-weight: 900; letter-spacing: 1px; }
.evim-doors { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
.door-ben, .door-dolap {
  width: min(220px, 42vw); padding: 22px 12px; font-size: 20px; line-height: 1.4;
  background: linear-gradient(180deg, #43318C, var(--bg-raised));
}
.door-ben small, .door-dolap small { display: block; font-size: 12px; font-weight: 600; color: var(--ink-dim); margin-top: 4px; }
.door-dolap { background: linear-gradient(180deg, #5B3FA8, #3F2E7E); }

.door-badge {
  position: absolute; top: 6px; right: 10px; min-width: 22px; height: 22px;
  background: var(--accent); color: #fff; border-radius: 99px; font-size: 12px;
  font-weight: 800; display: inline-flex; align-items: center; justify-content: center;
  padding: 0 5px; box-shadow: 0 0 10px var(--accent);
}
.door { position: relative; }

.part-sell .part-price { color: var(--warn); }

.quest-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding: 0 16px; max-width: 620px; width: 100%; margin: 0 auto; }
.quest-card {
  background: var(--bg-panel); border: 2px solid var(--line); border-radius: 16px; padding: 14px 16px;
  display: flex; flex-direction: column; gap: 10px;
}
.quest-done { border-color: var(--xp); box-shadow: 0 0 14px rgba(255, 213, 46, .3); }
.quest-claimed { opacity: .6; }
.quest-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.quest-top b { font-size: 15px; }
.quest-reward { color: var(--xp); font-size: 12px; font-weight: 800; white-space: nowrap; }
.quest-bar { position: relative; height: 20px; background: var(--bg-raised); border-radius: 99px; overflow: hidden; }
.quest-bar i { display: block; height: 100%; background: linear-gradient(90deg, var(--success), var(--accent)); transition: width .4s; }
.quest-count { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; }
.quest-claim { align-self: flex-end; padding: 8px 20px; }
.quest-status { align-self: flex-end; color: var(--success); font-weight: 800; font-size: 13px; }
.quest-note { text-align: center; color: var(--ink-dim); font-size: 13px; padding: 14px; }

/* ---------- v0.11: Giriş / Oyuncu Profilleri ---------- */
.login-root { align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
.login-box { display: flex; flex-direction: column; align-items: center; gap: 12px; max-width: 380px; width: 100%; text-align: center; }
.login-box-wide { max-width: 640px; }
.login-logo { font-size: 52px; animation: floatY 3s ease-in-out infinite; }
.login-title { font-size: 24px; font-weight: 900; letter-spacing: 1px; }
.login-sub { color: var(--ink-dim); font-size: 14px; }
.login-box .name-input { max-width: 320px; }
.login-remember { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--ink-dim); cursor: pointer; }
.login-remember input { width: 18px; height: 18px; accent-color: var(--accent); }
.login-err { color: var(--warn); font-size: 13px; min-height: 18px; font-weight: 700; }
.login-box .btn { width: 100%; max-width: 320px; }
.login-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 14px; width: 100%; margin-top: 8px; }
.login-card {
  background: var(--bg-panel); border: 2px solid var(--line); border-radius: 18px;
  padding: 14px 8px; display: flex; flex-direction: column; align-items: center; gap: 6px;
  transition: transform .12s, border-color .12s;
}
.login-card:hover, .login-card:active { border-color: var(--accent); transform: translateY(-3px); }
.login-av { width: 70px; height: 70px; }
.login-av .avatar-holder { width: 100%; height: 100%; }
.login-anon { font-size: 44px; line-height: 70px; }
.login-cardname { font-weight: 800; font-size: 15px; }
.login-lvl { font-size: 11px; color: var(--xp); font-weight: 700; }
.login-new { border-style: dashed; justify-content: center; }
.home-logout { position: absolute; right: 16px; bottom: 16px; z-index: 5; color: var(--ink-dim); }

/* ---------- v0.13: Dilek Kutusu (çocuk) ---------- */
.home-wishes { position: absolute; left: 16px; top: 64px; z-index: 5; }
.wishes-wrap { flex: 1; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 8px 16px 20px; }
@media (max-width: 720px) { .wishes-wrap { grid-template-columns: 1fr; } }
.wish-col { display: flex; flex-direction: column; gap: 8px; }
.wish-h { font-size: 18px; font-weight: 900; }
.wish-hint { color: var(--ink-dim); font-size: 12.5px; line-height: 1.4; }
.wish-add { display: flex; gap: 8px; }
.wish-add .name-input { margin: 0; flex: 1; text-align: left; font-size: 14px; }
.wish-add .btn { padding: 10px 14px; white-space: nowrap; }
.wish-card { background: var(--bg-panel); border: 2px solid var(--line); border-radius: 14px; padding: 10px 12px; display: flex; flex-direction: column; gap: 6px; }
.wish-card.wish-earned { border-color: var(--xp); box-shadow: 0 0 14px rgba(255,213,46,.4); animation: cardPop .4s; }
.wish-card.wish-granted { opacity: .6; }
.wish-card.wish-assigned { border-color: var(--accent); }
.wish-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.wish-top b { font-size: 14px; }
.wish-badge { font-size: 11px; font-weight: 800; white-space: nowrap; }
.wish-goal { font-size: 12px; color: var(--ink-dim); }
.wish-note { font-size: 12px; color: var(--xp); background: rgba(255,213,46,.08); border-radius: 8px; padding: 5px 8px; }
.wish-empty { color: var(--ink-dim); font-size: 13px; text-align: center; padding: 16px; }

/* ---------- v0.13: Ebeveyn Konsolu ---------- */
.login-parent { position: absolute; left: 16px; bottom: 16px; z-index: 6; color: var(--ink-dim); }
.admin-root { padding: 0; }
.admin-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 12px 14px; border-bottom: 1px solid var(--line); }
.admin-head b { font-size: 16px; }
.admin-tabs { display: flex; gap: 8px; padding: 10px 14px; overflow-x: auto; }
.atab.tab-on { background: var(--accent); color: #3a0a2e; }
.admin-body { flex: 1; overflow-y: auto; padding: 4px 14px 24px; display: flex; flex-direction: column; gap: 14px; }
.adm-card { background: var(--bg-panel); border: 2px solid var(--line); border-radius: 16px; padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }
.adm-p-head { display: flex; align-items: center; gap: 10px; }
.adm-av { width: 48px; height: 48px; flex: none; }
.adm-av .avatar-holder { width: 100%; height: 100%; }
.adm-rank { font-size: 12px; color: var(--ink-dim); }
.adm-xp { height: 12px; }
.adm-stats { display: flex; flex-wrap: wrap; gap: 10px; font-size: 13px; font-weight: 700; }
.adm-lessons { display: flex; flex-direction: column; gap: 4px; }
.adm-lesson { display: flex; justify-content: space-between; font-size: 12.5px; color: var(--ink-dim); }
.adm-wish { border-top: 1px dashed var(--line); padding-top: 8px; display: flex; flex-direction: column; gap: 6px; }
.adm-wish-ctl { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.adm-metric, .adm-istatus, .adm-target { background: var(--bg-raised); color: var(--ink); border: 1px solid var(--line); border-radius: 8px; padding: 6px 8px; font-size: 13px; font-family: inherit; }
.adm-target { width: 80px; }
.adm-note, .adm-inote { margin: 0 !important; text-align: left !important; font-size: 13px !important; padding: 8px 10px !important; }

/* ---------- v0.14: 3D avatar hissi (büyük önizlemeler) ---------- */
.locker-preview .avatar-holder,
.evim-avatar .avatar-holder,
.gender-prev,
.login-av .avatar-holder,
.creator-mini .avatar-holder {
  display: inline-block; transform-style: preserve-3d;
  animation: av3d 5.5s ease-in-out infinite;
  filter: drop-shadow(0 8px 14px rgba(0,0,0,.45));
}
@keyframes av3d {
  0%, 100% { transform: perspective(520px) rotateY(-9deg) rotateX(4deg) translateY(0); }
  50%      { transform: perspective(520px) rotateY(9deg) rotateX(-3deg) translateY(-4px); }
}
@media (prefers-reduced-motion: reduce) {
  .locker-preview .avatar-holder, .evim-avatar .avatar-holder, .gender-prev,
  .login-av .avatar-holder, .creator-mini .avatar-holder { animation: none; }
}

/* ---------- v0.14: Yaş & Sınıf seçimi ---------- */
.ag-q { font-weight: 800; font-size: 15px; margin-top: 8px; }
.ag-row { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 460px; }
.ag-age, .ag-grade { min-width: 40px; font-size: 15px; padding: 8px 12px; }
.ag-on { background: var(--accent); color: #3a0a2e; box-shadow: 0 0 10px rgba(255,79,216,.5); }
.creator-root .creator-go[disabled] { opacity: .4; pointer-events: none; }
.world-grade { color: var(--success); font-size: 11px; font-weight: 700; margin-top: 2px; }

/* ---------- v0.15: Aritmetik görünüm + sınıf kilidi ---------- */
.ar-root { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 18px; }
.ar-expr {
  display: flex; align-items: center; justify-content: center; gap: 14px;
  font-family: var(--mono); font-weight: 800; font-size: clamp(34px, 8vw, 58px);
  background: var(--bg-panel); border-radius: 18px; padding: 24px 16px;
}
.ar-op { color: var(--accent); }
.ar-eq { color: var(--ink-dim); }
.ar-box {
  min-width: 1.6ch; text-align: center; color: var(--accent);
  border: 3px solid var(--line); border-radius: 12px; padding: 2px 10px;
}
.ar-box.ld-active { border-color: var(--accent); box-shadow: 0 0 14px rgba(255, 79, 216, .6); }
.ar-box.ok { color: var(--success); border-color: var(--success); box-shadow: 0 0 14px rgba(82, 232, 140, .6); }
.map-gradelock {
  margin-top: 8px; font-size: 12.5px; color: var(--warn); line-height: 1.4;
  background: rgba(255, 179, 92, .1); border-radius: 10px; padding: 8px 10px;
}

/* ---------- v0.16: Bulut senkron (aile kodu, admin kaynak) ---------- */
.login-foot { position: absolute; left: 16px; bottom: 16px; z-index: 6; display: flex; gap: 8px; flex-wrap: wrap; }
.login-parent, .login-fam { color: var(--ink-dim); }
.adm-fam { padding: 10px 14px; border-bottom: 1px solid var(--line); font-size: 14px; }
.adm-code { color: var(--xp); font-size: 18px; letter-spacing: 2px; font-family: var(--mono); }
.adm-copy { margin-left: 8px; }
.adm-fam-hint { color: var(--ink-dim); font-size: 12px; margin-top: 4px; }
.asrc.tab-on { background: var(--legendary); color: #0b3a32; }
.adm-sep { flex: 1; }
.admin-tabs { flex-wrap: wrap; }

/* ---------- v0.17: İlgi Alanları ---------- */
.door-int { background: linear-gradient(180deg, #2f7a5a, #1f5a40); }
.int-scroll { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; padding: 4px 16px 16px; max-width: 680px; width: 100%; margin: 0 auto; }
.int-cat { background: var(--bg-panel); border: 1px solid var(--line); border-radius: 14px; padding: 12px 14px; }
.int-catlabel { font-weight: 800; font-size: 14px; margin-bottom: 8px; }
.int-chips { display: flex; flex-wrap: wrap; gap: 7px; }
.int-chip { font-size: 13px; }
.int-on { background: var(--success); color: #06331d; box-shadow: 0 0 8px rgba(82,232,140,.4); }
.int-custom { background: var(--accent); color: #3a0a2e; }
.int-add { display: flex; gap: 8px; margin-top: 8px; }
.int-input { flex: 1; background: var(--bg-raised); border: 1px solid var(--line); border-radius: 10px; color: var(--ink); padding: 8px 10px; font-family: inherit; font-size: 13px; }
.int-addbtn { white-space: nowrap; }
.int-done { align-self: center; margin: 4px auto 14px; }
.adm-ints { border-top: 1px dashed var(--line); padding-top: 8px; }
.adm-int-h { font-weight: 800; font-size: 12.5px; color: var(--xp); margin-bottom: 3px; }
.adm-int { font-size: 12px; color: var(--ink-dim); line-height: 1.5; }

/* ---------- v0.18: Okunur Komutan + süre + görsel anlatım ---------- */
/* Komutan tam genişlikte üstte, büyük okunur balon */
.mission-layout { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
.mission-left .commander-wrap { flex-direction: row; align-items: center; gap: 12px; }
.mission-left .commander-face, .commander-compact .commander-face { width: 68px; height: 68px; font-size: 34px; flex: none; }
.commander-balloon { font-size: clamp(16px, 2.5vw, 21px); line-height: 1.5; min-height: 62px; padding: 14px 18px; }
.ld-problem { font-size: clamp(15px, 2.4vw, 18px) !important; }
.mission-stagewrap { display: flex; flex-direction: column; min-height: 0; }
.mission-stage { flex: 1; min-height: 0; }

/* Soru süresi çubuğu */
.qtimer-host { padding: 0 2px; }
.qtimer { display: flex; align-items: center; gap: 8px; padding: 6px 2px; }
.qtimer-icon { font-size: 16px; }
.qtimer-bar { flex: 1; height: 12px; background: var(--bg-raised); border-radius: 99px; overflow: hidden; }
.qtimer-bar i { display: block; height: 100%; width: 100%; background: linear-gradient(90deg, var(--success), var(--xp)); }
.qtimer-num { font-weight: 800; font-family: var(--mono); min-width: 2.2ch; text-align: right; font-size: 15px; }
.qtimer-low .qtimer-bar i { background: linear-gradient(90deg, var(--warn), #e8443b); }
.qtimer-low .qtimer-num { color: var(--warn); }
.qtimer-low { animation: qpulse .6s ease-in-out infinite; }
@keyframes qpulse { 50% { opacity: .6; } }

/* Görsel anlatım: nesneler ve gruplar */
.obj-row { display: flex; align-items: center; justify-content: center; gap: 12px; flex-wrap: wrap; }
.obj-group { display: flex; flex-wrap: wrap; gap: 4px; max-width: 200px; justify-content: center; }
.obj { font-size: 30px; animation: objPop .3s both; }
.obj-gone { opacity: .35; text-decoration: line-through; }
@keyframes objPop { from { transform: scale(0); } }
.obj-op { font-size: 34px; font-weight: 800; color: var(--accent); font-family: var(--mono); }
.obj-res { font-size: 40px; font-weight: 900; color: var(--xp); font-family: var(--mono); }
.obj-res.obj-lit { animation: starPop .4s both; text-shadow: 0 0 18px rgba(255,213,46,.7); }
.grp-title { font-weight: 800; font-size: 16px; }
.grp-wrap { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
.grp-box { display: flex; flex-wrap: wrap; gap: 3px; background: var(--bg-raised); border: 2px dashed var(--line); border-radius: 12px; padding: 8px; max-width: 120px; }
.grp-box .obj { font-size: 22px; }

/* ---------- v0.20: konsol ek metrikler ---------- */
.adm-stats2 { border-top: 1px dashed var(--line); padding-top: 6px; margin-top: 2px; }
.adm-stats2 span { color: var(--xp); }

/* ---------- v0.21: Ebeveyn-önce karşılama + davet kodu ---------- */
.welcome-choices { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; margin-top: 12px; }
.welcome-card {
  width: min(230px, 44vw); padding: 22px 14px; font-size: 19px; line-height: 1.4;
  background: linear-gradient(180deg, #43318C, var(--bg-raised)); color: #fff;
  border-radius: 20px; box-shadow: inset 0 -4px 0 rgba(0,0,0,.35);
}
.welcome-card:active { transform: translateY(2px); }
.welcome-card small { display: block; font-size: 12px; font-weight: 600; color: var(--ink-dim); margin-top: 6px; }
.wc-parent { background: linear-gradient(180deg, #5B3FA8, #3F2E7E); }
.wc-kid { background: linear-gradient(180deg, #2f7a5a, #1f5a40); }

/* ---------- v0.22: Onay (KVKK/Sözleşme) + Google ---------- */
.consent-ov { padding: 16px; }
.consent-card {
  background: var(--bg-panel); border: 2px solid var(--line); border-radius: 20px;
  padding: 18px; width: min(560px, 96vw); max-height: 92vh; display: flex; flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,.6);
}
.consent-card h2 { text-align: center; }
.consent-lead { color: var(--ink-dim); font-size: 13px; text-align: center; margin: 4px 0 10px; }
.consent-tabs { display: flex; gap: 8px; justify-content: center; margin-bottom: 8px; }
.ctab.ctab-on { background: var(--accent); color: #3a0a2e; }
.consent-body {
  flex: 1; overflow-y: auto; background: var(--bg-deep); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px; font-size: 13px; line-height: 1.5; min-height: 160px;
}
.consent-body h3 { font-size: 16px; margin-bottom: 6px; }
.consent-body h4 { font-size: 13.5px; color: var(--xp); margin: 10px 0 3px; }
.consent-body p { margin-bottom: 6px; color: var(--ink); }
.consent-body em { color: var(--ink-dim); }
.consent-checks { display: flex; flex-direction: column; gap: 8px; margin: 12px 0; }
.consent-check { display: flex; gap: 8px; align-items: flex-start; font-size: 12.5px; line-height: 1.4; cursor: pointer; }
.consent-check input { width: 20px; height: 20px; flex: none; margin-top: 1px; accent-color: var(--success); }
.consent-btns { display: flex; gap: 10px; justify-content: space-between; }
.consent-accept[disabled] { opacity: .4; pointer-events: none; }
.google-btn { width: 100%; max-width: 320px; background: #fff; color: #202124; font-weight: 700; }
.consent-or { color: var(--ink-dim); font-size: 12px; text-align: center; margin: 8px 0; }

/* ---------- v0.23: Google giriş/kayıt + izinler + hesap ayarları ---------- */
/* Google iki buton (giriş / kayıt) */
.google-row { display: flex; flex-direction: column; gap: 8px; align-items: center; }
.google-signup { background: #eafff3; color: #0b3d24; }

/* Kilitli ders/özellik (çocuk tarafı) */
.world-locked { opacity: .72; filter: grayscale(.4); }
.world-lock-note { display: block; font-size: 12px; color: var(--warn); margin-top: 2px; }
.feat-locked { opacity: .5; filter: grayscale(.6); }

/* Aç/kapa anahtarı (switch) */
.adm-switch { position: relative; display: inline-block; width: 46px; height: 26px; flex: none; }
.adm-switch input { opacity: 0; width: 0; height: 0; }
.adm-slider {
  position: absolute; inset: 0; cursor: pointer; background: var(--bg-deep);
  border: 1px solid var(--line); border-radius: 26px; transition: .18s;
}
.adm-slider::before {
  content: ''; position: absolute; height: 18px; width: 18px; left: 3px; top: 3px;
  background: var(--ink-dim); border-radius: 50%; transition: .18s;
}
.adm-switch input:checked + .adm-slider { background: var(--success); border-color: var(--success); }
.adm-switch input:checked + .adm-slider::before { transform: translateX(20px); background: #fff; }

/* İzin satırları */
.adm-perm-row {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  padding: 8px 4px; border-bottom: 1px dashed var(--line);
}
.adm-perm-lbl { font-size: 14px; }
.adm-perm-h { font-weight: 800; font-size: 13px; color: var(--xp); margin: 12px 0 2px; }
.adm-hint { font-size: 12.5px; color: var(--ink-dim); background: var(--bg-deep); border: 1px solid var(--line); border-radius: 10px; padding: 8px 10px; margin-bottom: 10px; line-height: 1.4; }

/* Hesap ayar menüsü (farklı menüler) */
.acc-menu { display: flex; flex-direction: column; gap: 8px; }
.acc-item {
  display: flex; align-items: center; gap: 12px; text-align: left; width: 100%;
  background: var(--bg-panel); border: 1px solid var(--line); border-radius: 14px; padding: 12px 14px;
}
.acc-item:active { transform: translateY(1px); }
.acc-ic { font-size: 24px; flex: none; }
.acc-tt { flex: 1; display: flex; flex-direction: column; }
.acc-tt b { font-size: 15px; }
.acc-tt small { font-size: 12px; color: var(--ink-dim); }
.acc-go { color: var(--ink-dim); font-size: 18px; }

.acc-info { background: var(--bg-deep); border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; font-size: 13.5px; line-height: 1.6; margin: 6px 0; }
.acc-actions { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
.acc-actions .btn { width: 100%; }
.acc-profs { display: flex; flex-direction: column; gap: 8px; max-height: 50vh; overflow-y: auto; }
.acc-prof { display: flex; align-items: center; justify-content: space-between; gap: 8px; background: var(--bg-deep); border: 1px solid var(--line); border-radius: 12px; padding: 8px 10px; }
.acc-prof-nm { font-size: 14px; font-weight: 700; }
.acc-prof-ctl { display: flex; gap: 6px; }

.btn-danger { background: linear-gradient(180deg, #c0392b, #922b21); color: #fff; }
.legal-view { max-height: 78vh; overflow-y: auto; font-size: 13px; line-height: 1.55; padding: 4px 2px; }
.legal-view h3 { font-size: 16px; margin-bottom: 6px; }
.legal-view h4 { font-size: 13.5px; color: var(--xp); margin: 10px 0 3px; }
.legal-view p { margin-bottom: 6px; }

  "kvkk": "<h3>KVKK Aydınlatma Metni ve Açık Rıza Beyanı<\/h3><p><em>Son güncelleme: 18.07.2026 · Sürüm 1<\/em><\/p><p><b>ÖNEMLİ:<\/b> Bu metin bir taslaktır ve hukuki görüş yerine geçmez. Uygulamayı ticari veya yaygın biçimde kullanmadan önce bir KVKK/veri hukuku uzmanına inceletmeniz önerilir.<\/p><h4>1. Veri Sorumlusu<\/h4><p>BOKUL uygulamasını kuran/işleten kişi (bundan sonra \"İşletmeci\") 6698 sayılı Kişisel Verilerin Korunması Kanunu (\"KVKK\") kapsamında veri sorumlusudur. İletişim: uygulamayı size ileten ebeveyn/işletmeci ile sağlanır.<\/p><h4>2. İşlenen Kişisel Veriler<\/h4><p>Uygulama, mümkün olan en az veriyi işler: takma ad (gerçek ad/soyad girilmesi tavsiye edilmez), yaş ve bitirilen sınıf bilgisi, isteğe bağlı ilgi alanları (hobi, sevilen içerikler vb.), oyun içi ilerleme ve istatistikler, çocuğun girdiği dilek/fikir metinleri ve (yalnızca ebeveyn için) e-posta adresi. <b>Fotoğraf, adres, telefon, kimlik numarası gibi veriler İŞLENMEZ ve buluta gönderilmez.<\/b><\/p><h4>3. İşleme Amaçları<\/h4><p>Veriler; eğitici oyunun sunulması, içeriğin çocuğun yaş/sınıf seviyesine uyarlanması, ilerlemenin kaydedilmesi ve ebeveynin çocuğunun gelişimini görmesi amaçlarıyla işlenir.<\/p><h4>4. Hukuki Sebep<\/h4><p>İşleme, açık rızanıza (KVKK m.5/1) dayanır. Çocuğa ait veriler yalnızca velinin açık rızasıyla işlenir; bu rızayı çocuğun velisi/yasal temsilcisi verir.<\/p><h4>5. Yurt Dışına Aktarım<\/h4><p>İlerleme senkronu ve ebeveyn hesabı için Google/Firebase altyapısı kullanılır. Veriler Avrupa (eur3) bölgesinde tutulmakla birlikte, hizmet sağlayıcı yurt dışı merkezli olduğundan aktarım yurt dışına aktarım niteliği taşıyabilir. Bu aktarıma açık rıza vermektesiniz (KVKK m.9).<\/p><h4>6. Saklama Süresi<\/h4><p>Veriler, hesap/profil silinene veya rıza geri alınana kadar saklanır. Talebiniz üzerine silinir.<\/p><h4>7. Haklarınız (KVKK m.11)<\/h4><p>Kişisel verilerinize erişme, düzeltme, silme, işlemeyi öğrenme ve rızanızı geri alma haklarına sahipsiniz. Rızayı geri almak için profili/hesabı silebilir veya İşletmeci ile iletişime geçebilirsiniz.<\/p><h4>8. Çocuklara İlişkin<\/h4><p>Uygulama 18 yaş altı bireylere yöneliktir. Çocuğun uygulamayı kullanması, gözetimi ve verilerinin girilmesi velinin sorumluluğundadır. Onay veren kişi, çocuğun velisi/yasal temsilcisi olduğunu ve onun adına rıza vermeye yetkili olduğunu beyan eder.<\/p>",
  "terms": "<h3>Kullanıcı Sözleşmesi<\/h3><p><em>Son güncelleme: 18.07.2026 · Sürüm 1<\/em><\/p><p><b>ÖNEMLİ:<\/b> Bu metin bir taslaktır, hukuki görüş değildir. Ticari kullanım öncesi hukukçuya inceletiniz.<\/p><h4>1. Taraflar ve Konu<\/h4><p>Bu sözleşme, BOKUL uygulamasını (\"Uygulama\") kullanan ebeveyn/veli (\"Kullanıcı\") ile İşletmeci arasındadır. Uygulama, çocuklara yönelik ücretsiz bir eğitim oyunudur.<\/p><h4>2. Ebeveyn Beyanı ve Sorumluluğu<\/h4><p>Kullanıcı; (a) 18 yaşından büyük olduğunu, (b) çocuğun/çocukların velisi veya yasal temsilcisi olduğunu, (c) çocuk adına gerekli onayları vermeye yetkili olduğunu, (d) çocuğun Uygulamayı kullanımını gözeteceğini, (e) girdiği bilgilerin doğruluğundan ve cihaz güvenliğinden sorumlu olduğunu kabul ve beyan eder.<\/p><h4>3. Sorumluluğun Kullanıcıda Olması<\/h4><p>Uygulamanın kullanımına, çocuğun gözetimine, girilen verilere, davet kodunun paylaşımına ve ortaya çıkabilecek sonuçlara ilişkin sorumluluk, yürürlükteki hukukun izin verdiği azami ölçüde Kullanıcıya aittir. İşletmeci, eğitim içeriğinin doğruluğu veya kesintisizliği konusunda garanti vermez.<\/p><h4>4. Garanti Reddi<\/h4><p>Uygulama \"olduğu gibi\" ve \"mevcut haliyle\" sunulur. İşletmeci, Uygulamanın hatasız, kesintisiz veya belirli bir amaca uygun olacağını garanti etmez.<\/p><h4>5. Sorumluluğun Sınırlanması<\/h4><p>Yürürlükteki hukukun izin verdiği azami ölçüde İşletmeci; dolaylı, arızi veya sonuç niteliğindeki zararlardan sorumlu tutulamaz. Bu sınırlama, hukuken devredilemeyen/muaf tutulamayan sorumlulukları kapsamaz.<\/p><h4>6. Fikri Mülkiyet<\/h4><p>Uygulamadaki içerik, tasarım ve yazılım üzerindeki haklar saklıdır. İzinsiz kopyalanamaz veya ticari amaçla kullanılamaz.<\/p><h4>7. İleriye Dönük Özellikler<\/h4><p>İleride, çocuğun ilgi alanlarına göre ebeveyne hediye fikirleri veya bağlantılar (ör. yönlendirme/affiliate) sunulabilir. Böyle bir özellik eklendiğinde ayrıca bilgilendirme ve gerekli onaylar alınacaktır; çocuk verisi üçüncü taraflarla paylaş
