<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>BOKUL — Baba Okulu Eğitim Üssü</title>

<!-- Geliştirme modu: ayrı dosyalar. build.js bunları tek dosyaya gömer. -->
<style>
/* === src/styles/base.css === */
/* BOKUL — Temel stiller ve "Galaksi Üssü" tasarım token'ları */
:root {
  --bg-deep: #160F2E;
  --bg-panel: #231A48;
  --bg-raised: #31245F;
  --line: #4A3690;
  --ink: #F2EDFF;
  --ink-dim: #A79BC8;
  --accent: #FF4FD8;
  --action: #FF9F1C;
  --xp: #FFD52E;
  --success: #52E88C;
  --warn: #FFB35C;
  --epic: #9D6BFF;
  --legendary: #3DF2D2;
  --mono: Consolas, 'Courier New', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg-deep);
  color: var(--ink);
  font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
  user-select: none;
}

#app {
  height: 100dvh;
  width: 100vw;
  display: flex;
  flex-direction: column;
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  /* Yıldızlı galaksi zemini (saf CSS — dosya yok) */
  background:
    radial-gradient(1px 1px at 15% 25%, #fff8 0, transparent 50%),
    radial-gradient(1px 1px at 65% 15%, #fff6 0, transparent 50%),
    radial-gradient(1.5px 1.5px at 85% 65%, #fff7 0, transparent 50%),
    radial-gradient(1px 1px at 35% 85%, #fff5 0, transparent 50%),
    radial-gradient(1px 1px at 50% 45%, #fff4 0, transparent 50%),
    radial-gradient(ellipse at 70% -10%, #2C1E63 0, transparent 60%),
    var(--bg-deep);
}

button { font-family: inherit; color: inherit; border: none; background: none; cursor: pointer; }

.btn {
  border-radius: 16px;
  font-weight: 800;
  letter-spacing: .5px;
  padding: 12px 22px;
  color: #fff;
  box-shadow: inset 0 -4px 0 rgba(0, 0, 0, .35);
  transition: transform .08s;
}
.btn:active { transform: translateY(2px); box-shadow: inset 0 -2px 0 rgba(0, 0, 0, .35); }
.btn-action { background: linear-gradient(180deg, #FFB443, #F07E00); color: #3a2600; }
.btn-quiet { background: var(--bg-raised); color: var(--ink-dim); }

.chip {
  background: var(--bg-raised);
  border-radius: 99px;
  padding: 5px 12px;
  font-weight: 700;
  font-size: 13px;
  white-space: nowrap;
}

/* === src/styles/components.css === */
/* BOKUL — Ortak bileşenler: HUD, Komutan, ped, bölme tahtası, overlay, efektler */

/* ---------- HUD ---------- */
.hud { display: flex; align-items: center; gap: 10px; padding: 12px 14px; }
.hud-avatar {
  width: 42px; height: 42px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--epic));
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; border: 2px solid var(--xp);
}
.hud-xpbar { flex: 1; height: 18px; background: var(--bg-raised); border-radius: 99px; position: relative; }
.hud-xpbar i {
  display: block; height: 100%; width: 0; border-radius: 99px;
  background: linear-gradient(90deg, var(--xp), var(--action));
  box-shadow: 0 0 8px rgba(255, 213, 46, .5);
  transition: width .4s;
}
.hud-lvl {
  position: absolute; left: -6px; top: -7px; z-index: 1;
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--xp); color: #4a3600; font-weight: 800; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  border: 2px solid #ffe98f;
}

/* ---------- Komutan ---------- */
.commander-wrap { display: flex; flex-direction: column; gap: 8px; align-items: flex-start; }
.commander-face {
  width: 84px; height: 84px; border-radius: 18px; font-size: 46px;
  background: linear-gradient(160deg, #3F2E7E, var(--bg-panel));
  border: 2px solid var(--accent);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 16px rgba(255, 79, 216, .25);
}
.commander-compact .commander-face { width: 60px; height: 60px; font-size: 32px; }
.commander-balloon {
  background: var(--bg-panel); border: 1px solid var(--line);
  border-radius: 14px; padding: 10px 12px;
  font-size: 14px; line-height: 1.4; min-height: 58px; width: 100%;
}

/* ---------- Sayı pedi ---------- */
.numpad {
  display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px;
  padding: 10px 0 4px; max-width: 560px; margin: 0 auto; width: 100%;
}
.numpad .key {
  background: var(--bg-raised); border-radius: 12px;
  padding: 13px 0; font-weight: 800; font-size: 20px; min-height: 48px;
  box-shadow: inset 0 -3px 0 rgba(0, 0, 0, .35);
}
.numpad .key:active { transform: translateY(2px); }
.numpad .key-back { color: var(--warn); }
.numpad .key-go {
  grid-column: span 2;
  background: linear-gradient(180deg, #FFB443, #F07E00);
  color: #3a2600; font-size: 16px;
}
/* SEÇ adımı: rakam tuşları kapalı ama ONAYLA tam parlak — "bozuk" gibi görünmesin */
.numpad-dim .key { opacity: .3; pointer-events: none; }
.numpad-dim .key-go { opacity: 1; pointer-events: auto; animation: goPulse 1.4s infinite; }
@keyframes goPulse { 50% { box-shadow: inset 0 -3px 0 rgba(0,0,0,.35), 0 0 16px rgba(255,159,28,.8); } }
.numpad-mini { grid-template-columns: repeat(6, 1fr); max-width: 400px; }

/* ---------- Uzun bölme tahtası ---------- */
.ld-root { display: flex; flex-direction: column; gap: 10px; height: 100%; }
.ld-problem {
  background: var(--bg-panel); border: 1px dashed var(--epic);
  border-radius: 12px; padding: 10px 14px; font-size: 14.5px; line-height: 1.45;
}
.ld-board {
  flex: 1; display: flex; justify-content: center; align-items: flex-start;
  gap: 0; padding: 14px 6px; background: var(--bg-panel); border-radius: 16px;
  font-family: var(--mono); font-size: clamp(24px, 5vw, 36px); font-weight: 700;
  overflow: auto;
}
.ld-left { display: flex; flex-direction: column; }
.ld-right {
  display: flex; flex-direction: column; align-items: flex-start;
  border-left: 3px solid var(--ink); padding-left: 12px; margin-left: 8px;
}
.ld-divisor { padding: 0 6px 2px; }
.ld-qline { height: 3px; background: var(--ink); align-self: stretch; }
.ld-quotient { display: flex; padding-top: 4px; min-height: 1.3em; color: var(--accent); }
.ld-row { display: flex; }
.ld-cell {
  width: 1.35ch; height: 1.45em; text-align: center;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 8px; margin: 1px 0;
}
.ld-digit { cursor: pointer; }
.ld-select { background: rgba(255, 79, 216, .22); box-shadow: inset 0 -3px 0 var(--accent); }
.ld-pulse { animation: ldPulse 1.1s infinite; }
@keyframes ldPulse { 50% { background: rgba(255, 213, 46, .3); } }
.ld-active {
  border: 2px solid var(--accent);
  box-shadow: 0 0 10px rgba(255, 79, 216, .55);
  color: var(--accent); min-width: 1.35ch;
}
.ld-ghost { border-style: dashed; opacity: .8; }
.ld-done { color: var(--ink); }
.ld-sep .ld-cell { color: var(--ink-dim); }
.ld-product .ld-cell, .ld-rem .ld-cell { color: var(--ink); }
.ld-sign-cell { color: var(--ink-dim); }
.ld-quotient .ld-cell.ld-done { color: var(--accent); }
.ld-shake { animation: ldShake .32s; }
@keyframes ldShake {
  20% { transform: translateX(-6px); } 40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); } 80% { transform: translateX(4px); }
}

/* ---------- Overlay / tören ---------- */
.overlay {
  position: fixed; inset: 0; z-index: 50;
  background: rgba(10, 6, 26, .82);
  display: flex; align-items: center; justify-content: center;
  animation: ovIn .25s;
}
@keyframes ovIn { from { opacity: 0; } }
.overlay-card {
  background: var(--bg-panel); border: 2px solid var(--line);
  border-radius: 24px; padding: 28px 34px; text-align: center;
  max-width: min(480px, 92vw);
  box-shadow: 0 20px 60px rgba(0, 0, 0, .6);
  animation: cardPop .35s cubic-bezier(.2, 1.6, .4, 1);
}
@keyframes cardPop { from { transform: scale(.7); opacity: 0; } }
.overlay-card h2 { margin: 8px 0; letter-spacing: 1px; }
.overlay-btns { display: flex; gap: 10px; justify-content: center; margin-top: 18px; flex-wrap: wrap; }
.ov-big { font-size: 54px; }
.ov-rank { font-size: 44px; margin-top: 6px; }
.ov-ranktitle { color: var(--xp); font-weight: 800; }
.ov-quote { color: var(--ink-dim); font-style: italic; margin-top: 10px; font-size: 14px; }
.ov-xp { color: var(--xp); font-weight: 800; margin-top: 8px; }
.ov-stars { font-size: 46px; letter-spacing: 6px; }
.ov-star { color: var(--bg-raised); display: inline-block; }
.ov-star.lit { color: var(--xp); animation: starPop .5s cubic-bezier(.2, 1.8, .4, 1) both; text-shadow: 0 0 18px rgba(255, 213, 46, .8); }
@keyframes starPop { from { transform: scale(0) rotate(-40deg); } }
.name-input {
  margin-top: 12px; padding: 12px 16px; border-radius: 12px; border: 2px solid var(--line);
  background: var(--bg-deep); color: var(--ink); font-size: 18px; font-weight: 700;
  text-align: center; width: 100%; outline: none;
}
.name-input:focus { border-color: var(--accent); }

/* ---------- Toast ---------- */
.toast {
  position: fixed; top: -60px; left: 50%; transform: translateX(-50%);
  background: var(--bg-raised); border: 1px solid var(--line);
  border-radius: 99px; padding: 10px 20px; font-weight: 700; font-size: 14px;
  z-index: 60; transition: top .35s cubic-bezier(.2, 1.4, .4, 1);
}
.toast-show { top: 16px; }

/* ---------- Efektler ---------- */
.fx-xp {
  position: fixed; z-index: 55; pointer-events: none;
  color: var(--xp); font-weight: 800; font-size: 18px;
  text-shadow: 0 0 10px rgba(255, 213, 46, .8);
  transition: transform .8s cubic-bezier(.3, 0, .6, 1), opacity .8s;
}
.fx-confetti {
  position: fixed; top: 40vh; z-index: 55; pointer-events: none;
  width: 10px; height: 14px; border-radius: 3px;
  animation: confFall 1.9s ease-in forwards;
}
@keyframes confFall {
  to { transform: translate(var(--dx), 70vh) rotate(var(--dr)); opacity: 0; }
}

/* ---------- v0.7: Avatar / Komutan SVG ---------- */
.avatar-holder { display: inline-block; width: 100%; height: 100%; position: relative; }
.avatar-holder svg { width: 100%; height: 100%; display: block; }
.avatar-photo {
  width: 100%; height: 100%; object-fit: cover; border-radius: 50%;
  border: 2px solid var(--xp); display: block;
}
.avatar-ring-svg { position: absolute; inset: -4px; width: calc(100% + 8px) !important; height: calc(100% + 8px) !important; }
.hud-avatar { width: 44px; height: 44px; flex: none; }
.commander-face svg { width: 100%; height: 100%; display: block; }
.commander-face { background: linear-gradient(160deg, #3F2E7E, var(--bg-panel)); overflow: hidden; }
.boss-face svg { width: 88%; height: 88%; }
.boss-face.boss-enter { animation: bossEnter .8s cubic-bezier(.2, 1.4, .4, 1), bossIdle 2.6s ease-in-out .8s infinite; }
@keyframes bossEnter { from { transform: scale(.2) translateY(-40px); filter: blur(6px); opacity: 0; } }

/* ---------- v0.7: Sandık töreni (CSS 3D) ---------- */
.chest-overlay { perspective: 900px; }
.chest-scene { display: flex; flex-direction: column; align-items: center; gap: 14px; text-align: center; }
.chest-title { font-weight: 800; letter-spacing: 2px; color: var(--xp); }
.chest3d { position: relative; width: 150px; height: 130px; cursor: pointer; transform-style: preserve-3d; }
.chest-body {
  position: absolute; inset: 30px 0 0 0; border-radius: 16px;
  background: linear-gradient(180deg, #7a5217, #59390c);
  border: 3px solid #FFD52E; font-size: 56px;
  display: flex; align-items: center; justify-content: center;
}
.chest-lid {
  position: absolute; top: 0; left: -4px; right: -4px; height: 42px; border-radius: 14px 14px 6px 6px;
  background: linear-gradient(180deg, #96682199, #6b4610); background-color: #966821;
  border: 3px solid #FFD52E; transform-origin: top center;
  transition: transform .5s cubic-bezier(.3, 1.6, .4, 1); z-index: 2;
}
.chest-glow {
  position: absolute; inset: -20px; border-radius: 50%; opacity: 0;
  background: radial-gradient(circle, rgba(255,213,46,.55) 0%, transparent 70%);
  transition: opacity .4s;
}
.chest-shake { animation: chestShake 1.2s infinite; }
@keyframes chestShake {
  0%, 100% { transform: rotate(0); } 8% { transform: rotate(-5deg); }
  16% { transform: rotate(5deg); } 24% { transform: rotate(-3deg); } 32% { transform: rotate(0); }
}
.chest-open .chest-lid { transform: rotateX(-115deg); }
.chest-open .chest-glow { opacity: 1; }
.chest-hint { color: var(--ink-dim); font-size: 13px; min-height: 18px; }
.loot-card {
  background: var(--bg-panel); border: 3px solid var(--rar, #A79BC8); border-radius: 18px;
  padding: 14px 22px; min-width: 170px;
  box-shadow: 0 0 24px color-mix(in srgb, var(--rar) 55%, transparent);
  animation: lootIn .6s cubic-bezier(.2, 1.5, .4, 1);
}
@keyframes lootIn { from { transform: rotateY(90deg) scale(.6); opacity: 0; } }
.loot-rarity { font-size: 11px; font-weight: 800; letter-spacing: 2px; color: var(--rar); }
.loot-art { width: 100px; height: 100px; margin: 8px auto; }
.loot-art svg { width: 100%; height: 100%; }
.loot-xp { display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: 900; color: var(--xp); }
.loot-name { font-weight: 800; }
.loot-title-art { font-size: 54px; text-align: center; }
.loot-coins { color: var(--xp); font-weight: 800; }

/* ---------- v0.7: Dolap / Dükkân ---------- */
.locker-layout { flex: 1; display: grid; grid-template-columns: 240px 1fr; gap: 14px; padding: 8px 16px 16px; min-height: 0; }
.locker-left { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.locker-preview { width: 170px; height: 170px; }
.locker-name { font-weight: 900; font-size: 20px; letter-spacing: 1px; }
.locker-right { display: flex; flex-direction: column; min-height: 0; }
.locker-tabs { display: flex; gap: 8px; flex-wrap: wrap; padding-bottom: 10px; }
.tab-btn.tab-on { background: var(--accent); color: #3a0a2e; }
.locker-parts { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
.part-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(96px, 1fr)); gap: 10px; }
.part-card {
  background: var(--bg-panel); border: 2px solid var(--line); border-radius: 14px;
  padding: 8px 6px; display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.part-card:active { transform: scale(.96); }
.part-on { border-color: var(--success); box-shadow: 0 0 10px rgba(82, 232, 140, .4); }
.part-locked .part-prev { filter: grayscale(.9) brightness(.6); }
.part-prev { width: 64px; height: 64px; }
.part-prev svg { width: 100%; height: 100%; }
.part-name { font-size: 11px; font-weight: 700; color: var(--ink-dim); }
.part-price { font-size: 11px; font-weight: 800; color: var(--xp); }
.photo-panel { text-align: center; display: flex; flex-direction: column; gap: 12px; padding: 14px; background: var(--bg-panel); border-radius: 14px; }
.photo-input { display: none; }
.photo-btns { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
.chest-float {
  position: absolute; right: 20px; bottom: 120px; z-index: 5;
  font-size: 40px; background: none; text-align: center;
  filter: drop-shadow(0 0 12px rgba(255, 213, 46, .8));
  animation: chestShake 1.4s infinite;
}
.chest-float small { display: block; font-size: 11px; color: var(--xp); font-weight: 800; }

/* ---------- v0.7.1: Canlı karakterler ---------- */
.commander-idle { animation: cmdBreath 3.2s ease-in-out infinite; }
@keyframes cmdBreath {
  0%, 100% { transform: translateY(0) rotate(0); }
  50% { transform: translateY(-3px) rotate(-1deg); }
}
.boss-face { animation: bossIdle 2.6s ease-in-out infinite; }
@keyframes bossIdle {
  0%, 100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-4px) scale(1.03); }
}

/* === src/styles/screens.css === */
/* BOKUL — Ekran yerleşimleri: splash, üs, harita, harekât, boss, teach */

.screen { flex: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }

/* ---------- Splash ---------- */
#splash {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 14px; text-align: center; height: 100dvh;
}
.splash-logo { font-size: 64px; animation: floatY 3s ease-in-out infinite; }
@keyframes floatY { 50% { transform: translateY(-10px); } }
.splash-title { font-size: 56px; font-weight: 900; letter-spacing: 6px; }
.splash-title span { color: var(--accent); text-shadow: 0 0 24px rgba(255, 79, 216, .6); }
.splash-sub { color: var(--ink-dim); letter-spacing: 3px; font-size: 14px; margin-bottom: 14px; }
.splash-note { color: var(--ink-dim); font-size: 11px; margin-top: 22px; opacity: .7; }
.splash-error { color: var(--warn); margin-top: 16px; font-size: 14px; }
#splash-start { font-size: 20px; padding: 16px 38px; }

/* ---------- Üs (home) ---------- */
.home-mid { flex: 1; display: flex; align-items: center; justify-content: center; padding: 10px 18px; }
.home-mid .commander-wrap { max-width: 620px; flex-direction: row; align-items: center; }
.home-mid .commander-face { width: 110px; height: 130px; font-size: 60px; flex: none; }
.home-mid .commander-balloon { font-size: 16px; }
.home-doors { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 12px; padding: 0 18px 20px; max-width: 760px; width: 100%; margin: 0 auto; }
.door { font-size: 15px; line-height: 1.5; padding: 18px 8px; }
.door-main { background: linear-gradient(180deg, #FFB443, #F07E00); color: #3a2600; font-size: 19px; }
.door-side { background: linear-gradient(180deg, #43318C, var(--bg-raised)); }
.door-locked { opacity: .6; }

/* ---------- Harita ---------- */
.map-title { text-align: center; font-weight: 800; letter-spacing: 1px; padding: 2px 12px 10px; }
.map-scroll { flex: 1; overflow-y: auto; padding: 0 14px 24px; display: flex; flex-direction: column; gap: 12px; }
.map-unit { color: var(--xp); font-weight: 800; letter-spacing: 2px; font-size: 13px; margin-top: 8px; }
.map-section {
  background: var(--bg-panel); border: 1px solid var(--line);
  border-radius: 18px; padding: 12px 14px;
}
.map-locked { opacity: .55; }
.map-sec-head { display: flex; align-items: center; gap: 10px; }
.map-sec-head b { flex: 1; }
.map-stars { color: var(--xp); font-size: 13px; font-weight: 700; }
.map-path { display: flex; gap: 10px; margin-top: 12px; overflow-x: auto; padding: 6px 2px 14px; align-items: center; }
.map-node {
  flex: none; width: 60px; height: 60px; border-radius: 50%;
  background: var(--bg-raised); border: 3px solid var(--line);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-size: 22px; position: relative;
}
.map-node small { font-size: 8.5px; color: var(--xp); letter-spacing: 1px; margin-top: -2px; white-space: nowrap; }
.node-done { border-color: var(--success); }
.node-active { border-color: var(--accent); animation: nodePulse 1.6s infinite; }
@keyframes nodePulse { 50% { box-shadow: 0 0 20px rgba(255, 79, 216, .9); } }
.node-locked { opacity: .4; filter: grayscale(1); pointer-events: none; }
.map-boss { width: 76px; height: 76px; border-radius: 20px; border-color: var(--epic); font-size: 28px; }
.map-uboss { width: 88px; height: 88px; border-color: var(--legendary); font-size: 34px; }
.map-boss small { font-size: 8px; color: var(--epic); }
.map-uboss small { color: var(--legendary); }
.map-soon {
  text-align: center; color: var(--ink-dim); font-size: 13px;
  border: 1px dashed var(--line); border-radius: 14px; padding: 14px;
}

/* ---------- Harekât / Boss ortak yerleşim ---------- */
.mission-title { text-align: center; font-weight: 800; font-size: 14px; letter-spacing: 1px; color: var(--ink-dim); }
.mission-layout {
  flex: 1; display: grid; grid-template-columns: 200px 1fr;
  gap: 12px; padding: 10px 14px 14px; min-height: 0;
}
.mission-left { display: flex; flex-direction: column; gap: 8px; min-width: 0; }
.mission-stage { display: flex; flex-direction: column; min-height: 0; min-width: 0; }

/* Dar ekran: komutan üste, tek kolon */
@media (max-width: 720px) {
  .mission-layout { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
  .mission-left .commander-wrap { flex-direction: row; align-items: center; }
  .mission-left .commander-face { width: 48px; height: 48px; font-size: 26px; }
  .commander-balloon { min-height: 44px; font-size: 13px; }
}

/* ---------- Boss ---------- */
.boss-head {
  display: flex; align-items: center; gap: 12px; padding: 6px 16px;
}
.boss-face {
  width: 64px; height: 64px; border-radius: 16px; font-size: 36px; flex: none;
  background: linear-gradient(160deg, #5A3E9E, #2A1D52);
  border: 2px solid var(--epic);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 16px rgba(157, 107, 255, .5);

.boss-unit .boss-face { border-color: var(--legendary); box-shadow: 0 0 16px rgba(61, 242, 210, .4); }
.boss-info { flex: 1; }
.boss-name { font-weight: 800; letter-spacing: 1px; font-size: 13px; color: var(--epic); margin-bottom: 5px; }
.boss-unit .boss-name { color: var(--legendary); }
.boss-hp { height: 18px; background: var(--bg-raised); border-radius: 99px; overflow: hidden; }
.boss-hp i {
  display: block; height: 100%; width: 100%;
  background: linear-gradient(180deg, var(--accent), #A62B8C);
  transition: width .45s;
}
.boss-shield { font-size: 12px; color: var(--warn); font-weight: 700; min-width: 90px; text-align: right; }
.boss-hit .boss-face { animation: bossHit .35s; }
@keyframes bossHit { 30% { transform: scale(.9) rotate(-6deg); filter: brightness(1.8); } }
.boss-quake { animation: quake .4s; }
@keyframes quake {
  20% { transform: translate(-7px, 3px); } 40% { transform: translate(7px, -3px); }
  60% { transform: translate(-5px, 2px); } 80% { transform: translate(5px, -2px); }
}
.boss-armor { text-align: center; font-size: 13px; color: var(--ink-dim); padding: 2px 0 4px; }
.armor-plate { font-size: 22px; margin: 0 3px; filter: drop-shadow(0 0 6px rgba(61, 242, 210, .7)); }
.armor-plate.broken { opacity: .3; filter: grayscale(1); }
.boss-armor small { display: block; font-size: 10px; margin-top: 2px; }

.teach-stage {

.teach-next { align-self: center; margin-top: 10px; }
.deal-supply { font-size: 22px; font-weight: 800; }
.deal-count { color: var(--xp); }
.deal-groups { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
.deal-group {

.pv-col { text-align: center; }

<script>
/* === src/core/events.js === */
/* BOKUL — Olay Sözlüğü
 * Modüller arası TÜM iletişimin isimli sözleşmesi.
 * Yeni olay eklerken buraya kaydet; EventBus bilinmeyen olaya uyarı basar. */
(function (B) {
  B.Events = Object.freeze({
    // Soru akışı
    QUESTION_STARTED:   'question:started',
    STEP_ANSWERED:      'step:answered',      // { stepType, correct, attempt, value }
    STEP_HINT:          'step:hint',          // { stepType, hintLevel }
    QUESTION_COMPLETED: 'question:completed', // { stars, mistakes }

    // Ödül akışı
    XP_GAINED:      'xp:gained',       // { amount, source }
    LEVEL_UP:       'level:up',        // { newLevel, newRank }
    STREAK_CHANGED: 'streak:changed',  // { count, multiplier }
    CHEST_EARNED:   'chest:earned',    // { chestType }
    CHEST_OPENED:   'chest:opened',    // { chestType, item }
    COSMETIC_UNLOCKED: 'cosmetic:unlocked', // { itemId }
    COINS_CHANGED:  'coins:changed',   // { total, delta }

    // İlerleme
    MISSION_COMPLETED: 'mission:completed', // { missionId, stars, xp }
    SECTION_UNLOCKED:  'section:unlocked',
    BOSS_DAMAGED:      'boss:damaged',   // { amount, remaining }
    BOSS_ATTACKED:     'boss:attacked',  // { armorLeft } — sadece Ünite Boss'u
    BOSS_DEFEATED:     'boss:defeated',  // { bossId, tier }
    BOSS_RETREAT:      'boss:retreat',

    // Sistem
    GAME_SAVED:     'game:saved',
    GAME_LOADED:    'game:loaded',
    SCREEN_CHANGED: 'screen:changed',
  });

  // Hızlı doğrulama için ters küme
  B._eventSet = new Set(Object.values(B.Events));
})(window.BOKUL = window.BOKUL || {});

/* === src/core/event-bus.js === */
/* BOKUL — EventBus
 * Modüller birbirini asla doğrudan çağırmaz; buradan konuşur (pub/sub). */
(function (B) {
  const listeners = new Map(); // eventName -> Set<fn>

  B.Bus = {
    on(event, fn) {
      if (!B._eventSet.has(event)) console.warn('[BOKUL] Bilinmeyen olay dinleniyor:', event);
      if (!listeners.has(event)) listeners.set(event, new Set());
      listeners.get(event).add(fn);
      return () => B.Bus.off(event, fn);
    },
    off(event, fn) {
      const set = listeners.get(event);
      if (set) set.delete(fn);
    },
    emit(event, payload) {
      if (!B._eventSet.has(event)) console.warn('[BOKUL] Bilinmeyen olay yayınlanıyor:', event);
      const set = listeners.get(event);
      if (!set) return;
      // Kopya üzerinde dolaş: dinleyici kendini kaldırabilsin
      [...set].forEach(fn => {
        try { fn(payload); }
        catch (e) { console.error('[BOKUL] Olay dinleyicisi hata verdi (' + event + '):', e); }
      });
    },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/core/game-state.js === */
/* BOKUL — GameState
 * Tüm oyun durumunun tek sahibi. Motorlar state.data'yı okur;
 * değişiklikler motor metodlarıyla yapılır ve olaylarla duyurulur. */
(function (B) {
  const SCHEMA_VERSION = 1;

  function freshState() {
    return {
      meta: {
        schemaVersion: SCHEMA_VERSION,
        createdAt: new Date().toISOString(),
        lastPlayedAt: new Date().toISOString(),
      },
      player: { name: '', xp: 0, level: 1, rank: 'rank1', title: '', coins: 0,
                avatar: { skin: 1, hair: 0, hairColor: 0, eyes: 0, mouth: 0, acc: 'none', ring: 'none', photo: null, usePhoto: false } },
      streaks: { current: 0, best: 0, dailyDays: 0, lastPlayDate: '' },
      stats: { correct: 0, wrong: 0, perSkill: {} }, // perSkill: { estimate: [1,0,1,...] } son 20 sonuç
      progress: { lessons: {} }, // lessons[dersId].sections[sectionId] = { missions:{id:{stars}}, bossDefeated, bossHpCarry }
      inventory: { cosmetics: [], badges: [], titles: [] },
      quests: { daily: [], weekly: [], lastDailyReset: '', lastWeeklyReset: '' },
    };
  }

  B.State = {
    data: freshState(),
    SCHEMA_VERSION,
    fresh: freshState,

    /* Bir dersin bölüm kaydını getir (yoksa oluştur) */
    sectionProgress(lessonId, sectionId) {
      const lessons = this.data.progress.lessons;
      if (!lessons[lessonId]) lessons[lessonId] = { sections: {} };
      const secs = lessons[lessonId].sections;
      if (!secs[sectionId]) secs[sectionId] = { missions: {}, bossDefeated: false, bossHpCarry: 0 };
      return secs[sectionId];
    },

    /* Bölümün toplam yıldızı */
    sectionStars(lessonId, sectionId) {
      const sec = this.sectionProgress(lessonId, sectionId);
      return Object.values(sec.missions).reduce((t, m) => t + (m.stars || 0), 0);
    },

    touch() { this.data.meta.lastPlayedAt = new Date().toISOString(); },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/core/save-manager.js === */
/* BOKUL — SaveManager
 * LocalStorage kayıt: debounce'lu otomatik kayıt + şema migrasyonu.
 * Bozuk kayıt asla sessizce silinmez; yedeğe kopyalanır. */
(function (B) {
  const KEY = 'bokul.save.v1';
  const SETTINGS_KEY = 'bokul.settings';
  let timer = null;

  /* Eski şemaları yeniye taşıyan zincir: migrations[eskiSürüm] = fn(data) => data */
  const migrations = {
    // Örnek: 1: (d) => { d.yeniAlan = ...; d.meta.schemaVersion = 2; return d; }
  };

  B.Save = {
    load() {
      let raw = null;
      try { raw = localStorage.getItem(KEY); } catch (e) { /* gizli mod vb. */ }
      if (!raw) return false;
      try {
        let data = JSON.parse(raw);
        while (data.meta.schemaVersion < B.State.SCHEMA_VERSION) {
          const fn = migrations[data.meta.schemaVersion];
          if (!fn) throw new Error('Migrasyon eksik: ' + data.meta.schemaVersion);
          data = fn(data);
        }
        B.State.data = Object.assign(B.State.fresh(), data); // eksik alanları tamamla
        B.Bus.emit(B.Events.GAME_LOADED, {});
        return true;
      } catch (e) {
        console.error('[BOKUL] Kayıt okunamadı, yedeğe alınıyor:', e);
        try { localStorage.setItem(KEY + '.corrupt', raw); localStorage.removeItem(KEY); } catch (e2) {}
        return false;
      }
    },

    saveNow() {
      B.State.touch();
      try {
        localStorage.setItem(KEY, JSON.stringify(B.State.data));
        B.Bus.emit(B.Events.GAME_SAVED, {});
      } catch (e) { console.error('[BOKUL] Kayıt yazılamadı:', e); }
    },

    /* Debounce: art arda olaylarda tek yazım (config: autoSaveDebounceMs) */
    saveSoon() {
      clearTimeout(timer);
      const ms = (B.Content && B.Content.get('config') || {}).autoSaveDebounceMs || 2000;
      timer = setTimeout(() => B.Save.saveNow(), ms);
    },

    settings: {
      get() {
        try { return JSON.parse(localStorage.getItem(SETTINGS_KEY)) || {}; }
        catch (e) { return {}; }
      },
      set(patch) {
        const cur = B.Save.settings.get();
        Object.assign(cur, patch);
        try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(cur)); } catch (e) {}
        return cur;
      },
    },

    /* Önemli olaylarda otomatik kayıt bağla */
    init() {
      const E = B.Events;
      [E.QUESTION_COMPLETED, E.MISSION_COMPLETED, E.LEVEL_UP,
       E.BOSS_DEFEATED, E.BOSS_RETREAT, E.XP_GAINED]
        .forEach(ev => B.Bus.on(ev, () => B.Save.saveSoon()));
      window.addEventListener('beforeunload', () => B.Save.saveNow());
    },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/core/content-registry.js === */
/* BOKUL — ContentRegistry
 * JSON içerik paketlerini yükler: önce sayfaya gömülü blok (dist/tek dosya modu),
 * yoksa fetch (geliştirme modu). Hafif şema doğrulaması yapar. */
(function (B) {
  const store = new Map(); // ad -> veri

  /* İçerik adı → gömülü blok id'si: lessons/math-5-division → bokul-content-lessons-math-5-division */
  function embedId(name) { return 'bokul-content-' + name.replace(/\//g, '-'); }

  /* Zorunlu alan kontrolü — hatalı paket oyunu kırmasın, atlansın */
  const validators = {
    'config':    d => ['starThresholds', 'adaptive', 'unitBoss'].every(k => k in d),
    'dialogues': d => d.pools && typeof d.pools === 'object',
    'rewards':   d => d.xp && d.levels && Array.isArray(d.ranks),
    'lesson':    d => d.id && Array.isArray(d.units) && Array.isArray(d.skills),
  };

  B.Content = {
    async load(name) {
      if (store.has(name)) return store.get(name);
      let data = null;
      const el = document.getElementById(embedId(name));
      if (el) {
        data = JSON.parse(el.textContent);
      } else {
        const res = await fetch('content/' + name + '.json');
        if (!res.ok) throw new Error('İçerik yüklenemedi: ' + name);
        data = await res.json();
      }
      const kind = name.startsWith('lessons/') ? 'lesson' : name;
      const check = validators[kind];
      if (check && !check(data)) {
        console.error('[BOKUL] İçerik paketi şemaya uymuyor, atlanıyor: ' + name);
        return null;
      }
      store.set(name, data);
      return data;
    },

    async loadAll(names) {
      for (const n of names) await B.Content.load(n); // sıralı: hata ayıklaması kolay
    },

    get(name) { return store.get(name) || null; },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/engines/audio-manager.js === */
/* BOKUL — AudioManager
 * Harici ses dosyası YOK: tüm efektler Web Audio API ile sentezlenir.
 * Olayları dinler; kimse "ses çal" demez. */
(function (B) {
  let ctx = null;
  let enabled = true;

  function ac() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }

  /* Tek nota: tip, frekans, süre, ses düzeyi, gecikme */
  function tone(type, freq, dur, vol, delay) {
    if (!enabled) return;
    try {
      const a = ac(), t = a.currentTime + (delay || 0);
      const o = a.createOscillator(), g = a.createGain();
      o.type = type; o.frequency.setValueAtTime(freq, t);
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(vol, t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.connect(g); g.connect(a.destination);
      o.start(t); o.stop(t + dur + 0.05);
    } catch (e) { /* ses yoksa oyun devam */ }
  }

  const sfx = {
    tick:    () => tone('square', 720, 0.06, 0.05),
    correct: () => { tone('sine', 660, 0.12, 0.14); tone('sine', 880, 0.16, 0.12, 0.07); },
    wrong:   () => tone('triangle', 220, 0.25, 0.12),               // yumuşak, cezasız
    star:    (n) => tone('sine', 780 + n * 160, 0.22, 0.16, n * 0.18), // yıldız başına perde yükselir
    fanfare: () => [523, 659, 784, 1047].forEach((f, i) => tone('sine', f, 0.3, 0.16, i * 0.12)),
    hit:     () => { tone('sawtooth', 160, 0.15, 0.14); tone('square', 90, 0.2, 0.1, 0.03); },
    shield:  () => tone('triangle', 340, 0.18, 0.1),
    chest:   () => [440, 554, 659].forEach((f, i) => tone('sine', f, 0.25, 0.14, i * 0.1)),
    blip:    () => tone('square', 260 + Math.random() * 220, 0.045, 0.05), // Komutan mırıltısı
  };

  B.Audio = {
    unlock() { ac(); },                             // ilk kullanıcı dokunuşunda çağrılır
    setEnabled(v) { enabled = v; },
    isEnabled() { return enabled; },
    play(name, arg) { if (sfx[name]) sfx[name](arg); },

    init() {
      enabled = B.Save.settings.get().sound !== false;
      const E = B.Events;
      B.Bus.on(E.STEP_ANSWERED, p => sfx[p.correct ? 'correct' : 'wrong']());
      B.Bus.on(E.QUESTION_COMPLETED, p => { for (let i = 0; i < p.stars; i++) sfx.star(i); });
      B.Bus.on(E.LEVEL_UP, () => sfx.fanfare());
      B.Bus.on(E.BOSS_DAMAGED, () => sfx.hit());
      B.Bus.on(E.BOSS_ATTACKED, () => sfx.shield());
      B.Bus.on(E.BOSS_DEFEATED, () => sfx.fanfare());
    },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/engines/dialogue-manager.js === */
/* BOKUL — DialogueManager
 * Baba Komutan'ın repliklerini bağlama göre seçer.
 * Yer tutucu doldurma + tekrar önleme burada. */
(function (B) {
  const recent = new Map(); // havuz adı -> son seçilen indexler

  function fill(text, vars) {
    return text.replace(/\{(\w+)\}/g, (m, k) => {
      if (vars && vars[k] != null) return vars[k];
      if (k === 'playerName' || k === 'name') return B.State.data.player.name || 'Komutan';
      return m;
    });
  }

  B.Dialogue = {
    /* Havuzdan tekrar etmeyen rastgele replik seç */
    pick(poolName, vars) {
      const pools = (B.Content.get('dialogues') || {}).pools || {};
      const pool = pools[poolName];
      if (!pool) return null;
      if (typeof pool === 'string') return fill(pool, vars);   // tekil ipucu metinleri
      if (!pool.length) return null;

      const memory = recent.get(poolName) || [];
      const banned = new Set(memory.slice(-Math.min(pool.length - 1, 3))); // son 3 tekrar etmesin
      let idx, guard = 20;
      do { idx = Math.floor(Math.random() * pool.length); } while (banned.has(idx) && --guard);
      memory.push(idx);
      recent.set(poolName, memory.slice(-6));
      return fill(pool[idx], vars);
    },

    /* İpucu anahtarı → metin (ders paketindeki hints haritasından gelen anahtarlar) */
    hint(key, vars) { return B.Dialogue.pick(key, vars) || 'Bir daha dene Komutan!'; },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/engines/progress-manager.js === */
/* BOKUL — ProgressManager (Adaptif Sistem)
 * Mikro-beceri başına kayan pencereli ustalık takibi.
 * Soru üreticiler zorluğu buradan sorar; boss kapısı ustalığa bakar. */
(function (B) {
  function cfg() { return (B.Content.get('config') || {}).adaptive || { window: 20, weakThreshold: 0.6, strongThreshold: 0.85 }; }

  B.Progress = {
    /* step:answered olayından beceri kaydı — sadece İLK deneme sayılır
     * (ipucu sonrası düzeltmeler ustalık sayılmaz ama ceza da değildir) */
    record(skill, correct) {
      const per = B.State.data.stats.perSkill;
      if (!per[skill]) per[skill] = [];
      per[skill].push(correct ? 1 : 0);
      if (per[skill].length > cfg().window) per[skill].shift();
    },

    /* 0..1 ustalık: son N denemenin doğruluk oranı (deneme azsa temkinli) */
    mastery(skill) {
      const arr = B.State.data.stats.perSkill[skill] || [];
      if (!arr.length) return 0;
      const ratio = arr.reduce((a, b) => a + b, 0) / arr.length;
      const confidence = Math.min(1, arr.length / 8); // az veriyle şişme olmasın
      return ratio * confidence;
    },

    /* Ders becerilerinin ortalama ustalığı (boss kapısı bunu kullanır) */
    overallMastery(skills) {
      if (!skills || !skills.length) return 0;
      return skills.reduce((t, s) => t + B.Progress.mastery(s), 0) / skills.length;
    },

    /* En zayıf beceri (görev üretimi ve ipucu vurgusu için) */
    weakestSkill(skills) {
      let weakest = skills[0], min = Infinity;
      skills.forEach(s => { const m = B.Progress.mastery(s); if (m < min) { min = m; weakest = s; } });
      return weakest;
    },

    /* Üreticiye zorluk çarpanı: usta ise 1 (tam parametre), zayıfsa 0 (kolay uç) */
    difficultyBias(skills) {
      const m = B.Progress.overallMastery(skills);
      const c = cfg();
      if (m >= c.strongThreshold) return 1;
      if (m <= c.weakThreshold) return 0;
      return (m - c.weakThreshold) / (c.strongThreshold - c.weakThreshold);
    },

    init() {
      B.Bus.on(B.Events.STEP_ANSWERED, p => {
        if (p.attempt === 1) B.Progress.record(p.stepType, p.correct);
        const st = B.State.data.stats;
        if (p.correct) st.correct++; else st.wrong++;
      });
    },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/engines/reward-engine.js === */
/* BOKUL — RewardEngine
 * XP, level, rütbe, seri (streak) ve günlük çalışma serisi ekonomisi.
 * Tüm sayılar content/rewards.json'dan gelir — kodda denge sabiti YOK. */
(function (B) {
  function R() { return B.Content.get('rewards'); }

  /* Level n'i geçmek için gereken XP: base + (n-1)*perLevel */
  function xpForLevel(n) { const L = R().levels; return L.base + (n - 1) * L.perLevel; }

  B.Reward = {
    /* ---- XP ---- */
    addXp(amount, source, opts) {
      opts = opts || {};
      let final = amount;
      if (opts.applyStreak) final = Math.round(final * B.Reward.streakMultiplier());
      final = Math.round(final * (1 + B.Reward.dailyBonus()));
      const p = B.State.data.player;
      p.xp += final;
      B.Bus.emit(B.Events.XP_GAINED, { amount: final, source });
      // Level kontrolü (tek olayda birden çok level atlanabilir)
      while (p.xp >= B.Reward.xpNeeded()) {
        p.xp -= B.Reward.xpNeeded();
        p.level++;
        const rank = B.Reward.rankFor(p.level);
        const rankChanged = rank.id !== p.rank;
        p.rank = rank.id;
        B.Bus.emit(B.Events.LEVEL_UP, { newLevel: p.level, newRank: rankChanged ? rank : null });
      }
      return final;
    },

    xpNeeded() { return xpForLevel(B.State.data.player.level); },

    rankFor(level) {
      const ranks = R().ranks;
      let cur = ranks[0];
      ranks.forEach(r => { if (level >= r.minLevel) cur = r; });
      return cur;
    },

    /* ---- Hatasız hedef serisi ---- */
    streakMultiplier() {
      const mults = R().xp.streakMultipliers;
      const s = B.State.data.streaks.current;
      let m = 1;
      Object.keys(mults).map(Number).sort((a, b) => a - b)
        .forEach(k => { if (s >= k) m = mults[k]; });
      return m;
    },

    onQuestionDone(flawless) {
      const st = B.State.data.streaks;
      if (flawless) {
        st.current++;
        if (st.current > st.best) st.best = st.current;
      } else st.current = 0;
      B.Bus.emit(B.Events.STREAK_CHANGED, { count: st.current, multiplier: B.Reward.streakMultiplier() });
    },

    /* ---- Günlük çalışma serisi (login değil, HAREKÂT bitirme serisi) ---- */
    dailyBonus() {
      const x = R().xp;
      return Math.min(B.State.data.streaks.dailyDays * x.dailyStreakBonusPerDay, x.dailyStreakBonusMax);
    },

    registerDailyPlay() {
      const st = B.State.data.streaks;
      const today = new Date(); today.setHours(0, 0, 0, 0);
      const todayStr = today.toISOString().slice(0, 10);
      if (st.lastPlayDate === todayStr) return;
      if (st.lastPlayDate) {
        const diff = Math.round((today - new Date(st.lastPlayDate)) / 86400000);
        if (diff === 1) st.dailyDays++;
        else if (diff > 1) st.dailyDays = Math.max(0, st.dailyDays - 2); // kırılınca sıfırlama YOK: 2 kademe düşer
      } else st.dailyDays = 1;
      st.lastPlayDate = todayStr;
    },

    /* ---- Altın (para) ---- */
    addCoins(amount, source) {
      const p = B.State.data.player;
      p.coins = (p.coins || 0) + amount;
      B.Bus.emit(B.Events.COINS_CHANGED, { total: p.coins, delta: amount });
      return amount;
    },
    spendCoins(amount) {
      const p = B.State.data.player;
      if ((p.coins || 0) < amount) return false;
      p.coins -= amount;
      B.Bus.emit(B.Events.COINS_CHANGED, { total: p.coins, delta: -amount });
      B.Save.saveSoon();
      return true;
    },

    /* ---- Soru/görev ödül yardımcıları ---- */
    stepXp() { return R().xp.perStep; },
    questionXp(stars) { return R().xp.perQuestionByStars[String(stars)] || 0; },
    missionBonus() { return R().xp.missionBonus; },
    bossXp(tier) { return tier === 'unit' ? R().xp.bossUnit : R().xp.bossTopic; },

    init() {
      // Harekât bittiğinde günlük seri işlenir
      B.Bus.on(B.Events.MISSION_COMPLETED, () => B.Reward.registerDailyPlay());
    },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/engines/question-engine.js === */
/* BOKUL — QuestionEngine
 * Soru tipi plugin çatısı. Her tip registerType ile kaydolur:
 *   { generate(params, bias), getSteps(q), validateStep(q, step, answer) }
 * Motor tiplerin içini bilmez — Open/Closed. */
(function (B) {
  const types = new Map();

  B.Question = {
    registerType(name, impl) {
      ['generate', 'getSteps', 'validateStep'].forEach(k => {
        if (typeof impl[k] !== 'function') throw new Error('Soru tipi eksik metod: ' + name + '.' + k);
      });
      types.set(name, impl);
    },

    type(name) {
      const t = types.get(name);
      if (!t) throw new Error('Kayıtsız soru tipi: ' + name);
      return t;
    },

    /* Üret: adaptif zorluk çarpanı ProgressManager'dan alınır */
    generate(typeName, params, skills) {
      const bias = skills ? B.Progress.difficultyBias(skills) : 0.5;
      const q = B.Question.type(typeName).generate(params || {}, bias);
      q._type = typeName;
      return q;
    },

    steps(q) { return B.Question.type(q._type).getSteps(q); },
    validate(q, step, answer) { return B.Question.type(q._type).validateStep(q, step, answer); },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/engines/lesson-engine.js === */
/* BOKUL — LessonEngine
 * Ders paketini (cephe) yorumlar: ünite → bölüm → harekât → boss akışı,
 * kilit kuralları ve ustalık kapısı. İçeriğin ANLAMINI bilmez. */
(function (B) {
  let lesson = null; // aktif ders paketi

  function cfg() { return B.Content.get('config') || {}; }

  B.Lesson = {
    setActive(lessonData) { lesson = lessonData; },
    active() { return lesson; },

    sections() {
      const out = [];
      lesson.units.forEach(u => u.sections.forEach(s => out.push({ unit: u, section: s })));
      return out;
    },

    findSection(sectionId) {
      return B.Lesson.sections().find(x => x.section.id === sectionId) || null;
    },

    findMission(sectionId, missionId) {
      const s = B.Lesson.findSection(sectionId);
      return s ? s.section.missions.find(m => m.id === missionId) : null;
    },

    /* ---- Kilit kuralları ---- */

    /* Bölüm açık mı? İlk bölüm hep açık; sonrakiler önceki bölümden yıldız ister */
    isSectionUnlocked(sectionId) {
      const list = B.Lesson.sections();
      const idx = list.findIndex(x => x.section.id === sectionId);
      if (idx <= 0) return true;
      const prev = list[idx - 1].section;
      const need = (list[idx].section.unlock || {}).starsRequired ?? (cfg().sectionUnlockStars || 16);
      const prevProg = B.State.sectionProgress(lesson.id, prev.id);
      return prevProg.bossDefeated && B.State.sectionStars(lesson.id, prev.id) >= need;
    },

    /* Harekât oynanabilir mi? Kendinden önceki harekât tamamlanmış olmalı (tekrar hep serbest) */
    isMissionUnlocked(sectionId, missionId) {
      if (!B.Lesson.isSectionUnlocked(sectionId)) return false;
      const sec = B.Lesson.findSection(sectionId).section;
      const idx = sec.missions.findIndex(m => m.id === missionId);
      if (idx <= 0) return true;
      const prevId = sec.missions[idx - 1].id;
      return !!B.State.sectionProgress(lesson.id, sectionId).missions[prevId];
    },

    /* Boss kapısı: tüm harekâtlar bitmiş + kazanım ustalığı yeterli */
    bossGate(sectionId) {
      const sec = B.Lesson.findSection(sectionId).section;
      const prog = B.State.sectionProgress(lesson.id, sectionId);
      const missionsDone = sec.missions.every(m => prog.missions[m.id]);
      const need = (sec.boss.unlock || {}).masteryRequired ?? (cfg().mastery || {}).bossGate ?? 0.8;
      const mastery = B.Progress.overallMastery(lesson.skills);
      return { missionsDone, mastery, need, open: missionsDone && mastery >= need };
    },

    /* ---- Tamamlama kayıtları ---- */

    completeMission(sectionId, missionId, stars) {
      const prog = B.State.sectionProgress(lesson.id, sectionId);
      const prev = prog.missions[missionId];
      // Yıldız sadece yükselir, asla düşmez (tekrar oynama tamamlamacılığı besler)
      prog.missions[missionId] = { stars: Math.max(stars, prev ? prev.stars : 0) };
    },

    defeatBoss(sectionId) {
      const prog = B.State.sectionProgress(lesson.id, sectionId);
      prog.bossDefeated = true;
      prog.bossHpCarry = 0;
      const list = B.Lesson.sections();
      const idx = list.findIndex(x => x.section.id === sectionId);
      const next = list[idx + 1];
      if (next && B.Lesson.isSectionUnlocked(next.section.id)) {
        B.Bus.emit(B.Events.SECTION_UNLOCKED, { sectionId: next.section.id });
      }
    },

    /* Review harekâtı için: bu bölüme kadar tamamlanmış practice üreticileri havuzu */
    reviewGenerators(sectionId) {
      const list = B.Lesson.sections();
      const idx = list.findIndex(x => x.section.id === sectionId);
      const gens = [];
      list.slice(0, idx + 1).forEach(x => x.section.missions.forEach(m => {
        if (m.generator && (m.type === 'practice' || m.type === 'guided')) gens.push(m.generator);
      }));
      return gens.length ? gens : [{ divisorRange: [2, 5], dividendDigits: 1 }];
    },

    /* Harekâtın ipucu anahtarını getir: hints[stepType][hataSeviyesi] → rastgele anahtar */
    hintKey(stepType, level) {
      const h = (lesson.hints || {})[stepType];
      if (!h) return null;
      const lv = Math.min(level, 3);
      const keys = h[String(lv)] || h['1'] || [];
      return keys[Math.floor(Math.random() * keys.length)] || null;
    },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/engines/chest-engine.js === */
/* BOKUL — Sandık Motoru
 * Kazanma tetikleri olaylardan; içerik rewards.json'dan.
 * Kopya koruması: açılmamış kozmetik bitmeden aynı şey çıkmaz;
 * her şey açıldıysa XP paketi düşer. */
(function (B) {
  const TYPE_META = {
    bronze:    { name: 'Bronz Sandık',    icon: '🥉' },
    silver:    { name: 'Gümüş Sandık',    icon: '🥈' },
    gold:      { name: 'Altın Sandık',    icon: '🥇' },
    epic:      { name: 'Epik Sandık',     icon: '💎' },
    legendary: { name: 'Efsanevi Sandık', icon: '🏆' },
  };

  function R() { return B.Content.get('rewards'); }

  function inv() {
    const i = B.State.data.inventory;
    if (!i.chests) i.chests = [];
    if (i.starBank == null) i.starBank = 0;
    return i;
  }

  B.Chest = {
    meta(type) { return TYPE_META[type]; },
    queue() { return inv().chests; },

    earn(type) {
      inv().chests.push(type);
      B.Bus.emit(B.Events.CHEST_EARNED, { chestType: type });
      B.UI.toast(TYPE_META[type].icon + ' ' + TYPE_META[type].name + ' kazandın!');
      B.Save.saveSoon();
    },

    /* Nadirlik çek: drops yüzdelerinden; o nadirlikte açılmamış kozmetik yoksa alta düş */
    roll(type) {
      const drops = R().chests[type].drops;
      let r = Math.random() * 100, rarity = 'common';
      for (const k of Object.keys(drops)) { r -= drops[k]; if (r <= 0) { rarity = k; break; } }
      if (rarity === 'xpPack') return { xpPack: 50 };

      const order = ['legendary', 'epic', 'rare', 'common'];
      const owned = B.State.data.inventory.cosmetics;
      let idx = order.indexOf(rarity);
      if (idx < 0) idx = 3;
      for (let i = idx; i < order.length; i++) {
        const pool = R().cosmetics.filter(c => c.rarity === order[i] && !owned.includes(c.id));
        if (pool.length) return { item: pool[Math.floor(Math.random() * pool.length)] };
      }
      // her nadirlikte de her şey açık → tatlı teselli
      return { xpPack: 50 };
    },

    /* Kuyruktaki ilk sandığı aç, sonucu döndür (tören ChestUI'da) */
    openNext() {
      const q = inv().chests;
      if (!q.length) return null;
      const type = q.shift();
      const result = B.Chest.roll(type);
      // Her sandıktan taban altın da çıkar (dükkân ekonomisini besler)
      const baseCoins = { bronze: 20, silver: 30, gold: 50, epic: 80, legendary: 150 }[type] || 20;
      result.coins = baseCoins;
      B.Reward.addCoins(baseCoins, 'chest');
      if (result.item) {
        B.State.data.inventory.cosmetics.push(result.item.id);
        B.Bus.emit(B.Events.COSMETIC_UNLOCKED, { itemId: result.item.id });
      } else {
        B.Reward.addXp(result.xpPack, 'chest');
      }
      B.Bus.emit(B.Events.CHEST_OPENED, { chestType: type, item: result.item || null });
      B.Save.saveSoon();
      return { type, result };
    },

    init() {
      // Bronz: toplanan her 10 yıldız
      B.Bus.on(B.Events.QUESTION_COMPLETED, p => {
        const i = inv();
        i.starBank += p.stars;
        const every = R().chests.bronze.every || 10;
        while (i.starBank >= every) { i.starBank -= every; B.Chest.earn('bronze'); }
      });
      // Altın: level atlama
      B.Bus.on(B.Events.LEVEL_UP, () => B.Chest.earn('gold'));
      // Epik/Efsanevi: boss zaferleri
      B.Bus.on(B.Events.BOSS_DEFEATED, p => B.Chest.earn(p.tier === 'unit' ? 'legendary' : 'epic'));
      // Gümüş: günlük görevler v0.8'de — tetik orada bağlanacak
    },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/interactions/long-division/logic.js === */
/* BOKUL — Uzun Bölme Mantığı (saf — DOM YOK, test edilebilir)
 * Bir bölme işlemini 5 tip mikro-adıma çözümler:
 *   select   → ilk çalışma sayısı için kaç basamak alınacağı
 *   estimate → bölüm rakamı tahmini
 *   multiply → tahmin × bölen
 *   subtract → fark (kale kuralı: fark < bölen)
 *   bringdown→ sonraki basamağı indir
 * computePlan() tüm adım listesini ve beklenen cevapları üretir. */
(function (B) {

  /* İşlem planını çıkar: her adım { type, expected, ... } */
  function computePlan(dividend, divisor) {
    const digits = String(dividend).split('').map(Number);
    const steps = [];

    // İlk çalışma sayısı: bölenden küçük olmayan en kısa önek
    let idx = 0, current = 0;
    do { current = current * 10 + digits[idx]; idx++; }
    while (current < divisor && idx < digits.length);
    steps.push({ type: 'select', expected: idx });

    const qDigits = [];
    // İterasyon bilgileri görünüm katmanı için saklanır (kolon hizalama)
    while (true) {
      const q = Math.floor(current / divisor);
      qDigits.push(q);
      const endCol = idx - 1; // çalışma sayısının son basamağının kolonu
      steps.push({ type: 'estimate', expected: q, endCol });
      const p = q * divisor;
      steps.push({ type: 'multiply', expected: p, endCol, working: current });
      const r = current - p;
      steps.push({ type: 'subtract', expected: r, endCol, working: current, product: p });
      if (idx < digits.length) {
        steps.push({ type: 'bringdown', expected: digits[idx], digitIndex: idx, endCol });
        current = r * 10 + digits[idx];
        idx++;
      } else {
        return {
          dividend, divisor, steps,
          quotient: Number(qDigits.join('')),
          remainder: r,
        };
      }
    }
  }

  /* Rastgele soru üretici.
   * params: { divisorRange:[a,b], dividendDigits:n|[min,max], remainder:bool, context? }
   * bias 0..1: adaptif zorluk — 0 kolay uç, 1 zor uç */
  function generate(params, bias) {
    const rnd = (a, b) => a + Math.floor(Math.random() * (b - a + 1));
    const dr = params.divisorRange || [2, 9];
    // bias yüksekse bölen aralığın üst ucuna kayar
    const divisor = rnd(dr[0], Math.max(dr[0], Math.round(dr[0] + (dr[1] - dr[0]) * (0.4 + 0.6 * bias))));

    let dd = params.dividendDigits || 2;
    if (Array.isArray(dd)) dd = rnd(dd[0], Math.max(dd[0], Math.round(dd[0] + (dd[1] - dd[0]) * bias)));

    let dividend;
    if (params.remainder) {
      // Kalanlı: uygun basamakta, tam bölünmeyen sayı bul
      let guard = 200;
      do {
        dividend = rnd(Math.pow(10, dd - 1), Math.pow(10, dd) - 1);
      } while ((dividend % divisor === 0 || dividend < divisor) && --guard);
    } else {
      // Kalansız: bölümü kur, çarparak bölüneni üret (basamak sayısı tutana dek)
      let guard = 200;
      do {
        const qMin = Math.ceil(Math.pow(10, dd - 1) / divisor);
        const qMax = Math.floor((Math.pow(10, dd) - 1) / divisor);
        const q = rnd(Math.max(1, qMin), Math.max(1, qMax));
        dividend = q * divisor;
      } while ((String(dividend).length !== dd || dividend < divisor) && --guard);
    }

    const plan = computePlan(dividend, divisor);
    return { dividend, divisor, plan, params };
  }

  const impl = {
    generate,
    getSteps(q) { return q.plan.steps; },
    validateStep(q, step, answer) {
      const val = Number(answer);
      if (step.type === 'select') return { correct: val === step.expected };
      return { correct: val === step.expected };
    },
  };

  // Tarayıcıda plugin olarak kaydol; Node'da (test) modül olarak dışa aç
  if (B && B.Question) B.Question.registerType('long-division', impl);
  if (B) B.LongDivision = { computePlan, generate, impl };
  if (typeof module !== 'undefined' && module.exports) {
    module.exports = { computePlan, generate, impl };
  }
})(typeof window !== 'undefined' ? (window.BOKUL = window.BOKUL || {}) : null);

/* === src/interactions/long-division/teach-models.js === */
/* BOKUL — Öğretim Modelleri (CPA: Somut → Görsel → Soyut)
 * teach harekâtlarının senaryo oynatıcısı. Senaryo adımları ders paketindeki
 * teachScripts'ten gelir; buradaki motor sadece oynatır.
 *
 * Adım türleri:
 *   { say: "..." }                        → Komutan konuşur, DEVAM ile geçilir
 *   { deal: { total, groups } }           → somut: kutuları takımlara paylaştır
 *   { pv:   { number, divisor } }         → görsel: basamak (onluk/birlik) tablosu
 *   { ask:  "...", expect: n }            → mini soru (küçük ped ile)
 *   { guided: { dividend, divisor } }     → soyut: koçlu ilk uzun bölme
 */
(function (B) {

  function el(tag, cls, text) {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    if (text != null) e.textContent = text;
    return e;
  }

  function run(container, scriptSteps, api) {
    let i = -1;
    let cleanup = null;

    function next() {
      if (cleanup) { cleanup(); cleanup = null; }
      i++;
      const s = scriptSteps[i];
      if (!s) return api.onComplete();
      container.innerHTML = '';

      if (s.say) return doSay(s);
      if (s.deal) return doDeal(s.deal);
      if (s.pv) return doPv(s.pv);
      if (s.ask) return doAsk(s);
      if (s.guided) return doGuided(s.guided);
      next(); // bilinmeyen adım atlanır
    }

    /* --- Komutan anlatımı --- */
    function doSay(s) {
      api.say(s.say);
      const btn = el('button', 'btn btn-action teach-next', 'DEVAM ▶');
      btn.onclick = () => { B.Audio.play('tick'); next(); };
      container.appendChild(el('div', 'teach-stage teach-say', '🫡'));
      container.appendChild(btn);
    }

    /* --- SOMUT: kutu paylaştırma ---
     * Kural: bir takıma, en az kutusu olan takımdan fazlası verilemez (eşit paylaşım öğretisi) */
    function doDeal(cfg) {
      api.say(B.Dialogue.pick('teach.deal.intro', { total: cfg.total, groups: cfg.groups }) ||
              cfg.total + ' kutuyu ' + cfg.groups + ' takıma EŞİT paylaştır. Takımlara dokun!');
      const stage = el('div', 'teach-stage');
      const supply = el('div', 'deal-supply');
      let left = cfg.total;
      const counts = new Array(cfg.groups).fill(0);
      const supplyLabel = el('div', 'deal-count', '📦 × ' + left);
      supply.appendChild(supplyLabel);
      stage.appendChild(supply);

      const groupsRow = el('div', 'deal-groups');
      const groupEls = [];
      for (let g = 0; g < cfg.groups; g++) {
        const box = el('div', 'deal-group');
        box.appendChild(el('div', 'deal-group-title', 'Takım ' + (g + 1)));
        const crates = el('div', 'deal-crates');
        box.appendChild(crates);
        box.onclick = () => {
          if (!left) return;
          const min = Math.min(...counts);
          if (counts[g] > min) { // eşitlik bozuluyor → nazik uyarı
            B.Audio.play('wrong');
            api.say(B.Dialogue.pick('teach.deal.unfair') || 'Eşit paylaştır Komutan — önce az olan takıma!');
            return;
          }
          counts[g]++; left--;
          B.Audio.play('tick');
          crates.appendChild(el('span', 'deal-crate', '📦'));
          supplyLabel.textContent = '📦 × ' + left;
          if (!left) {
            B.Audio.play('correct');
            api.say(B.Dialogue.pick('teach.deal.done', { each: counts[0] }) ||
                    'Paylaştırma tamam! Her takıma ' + counts[0] + ' kutu düştü. İşte BÖLME budur.');
            setTimeout(next, 1600);
          }
        };
        groupEls.push(box);
        groupsRow.appendChild(box);
      }
      stage.appendChild(groupsRow);
      container.appendChild(stage);
    }

    /* --- GÖRSEL: basamak tablosu --- */
    function doPv(cfg) {
      const tens = Math.floor(cfg.number / 10), ones = cfg.number % 10;
      const stage = el('div', 'teach-stage');
      const table = el('div', 'pv-table');
      const colT = el('div', 'pv-col');
      colT.appendChild(el('div', 'pv-title', 'ONLUKLAR'));
      const tRow = el('div', 'pv-blocks');
      for (let i = 0; i < tens; i++) tRow.appendChild(el('span', 'pv-ten', '10'));
      colT.appendChild(tRow);
      const colO = el('div', 'pv-col');
      colO.appendChild(el('div', 'pv-title', 'BİRLİKLER'));
      const oRow = el('div', 'pv-blocks');
      for (let i = 0; i < ones; i++) oRow.appendChild(el('span', 'pv-one', '1'));
      colO.appendChild(oRow);
      table.appendChild(colT); table.appendChild(colO);
      stage.appendChild(el('div', 'pv-number', cfg.number + ' ÷ ' + cfg.divisor));
      stage.appendChild(table);
      container.appendChild(stage);
      const btn = el('button', 'btn btn-action teach-next', 'DEVAM ▶');
      btn.onclick = () => { B.Audio.play('tick'); next(); };
      container.appendChild(btn);
    }

    /* --- Mini soru (küçük ped) --- */
    function doAsk(s) {
      api.say(s.ask);
      const stage = el('div', 'teach-stage');
      const display = el('div', 'ask-display', '?');
      stage.appendChild(display);
      const pad = el('div', 'numpad numpad-mini');
      let buf = '';
      '1234567890'.split('').forEach(k => {
        const b = el('button', 'key', k);
        b.onclick = () => { B.Audio.play('tick'); if (buf.length < 4) { buf += k; display.textContent = buf; } };
        pad.appendChild(b);
      });
      const back = el('button', 'key key-back', '⌫');
      back.onclick = () => { buf = buf.slice(0, -1); display.textContent = buf || '?'; };
      const ok = el('button', 'key key-go', '✔');
      ok.onclick = () => {
        if (!buf) return;
        if (Number(buf) === s.expect) {
          B.Audio.play('correct');
          api.say(B.Dialogue.pick('correct'));
          setTimeout(next, 1100);
        } else {
          B.Audio.play('wrong');
          buf = ''; display.textContent = '?';
          api.say(B.Dialogue.pick('wrong.soft'));
        }
      };
      pad.appendChild(back); pad.appendChild(ok);
      stage.appendChild(pad);
      container.appendChild(stage);
    }

    /* --- SOYUT: koçlu ilk uzun bölme --- */
    function doGuided(cfg) {
      const q = {
        dividend: cfg.dividend, divisor: cfg.divisor,
        plan: B.LongDivision.computePlan(cfg.dividend, cfg.divisor),
        _type: 'long-division',
      };
      const view = B.LongDivisionView.create(container, q, {
        coach: true,
        say: api.say,
        onAnswer(step, correct, attempt) {
          B.Bus.emit(B.Events.STEP_ANSWERED, { stepType: step.type, correct, attempt, value: null });
        },
        onComplete() {
          api.say(B.Dialogue.pick('teach.guided.done') || 'İlk uzun bölmeni bitirdin Komutan! Artık hazırsın.');
          setTimeout(next, 1600);
        },
      });
      cleanup = () => view.destroy();
    }

    next();
    return { destroy() { if (cleanup) cleanup(); container.innerHTML = ''; } };
  }

  B.TeachModels = { run };
})(window.BOKUL = window.BOKUL || {});

/* === src/interactions/long-division/view.js === */
/* BOKUL — Uzun Bölme Tahtası (görünüm)
 * Türk okul notasyonu: bölünen solda, dikey çizgi, bölen sağ üstte,
 * bölüm bölenin altında. Adımlar logic.js planından sürülür.
 *
 * API:
 *   const ctl = B.LongDivisionView.create(container, question, {
 *     prefilled: Set<stepType>,      // guided: bu adımları Komutan yapar
 *     coach: bool,                    // teach: her adımda yönerge repliği
 *     problemText: string|null,       // challenge: problem metni
 *     onAnswer(step, correct, attempt),
 *     onComplete({ mistakes }),
 *     say(text),                      // Komutan balonuna yaz
 *   });
 */
(function (B) {

  function el(tag, cls, text) {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    if (text != null) e.textContent = text;
    return e;
  }

  function create(container, q, opts) {
    opts = opts || {};
    const plan = q.plan;
    const D = String(q.dividend).length;
    const steps = plan.steps;

    let stepIdx = 0;
    let attempt = 0;
    let mistakes = 0;
    let buffer = '';
    let selectCount = 0;   // select adımında seçili basamak sayısı
    let destroyed = false;

    /* ---------- DOM iskeleti ---------- */
    container.innerHTML = '';
    const root = el('div', 'ld-root');

    if (opts.problemText) root.appendChild(el('div', 'ld-problem', opts.problemText));

    const boardWrap = el('div', 'ld-board');
    const left = el('div', 'ld-left');           // bölünen + işlem satırları
    const right = el('div', 'ld-right');         // bölen + bölüm

    // Bölünen satırı (tıklanabilir basamaklar)
    const dividendRow = el('div', 'ld-row ld-dividend');
    const digitEls = [];
    dividendRow.appendChild(el('span', 'ld-cell ld-sign', ''));  // kolon 0: işaret kolonu
    String(q.dividend).split('').forEach((d, i) => {
      const c = el('span', 'ld-cell ld-digit', d);
      c.dataset.idx = i;
      digitEls.push(c);
      dividendRow.appendChild(c);
    });
    left.appendChild(dividendRow);

    const workArea = el('div', 'ld-work');        // işlem satırları buraya eklenir
    left.appendChild(workArea);

    // Sağ blok: bölen, çizgi, bölüm
    right.appendChild(el('div', 'ld-divisor', String(q.divisor)));
    right.appendChild(el('div', 'ld-qline'));
    const quotientRow = el('div', 'ld-quotient');
    right.appendChild(quotientRow);

    boardWrap.appendChild(left);
    boardWrap.appendChild(right);
    root.appendChild(boardWrap);

    // Sayı pedi
    const pad = el('div', 'numpad');
    '1234567890'.split('').forEach(k => {
      const b = el('button', 'key', k);
      b.dataset.key = k;
      pad.appendChild(b);
    });
    const back = el('button', 'key key-back', '⌫'); back.dataset.key = 'back';
    const ok = el('button', 'key key-go', '✔ ONAYLA'); ok.dataset.key = 'ok';
    pad.appendChild(back); pad.appendChild(ok);
    root.appendChild(pad);
    container.appendChild(root);

    /* ---------- Yardımcılar ---------- */
    function cellRow(cls) {
      const r = el('div', 'ld-row ' + (cls || ''));
      for (let c = 0; c <= D; c++) r.appendChild(el('span', 'ld-cell'));
      workArea.appendChild(r);
      return r;
    }
    function setCell(row, col, text, cls) {
      const c = row.children[col];
      c.textContent = text;
      if (cls) c.classList.add(cls);
      return c;
    }
    // plan endCol (0 tabanlı basamak indeksi) → görüntü kolonu (+1: işaret kolonu)
    const VC = i => i + 1;

    function say(t) { if (opts.say && t) opts.say(t); }

    /* ---------- Adım durumu ---------- */
    let activeCells = [];   // buffer'ın yazıldığı hücreler (sağdan sola)
    let currentRow = null;  // multiply/subtract için aktif satır
    let remRow = null;      // son kalan satırı (bringdown buraya ekler)

    function clearActive() {
      activeCells.forEach(c => { c.classList.remove('ld-active'); c.textContent = c.dataset.keep || ''; });
      activeCells = [];
    }

    function renderBuffer() {
      // buffer'ı aktif hücrelere sağa dayalı yaz
      const chars = buffer.split('');
      for (let i = 0; i < activeCells.length; i++) {
        const ch = chars[chars.length - activeCells.length + i];
        activeCells[i].textContent = ch || '';
      }
      // taşma: buffer hücre sayısını aşarsa son hücrede birden çok karakter göster
      if (chars.length > activeCells.length && activeCells.length) {
        activeCells[activeCells.length - 1].textContent = chars.slice(chars.length - 1).join('');
      }
    }

    /* Adımı başlat: giriş hücrelerini hazırla + koçluk repliği */
    function beginStep() {
      if (destroyed) return;
      buffer = ''; attempt = 0; selectCount = 0;
      const step = steps[stepIdx];
      if (!step) return finish();

      // Tek basamaklı bölünende SEÇ adımı otomatik: seçilecek tek şey var,
      // çocuğu anlamsız bir dokunuşla oyalama (UX düzeltmesi)
      if (step.type === 'select' && digitEls.length === 1) {
        digitEls[0].classList.add('ld-select');
        setTimeout(() => commitStep(step, true), 400);
        return;
      }

      if (opts.coach) {
        const key = 'teach.coach.' + step.type;
        const line = B.Dialogue.pick(key, { divisor: q.divisor });
        if (line) say(line);
      } else if (step.type === 'select') {
        // SEÇ adımı pedle değil dokunarak oynanır — bunu HER ZAMAN söyle
        say(B.Dialogue.pick('step.select.intro', { divisor: q.divisor }) ||
            'Kaç basamak alacağız? Sayının basamaklarına DOKUN, sonra ONAYLA!');
      }

      // Guided: Komutan bu adımı kendisi yapar
      if (opts.prefilled && opts.prefilled.has(step.type)) {
        setTimeout(() => autoFill(step), 700);
        prepareCells(step, true);
        return;
      }
      prepareCells(step, false);
    }

    function prepareCells(step, ghost) {
      clearActive();
      digitEls.forEach(d => d.classList.remove('ld-select', 'ld-pulse'));

      if (step.type === 'select') {
        // Basamaklara dokunarak önek seç
        digitEls.forEach(d => d.classList.add('ld-pulse'));
        pad.classList.add('numpad-dim');
        return;
      }
      pad.classList.remove('numpad-dim');

      if (step.type === 'estimate') {
        const c = el('span', 'ld-cell ld-active', '');
        quotientRow.appendChild(c);
        activeCells = [c];
      }
      else if (step.type === 'multiply') {
        currentRow = cellRow('ld-product');
        const len = String(step.expected).length;
        const end = VC(step.endCol);
        setCell(currentRow, end - len, '−', 'ld-sign-cell'); // eksi işareti
        activeCells = [];
        for (let c = end - len + 1; c <= end; c++) {
          const cell = setCell(currentRow, c, '', null);
          cell.classList.add('ld-active');
          activeCells.push(cell);
        }
      }
      else if (step.type === 'subtract') {
        // ayraç çizgisi
        const sep = cellRow('ld-sep');
        const plen = String(step.product).length;
        const end = VC(step.endCol);
        for (let c = end - plen; c <= end; c++) setCell(sep, c, '─');
        // sonuç satırı
        remRow = cellRow('ld-rem');
        const rlen = String(step.expected).length;
        activeCells = [];
        for (let c = end - rlen + 1; c <= end; c++) {
          const cell = setCell(remRow, c, '');
          cell.classList.add('ld-active');
          activeCells.push(cell);
        }
      }
      else if (step.type === 'bringdown') {
        // İndirilecek basamak yanıp söner; dokunuş ya da ped ile
        const d = digitEls[step.digitIndex];
        d.classList.add('ld-pulse');
        const cell = setCell(remRow, VC(step.digitIndex), '');
        cell.classList.add('ld-active');
        activeCells = [cell];
      }
      if (ghost) activeCells.forEach(c => c.classList.add('ld-ghost'));
    }

    /* Guided otomatik doldurma */
    function autoFill(step) {
      if (destroyed) return;
      if (step.type === 'select') {
        for (let i = 0; i < step.expected; i++) digitEls[i].classList.add('ld-select');
        say(B.Dialogue.pick('teach.autofill.select', { n: step.expected }) || 'Bu kısmı ben aldım Komutan.');
      } else {
        buffer = String(step.expected);
        renderBuffer();
      }
      setTimeout(() => { commitStep(step, true); }, 650);
    }

    /* ---------- Doğrulama ---------- */
    function submit() {
      const step = steps[stepIdx];
      if (!step) return;
      let answer;
      if (step.type === 'select') {
        if (!selectCount) return; // henüz seçim yok
        answer = selectCount;
      } else {
        if (!buffer.length) return;
        answer = buffer;
      }
      attempt++;
      const { correct } = B.Question.validate(q, step, answer);
      if (opts.onAnswer) opts.onAnswer(step, correct, attempt);

      if (correct) { commitStep(step, false); }
      else {
        mistakes++;
        root.classList.remove('ld-shake'); void root.offsetWidth; // animasyonu tazele
        root.classList.add('ld-shake');
        const key = B.Lesson.active() ? B.Lesson.hintKey(step.type, attempt) : null;
        say(key ? B.Dialogue.hint(key, { divisor: q.divisor }) : 'Bir daha dene Komutan!');
        if (step.type === 'select') {
          digitEls.forEach(d => d.classList.remove('ld-select'));
          selectCount = 0;
        } else { buffer = ''; renderBuffer(); }
      }
    }

    /* Doğru adımı tahtaya işle ve sonrakine geç */
    function commitStep(step, wasAuto) {
      clearActiveKeep(step);
      digitEls.forEach(d => d.classList.remove('ld-pulse'));
      stepIdx++;
      setTimeout(beginStep, wasAuto ? 250 : 350);
    }

    function clearActiveKeep(step) {
      // Aktif hücrelere kesin değeri yaz, vurguyu kaldır
      const val = String(step.expected);
      if (step.type === 'select') {
        for (let i = 0; i < step.expected; i++) digitEls[i].classList.add('ld-select');
      } else {
        const chars = val.split('');
        activeCells.forEach((c, i) => {
          c.textContent = chars[i] != null ? chars[i] : '';
          c.classList.remove('ld-active', 'ld-ghost');
          c.classList.add('ld-done');
        });
      }
      activeCells = [];
    }

    function finish() {
      if (opts.onComplete) opts.onComplete({ mistakes });
    }

    /* ---------- Girdi bağlama ---------- */
    function onPad(e) {
      const b = e.target.closest('.key');
      if (!b) return;
      B.Audio.play('tick');
      const k = b.dataset.key;
      const step = steps[stepIdx];
      if (!step) return;

      if (k === 'ok') return submit();
      if (step.type === 'select') return; // seçim dokunuşla yapılır
      if (k === 'back') { buffer = buffer.slice(0, -1); renderBuffer(); return; }
      if (buffer.length < 6) { buffer += k; renderBuffer(); }
    }

    function onDigitTap(e) {
      const d = e.target.closest('.ld-digit');
      if (!d) return;
      const step = steps[stepIdx];
      if (!step) return;
      const idx = Number(d.dataset.idx);
      if (step.type === 'select') {
        B.Audio.play('tick');
        selectCount = idx + 1;
        digitEls.forEach((x, i) => x.classList.toggle('ld-select', i <= idx));
      } else if (step.type === 'bringdown') {
        B.Audio.play('tick');
        buffer = d.textContent; // dokunulan basamak cevaptır (yanlışsa yanlış sayılır)
        renderBuffer();
        submit();
      }
    }

    pad.addEventListener('click', onPad);
    dividendRow.addEventListener('click', onDigitTap);

    beginStep();

    return {
      destroy() { destroyed = true; container.innerHTML = ''; },
    };
  }

  B.LongDivisionView = { create };
})(window.BOKUL = window.BOKUL || {});

/* === src/ui/animation-engine.js === */
/* BOKUL — AnimationEngine
 * XP damlası, konfeti ve küçük şölenler. Olayları dinler, kimse çağırmaz. */
(function (B) {

  /* Ekranda bir noktadan XP barına uçan altın çip */
  function xpDrop(amount) {
    const bar = document.querySelector('.hud-xpbar');
    const chip = document.createElement('div');
    chip.className = 'fx-xp';
    chip.textContent = '+' + amount + ' XP';
    document.body.appendChild(chip);
    const startX = window.innerWidth / 2, startY = window.innerHeight * 0.45;
    chip.style.left = startX + 'px'; chip.style.top = startY + 'px';
    requestAnimationFrame(() => {
      let tx = startX, ty = 60;
      if (bar) { const r = bar.getBoundingClientRect(); tx = r.left + r.width / 2; ty = r.top; }
      chip.style.transform = 'translate(' + (tx - startX) + 'px,' + (ty - startY) + 'px) scale(.6)';
      chip.style.opacity = '0';
    });
    setTimeout(() => chip.remove(), 900);
  }

  /* Basit konfeti patlaması (level-up, boss zaferi) */
  function confetti(n) {
    const colors = ['#FF4FD8', '#FFD52E', '#52E88C', '#9D6BFF', '#3DF2D2', '#FF9F1C'];
    for (let i = 0; i < (n || 40); i++) {
      const p = document.createElement('div');
      p.className = 'fx-confetti';
      p.style.background = colors[i % colors.length];
