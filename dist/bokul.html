        'Balık ister misin? Önce akvaryum craftla: cam panel + filtre + temiz su + çakıl! 🐠',
        'İpi 3 kez birleştirince kumaş olur; kumaşla evini geliştirebilirsin! 🧵',
        'Ürettiğin eşyalarla hem evini hem dep\'onu büyüt — daha çok eşya saklarsın! 🏠',
        'Bir eşya craftlamak için birden çok parça gerekebilir; önce malzeme topla! 🧰',
        'Craft zinciri: küçük craftladığınla yenisini craftlarsın — Arc Raiders gibi! ⚙️',
      ];
      function babaPending() {
        const b = [];
        if (B.Quest && B.Quest.pending && B.Quest.pending()) b.push('Toplamanı bekleyen ' + B.Quest.pending() + ' görev ödülü var! 📋');
        if (B.Daily && B.Daily.canClaim && B.Daily.canClaim()) b.push('Günlük ödülün hazır — al da serin büyüsün! 🎁');
        const pets = (B.Perms.feature('pets') && B.Pets) ? B.Pets.adopted() : [];
        const cap = pets.filter(x => B.Pets.isCaptured(x)).length;
        const needy = pets.filter(x => !B.Pets.isCaptured(x) && (x.tokluk < 50 || x.mutluluk < 50)).length;
        if (cap) b.push(cap + ' dostun ' + B.Pets.villain() + "'a kaçırıldı — kurtar! 😈");
        else if (needy) b.push(needy + ' dostun bakım bekliyor, unutma! 🐾');
        const ch = (B.Chest && B.Chest.queue) ? B.Chest.queue().length : 0;
        if (ch) b.push(ch + ' sandık açılmayı bekliyor! 📦');
        return b.length ? b[Math.floor(Math.random() * b.length)] : 'Bekleyen işin yok — her şey yolunda, aferin asker! ✅';
      }
      let bC = 0, bR = 0;
      const babaCats = [() => babaPending(), () => craftTips[bC++ % craftTips.length]];
      this._babaTimer = setInterval(() => {
        if (B.UI.currentScreen() !== 'home') return;
        if (document.querySelector('.overlay')) return; // tur/overlay açıkken bekle
        cmd.say(babaCats[bR++ % babaCats.length]());
      }, 10000);

      // Bekleyen sandık: sallanan buton (dopamin kancası)
      const q = B.Chest.queue();
      if (q.length) {
        const c = document.createElement('button');
        c.className = 'chest-float';
        c.innerHTML = '🎁<small>' + q.length + ' sandık!</small>';
        c.onclick = () => B.ChestUI.openCeremony(() => B.UI.show('home'));
        root.appendChild(c);
      }

      // ---- Baba'nın Panosu (dashboard): durum + öğrenme yolları + şaka ----
      const p = B.State.data.player;
      const st = B.State.data.stats || {};
      const rank = B.Reward.rankFor(p.level);
      const lessons = (B.Lesson.forPlayer() || []).filter(l => B.Perms.lesson(l.id));
      const pathRows = lessons.map(l => {
        let stars = 0, max = 0, bosses = 0, done = 0;
        l.units.forEach(u => u.sections.forEach(s => {
          max += s.missions.length * 3; stars += B.State.sectionStars(l.id, s.id);
          bosses++; if (B.State.sectionProgress(l.id, s.id).bossDefeated) done++;
        }));
        const pct = max ? Math.round(stars / max * 100) : 0;
        return '<button class="dash-path" data-lid="' + l.id + '">' +
          '<span class="dash-picon">' + l.icon + '</span>' +
          '<span class="dash-pinfo"><b>' + l.title + '</b>' +
            '<span class="dash-bar"><i style="width:' + pct + '%"></i></span>' +
            '<small>⭐ ' + stars + '/' + max + ' · 💠 ' + done + '/' + bosses + '</small></span>' +
          '<span class="dash-pgo">▶</span></button>';
      }).join('');
      const dash = document.createElement('div');
      dash.className = 'home-dash';
      dash.innerHTML =
        '<div class="dash-stats">' +
          '<span class="dash-stat">' + rank.icon + ' ' + rank.title + '</span>' +
          '<span class="dash-stat">🎖️ Sv.' + p.level + '</span>' +
          '<span class="dash-stat">💰 ' + (p.coins || 0) + '</span>' +
          '<span class="dash-stat">🔥 Seri ' + (B.State.data.streaks.current || 0) + '</span>' +
          '<span class="dash-stat">✅ ' + (st.questionsDone || 0) + ' soru</span>' +
        '</div>' +
        '<div class="dash-title">🗺️ Öğrenme Yolların</div>' +
        '<div class="dash-paths">' + (pathRows || '<div class="dash-empty">Cephe bulunamadı.</div>') + '</div>';
      scroll.appendChild(dash);
      dash.querySelectorAll('.dash-path').forEach(b => b.onclick = () => {
        B.Audio.play('tick');
        const l = lessons.find(x => x.id === b.dataset.lid);
        if (l) { B.Lesson.setActive(l); B.UI.show('map'); }
      });

      // "Seni bekleyenler" — geri gelme kancaları (retention, reklamsız)
      const reasons = [];
      if (B.Daily.canClaim()) reasons.push('🎁 Günlük ödül hazır!');
      const petsList = (B.Perms.feature('pets') && B.Pets ? B.Pets.adopted() : []);
      const captured = petsList.filter(p => B.Pets.isCaptured(p));
      if (captured.length) reasons.push('😈 ' + captured.length + ' dostun ' + B.Pets.villain() + "'a kaçırıldı — kurtar!");
      const needy = petsList.filter(p => !B.Pets.isCaptured(p) && (p.tokluk < 50 || p.mutluluk < 50));
      if (needy.length) reasons.push('🐾 ' + needy.length + ' dostun bakım istiyor');
      const chq = B.Chest.queue ? B.Chest.queue().length : 0;
      if (chq) reasons.push('📦 ' + chq + ' sandık seni bekliyor');
      if (reasons.length) {
        const rz = document.createElement('div');
        rz.className = 'home-reasons';
        rz.innerHTML = reasons.map(r => '<span class="reason-chip">' + r + '</span>').join('');
        scroll.appendChild(rz);
      }

      // Toplanmayı bekleyen görev sayısı (kapıda rozet)
      const pending = B.Quest.pending();
      const badge = pending ? '<span class="door-badge">' + pending + '</span>' : '';

      const doors = document.createElement('div');
      doors.className = 'home-doors';
      const ic = n => B.Icon ? '<span class="door-ic">' + B.Icon(n) + '</span>' : '';
      doors.innerHTML =
        '<button class="btn door door-main">' + (ic('sword') || '⚔️') + '<br>HAREKÂT</button>' +
        '<button class="btn door door-side door-quests">' + (ic('quests') || '📋') + '<br>GÖREVLER' + badge + '</button>' +
        '<button class="btn door door-side door-evim">' + (ic('home') || '🏠') + '<br>BEN</button>' +
        '<button class="btn door door-side door-store">' + (ic('shop') || '🏪') + '<br>MAĞAZA</button>';
      root.appendChild(doors);

      // Kilit: demo kısıtı VEYA ebeveyn kilidi → tıklanınca uyarı
      function gate(el, feature, go) {
        if (B.Demo && B.Demo.featureLocked(feature)) {
          el.classList.add('feat-locked');
          el.onclick = () => { B.Audio.play('wrong'); B.UI.toast('🎫 Demo sürüm — davet koduyla açılır.'); };
          return;
        }
        if (B.Perms.feature(feature)) { el.onclick = go; return; }
        el.classList.add('feat-locked');
        el.onclick = () => { B.Audio.play('wrong'); B.UI.toast('🔒 Bu bölümü ebeveynin kapatmış.'); };
      }

      doors.querySelector('.door-main').onclick = () => { B.Audio.play('tick'); B.UI.show('world'); };
      gate(doors.querySelector('.door-evim'), 'shop', () => { B.Audio.play('tick'); B.UI.show('evim'); });
      gate(doors.querySelector('.door-quests'), 'quests', () => { B.Audio.play('tick'); B.UI.show('quests'); });
      gate(doors.querySelector('.door-store'), 'store', () => { B.Audio.play('tick'); B.UI.show('store', { tab: 'shop' }); });

      // Alt araç çubuğu (kompakt tek satır — ekrana sığması için)
      const footer = document.createElement('div');
      footer.className = 'home-footer';
      root.appendChild(footer);

      // Hikâyeyi tekrar izleme
      const replay = document.createElement('button');
      replay.className = 'chip home-story';
      replay.textContent = '🎬 Hikâye';
      gate(replay, 'story', () => B.UI.show('intro', { replay: true }));
      footer.appendChild(replay);

      // Dilek Kutusu (ödül isteği + oyun fikri)
      const wish = document.createElement('button');
      wish.className = 'chip home-wishes';
      const earned = (B.State.data.wishes || []).some(w => w.status === 'earned');
      wish.textContent = '🎁 Dilek' + (earned ? ' 🎉' : '');
      gate(wish, 'wishes', () => B.UI.show('wishes'));
      footer.appendChild(wish);

      const demoMode = B.Demo && B.Demo.isDemo();
      const tourPending = !(B.State.data.meta && B.State.data.meta.homeTourSeen); // ilk oyun: ekran turu

      // Günlük ödül (retention) — demo'da kapalı (ödül vermiyor)
      if (!demoMode) {
        const daily = document.createElement('button');
        daily.className = 'chip home-daily' + (B.Daily.canClaim() ? ' daily-ready' : '');
        daily.textContent = B.Daily.canClaim() ? '🎁 Günlük Ödül!' : '🎁 Seri: ' + B.Daily.streak() + ' gün';
        daily.onclick = () => B.Daily.show();
        footer.appendChild(daily);
      }

      // Demo bilgi + tam sürüme geçiş (davet kodu)
      if (demoMode) {
        const demo = document.createElement('button');
        demo.className = 'chip home-demo';
        demo.textContent = '🎫 Demo — Tam Sürüm İçin Davet Kodu';
        demo.onclick = () => {
          const ov = B.UI.overlay('<div class="ov-big">🎫</div><h2>Tam Sürümü Aç</h2>' +
            '<p class="ov-quote">Ebeveyninin davet kodunu gir; tüm dersler, altın, mağaza ve evcil hayvanlar açılsın!</p>' +
            '<input id="demo-code" class="name-input" maxlength="14" placeholder="Davet kodu" style="text-transform:uppercase">' +
            '<div class="login-err" id="demo-err"></div>',
            [{ label: 'AÇ ▶', onClick: null }, { label: 'Vazgeç', cls: 'btn-quiet', onClick: null }]);
          const btns = ov.querySelectorAll('.overlay-btns .btn');
          btns[0].onclick = () => {
            const v = (ov.querySelector('#demo-code').value || '').trim().toUpperCase();
            if (v.length < 6) { ov.querySelector('#demo-err').textContent = '⚠️ Kod en az 6 karakter.'; return; }
            B.Cloud.setCode(v); ov.remove();
            B.Audio.play('fanfare'); B.UI.toast('🎉 Tam sürüm açıldı! Aileye bağlandın.');
            B.UI.show('home');
          };
          btns[1].onclick = () => ov.remove();
        };
        footer.appendChild(demo);
      }

      // Oyuncu değiştir / çıkış
      const out = document.createElement('button');
      out.className = 'chip home-logout';
      out.textContent = '🚪 Çıkış';
      out.onclick = () => B.Engine.logout();
      footer.appendChild(out);

      // Günlük ödül hazırsa otomatik aç (günde bir; demo/tur değilse)
      if (!demoMode && !tourPending && B.Daily.canClaim()) setTimeout(() => { if (B.UI.currentScreen() === 'home') B.Daily.show(); }, 550);

      // İlk oyun: Baba Komutan çocuğa ekranını tanıtır (profil başına bir kez)
      if (tourPending && B.Tour) {
        B.State.data.meta.homeTourSeen = true; B.Save.saveNow();
        setTimeout(() => { if (B.UI.currentScreen() === 'home') B.Tour.run([
          { icon: '🧑‍✈️', title: 'Hoş geldin asker!', text: 'Ben Baba Komutan. Burası senin ÜSSÜN! Etrafı hızlıca tanıtayım.' },
          { icon: '⚔️', title: 'HAREKÂT', text: 'Buradan derslere girersin. Soruları çözüp yıldız, altın ve XP kazanırsın. Her cephe bir ders!' },
          { icon: '🧍', title: 'BEN', text: 'Görünüşünü ayarla (kıyafet, saç), başarılarını gör, odanı süsle, evcil hayvanına bak.' },
          { icon: '🏪', title: 'MAĞAZA', text: 'Kazandığın altınla eşya al; Atölye\'de parçaları birleştirip yeni şeyler ÜRET (craft).' },
          { icon: '🐾', title: 'Evcil Hayvan', text: 'Bir dost sahiplen — ama sakın ihmal etme! Beslemez, oynamazsan Bulanık onu kaçırır. Düzenli bak!' },
          { icon: '🎁', title: 'Her Gün Gel', text: 'Her gün girince günlük ödül kazanır, serin büyür. Hadi göreve başla, Komutan!' },
        ]); }, 450);
      }

      this._hud = hud;
    },
    exit() { if (this._babaTimer) { clearInterval(this._babaTimer); this._babaTimer = null; } if (this._hud) this._hud.dispose(); },
  });
})(window.BOKUL = window.BOKUL || {});

/* === src/ui/screens/world-screen.js === */
/* BOKUL — Dünya Haritası (Cephe Seçimi)
 * Her ders bir "Cephe" kartıdır. Kart seçilince o ders aktif olur ve
 * bölüm haritası açılır. Yeni ders eklemek = content/lessons/'a JSON eklemek. */
(function (B) {

  B.UI.registerScreen('world', {
    enter(root) {
      const hud = B.UI.buildHud(root, { backTo: 'home' });
      this._hud = hud;

      const title = document.createElement('div');
      title.className = 'map-title';
      title.textContent = '🌌 CEPHE SEÇ — Hangi kristal parçasının peşindesin?';
      root.appendChild(title);

      const list = document.createElement('div');
      list.className = 'world-list';
      root.appendChild(list);

      (B.Lesson.forPlayer() || []).forEach(lesson => {
        // Dersin toplam yıldız / maksimum yıldız hesabı
        let stars = 0, max = 0, bosses = 0, bossesDone = 0;
        lesson.units.forEach(u => u.sections.forEach(s => {
          max += s.missions.length * 3;
          stars += B.State.sectionStars(lesson.id, s.id);
          bosses++;
          if (B.State.sectionProgress(lesson.id, s.id).bossDefeated) bossesDone++;
        }));

        // Matematik cephesi çocuğun sınıfına göre bölümleri açar/ayarlar
        const gradeNote = (lesson.gradeAware && B.State.data.player.grade != null)
          ? '<span class="world-grade">🎓 Senin seviyene ayarlı (' + (B.State.data.player.grade === 0 ? 'okul öncesi' : B.State.data.player.grade + '. sınıfı bitirdin') + ')</span>'
          : '';

        const allowed = B.Perms.lesson(lesson.id);
        const card = document.createElement('button');
        card.className = 'world-card' + (allowed ? '' : ' world-locked');
        card.innerHTML =
          '<span class="world-icon">' + lesson.icon + '</span>' +
          '<span class="world-info"><b>' + lesson.title + '</b>' +
          '<small>' + lesson.subtitle + '</small>' +
          (allowed
            ? '<span class="world-progress">⭐ ' + stars + '/' + max +
              ' · 💠 ' + bossesDone + '/' + bosses + ' kristal</span>' + gradeNote
            : '<span class="world-lock-note">🔒 Bu cephe şu an ebeveyn tarafından kapalı</span>') +
          '</span>' +
          '<span class="world-go">' + (allowed ? '▶' : '🔒') + '</span>';
        card.onclick = () => {
          if (!allowed) { B.Audio.play('wrong'); B.UI.toast('🔒 Bu cepheyi ebeveynin kapatmış.'); return; }
          B.Audio.play('tick');
          B.Lesson.setActive(lesson);
          B.UI.show('map');
        };
        list.appendChild(card);
      });
    },
    exit() { if (this._hud) this._hud.dispose(); },
  });
})(window.BOKUL = window.BOKUL || {});

/* === src/ui/screens/map-screen.js === */
/* BOKUL — Harita Ekranı
 * Ünite → bölüm kartları → harekât düğümleri patikası + boss kapısı. */
(function (B) {
  const TYPE_ICON = { teach: '🎓', guided: '🤝', practice: '⚔️', challenge: '🧠', review: '🔄' };

  B.UI.registerScreen('map', {
    enter(root) {
      const lesson = B.Lesson.active();
      const hud = B.UI.buildHud(root, { backTo: 'world' });

      const title = document.createElement('div');
      title.className = 'map-title';
      title.textContent = lesson.icon + ' ' + lesson.title + ' — ' + lesson.subtitle;
      root.appendChild(title);

      // Genel ilerleme (dersin toplam yıldız + kristal durumu)
      let totStars = 0, totMax = 0, totBoss = 0, totBossDone = 0;
      lesson.units.forEach(u => u.sections.forEach(s => {
        totMax += s.missions.length * 3; totStars += B.State.sectionStars(lesson.id, s.id);
        totBoss++; if (B.State.sectionProgress(lesson.id, s.id).bossDefeated) totBossDone++;
      }));
      const totPct = totMax ? Math.round(totStars / totMax * 100) : 0;
      const overall = document.createElement('div');
      overall.className = 'map-overall';
      overall.innerHTML =
        '<div class="map-overall-bar"><i style="width:' + totPct + '%"></i><span>%' + totPct + '</span></div>' +
        '<div class="map-overall-meta">⭐ ' + totStars + '/' + totMax + ' yıldız · 💠 ' + totBossDone + '/' + totBoss + ' kristal</div>';
      root.appendChild(overall);

      const scroll = document.createElement('div');
      scroll.className = 'map-scroll';
      root.appendChild(scroll);

      lesson.units.forEach(unit => {
        const uHead = document.createElement('div');
        uHead.className = 'map-unit';
        uHead.textContent = unit.title;
        scroll.appendChild(uHead);

        unit.sections.forEach(section => {
          const unlocked = B.Lesson.isSectionUnlocked(section.id);
          const gradeLocked = B.Lesson.gradeLocked(section.id);
          const prog = B.State.sectionProgress(lesson.id, section.id);
          const stars = B.State.sectionStars(lesson.id, section.id);
          const maxStars = section.missions.length * 3;

          const card = document.createElement('div');
          card.className = 'map-section' + (unlocked ? '' : ' map-locked');
          const secPct = maxStars ? Math.round(stars / maxStars * 100) : 0;
          const demoLocked = !unlocked && !gradeLocked && B.Demo && B.Demo.isDemo();
          card.innerHTML =
            '<div class="map-sec-head"><b>' + section.title + '</b>' +
            '<span class="map-stars">⭐ ' + stars + '/' + maxStars + '</span>' +
            (unlocked ? '' : '<span class="map-lock">🔒</span>') + '</div>' +
            (unlocked ? '<div class="map-sec-bar"><i style="width:' + secPct + '%"></i></div>' : '') +
            (gradeLocked ? '<div class="map-gradelock">🎓 Bu bölümü ' + section.minGrade + '. sınıfta açacaksın. Şimdilik seviyene uygun bölümlere odaklan!</div>' : '') +
            (demoLocked ? '<div class="map-demolock">🎫 Demo sürüm — bu bölüm davet koduyla açılır. Ebeveyninden kod iste!</div>' : '');

          if (unlocked) {
            const path = document.createElement('div');
            path.className = 'map-path';

            section.missions.forEach(m => {
              const done = prog.missions[m.id];
              const open = B.Lesson.isMissionUnlocked(section.id, m.id);
              const node = document.createElement('button');
              node.className = 'map-node' +
                (done ? ' node-done' : open ? ' node-active' : ' node-locked');
              node.innerHTML = (TYPE_ICON[m.type] || '⚔️') +
                (done ? '<small>' + '★'.repeat(done.stars) + '☆'.repeat(3 - done.stars) + '</small>' : '');
              node.title = m.title;
              if (open) node.onclick = () => {
                B.Audio.play('tick');
                B.UI.show('mission', { sectionId: section.id, missionId: m.id });
              };
              path.appendChild(node);
            });

            // Boss düğümü + ustalık kapısı
            const gate = B.Lesson.bossGate(section.id);
            const boss = document.createElement('button');
            const isUnit = section.boss.tier === 'unit';
            boss.className = 'map-node map-boss' + (isUnit ? ' map-uboss' : '') +
              (prog.bossDefeated ? ' node-done' : gate.open ? ' node-active' : ' node-locked');
            boss.innerHTML = section.boss.icon +
              '<small>' + (prog.bossDefeated ? 'FETHEDİLDİ'
                : gate.open ? 'SAVAŞ!'
                : gate.missionsDone ? '⭐ Biraz daha yıldız topla!'
                : 'Harekâtlar sürüyor') + '</small>';
            if (gate.open || prog.bossDefeated) boss.onclick = () => {
              B.Audio.play('tick');
              B.UI.show('boss', { sectionId: section.id });
            };
            path.appendChild(boss);
            card.appendChild(path);
          }
          scroll.appendChild(card);
        });
      });

      // Ünite 2 içerik notu (v0.8'de gelecek bölümler için dürüst ilan)
      if (lesson.comingSoon) {
        const note = document.createElement('div');
        note.className = 'map-soon';
        note.textContent = '🛰️ ' + lesson.comingSoon;
        scroll.appendChild(note);
      }

      this._hud = hud;
    },
    exit() { if (this._hud) this._hud.dispose(); },
  });
})(window.BOKUL = window.BOKUL || {});

/* === src/ui/screens/mission-screen.js === */
/* BOKUL — Harekât Ekranı
 * Tüm harekât tiplerini oynatır: teach / guided / practice / challenge / review.
 * Hedef döngüsü: soru üret → tahtada çöz → yıldız + XP → sonraki hedef → harekât sonu. */
(function (B) {
  const AD = { teach: '🎓 Keşif Brifingi', guided: '🤝 Ortak Harekât', practice: '⚔️ Saha Görevi',
               challenge: '🧠 Yeni Nesil Operasyon', review: '🔄 Devriye' };

  B.UI.registerScreen('mission', {
    enter(root, params) {
      const lesson = B.Lesson.active();
      const mission = B.Lesson.findMission(params.sectionId, params.missionId);
      const sectionObj = (B.Lesson.findSection(params.sectionId) || {}).section || {};
      const itype = sectionObj.interactionType || lesson.interactionType; // bölüm bazlı soru tipi
      const singleAttempt = (itype === 'multiple-choice' || itype === 'arithmetic'); // tek deneme tipleri
      const cfg = B.Content.get('config');
      const self = this;

      const hud = B.UI.buildHud(root, {
        backTo: 'map',
        extra: '<div class="chip hud-target"></div><div class="chip hud-streak"></div>',
      });
      this._hud = hud;

      const streakChip = root.querySelector('.hud-streak');
      const targetChip = root.querySelector('.hud-target');
      function refreshStreak() {
        const s = B.State.data.streaks.current;
        const m = B.Reward.streakMultiplier();
        streakChip.textContent = s >= 2 ? ('🔥 Seri x' + s + (m > 1 ? ' → XP ×' + m : '')) : '';
      }
      this._offStreak = B.Bus.on(B.Events.STREAK_CHANGED, refreshStreak);
      refreshStreak();

      const title = document.createElement('div');
      title.className = 'mission-title';
      title.textContent = (AD[mission.type] || mission.type) + ' — ' + mission.title;
      root.appendChild(title);

      const layout = document.createElement('div');
      layout.className = 'mission-layout';
      root.appendChild(layout);

      const leftCol = document.createElement('div');
      leftCol.className = 'mission-left';
      layout.appendChild(leftCol);
      const cmd = B.Commander.mount(leftCol, { compact: true });

      const stageWrap = document.createElement('div');
      stageWrap.className = 'mission-stagewrap';
      layout.appendChild(stageWrap);
      const timerHost = document.createElement('div');
      timerHost.className = 'qtimer-host';
      stageWrap.appendChild(timerHost);
      const stage = document.createElement('div');
      stage.className = 'mission-stage';
      stageWrap.appendChild(stage);

      // Soru süresi (config.timer): teach hariç soru bazlı tipler için
      const tcfg = cfg.timer || {};
      const timerSec = tcfg.enabled ? (tcfg[itype] || tcfg.default || 0) : 0;
      let timerCtl = null;

      /* ---------- TEACH: senaryo oynatıcı ---------- */
      if (mission.type === 'teach') {
        targetChip.textContent = '🎓 Brifing';
        const scriptSteps = [];
        (mission.segments || []).forEach(seg => {
          const s = (lesson.teachScripts || {})[seg.script];
          if (s) scriptSteps.push(...s);
        });
        cmd.sayFrom('teach.intro');
        this._teach = B.TeachModels.run(stage, scriptSteps, {
          say: t => cmd.say(t),
          onComplete() {
            // Brifing tamam: 3 yıldız sabit + görev XP'si
            finishMission([3]);
          },
        });
        return;
      }

      /* ---------- Soru bazlı tipler ---------- */
      const total = mission.targetCount || 3;
      let qIndex = 0;
      const starList = [];
      let view = null;

      // Review: önceki bölümlerin üreticilerinden karışık havuz
      const reviewGens = mission.source === 'spaced-repetition'
        ? B.Lesson.reviewGenerators(params.sectionId) : null;

      function nextQuestion() {
        if (view) { view.destroy(); view = null; }
        if (timerCtl) { timerCtl.stop(); timerCtl = null; }
        if (qIndex >= total) return finishMission(starList);
        targetChip.textContent = '🎯 Hedef ' + (qIndex + 1) + '/' + total;

        let gen = reviewGens
          ? reviewGens[Math.floor(Math.random() * reviewGens.length)]
          : B.Lesson.resolveGenerator(params.sectionId, mission.generator);
        gen = B.Curriculum.forType(itype, gen); // yaş/sınıfa göre zorluk (uzun bölme)
        const q = B.Question.generate(itype, gen, lesson.skills);
        B.Bus.emit(B.Events.QUESTION_STARTED, { questionId: qIndex, lessonId: lesson.id, type: mission.type });

        // Guided iskelesi: fadeOut ile her soruda bir adım daha oyuncuya bırakılır
        let prefilled = null;
        if (mission.scaffold) {
          let list = mission.scaffold.prefilledSteps || [];
          if (mission.scaffold.fadeOut) list = list.slice(0, Math.max(0, list.length - qIndex));
          if (list.length) prefilled = new Set(list);
        }

        // Challenge: problem metni şablondan
        let problemText = null;
        if (mission.problemTemplates && mission.problemTemplates.length) {
          const t = mission.problemTemplates[Math.floor(Math.random() * mission.problemTemplates.length)];
          problemText = t.replace('{dividend}', q.dividend).replace('{divisor}', q.divisor)
                         .replace('{name}', B.State.data.player.name || 'Komutan');
        }

        cmd.sayFrom(qIndex === 0 ? 'mission.start' : 'mission.next');
        let mistakes = 0;
        let settled = false;
        const qStart = Date.now();

        // Soruyu bitir: normal (timedOut=false) veya süre doldu (true)
        function completeCurrent(timedOut) {
          if (settled) return; settled = true;
          if (timerCtl) { timerCtl.stop(); timerCtl = null; }
          if (view) { view.destroy(); view = null; }
          const th = cfg.starThresholds;
          // Tek deneme tiplerinde: doğru→3★, yanlış→1★. Uzun bölme: adım eşiklerine göre.
          const stars = timedOut ? 1
            : singleAttempt ? (mistakes === 0 ? 3 : 1)
            : (mistakes <= th.three ? 3 : mistakes <= th.two ? 2 : 1);
          starList.push(stars);
          B.Reward.onQuestionDone(stars === 3);
          B.Reward.addCoins(stars * 2, 'question');
          const xp = B.Reward.addXp(B.Reward.questionXp(stars), 'question', { applyStreak: true });
          B.Bus.emit(B.Events.QUESTION_COMPLETED, {
            stars, mistakes, ms: Date.now() - qStart, firstTry: !timedOut && mistakes === 0,
          });
          if (timedOut) cmd.sayFrom('timeUp');
          showStars(stars, xp, () => { qIndex++; nextQuestion(); });
        }

        view = B.Question.view(itype)(stage, q, {
          prefilled, problemText,
          say: t => cmd.say(t),
          onAnswer(step, correct, attempt) {
            B.Bus.emit(B.Events.STEP_ANSWERED, { stepType: step.type, correct, attempt, value: null });
            if (correct) {
              B.Reward.addXp(B.Reward.stepXp(), 'step');
              if (Math.random() < 0.25) cmd.sayFrom('correct');
            } else mistakes++;
          },
          onComplete() { completeCurrent(false); },
        });

        // Süre başlat (varsa)
        if (timerSec > 0) timerCtl = B.Timer.create(timerHost, timerSec, () => completeCurrent(true));
      }

      /* Hedef sonu yıldız töreni */
      function showStars(stars, xp, then) {
        const quip = stars === 3 ? B.Dialogue.pick('correct.streak3') || B.Dialogue.pick('correct')
                                 : B.Dialogue.pick(stars === 2 ? 'correct' : 'wrong.retry');
        B.UI.overlay(
          '<div class="ov-stars">' +
            [1, 2, 3].map(i => '<span class="ov-star' + (i <= stars ? ' lit' : '') + '" style="animation-delay:' + (i * 0.18) + 's">★</span>').join('') +
          '</div><p class="ov-xp">+' + xp + ' XP</p><p class="ov-quote">' + (quip || '') + '</p>',
          [{ label: 'DEVAM ▶', onClick: then }]
        );
      }

      /* Harekât sonu */
      function finishMission(starsArr) {
        const best = starsArr.length ? Math.round(starsArr.reduce((a, b) => a + b, 0) / starsArr.length) : 3;
        const stars = Math.max(1, Math.min(3, best));
        B.Lesson.completeMission(params.sectionId, params.missionId, stars);
        const bonus = B.Reward.addXp(B.Reward.missionBonus(), 'mission');
        const coins = B.Reward.addCoins(10, 'mission');
        B.Bus.emit(B.Events.MISSION_COMPLETED, { missionId: params.missionId, stars, xp: bonus });
        if (B.Anim.confetti) B.Anim.confetti(stars === 3 ? 55 : 30); // küçük kutlama

        B.UI.overlay(
          '<div class="ov-big">🎖️</div><h2>HAREKÂT TAMAM!</h2>' +
          '<div class="ov-stars">' +
            [1, 2, 3].map(i => '<span class="ov-star' + (i <= stars ? ' lit' : '') + '">★</span>').join('') +
          '</div><p class="ov-xp">Görev bonusu: +' + bonus + ' XP · +' + coins + ' 💰</p>' +
          '<p class="ov-quote">' + (B.Dialogue.pick('mission.done') || '') + '</p>',
          [{ label: 'HARİTAYA DÖN', onClick: () => B.UI.show('map') }]
        );
      }

      nextQuestion();
      this._view = () => view;
      this._stopTimer = () => { if (timerCtl) { timerCtl.stop(); timerCtl = null; } };
    },

    exit() {
      if (this._hud) this._hud.dispose();
      if (this._offStreak) this._offStreak();
      if (this._stopTimer) this._stopTimer();
      if (this._teach) { this._teach.destroy(); this._teach = null; }
      if (this._view) { const v = this._view(); if (v) v.destroy(); }
    },
  });
})(window.BOKUL = window.BOKUL || {});

/* === src/ui/screens/boss-screen.js === */
/* BOKUL — Boss Ekranı
 * Konu Boss'u: can barı var, VURAMAZ (hata sadece kalkan verir).
 * Ünite Boss'u: VURUR — oyuncunun 3 zırh plakası var; yanlış cevap zırh kırar,
 * 3 ardışık doğru 1 zırh onarır; zırh biterse "geri çekilme" (kayıp yok). */
(function (B) {
  B.UI.registerScreen('boss', {
    enter(root, params) {
      const lesson = B.Lesson.active();
      const section = B.Lesson.findSection(params.sectionId).section;
      const boss = section.boss;
      const itype = section.interactionType || lesson.interactionType; // bölüm bazlı soru tipi
      const cfg = B.Content.get('config');
      const isUnit = boss.tier === 'unit';
      const prog = B.State.sectionProgress(lesson.id, params.sectionId);

      const hud = B.UI.buildHud(root, { backTo: 'map' });
      this._hud = hud;

      /* ---- Boss durumu ---- */
      const maxHp = boss.hp;
      let hp = Math.max(1, maxHp - (prog.bossHpCarry || 0)); // geri çekilme taşıması: yorgun başlar
      let shield = 0;                                        // konu boss'u kalkanı
      let armor = isUnit ? (cfg.unitBoss.armor || 3) : 0;    // ünite boss'unda oyuncu zırhı
      let repairStreak = 0;
      let dealt = maxHp - hp;
      let over = false;

      /* ---- Boss başlığı ---- */
      const head = document.createElement('div');
      head.className = 'boss-head' + (isUnit ? ' boss-unit' : '');
      head.innerHTML =
        '<div class="boss-face boss-enter">' +
          (B.SvgArt.boss(boss.id) || '<span class="boss-emoji">' + boss.icon + '</span>') + '</div>' +
        '<div class="boss-info"><div class="boss-name">' + boss.name.toUpperCase() +
        (isUnit ? ' — ⚔️ ÜNİTE BOSS\'U' : ' — KONU BOSS\'U') + '</div>' +
        '<div class="boss-hp"><i></i></div></div>' +
        '<div class="boss-shield"></div>';
      root.appendChild(head);
      const hpFill = head.querySelector('.boss-hp i');
      const shieldEl = head.querySelector('.boss-shield');

      /* ---- Zırh göstergesi (sadece ünite) ---- */
      let armorEl = null;
      if (isUnit) {
        armorEl = document.createElement('div');
        armorEl.className = 'boss-armor';
        root.appendChild(armorEl);
      }

      function refresh() {
        hpFill.style.width = Math.max(0, Math.round(hp / maxHp * 100)) + '%';
        shieldEl.textContent = shield > 0 ? '🛡️ Boss kalkanı!' : '';
        if (armorEl) {
          armorEl.innerHTML = 'ZIRHIN: ' +
            Array.from({ length: cfg.unitBoss.armor }, (_, i) =>
              '<span class="armor-plate' + (i < armor ? '' : ' broken') + '">🛡️</span>').join('') +
            '<small>3 doğru adım = 1 zırh onarımı</small>';
        }
      }
      refresh();

      const layout = document.createElement('div');
      layout.className = 'mission-layout';
      root.appendChild(layout);
      const leftCol = document.createElement('div');
      leftCol.className = 'mission-left';
      layout.appendChild(leftCol);
      const cmd = B.Commander.mount(leftCol, { compact: true });
      const stageWrap = document.createElement('div');
      stageWrap.className = 'mission-stagewrap';
      layout.appendChild(stageWrap);
      const timerHost = document.createElement('div');
      timerHost.className = 'qtimer-host';
      stageWrap.appendChild(timerHost);
      const stage = document.createElement('div');
      stage.className = 'mission-stage';
      stageWrap.appendChild(stage);

      const tcfg = cfg.timer || {};
      const timerSec = tcfg.enabled ? (tcfg[itype] || tcfg.default || 0) : 0;
      let timerCtl = null;

      cmd.sayFrom(isUnit ? 'boss.intro.unit' : 'boss.intro.topic', { bossName: boss.name });

      let view = null;
      const self = this;

      function nextQuestion() {
        if (over) return;
        if (view) { view.destroy(); view = null; }
        if (timerCtl) { timerCtl.stop(); timerCtl = null; }
        const q = B.Question.generate(itype,
          B.Curriculum.forType(itype, B.Lesson.resolveGenerator(params.sectionId, boss.generator)), lesson.skills);
        let mistakes = 0;

        view = B.Question.view(itype)(stage, q, {
          say: t => cmd.say(t),
          onAnswer(step, correct, attempt) {
            B.Bus.emit(B.Events.STEP_ANSWERED, { stepType: step.type, correct, attempt, value: null });
            if (correct) {
              // Hasar: kalkan varsa önce kalkan kırılır
              if (shield > 0) { shield--; cmd.sayFrom('boss.shieldBreak'); }
              else {
                const dmg = 3;
                hp -= dmg; dealt += dmg;
                B.Bus.emit(B.Events.BOSS_DAMAGED, { amount: dmg, remaining: hp });
                head.classList.remove('boss-hit'); void head.offsetWidth;
                head.classList.add('boss-hit');
                if (B.Anim.damageFloat) B.Anim.damageFloat(dmg, head);
                // Baba düşmanla dalga geçer (bazen)
                if (Math.random() < 0.45) cmd.sayFrom('boss.taunt', { bossName: boss.name });
              }
              // Zırh onarımı
              if (isUnit) {
                repairStreak++;
                if (repairStreak >= (cfg.unitBoss.repairStreak || 3) && armor < cfg.unitBoss.armor) {
                  armor++; repairStreak = 0;
                  cmd.sayFrom('boss.armorRepair');
                }
              }
              refresh();
              if (hp <= 0) return victory();
            } else {
              mistakes++;
              if (isUnit) {
                // ÜNİTE BOSS'U VURUR: yanlış cevabını sana fırlatır
                armor--; repairStreak = 0;
                B.Bus.emit(B.Events.BOSS_ATTACKED, { armorLeft: armor });
                root.classList.remove('boss-quake'); void root.offsetWidth;
                root.classList.add('boss-quake');
                cmd.sayFrom('boss.playerHit', { wrongAnswer: '' });
                refresh();
                if (armor <= 0) return retreat();
              } else {
                shield++;
                cmd.sayFrom('boss.shieldUp');
                refresh();
              }
            }
          },
          onComplete() {
            if (over) return;
            if (timerCtl) { timerCtl.stop(); timerCtl = null; }
            // Hatasız hedef = kritik vuruş bonusu
            if (mistakes === 0 && hp > 0) {
              hp -= 6; dealt += 6;
              B.Bus.emit(B.Events.BOSS_DAMAGED, { amount: 6, remaining: hp });
              head.classList.remove('boss-hit'); void head.offsetWidth;
              head.classList.add('boss-hit');
              if (B.Anim.damageFloat) B.Anim.damageFloat(6, head);
              cmd.sayFrom('boss.crit');
              refresh();
              if (hp <= 0) return victory();
            }
            setTimeout(nextQuestion, 500);
          },
        });

        // Süre dolunca: hasarsız, sonraki soruya geç (nazik)
        if (timerSec > 0) timerCtl = B.Timer.create(timerHost, timerSec, () => {
          if (over) return;
          if (view) { view.destroy(); view = null; }
          cmd.sayFrom('timeUp');
          setTimeout(nextQuestion, 400);
        });
      }

      function victory() {
        over = true;
        if (timerCtl) { timerCtl.stop(); timerCtl = null; }
        if (view) { view.destroy(); view = null; }
        B.Lesson.defeatBoss(params.sectionId);
        // Rozet (nişan) kazan — bölüm/ünite tamamlama madalyası
        if (B.Badges && boss.rewards && boss.rewards.badge) {
          B.Badges.grant({ id: boss.rewards.badge, name: boss.name, icon: boss.icon, tier: boss.tier,
            lesson: lesson.title, lessonId: lesson.id, section: section.title });
        }
        const xp = B.Reward.addXp(B.Reward.bossXp(boss.tier), 'boss');
        const coins = B.Reward.addCoins(isUnit ? 100 : 50, 'boss');
        head.classList.remove('boss-hit', 'boss-enter'); void head.offsetWidth;
        head.classList.add('boss-defeated'); // patlama animasyonu
        B.Bus.emit(B.Events.BOSS_DEFEATED, { bossId: boss.id, tier: boss.tier }); // konfeti + ekran parlaması
        // Zafer kartını biraz geciktir: önce boss'un patlaması + konfeti görünsün
        setTimeout(() => B.UI.overlay(
          '<div class="ov-big">' + boss.icon + '💥</div><h2>' + boss.name.toUpperCase() + ' DEVRİLDİ!</h2>' +
          '<p class="ov-xp">+' + xp + ' XP · +' + coins + ' 💰' + (isUnit ? ' · 🏆 Efsanevi zafer!' : ' · 💎 Epik zafer!') + '</p>' +
          '<p class="ov-crystal">💠 Bir Sayı Kristali parçası daha kurtarıldı!</p>' +
          '<p class="ov-quote">' + (B.Dialogue.pick('boss.win') || '') + '</p>',
          [{ label: 'HARİTAYA DÖN', onClick: () => B.UI.show('map') }]
        ), 700);
      }

      function retreat() {
        over = true;
        if (timerCtl) { timerCtl.stop(); timerCtl = null; }
        if (view) { view.destroy(); view = null; }
        // Emek boşa gitmez: verilen hasarın yarısı taşınır (boss yorgun başlar)
        prog.bossHpCarry = Math.round(dealt * (cfg.unitBoss.regroupHpCarry || 0.5));
        B.Bus.emit(B.Events.BOSS_RETREAT, {});
        B.UI.overlay(
          '<div class="ov-big">🏳️</div><h2>GERİ ÇEKİLME!</h2>' +
          '<p class="ov-quote">' + (B.Dialogue.pick('boss.retreat') || 'Yeniden toplan Komutan, kale hâlâ orada!') + '</p>' +
          '<p class="ov-xp">Boss yorgun: bir sonraki denemede ' + prog.bossHpCarry + ' hasarla başlıyorsun.</p>',
          [
            { label: 'TEKRAR SALDIR ⚔️', onClick: () => B.UI.show('boss', { sectionId: params.sectionId }) },
            { label: 'HARİTAYA DÖN', cls: 'btn-quiet', onClick: () => B.UI.show('map') },
          ]
        );
      }

      nextQuestion();
      this._view = () => view;
      this._stopTimer = () => { if (timerCtl) { timerCtl.stop(); timerCtl = null; } };
    },

    exit() {
      if (this._hud) this._hud.dispose();
      if (this._stopTimer) this._stopTimer();
      if (this._view) { const v = this._view(); if (v) v.destroy(); }
    },
  });
})(window.BOKUL = window.BOKUL || {});

/* === src/ui/screens/locker-screen.js === */
/* BOKUL — Ben / Dolap Ekranı
 * Evim'in iki bölümü tek ekranda:
 *   section 'ben'   → görünüm/tip (saç modeli, yüz, renkler, fotoğraf)
 *   section 'dolap' → kıyafet (aksesuar, çerçeve) + AL / SAT
 * Onboarding (ilk kayıt) modunda 'ben' bölümüyle açılır, "ÜSSE GİR" ile devam eder.
 * Kilitli parça altınla alınır; sahip olunan kıyafet daha ucuza satılabilir. */
(function (B) {
  const TABSETS = {
    ben: [
      { id: 'hair',  name: '💇 Saç' },
      { id: 'face',  name: '🙂 Yüz' },
      { id: 'color', name: '🎨 Renk' },
    ],
    dolap: [
      { id: 'outfit', name: '👕 Üst' },
      { id: 'bottom', name: '👖 Alt' },
      { id: 'acc',    name: '🕶️ Aksesuar' },
      { id: 'ring',   name: '⭕ Çerçeve' },
      { id: 'sell',   name: '💰 Sat' },
    ],
  };

  B.UI.registerScreen('locker', {
    enter(root, params) {
      const onboarding = !!params.onboarding;
      const section = onboarding ? 'ben' : (params.section || 'ben');
      const hud = onboarding ? null : B.UI.buildHud(root, { backTo: 'evim' });
      this._hud = hud;
      const R = B.Content.get('rewards');
      const prices = R.shopPrices;
      const sellRatio = R.sellRatio || 0.4;
      const C = B.Avatar.CATALOG;
      const TABS = TABSETS[section];
      let tab = TABS[0].id;

      if (onboarding) {
        const t = document.createElement('div');
        t.className = 'map-title';
        t.textContent = '🎨 Görünümünü ayarla, ' + (B.State.data.player.name || 'asker') + '! (Saç, göz rengi, yüz...)';
        root.appendChild(t);
      }

      const layout = document.createElement('div');
      layout.className = 'locker-layout';
      root.appendChild(layout);
      const left = document.createElement('div'); left.className = 'locker-left'; layout.appendChild(left);
      const right = document.createElement('div'); right.className = 'locker-right'; layout.appendChild(right);

      const av = () => B.Avatar.normalize(B.State.data.player.avatar);
      function commit(a) { B.State.data.player.avatar = a; B.Save.saveSoon(); render(); }

      const priceOf = part => prices[part.rarity] || 50;

      /* Sahip olunan bir parçayı sat (alış fiyatının bir kısmı geri döner) */
      function sellPart(part) {
        const price = Math.round(priceOf(part) * sellRatio);
        const inv = B.State.data.inventory;
        const key = B.Avatar.unlockKey(part);
        const i = inv.cosmetics.indexOf(key);
        if (i < 0) return;
        inv.cosmetics.splice(i, 1);
        B.State.data.player.avatar = B.Avatar.unequipCosmetic(B.State.data.player.avatar, { id: key, type: part.type });
        B.Reward.addCoins(price, 'sell');
        B.Bus.emit(B.Events.COSMETIC_SOLD, { itemId: key, coins: price });
        B.Audio.play('tick');
        B.UI.toast('💰 ' + part.name + ' satıldı: +' + price + ' Altın');
        B.Save.saveSoon();
        render();
      }

      const label = txt => { const d = document.createElement('div'); d.className = 'part-label'; d.textContent = txt; return d; };

      /* Parça kartı: önizleme = o parça takılı mini avatar (previewFn ile önizleme özelleştirilir)
       * Dolapta yalnızca SAHİP OLUNAN parçalar gösterilir → kart tıklanınca doğrudan giyilir.
       * fullPrev=true → dairesel yüz yerine tam vücut önizleme (kıyafet/alt giyim için) */
      function partCard(part, apply, isEquipped, previewFn, fullPrev) {
        const a = av(); a.usePhoto = false; apply(a, part); if (previewFn) previewFn(a);
        const card = document.createElement('button');
        card.className = 'part-card' + (fullPrev ? ' part-tall' : '') + (isEquipped ? ' part-on' : '');
        card.innerHTML =
          '<span class="part-prev">' + (fullPrev ? B.Avatar.fullBody(a) : B.Avatar.svg(a)) + '</span>' +
          '<span class="part-name">' + (part.name || '') + '</span>';
        card.onclick = () => {
          B.Audio.play('tick');
          const cur = av(); cur.usePhoto = false; apply(cur, part);
          commit(cur);
        };
        return card;
      }

      /* Grid yalnızca sahip olunan (kilidi açık) parçaları listeler.
       * Hiç sahip olunan yoksa mağaza yönlendirmesi gösterilir. */
      function grid(parts, apply, equippedCheck, previewFn, fullPrev) {
        const owned = parts.filter(p => B.Avatar.isUnlocked(p));
        const g = document.createElement('div'); g.className = 'part-grid' + (fullPrev ? ' grid-tall' : '');
        if (!owned.length) {
          g.classList.add('part-grid-empty');
          g.innerHTML = '<div class="locker-empty">Bu kategoride henüz eşyan yok.<br><small>🛒 Mağaza\'dan alabilirsin.</small></div>';
          return g;
        }
        owned.forEach(p => g.appendChild(partCard(p, apply, equippedCheck(p), previewFn, fullPrev)));
        return g;
      }

      function renderTab() {
        const a = av();
        const host = right.querySelector('.locker-parts');
        host.innerHTML = '';

        if (tab === 'hair') {
          // Saç: hem model hem renk aynı menüde
          host.appendChild(label('💇 SAÇ MODELİ'));
          host.appendChild(grid(B.Avatar.hairsFor(a.gender), (x, p) => { x.hair = p.id; }, p => p.id === a.hair));
          host.appendChild(label('🎨 SAÇ RENGİ'));
          host.appendChild(grid(C.hairColors, (x, p) => { x.hairColor = p.id; }, p => p.id === a.hairColor));
        } else if (tab === 'outfit') {
          // Üst kıyafetler cinsiyete göre süzülür — tam vücut önizleme
          host.appendChild(grid(B.Avatar.outfitsFor(a.gender), (x, p) => { x.outfit = p.id; }, p => p.id === a.outfit, null, true));
        } else if (tab === 'bottom') {
          // Alt giyim (pantolon/etek/şort…) cinsiyete göre — tam vücut önizleme
          host.appendChild(grid(B.Avatar.bottomsFor(a.gender), (x, p) => { x.bottom = p.id; }, p => p.id === a.bottom, null, true));
        } else if (tab === 'face') {
          host.appendChild(label('👁️ GÖZ ŞEKLİ'));
          host.appendChild(grid(C.eyes, (x, p) => { x.eyes = p.id; }, p => p.id === a.eyes));
          host.appendChild(label('👃 BURUN'));
          host.appendChild(grid(C.noses, (x, p) => { x.nose = p.id; }, p => p.id === a.nose));
          host.appendChild(label('👂 KULAK'));
          host.appendChild(grid(C.ears, (x, p) => { x.ear = p.id; }, p => p.id === a.ear));
          host.appendChild(label('👄 AĞIZ'));
          host.appendChild(grid(C.mouths, (x, p) => { x.mouth = p.id; }, p => p.id === a.mouth));
        } else if (tab === 'color') {
          host.appendChild(label('👁️ GÖZ RENGİ'));
          // Göz rengi kartları açık gözle önizlenir (renk görünsün diye)
          host.appendChild(grid(C.eyeColors, (x, p) => { x.eyeColor = p.id; }, p => p.id === a.eyeColor,
            ap => { if (ap.eyes === 1 || ap.eyes === 2) ap.eyes = 0; }));
          host.appendChild(label('🎨 TEN RENGİ'));
          host.appendChild(grid(C.skins.map(s => ({ ...s, name: 'Ten' })), (x, p) => { x.skin = p.id; }, p => p.id === a.skin));
        } else if (tab === 'acc') {
          host.appendChild(grid(C.accs, (x, p) => { x.acc = p.id; }, p => p.id === a.acc));
        } else if (tab === 'ring') {
          host.appendChild(grid(C.rings, (x, p) => { x.ring = p.id; }, p => p.id === a.ring));
        } else if (tab === 'sell') {
          renderSell(host);
        }

        // Giyilebilir sekmelerde (üst/alt/aksesuar/çerçeve) Mağaza'ya yönlendir.
        // Görünüm sekmeleri (saç/yüz/renk) ücretsizdir → mağaza yönlendirmesi yok.
        if (['outfit', 'bottom', 'acc', 'ring'].includes(tab) && !onboarding) {
          const shopBtn = document.createElement('button');
          shopBtn.className = 'btn locker-shop';
          shopBtn.innerHTML = '🛒 Yeni kıyafet & aksesuar → Mağaza';
          shopBtn.onclick = () => { B.Audio.play('tick'); B.UI.show('store', { tab: 'kiyafet' }); };
          host.appendChild(shopBtn);
        }
      }

      /* Satış: envanterdeki sahip olunan parçalar (katalogdan çözümlenir) */
      function renderSell(host) {
        const owned = (B.State.data.inventory.cosmetics || [])
          .map(key => B.Avatar.findByUnlock(key)).filter(Boolean);
        if (!owned.length) {
          host.innerHTML = '<div class="photo-panel"><p>Henüz satılık kıyafetin yok Komutan. Sandıklardan ve dükkândan kazan, sonra satarsın!</p></div>';
          return;
        }
        const g = document.createElement('div'); g.className = 'part-grid';
        owned.forEach(found => {
          const part = Object.assign({ type: found.type, rarity: found.rarity }, found.part);
          const a = av(); a.usePhoto = false;
          const pid = found.part.id;
          if (pid != null) a[found.type] = pid;
          const price = Math.round((prices[found.rarity] || 50) * sellRatio);
          const fullPrev = found.type === 'outfit' || found.type === 'bottom';
          const card = document.createElement('button');
          card.className = 'part-card part-sell' + (fullPrev ? ' part-tall' : '');
          card.innerHTML =
            '<span class="part-prev">' + (fullPrev ? B.Avatar.fullBody(a) : B.Avatar.svg(a)) + '</span>' +
            '<span class="part-name">' + found.name + '</span>' +
            '<span class="part-price">Sat: 💰 ' + price + '</span>';
          card.onclick = () => B.UI.confirm({
            icon: '💰', title: found.name + ' satılsın mı?',
            body: 'Bu parçayı satıp <b>+' + price + ' Altın</b> alacaksın.',
            yes: 'Sat', no: 'Vazgeç',
            onYes: () => sellPart(part),
          });
          g.appendChild(card);
        });
        host.appendChild(g);
      }

      function render() {
        const p = B.State.data.player;
        left.innerHTML =
          '<div class="locker-preview">' + B.Avatar.elFull(p.avatar, 'avatar-big') + '</div>' +
          '<div class="turn-hint">👆 Çevirmek için sürükle</div>' +
          '<div class="locker-name">' + (p.name || 'İsimsiz Asker') + '</div>' +
          '<div class="chip">💰 ' + (p.coins || 0) + ' Altın</div>' +
          (onboarding ? '<button class="btn btn-action locker-done">DEVAM ▶</button>' : '');
        const turnH = left.querySelector('.locker-preview .avatar-holder');
        if (turnH) B.Avatar.turntable(turnH); // pseudo-3D döndürme
        if (onboarding) {
          left.querySelector('.locker-done').onclick = () => {
            B.Save.saveNow();
            B.UI.show('interests', { onboarding: true }); // görünüm → ilgi alanları → hikâye
          };
        }
        renderTab();
      }

      right.innerHTML =
        '<div class="locker-tabs">' +
        TABS.map(t => '<button class="chip tab-btn" data-tab="' + t.id + '">' + t.name + '</button>').join('') +
        '</div><div class="locker-parts"></div>';
      right.querySelectorAll('.tab-btn').forEach(b => {
        b.onclick = () => {
          tab = b.dataset.tab;
          right.querySelectorAll('.tab-btn').forEach(x => x.classList.toggle('tab-on', x === b));
          renderTab();
        };
      });
      right.querySelector('.tab-btn').classList.add('tab-on');

      render();
    },
    exit() { if (this._hud) this._hud.dispose(); },
  });
})(window.BOKUL = window.BOKUL || {});

/* === src/ui/screens/evim-screen.js === */
/* BOKUL — Evim (üssümdeki barınak / hub)
 * İki kapı: 🧍 Ben (görünüm/tip) ve 👕 Dolap (kıyafet: al-sat-giy). */
(function (B) {
  B.UI.registerScreen('evim', {
    enter(root) {
      const hud = B.UI.buildHud(root, { backTo: 'home' });
      this._hud = hud;

      const p = B.State.data.player;

      // Evcil hayvan eşlikçileri (Evim'de görsel bağ + bakım hatırlatma)
      const petsOn = B.Perms.feature('pets') && !(B.Demo && B.Demo.featureLocked('pets'));
      const myPets = (petsOn && B.Pets) ? B.Pets.adopted() : [];
      const needy = myPets.filter(pt => B.Pets.isCaptured(pt) || (pt.tokluk || 0) < 50 || (pt.mutluluk || 0) < 50);
      const petBadge = needy.length ? '<span class="door-badge pet-need">' + needy.length + '</span>' : '';
      const compHtml = myPets.length ? ('<div class="evim-pets">' + myPets.map(pt => {
        const d = B.Pets.typeDef(pt.type) || { icon: '🐾', name: 'Dost' };
        const cap = B.Pets.isCaptured(pt);
        const care = cap || (pt.tokluk || 0) < 50 || (pt.mutluluk || 0) < 50;
        return '<button class="evim-pet' + (cap ? ' pet-cap' : (care ? ' pet-care' : '')) + '" data-uid="' + pt.uid + '">' +
          '<span class="ep-ico">' + d.icon + '</span>' +
          '<span class="ep-mood">' + B.Pets.mood(pt) + '</span>' +
          '<span class="ep-name">' + (pt.name || d.name) + '</span>' +
          (care ? '<span class="ep-flag">' + (cap ? '😈' : '🐾') + '</span>' : '') +
        '</button>';
      }).join('') + '</div>') : '';

      const wrap = document.createElement('div');
      wrap.className = 'evim-wrap';
      wrap.innerHTML =
        '<div class="evim-hero">' +
          '<div class="evim-avatar">' + B.Avatar.elFull(p.avatar, 'avatar-big') + '</div>' +
          '<div class="evim-name">🧍 ' + (p.name || 'Asker') + '</div>' +
          '<div class="evim-levels">' +
            '<span class="chip">💰 ' + (p.coins || 0) + '</span>' +
            '<span class="chip">🏠 Ev Sv.' + (p.homeLevel || 1) + '</span>' +
            '<span class="chip">📦 Depo Sv.' + (p.depoLevel || 1) + '</span>' +
          '</div>' +
          compHtml +
        '</div>' +
        '<div class="evim-doors">' +
          '<button class="btn door door-char"><span class="door-ico">🎖️</span><span class="door-tt">BAŞARILARIM</span><small>Rozetler · istatistik · kimlik</small></button>' +
          '<button class="btn door door-ben"><span class="door-ico">🧍</span><span class="door-tt">GÖRÜNÜŞÜM</span><small>Kıyafet · saç · yüz</small></button>' +
          '<button class="btn door door-dolap"><span class="door-ico">👕</span><span class="door-tt">DOLAP</span><small>Kıyafet al · sat · giy</small></button>' +
          '<button class="btn door door-room"><span class="door-ico">🛋️</span><span class="door-tt">ODAM</span><small>Eşya yerleştir · süsle</small></button>' +
          '<button class="btn door door-store"><span class="door-ico">📦</span><span class="door-tt">DEPOM</span><small>Eşya al · sakla</small></button>' +
          '<button class="btn door door-atolye"><span class="door-ico">🔨</span><span class="door-tt">ATÖLYE</span><small>Depodan eşya üret</small></button>' +
          '<button class="btn door door-pets">' + petBadge + '<span class="door-ico">🐾</span><span class="door-tt">EVCİL HAYVANLARIM</span><small>' + (needy.length ? '🐾 ' + needy.length + ' dost bakım bekliyor' : 'Sahiplen · bak') + '</small></button>' +
          '<button class="btn door door-int"><span class="door-ico">🎯</span><span class="door-tt">İLGİ ALANLARIM</span><small>Sevdiklerim</small></button>' +
        '</div>';
      root.appendChild(wrap);

      // Eşlikçiye tıkla → evcil hayvan ekranı
      wrap.querySelectorAll('.evim-pet').forEach(b => b.onclick = () => { B.Audio.play('tick'); B.UI.show('pets', {}); });

      const evimTurn = wrap.querySelector('.evim-avatar .avatar-holder');
      if (evimTurn) B.Avatar.turntable(evimTurn); // pseudo-3D döndürme

      wrap.querySelector('.door-char').onclick = () => { B.Audio.play('tick'); B.UI.show('character'); };
      evimGate(wrap.querySelector('.door-room'), 'shop', () => { B.Audio.play('tick'); B.UI.show('room'); });
      evimGate(wrap.querySelector('.door-atolye'), 'shop', () => { B.Audio.play('tick'); B.UI.show('atolye'); });
      wrap.querySelector('.door-ben').onclick = () => { B.Audio.play('tick'); B.UI.show('locker', { section: 'ben' }); };
      wrap.querySelector('.door-dolap').onclick = () => { B.Audio.play('tick'); B.UI.show('locker', { section: 'dolap' }); };
      function evimGate(el, feature, go) {
        if (B.Demo && B.Demo.featureLocked(feature)) {
          el.classList.add('feat-locked');
          el.onclick = () => { B.Audio.play('wrong'); B.UI.toast('🎫 Demo sürüm — davet koduyla açılır.'); };
          return;
        }
        if (B.Perms.feature(feature)) { el.onclick = go; return; }
        el.classList.add('feat-locked');
        el.onclick = () => { B.Audio.play('wrong'); B.UI.toast('🔒 Bu bölümü ebeveynin kapatmış.'); };
      }
      evimGate(wrap.querySelector('.door-store'), 'store', () => { B.Audio.play('tick'); B.UI.show('store', { tab: 'depo' }); });
      evimGate(wrap.querySelector('.door-pets'), 'pets', () => { B.Audio.play('tick'); B.UI.show('pets', {}); });
      wrap.querySelector('.door-int').onclick = () => { B.Audio.play('tick'); B.UI.show('interests', {}); };
    },
    exit() { if (this._hud) this._hud.dispose(); },
  });
})(window.BOKUL = window.BOKUL || {});

/* === src/ui/screens/store-screen.js === */
/* BOKUL — Mağaza & Depom
 * 🏪 Mağaza: altınla eşya satın al (kategori süzgeçli).
 * 📦 Depom : sahip olduğun eşyalar (adetli), Evim'de saklanır.
 * Eşyalar ileride evcil hayvan craft'ında ön koşul olur. */
(function (B) {
  B.UI.registerScreen('store', {
    enter(root, params) {
      const hud = B.UI.buildHud(root, { backTo: 'evim' });
      this._hud = hud;
      let tab = (params && params.tab) || 'shop';
      if (tab === 'craft') tab = 'shop'; // craft artık kendi ekranı (atolye)
      let cat = 'all';
      let kcat = 'all'; // kıyafet sekmesi tür süzgeci

      const wrap = document.createElement('div');
      wrap.className = 'store-wrap';
      root.appendChild(wrap);

      function coins() { return B.State.data.player.coins || 0; }

      function shell() {
        wrap.innerHTML =
          '<div class="store-top"><div class="chip store-gold">💰 ' + coins() + ' Altın</div></div>' +
          '<div class="store-tabs">' +
            '<button class="chip stab" data-t="shop">🏪 Eşya</button>' +
            '<button class="chip stab" data-t="kiyafet">👕 Kıyafet</button>' +
            '<button class="chip stab" data-t="depo">📦 Depom (' + B.Items.total() + ')</button>' +
            '<button class="chip stab store-goatolye">🔨 Atölye ▶</button>' +
          '</div>' +
          '<div class="store-body"></div>';
        wrap.querySelectorAll('.stab[data-t]').forEach(b => b.onclick = () => {
          tab = b.dataset.t;
          wrap.querySelectorAll('.stab').forEach(x => x.classList.toggle('tab-on', x === b));
          renderBody();
        });
        const goAt = wrap.querySelector('.store-goatolye');
        if (goAt) goAt.onclick = () => { B.Audio.play('tick'); B.UI.show('atolye'); };
        wrap.querySelector('.stab[data-t="' + tab + '"]').classList.add('tab-on');
        renderBody();
      }

      function renderBody() {
        const body = wrap.querySelector('.store-body');
        if (tab === 'shop') renderShop(body);
        else if (tab === 'kiyafet') renderKiyafet(body);
        else renderDepo(body);
      }

      /* Baba bir mekaniği ilk kez açıklıyor (bir kez gösterilir) */
      function babaSays(key, icon, text) {
        const seen = B.Save.settings.get();
        if (seen['tut_' + key]) return;
        B.Save.settings.set({ ['tut_' + key]: true });
        B.UI.overlay('<div class="ov-baba">' + (icon || '🧑‍✈️') + '</div><h2>Baba Komutan</h2>' +
          '<p class="ov-quote">' + text + '</p>', [{ label: 'Anlaşıldı!', onClick: null }]);
      }

      /* ---- 🏪 Mağaza ---- */
      function renderShop(body) {
        babaSays('shop', '🛒', 'Burası Mağaza! Kazandığın altınla eşya alırsın; aldıkların Depom\'a gider. Ham malzemeleri (tahta, cam, metal…) buradan al, sonra 🔨 Atölye\'de birleştirip yeni şeyler ÜRET. İpucu: bir eşyanın üstüne dokun, "emin misin?" diye sorar.');
        const buyable = B.Items.catalog().filter(it => !it.craftOnly);
        const cats = B.Items.categories().filter(c => buyable.some(it => it.cat === c.id));
        const filterRow = '<div class="store-cats">' +
          '<button class="chip scat" data-c="all">Hepsi</button>' +
          cats.map(c => '<button class="chip scat" data-c="' + c.id + '">' + c.icon + ' ' + c.name + '</button>').join('') +
          '</div>';
        const items = buyable.filter(it => cat === 'all' || it.cat === cat);
        const cards = items.map(it => {
          const owned = B.Items.count(it.id);
          const isOwnedUnique = it.unique && owned > 0;
          const afford = coins() >= it.price;
          return '<button class="store-card' + (isOwnedUnique ? ' store-owned' : '') + (afford || isOwnedUnique ? '' : ' store-poor') + '" data-id="' + it.id + '"' + (isOwnedUnique ? ' disabled' : '') + '>' +
            '<span class="store-ic">' + it.icon + '</span>' +
            '<span class="store-nm">' + it.name + '</span>' +
            '<span class="store-desc">' + (it.desc || '') + '</span>' +
            (owned && !it.unique ? '<span class="store-have">Depoda: ' + owned + '</span>' : '') +
            (isOwnedUnique ? '<span class="store-tag">✓ Sende var</span>'
                           : '<span class="store-price">💰 ' + it.price + '</span>') +
            '</button>';
        }).join('');
        body.innerHTML = filterRow + '<div class="store-grid">' + cards + '</div>';

        body.querySelectorAll('.scat').forEach(b => b.onclick = () => {
          cat = b.dataset.c;
          body.querySelectorAll('.scat').forEach(x => x.classList.toggle('tab-on', x === b));
          renderShop(body);
        });
        const active = body.querySelector('.scat[data-c="' + cat + '"]'); if (active) active.classList.add('tab-on');

        body.querySelectorAll('.store-card[data-id]').forEach(cardEl => {
          if (cardEl.disabled) return;
          cardEl.onclick = () => {
            const it = B.Items.get(cardEl.dataset.id);
            if (!it) return;
            if (coins() < it.price) { B.Audio.play('wrong'); B.UI.toast('💰 Altının yetmiyor!'); return; }
            B.UI.confirm({
              icon: it.icon, title: it.name + ' alınsın mı?',
              body: '💰 ' + it.price + ' Altın karşılığında satın alacaksın.',
              yes: 'Satın al', no: 'Vazgeç',
              onYes: () => {
                const r = B.Items.buy(cardEl.dataset.id);
                if (!r.ok) { B.Audio.play('wrong'); B.UI.toast('💰 ' + r.err); return; }
                B.Audio.play('chest');
                B.UI.toast('✨ ' + r.item.name + ' alındı! Depom\'da.');
                shell(); // altın + depo sayısı güncellensin
              },
            });
          };
        });
      }

      /* Not: Atölye (craft) artık ayrı ekran → src/ui/screens/atolye-screen.js */

      /* ---- 👕 Kıyafet & Kozmetik (sahip OLMADIĞIN her şey) ---- */
      function renderKiyafet(body) {
        babaSays('kiyafet', '👕', 'Burası Kıyafet Reyonu! Sahip olmadığın tüm kıyafet, saç, aksesuar burada. Altınla al → Dolabına gider → Görünüşüm\'den giyersin. Sahip olduklarını Dolabında bulursun.');
        const gender = (B.State.data.player.avatar || {}).gender;
        const prices = B.Content.get('rewards').shopPrices;
        const priceOf = p => prices[p.rarity] || 50;
        // Cinsiyete uygun + henüz sahip OLMADIĞIN kozmetikler
        const all = B.Avatar.cosmeticCatalog().filter(c => B.Avatar.genderOk(c.part, gender) && !B.Avatar.isUnlocked(c.part));
        if (!all.length) {
          body.innerHTML = '<div class="store-empty">👑 Harika Komutan! Tüm kıyafet ve kozmetikler artık senin. Dolabından giyebilirsin.</div>';
          return;
        }
        // Tür süzgeci (Üst/Alt/Saç…)
        const types = [];
        all.forEach(c => { if (!types.some(t => t.id === c.type)) types.push({ id: c.type, label: c.typeLabel }); });
        const filterRow = '<div class="store-cats">' +
          '<button class="chip kcat" data-c="all">Hepsi</button>' +
          types.map(t => '<button class="chip kcat" data-c="' + t.id + '">' + t.label + '</button>').join('') +
          '</div>';
        const shown = all.filter(c => kcat === 'all' || c.type === kcat);
        const cards = shown.map(c => {
          const a = B.Avatar.normalize(B.State.data.player.avatar); a.usePhoto = false; a[c.type] = c.part.id;
          const full = c.type === 'outfit' || c.type === 'bottom';
          const afford = coins() >= priceOf(c.part);
          return '<button class="store-card cos-card' + (full ? ' cos-tall' : '') + (afford ? '' : ' store-poor') + '" data-type="' + c.type + '" data-id="' + c.id + '">' +
            '<span class="cos-prev' + (full ? ' cos-prev-tall' : '') + '">' + (full ? B.Avatar.fullBody(a) : B.Avatar.svg(a)) + '</span>' +
            '<span class="store-nm">' + c.name + '</span>' +
            '<span class="store-sub">' + c.typeLabel + '</span>' +
            '<span class="store-price">💰 ' + priceOf(c.part) + '</span>' +
            '</button>';
        }).join('');
        body.innerHTML = filterRow + '<div class="store-grid cos-grid">' + cards + '</div>';

        body.querySelectorAll('.kcat').forEach(b => b.onclick = () => {
          kcat = b.dataset.c;
          renderKiyafet(body);
        });
        const active = body.querySelector('.kcat[data-c="' + kcat + '"]'); if (active) active.classList.add('tab-on');

        body.querySelectorAll('.cos-card[data-id]').forEach(el => el.onclick = () => {
          const c = all.find(x => x.type === el.dataset.type && x.id === el.dataset.id);
          if (!c) return;
          const price = priceOf(c.part);
          if (coins() < price) { B.Audio.play('wrong'); B.UI.toast('💰 Altının yetmiyor! Görev ve harekâtlardan kazan.'); return; }
          B.UI.confirm({
            icon: '👕', title: c.name + ' alınsın mı?',
            body: '💰 ' + price + ' Altın — alınca Dolabına eklenir, Görünüşüm\'den giyersin.',
            yes: 'Satın al', no: 'Vazgeç',
            onYes: () => {
              if (!B.Reward.spendCoins(price)) { B.Audio.play('wrong'); B.UI.toast('💰 Altının yetmiyor!'); return; }
              B.State.data.inventory.cosmetics.push(c.id);
              if (B.Bus && B.Events && B.Events.COSMETIC_UNLOCKED) B.Bus.emit(B.Events.COSMETIC_UNLOCKED, { itemId: c.id });
              B.Audio.play('chest'); B.Save.saveSoon();
              B.UI.toast('✨ ' + c.name + ' alındı! Dolabında.');
              shell(); // altın + liste güncellensin (satın alınan kaybolur)
            },
          });
        });
      }

      /* ---- 📦 Depom ---- */
      function renderDepo(body) {
        const owned = B.Items.ownedList();
        if (!owned.length) {

/* BOKUL — Evcil Hayvanlarım
 * Sahiplenilen hayvanları bakım (besle/oynat/gezdir...) ile mutlu tut;
 * ön koşulları tamamlanan yeni türleri sahiplen. */
(function (B) {
  B.UI.registerScreen('pets', {
    enter(root) {
      const hud = B.UI.buildHud(root, { backTo: 'evim' });
      this._hud = hud;
      B.Pets.ensure();

      const wrap = document.createElement('div');
      wrap.className = 'pets-wrap';
      root.appendChild(wrap);

      // Baba ilk ziyaret açıklaması (bir kez)
      const seen = B.Save.settings.get();
      if (!seen.tut_pets) {
        B.Save.settings.set({ tut_pets: true });
        B.UI.overlay('<div class="ov-baba">🐾</div><h2>Baba Komutan</h2><p class="ov-quote">' + B.Pets.intro() + '</p>', [{ label: 'Anlaşıldı!', onClick: null }]);
      }

      function bar(label, val, cls) {
        return '<div class="pet-stat"><span>' + label + '</span><div class="pet-bar ' + cls + '"><i style="width:' + val + '%"></i></div></div>';
      }

      function render() {
        const pets = B.Pets.adopted();
        let html = '<div class="pets-title">🐾 Evcil Hayvanlarım</div>';

        if (!pets.length) {
          html += '<div class="pets-empty">Henüz evcil hayvanın yok. Aşağıdan ön koşulları tamamla ve ilkini sahiplen!</div>';
        } else {
          html += '<div class="pets-list">' + pets.map(p => {
            const def = B.Pets.typeDef(p.type) || { icon: '🐾', care: [] };
            const cap = B.Pets.isCaptured(p);
            const care = (def.care || []).map(a => {
              const left = B.Pets.cooldownLeft(p, a);
              const cd = left > 0 ? ' disabled' : '';
              const lbl = left > 0 ? Math.ceil(left / 3600000) + ' sa' : (cap ? '🦸 ' + a.label : a.label);
              return '<button class="btn pet-care' + cd + '" data-uid="' + p.uid + '" data-act="' + a.id + '"' + cd + '>' + a.icon + ' ' + lbl + '</button>';
            }).join('');
            return '<div class="pet-card' + (cap ? ' pet-captured' : '') + '">' +
              '<div class="pet-head"><span class="pet-face">' + def.icon + '</span>' +
                '<div class="pet-id"><b>' + esc(p.name) + '</b><span class="pet-mood">' + B.Pets.mood(p) + '</span></div></div>' +
              (cap ? '<div class="pet-capmsg">😈 <b>' + B.Pets.villain() + '</b> ' + esc(p.name) + '\'i kaçırdı! Besleyip mutlu ederek KURTAR (tokluk + mutluluk ortalaması 50\'ye ulaşınca geri döner).</div>' : '') +
              bar('🍖 Tokluk', p.tokluk, 'b-tok') + bar('❤️ Mutluluk', p.mutluluk, 'b-mut') +
              '<div class="pet-actions">' + care + '</div></div>';
          }).join('') + '</div>';
        }

        // Sahiplenilebilir türler
        html += '<div class="pets-title pets-title2">🏠 Yeni Dost Sahiplen</div>';
        html += '<div class="adopt-list">' + B.Pets.types().map(def => {
          const owned = B.Pets.hasType(def.id);
          const miss = B.Pets.missingPrereq(def.id);
          const ready = !owned && miss.length === 0;
          const prereqRows = (def.prereq || []).map(r => {
            const it = B.Items.get(r.item) || { name: r.item, icon: '❔' };
            const have = B.Items.count(r.item), ok = have >= r.n;
            return '<span class="adopt-need' + (ok ? ' need-ok' : ' need-no') + '">' + it.icon + ' ' + it.name + ' ' + have + '/' + r.n + '</span>';
          }).join('');
          return '<div class="adopt-card' + (owned ? ' adopt-owned' : '') + '">' +
            '<div class="pet-head"><span class="pet-face">' + def.icon + '</span><b>' + def.name + '</b></div>' +
            '<div class="adopt-needs">' + prereqRows + '</div>' +
            (owned
              ? '<div class="adopt-tag">✓ Sahiplendin</div>'
              : '<button class="btn adopt-go' + (ready ? ' btn-action' : ' btn-quiet') + '" data-type="' + def.id + '"' + (ready ? '' : ' disabled') + '>' +
                  (ready ? '🐾 Sahiplen' : '🔒 Ön koşul eksik') + '</button>') +
            '</div>';
        }).join('') + '</div>';

        wrap.innerHTML = html;

        // Bakım aksiyonları
        wrap.querySelectorAll('.pet-care').forEach(b => { if (!b.disabled) b.onclick = () => {
          const r = B.Pets.care(b.dataset.uid, b.dataset.act);
          if (!r.ok) { B.Audio.play('wrong'); B.UI.toast('⚠️ ' + r.err); return; }
          if (r.rescued) {
            B.Audio.play('fanfare'); if (B.Anim.confetti) B.Anim.confetti(60);
            B.UI.overlay('<div class="ov-baba">🦸</div><h2>' + esc(r.pet.name) + ' kurtarıldı! 🎉</h2>' +
              '<p class="ov-quote">Sevgin ' + B.Pets.villain() + '\'ı yendi. Bir daha ihmal etme — düzenli besle ve oyna!</p>',
              [{ label: 'Yaşasın!', onClick: null }]);
          } else {
            B.Audio.play('correct');
            B.UI.toast('💛 ' + r.act.label + ' — teşekkür eder!');
          }
          render();
        }; });

        // Sahiplenme
        wrap.querySelectorAll('.adopt-go').forEach(b => { if (!b.disabled) b.onclick = () => {
          const def = B.Pets.typeDef(b.dataset.type);
          const ov = B.UI.overlay('<div class="ov-baba">' + def.icon + '</div><h2>' + def.name + ' sahiplen</h2>' +
            '<p class="ov-quote">Ön koşul eşyaların bu hayvanın kurulumu için harcanacak. Ona bir isim ver:</p>' +
            '<input id="pet-name" class="name-input" maxlength="14" placeholder="' + def.name + ' adı" value="' + def.name + '">',
            [{ label: 'Sahiplen 🐾', onClick: null }, { label: 'Vazgeç', cls: 'btn-quiet', onClick: null }]);
          const btns = ov.querySelectorAll('.overlay-btns .btn');
          btns[0].onclick = () => {
            const nm = ov.querySelector('#pet-name').value;
            const r = B.Pets.adopt(b.dataset.type, nm);
            ov.remove();
            if (!r.ok) { B.Audio.play('wrong'); B.UI.toast('⚠️ ' + r.err); return; }
            B.Audio.play('fanfare'); if (B.Anim.confetti) B.Anim.confetti(40);
            B.UI.overlay('<div class="ov-baba">' + def.icon + '</div><h2>' + esc(r.pet.name) + ' ailene katıldı! 🎉</h2><p class="ov-quote">' + (def.teach || '') + '</p>', [{ label: 'Yaşasın!', onClick: null }]);
            render();
          };
          btns[1].onclick = () => ov.remove();
        }; });
      }

      function esc(s) { return String(s || '').replace(/[<>&]/g, c => ({ '<': '&lt;', '>': '&gt;', '&': '&amp;' }[c])); }
      render();
    },
    exit() { if (this._hud) this._hud.dispose(); },
  });
})(window.BOKUL = window.BOKUL || {});

(function (B) {

    enter(root) {

      this._hud = hud;

      const title = document.createElement('div');
      title.className = 'map-title';

      const list = document.createElement('div');
      list.className = 'quest-list';
      root.appendChild(list);

      const note = document.createElement('div');
      note.className = 'quest-note';
      note.textContent = '🥈 Üç emri de tamamla → Gümüş Sandık! Yeni emirler her gün gelir.';
      root.appendChild(note);

      function render() {
        list.innerHTML = '';
        B.Quest.daily().forEach(q => {
          const pct = Math.round(q.progress / q.target * 100);
          const card = document.createElement('div');
          card.className = 'quest-card' + (q.claimed ? ' quest-claimed' : q.done ? ' quest-done' : '');

            card.insertAdjacentHTML('beforeend', '<div class="quest-status">✓ TOPLANDI</div>');
          } else if (q.done) {
            const btn = document.createElement('button');
            btn.className = 'btn btn-action quest-claim';
            btn.textContent = '🎁 TOPLA';
            btn.onclick = () => {
              const r = B.Quest.claim(q);

        show(idx + 1);

      show(0);
      this._cleanup = () => clearInterval(typeTimer);
