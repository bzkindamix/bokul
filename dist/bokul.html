      face.blink = true; renderFaces();
      setTimeout(() => { face.blink = false; renderFaces(); scheduleBlink(); }, 130);
    }, 2500 + Math.random() * 3000);
  }

  /* İfadeyi kısa süreliğine değiştir, sonra normale dön */
  function express(expr, ms) {
    clearTimeout(exprTimer);
    face.expr = expr; renderFaces();
    exprTimer = setTimeout(() => { face.expr = 'normal'; renderFaces(); }, ms || 1600);
  }

  function stopTalking() {
    clearInterval(talkTimer); talkTimer = null;
    face.mouthOpen = false; renderFaces();
  }

  B.Commander = {
    mount(container, opts) {
      opts = opts || {};
      const wrap = document.createElement('div');
      wrap.className = 'commander-wrap' + (opts.compact ? ' commander-compact' : '');
      wrap.innerHTML =
        '<div class="commander-face commander-idle">' +
          B.SvgArt.commander(face.expr, face) +
        '</div>' +
        '<div class="commander-balloon"><span class="commander-text"></span></div>';
      container.appendChild(wrap);
      const textEl = wrap.querySelector('.commander-text');

      /* Konuşma: harfler akarken ağız oynar + her 3 harfte bir mırıltı sesi */
      function say(text) {
        if (!text) return;
        clearInterval(typeTimer);
        stopTalking();
        textEl.textContent = '';
        let i = 0;

        talkTimer = setInterval(() => {
          face.mouthOpen = !face.mouthOpen;
          renderFaces();
        }, 120);

        typeTimer = setInterval(() => {
          textEl.textContent = text.slice(0, ++i);
          if (i % 3 === 0 && text[i - 1] !== ' ') B.Audio.play('blip');
          if (i >= text.length) {
            clearInterval(typeTimer);
            stopTalking();
          }
        }, 26); // ağız hareketi görünsün diye biraz yavaşlatıldı
      }

      function sayFrom(pool, vars) {
        const t = B.Dialogue.pick(pool, vars);
        if (t) say(t);
        return t;
      }

      renderFaces();
      return { say, sayFrom, el: wrap };
    },

    express,

    init() {
      scheduleBlink();
      B.Bus.on(B.Events.STEP_ANSWERED, p => express(p.correct ? 'happy' : 'surprised', 1200));
      B.Bus.on(B.Events.LEVEL_UP, () => express('proud', 2500));
      B.Bus.on(B.Events.BOSS_DEFEATED, () => express('proud', 3000));
      B.Bus.on(B.Events.BOSS_ATTACKED, () => express('stern', 1800));
    },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/ui/components/chest-ui.js === */
/* BOKUL — Sandık Açılış Töreni (CSS 3D)
 * Karartılmış sahne → sallanan 3D sandık → dokun → kapak açılır,
 * ışık patlar, ödül kartı dönerek gelir. */
(function (B) {
  const RARITY = {
    common:    { name: 'Yaygın',   color: '#A79BC8' },
    rare:      { name: 'Nadir',    color: '#6FA8FF' },
    epic:      { name: 'Epik',     color: '#9D6BFF' },
    legendary: { name: 'Efsanevi', color: '#3DF2D2' },
  };

  /* Kuyruktaki sandıkları sırayla aç; bitince onDone */
  function openCeremony(onDone) {
    if (!B.Chest.queue().length) { if (onDone) onDone(); return; }
    const meta = B.Chest.meta(B.Chest.queue()[0]);

    const ov = document.createElement('div');
    ov.className = 'overlay chest-overlay';
    ov.innerHTML =
      '<div class="chest-scene">' +
        '<div class="chest-title">' + meta.name + '</div>' +
        '<div class="chest3d chest-shake">' +
          '<div class="chest-lid"></div>' +
          '<div class="chest-body">' + meta.icon + '</div>' +
          '<div class="chest-glow"></div>' +
        '</div>' +
        '<div class="chest-hint">Açmak için dokun!</div>' +
      '</div>';
    document.body.appendChild(ov);

    const chestEl = ov.querySelector('.chest3d');
    let opened = false;

    chestEl.parentElement.onclick = () => {
      if (opened) return;
      opened = true;
      const { result } = B.Chest.openNext();
      B.Audio.play('chest');
      chestEl.classList.remove('chest-shake');
      chestEl.classList.add('chest-open');

      setTimeout(() => {
        B.Anim.confetti(40);
        let cardHtml;
        if (result.item) {
          const rar = RARITY[result.item.rarity] || RARITY.common;
          cardHtml =
            '<div class="loot-card" style="--rar:' + rar.color + '">' +
              '<div class="loot-rarity">' + rar.name.toUpperCase() + '</div>' +
              '<div class="loot-art">' + lootArt(result.item) + '</div>' +
              '<div class="loot-name">' + result.item.name + '</div>' +
            '</div>';
        } else {
          cardHtml =
            '<div class="loot-card" style="--rar:#FFD52E">' +
              '<div class="loot-rarity">XP PAKETİ</div>' +
              '<div class="loot-art loot-xp">+50 XP</div>' +
            '</div>';
        }
        const scene = ov.querySelector('.chest-scene');
        scene.insertAdjacentHTML('beforeend',
          cardHtml + '<div class="loot-coins">+' + result.coins + ' 💰 Altın</div>');
        ov.querySelector('.chest-hint').textContent = '';

        setTimeout(() => {
          const btn = document.createElement('button');
          btn.className = 'btn btn-action';
          btn.textContent = B.Chest.queue().length ? ('SIRADAKİ SANDIK (' + B.Chest.queue().length + ') ▶') : 'DEVAM ▶';
          btn.onclick = () => { ov.remove(); openCeremony(onDone); };
          scene.appendChild(btn);
        }, 700);
      }, 550);
    };
  }

  /* Ödül kartındaki görsel: avatar parçasıysa o parçayla mini avatar önizlemesi */
  function lootArt(item) {
    const a = B.Avatar.normalize(B.State.data.player.avatar);
    a.usePhoto = false;
    const C = B.Avatar.CATALOG;
    const bind = {
      hair:      () => { const p = C.hairs.find(x => x.cosmeticId === item.id); if (p) a.hair = p.id; },
      hairColor: () => { const p = C.hairColors.find(x => x.cosmeticId === item.id); if (p) a.hairColor = p.id; },
      eyes:      () => { const p = C.eyes.find(x => x.cosmeticId === item.id); if (p) a.eyes = p.id; },
      mouth:     () => { const p = C.mouths.find(x => x.cosmeticId === item.id); if (p) a.mouth = p.id; },
      acc:       () => { const p = C.accs.find(x => x.cosmeticId === item.id); if (p) a.acc = p.id; },
      ring:      () => { const p = C.rings.find(x => x.cosmeticId === item.id); if (p) a.ring = p.id; },
    };
    if (bind[item.type]) { bind[item.type](); return B.Avatar.svg(a); }
    if (item.type === 'title') return '<div class="loot-title-art">🎖️</div>';
    return '<div class="loot-title-art">✨</div>';
  }

  B.ChestUI = { openCeremony };
})(window.BOKUL = window.BOKUL || {});

/* === src/ui/ui-manager.js === */
/* BOKUL — UIManager
 * Ekran yönlendirici + ortak HUD + tören katmanları (overlay/toast).
 * Ekranlar registerScreen ile kaydolur: { enter(root, params), exit() } */
(function (B) {
  const screens = new Map();
  let current = null;
  let currentName = '';

  B.UI = {
    registerScreen(name, impl) { screens.set(name, impl); },

    show(name, params) {
      const next = screens.get(name);
      if (!next) { console.error('[BOKUL] Kayıtsız ekran:', name); return; }
      if (current && current.exit) current.exit();
      const app = document.getElementById('app');
      app.innerHTML = '';
      const root = document.createElement('div');
      root.className = 'screen screen-' + name;
      app.appendChild(root);
      current = next; currentName = name;
      next.enter(root, params || {});
      B.Bus.emit(B.Events.SCREEN_CHANGED, { name });
    },

    currentScreen() { return currentName; },

    /* ---- Ortak HUD (üst şerit) ---- */
    buildHud(root, opts) {
      opts = opts || {};
      const p = B.State.data.player;
      const rank = B.Reward.rankFor(p.level);
      const hud = document.createElement('div');
      hud.className = 'hud';
      hud.innerHTML =
        (opts.backTo ? '<button class="chip hud-back">◀</button>' : '<div class="hud-avatar">' + B.Avatar.el(p.avatar) + '</div>') +
        '<div class="chip hud-rank">' + rank.icon + ' ' + rank.title + '</div>' +
        '<div class="hud-xpbar"><span class="hud-lvl">' + p.level + '</span><i></i></div>' +
        '<div class="chip hud-coins">💰 ' + (p.coins || 0) + '</div>' +
        (opts.extra || '') +
        '<button class="chip hud-sound">' + (B.Audio.isEnabled() ? '🔊' : '🔇') + '</button>';
      root.appendChild(hud);

      const fill = hud.querySelector('.hud-xpbar i');
      function refresh() {
        const pl = B.State.data.player;
        fill.style.width = Math.min(100, Math.round(pl.xp / B.Reward.xpNeeded() * 100)) + '%';
        hud.querySelector('.hud-lvl').textContent = pl.level;
        const r = B.Reward.rankFor(pl.level);
        hud.querySelector('.hud-rank').textContent = r.icon + ' ' + r.title;
      }
      refresh();
      const offXp = B.Bus.on(B.Events.XP_GAINED, refresh);
      const offLvl = B.Bus.on(B.Events.LEVEL_UP, refresh);
      const offCoin = B.Bus.on(B.Events.COINS_CHANGED, p2 => {
        const c = hud.querySelector('.hud-coins');
        if (c) c.textContent = '💰 ' + p2.total;
      });

      if (opts.backTo) hud.querySelector('.hud-back').onclick = () => B.UI.show(opts.backTo, opts.backParams);
      hud.querySelector('.hud-sound').onclick = (e) => {
        const on = !B.Audio.isEnabled();
        B.Audio.setEnabled(on);
        B.Save.settings.set({ sound: on });
        e.target.textContent = on ? '🔊' : '🔇';
      };
      return { refresh, dispose() { offXp(); offLvl(); offCoin(); } };
    },

    /* ---- Tören katmanı: level-up, zafer, geri çekilme ---- */
    overlay(html, buttons) {
      const ov = document.createElement('div');
      ov.className = 'overlay';
      const card = document.createElement('div');
      card.className = 'overlay-card';
      card.innerHTML = html;
      const btnRow = document.createElement('div');
      btnRow.className = 'overlay-btns';
      (buttons || []).forEach(b => {
        const btn = document.createElement('button');
        btn.className = 'btn ' + (b.cls || 'btn-action');
        btn.textContent = b.label;
        // ÖNEMLİ: önce onClick, sonra kaldır — onClick overlay içindeki
        // form alanlarını (ör. isim inputu) okuyabilmeli
        btn.onclick = () => { if (b.onClick) b.onClick(); ov.remove(); };
        btnRow.appendChild(btn);
      });
      card.appendChild(btnRow);
      ov.appendChild(card);
      document.body.appendChild(ov);
      return ov;
    },

    toast(text) {
      const t = document.createElement('div');
      t.className = 'toast';
      t.textContent = text;
      document.body.appendChild(t);
      setTimeout(() => t.classList.add('toast-show'), 20);
      setTimeout(() => { t.classList.remove('toast-show'); setTimeout(() => t.remove(), 400); }, 2600);
    },

    /* Level-up törenini merkezi bağla */
    init() {
      B.Bus.on(B.Events.LEVEL_UP, p => {
        const rankHtml = p.newRank
          ? '<div class="ov-rank">' + p.newRank.icon + '</div><div class="ov-ranktitle">Yeni rütbe: ' + p.newRank.title + '!</div>'
          : '';
        B.UI.overlay(
          '<div class="ov-big">⬆️</div><h2>LEVEL ' + p.newLevel + '!</h2>' + rankHtml +
          '<p class="ov-quote">' + (B.Dialogue.pick('levelup') || '') + '</p>',
          [{ label: 'DEVAM ▶' }]
        );
      });
    },
  };
})(window.BOKUL = window.BOKUL || {});

(function (B) {
  const TYPE_ICON = { teach: '🎓', guided: '🤝', practice: '⚔️', challenge: '🧠', review: '🔄' };

  B.UI.registerScreen('map', {

/* === src/ui/screens/mission-screen.js === */
/* BOKUL — Harekât Ekranı
 * Tüm harekât tiplerini oynatır: teach / guided / practice / challenge / review.
 * Hedef döngüsü: soru üret → tahtada çöz → yıldız + XP → sonraki hedef → harekât sonu. */
(function (B) {
  const AD = { teach: '🎓 Keşif Brifingi', guided: '🤝 Ortak Harekât', practice: '⚔️ Saha Görevi',
               challenge: '🧠 Yeni Nesil Operasyon', review: '🔄 Devriye' };

  B.UI.registerScreen('mission', {
    enter(root, params) {
      const lesson = B.Lesson.active();
      const mission = B.Lesson.findMission(params.sectionId, params.missionId);
      const cfg = B.Content.get('config');
      const self = this;

      const hud = B.UI.buildHud(root, {
        backTo: 'map',
        extra: '<div class="chip hud-target"></div><div class="chip hud-streak"></div>',
      });
      this._hud = hud;

      const streakChip = root.querySelector('.hud-streak');
      const targetChip = root.querySelector('.hud-target');
      function refreshStreak() {
        const s = B.State.data.streaks.current;
        const m = B.Reward.streakMultiplier();
        streakChip.textContent = s >= 2 ? ('🔥 Seri x' + s + (m > 1 ? ' → XP ×' + m : '')) : '';
      }
      this._offStreak = B.Bus.on(B.Events.STREAK_CHANGED, refreshStreak);
      refreshStreak();

      const title = document.createElement('div');
      title.className = 'mission-title';
      title.textContent = (AD[mission.type] || mission.type) + ' — ' + mission.title;
      root.appendChild(title);

      const layout = document.createElement('div');
      layout.className = 'mission-layout';
      root.appendChild(layout);

      const leftCol = document.createElement('div');
      leftCol.className = 'mission-left';
      layout.appendChild(leftCol);
      const cmd = B.Commander.mount(leftCol, { compact: true });

      const stage = document.createElement('div');
      stage.className = 'mission-stage';
      layout.appendChild(stage);

      /* ---------- TEACH: senaryo oynatıcı ---------- */
      if (mission.type === 'teach') {
        targetChip.textContent = '🎓 Brifing';
        const scriptSteps = [];
        (mission.segments || []).forEach(seg => {
          const s = (lesson.teachScripts || {})[seg.script];
          if (s) scriptSteps.push(...s);
        });
        cmd.sayFrom('teach.intro');
        this._teach = B.TeachModels.run(stage, scriptSteps, {
          say: t => cmd.say(t),
          onComplete() {
            // Brifing tamam: 3 yıldız sabit + görev XP'si
            finishMission([3]);
          },
        });
        return;
      }

      /* ---------- Soru bazlı tipler ---------- */
      const total = mission.targetCount || 3;
      let qIndex = 0;
      const starList = [];
      let view = null;

      // Review: önceki bölümlerin üreticilerinden karışık havuz
      const reviewGens = mission.source === 'spaced-repetition'
        ? B.Lesson.reviewGenerators(params.sectionId) : null;

      function nextQuestion() {
        if (view) { view.destroy(); view = null; }
        if (qIndex >= total) return finishMission(starList);
        targetChip.textContent = '🎯 Hedef ' + (qIndex + 1) + '/' + total;

        const gen = reviewGens
          ? reviewGens[Math.floor(Math.random() * reviewGens.length)]
          : mission.generator;
        const q = B.Question.generate(lesson.interactionType, gen, lesson.skills);
        B.Bus.emit(B.Events.QUESTION_STARTED, { questionId: qIndex, lessonId: lesson.id, type: mission.type });

        // Guided iskelesi: fadeOut ile her soruda bir adım daha oyuncuya bırakılır
        let prefilled = null;
        if (mission.scaffold) {
          let list = mission.scaffold.prefilledSteps || [];
          if (mission.scaffold.fadeOut) list = list.slice(0, Math.max(0, list.length - qIndex));
          if (list.length) prefilled = new Set(list);
        }

        // Challenge: problem metni şablondan
        let problemText = null;
        if (mission.problemTemplates && mission.problemTemplates.length) {
          const t = mission.problemTemplates[Math.floor(Math.random() * mission.problemTemplates.length)];
          problemText = t.replace('{dividend}', q.dividend).replace('{divisor}', q.divisor)
                         .replace('{name}', B.State.data.player.name || 'Komutan');
        }

        cmd.sayFrom(qIndex === 0 ? 'mission.start' : 'mission.next');
        let mistakes = 0;

        view = B.LongDivisionView.create(stage, q, {
          prefilled, problemText,
          say: t => cmd.say(t),
          onAnswer(step, correct, attempt) {
            B.Bus.emit(B.Events.STEP_ANSWERED, { stepType: step.type, correct, attempt, value: null });
            if (correct) {
              B.Reward.addXp(B.Reward.stepXp(), 'step');
              if (Math.random() < 0.25) cmd.sayFrom('correct');
            } else mistakes++;
          },
          onComplete() {
            // Yıldız: config eşikleri (0 hata → 3★, ≤2 hata → 2★, üstü → 1★)
            const th = cfg.starThresholds;
            const stars = mistakes <= th.three ? 3 : mistakes <= th.two ? 2 : 1;
            starList.push(stars);
            B.Reward.onQuestionDone(stars === 3);
            B.Reward.addCoins(stars * 2, 'question');
            const xp = B.Reward.addXp(B.Reward.questionXp(stars), 'question', { applyStreak: true });
            B.Bus.emit(B.Events.QUESTION_COMPLETED, { stars, mistakes });
            showStars(stars, xp, () => { qIndex++; nextQuestion(); });
          },
        });
      }

      /* Hedef sonu yıldız töreni */
      function showStars(stars, xp, then) {
        const quip = stars === 3 ? B.Dialogue.pick('correct.streak3') || B.Dialogue.pick('correct')
                                 : B.Dialogue.pick(stars === 2 ? 'correct' : 'wrong.retry');
        B.UI.overlay(
          '<div class="ov-stars">' +
            [1, 2, 3].map(i => '<span class="ov-star' + (i <= stars ? ' lit' : '') + '" style="animation-delay:' + (i * 0.18) + 's">★</span>').join('') +
          '</div><p class="ov-xp">+' + xp + ' XP</p><p class="ov-quote">' + (quip || '') + '</p>',
          [{ label: 'DEVAM ▶', onClick: then }]
        );
      }

      /* Harekât sonu */
      function finishMission(starsArr) {
        const best = starsArr.length ? Math.round(starsArr.reduce((a, b) => a + b, 0) / starsArr.length) : 3;
        const stars = Math.max(1, Math.min(3, best));
        B.Lesson.completeMission(params.sectionId, params.missionId, stars);
        const bonus = B.Reward.addXp(B.Reward.missionBonus(), 'mission');
        const coins = B.Reward.addCoins(10, 'mission');
        B.Bus.emit(B.Events.MISSION_COMPLETED, { missionId: params.missionId, stars, xp: bonus });

        B.UI.overlay(
          '<div class="ov-big">🎖️</div><h2>HAREKÂT TAMAM!</h2>' +
          '<div class="ov-stars">' +
            [1, 2, 3].map(i => '<span class="ov-star' + (i <= stars ? ' lit' : '') + '">★</span>').join('') +
          '</div><p class="ov-xp">Görev bonusu: +' + bonus + ' XP · +' + coins + ' 💰</p>' +
          '<p class="ov-quote">' + (B.Dialogue.pick('mission.done') || '') + '</p>',
          [{ label: 'HARİTAYA DÖN', onClick: () => B.UI.show('map') }]
        );
      }

      nextQuestion();
      this._view = () => view;
    },

    exit() {
      if (this._hud) this._hud.dispose();
      if (this._offStreak) this._offStreak();
      if (this._teach) { this._teach.destroy(); this._teach = null; }
      if (this._view) { const v = this._view(); if (v) v.destroy(); }
    },
  });
})(window.BOKUL = window.BOKUL || {});

/* === src/ui/screens/boss-screen.js === */
/* BOKUL — Boss Ekranı
 * Konu Boss'u: can barı var, VURAMAZ (hata sadece kalkan verir).
 * Ünite Boss'u: VURUR — oyuncunun 3 zırh plakası var; yanlış cevap zırh kırar,
 * 3 ardışık doğru 1 zırh onarır; zırh biterse "geri çekilme" (kayıp yok). */
(function (B) {
  B.UI.registerScreen('boss', {
    enter(root, params) {
      const lesson = B.Lesson.active();
      const section = B.Lesson.findSection(params.sectionId).section;
      const boss = section.boss;
      const cfg = B.Content.get('config');
      const isUnit = boss.tier === 'unit';
      const prog = B.State.sectionProgress(lesson.id, params.sectionId);

      const hud = B.UI.buildHud(root, { backTo: 'map' });
      this._hud = hud;

      /* ---- Boss durumu ---- */
      const maxHp = boss.hp;
      let hp = Math.max(1, maxHp - (prog.bossHpCarry || 0)); // geri çekilme taşıması: yorgun başlar
      let shield = 0;                                        // konu boss'u kalkanı
      let armor = isUnit ? (cfg.unitBoss.armor || 3) : 0;    // ünite boss'unda oyuncu zırhı
      let repairStreak = 0;
      let dealt = maxHp - hp;
      let over = false;

      /* ---- Boss başlığı ---- */
      const head = document.createElement('div');
      head.className = 'boss-head' + (isUnit ? ' boss-unit' : '');
      head.innerHTML =
        '<div class="boss-face boss-enter">' + B.SvgArt.boss(boss.id) + '</div>' +
        '<div class="boss-info"><div class="boss-name">' + boss.name.toUpperCase() +
        (isUnit ? ' — ⚔️ ÜNİTE BOSS\'U' : ' — KONU BOSS\'U') + '</div>' +
        '<div class="boss-hp"><i></i></div></div>' +
        '<div class="boss-shield"></div>';
      root.appendChild(head);
      const hpFill = head.querySelector('.boss-hp i');
      const shieldEl = head.querySelector('.boss-shield');

      /* ---- Zırh göstergesi (sadece ünite) ---- */
      let armorEl = null;
      if (isUnit) {
        armorEl = document.createElement('div');
        armorEl.className = 'boss-armor';
        root.appendChild(armorEl);
      }

      function refresh() {
        hpFill.style.width = Math.max(0, Math.round(hp / maxHp * 100)) + '%';
        shieldEl.textContent = shield > 0 ? '🛡️ Boss kalkanı!' : '';
        if (armorEl) {
          armorEl.innerHTML = 'ZIRHIN: ' +
            Array.from({ length: cfg.unitBoss.armor }, (_, i) =>
              '<span class="armor-plate' + (i < armor ? '' : ' broken') + '">🛡️</span>').join('') +
            '<small>3 doğru adım = 1 zırh onarımı</small>';
        }
      }
      refresh();

      const layout = document.createElement('div');
      layout.className = 'mission-layout';
      root.appendChild(layout);
      const leftCol = document.createElement('div');
      leftCol.className = 'mission-left';
      layout.appendChild(leftCol);
      const cmd = B.Commander.mount(leftCol, { compact: true });
      const stage = document.createElement('div');
      stage.className = 'mission-stage';
      layout.appendChild(stage);

      cmd.sayFrom(isUnit ? 'boss.intro.unit' : 'boss.intro.topic', { bossName: boss.name });

      let view = null;
      const self = this;

      function nextQuestion() {
        if (over) return;
        if (view) { view.destroy(); view = null; }
        const q = B.Question.generate(lesson.interactionType, boss.generator, lesson.skills);
        let mistakes = 0;

        view = B.LongDivisionView.create(stage, q, {
          say: t => cmd.say(t),
          onAnswer(step, correct, attempt) {
            B.Bus.emit(B.Events.STEP_ANSWERED, { stepType: step.type, correct, attempt, value: null });
            if (correct) {
              // Hasar: kalkan varsa önce kalkan kırılır
              if (shield > 0) { shield--; cmd.sayFrom('boss.shieldBreak'); }
              else {
                const dmg = 3;
                hp -= dmg; dealt += dmg;
                B.Bus.emit(B.Events.BOSS_DAMAGED, { amount: dmg, remaining: hp });
                head.classList.remove('boss-hit'); void head.offsetWidth;
                head.classList.add('boss-hit');
              }
              // Zırh onarımı
              if (isUnit) {
                repairStreak++;
                if (repairStreak >= (cfg.unitBoss.repairStreak || 3) && armor < cfg.unitBoss.armor) {
                  armor++; repairStreak = 0;
                  cmd.sayFrom('boss.armorRepair');
                }
              }
              refresh();
              if (hp <= 0) return victory();
            } else {
              mistakes++;
              if (isUnit) {
                // ÜNİTE BOSS'U VURUR: yanlış cevabını sana fırlatır
                armor--; repairStreak = 0;
                B.Bus.emit(B.Events.BOSS_ATTACKED, { armorLeft: armor });
                root.classList.remove('boss-quake'); void root.offsetWidth;
                root.classList.add('boss-quake');
                cmd.sayFrom('boss.playerHit', { wrongAnswer: '' });
                refresh();
                if (armor <= 0) return retreat();
              } else {
                shield++;
                cmd.sayFrom('boss.shieldUp');
                refresh();
              }
            }
          },
          onComplete() {
            if (over) return;
            // Hatasız hedef = kritik vuruş bonusu
            if (mistakes === 0 && hp > 0) {
              hp -= 6; dealt += 6;
              B.Bus.emit(B.Events.BOSS_DAMAGED, { amount: 6, remaining: hp });
              cmd.sayFrom('boss.crit');
              refresh();
              if (hp <= 0) return victory();
            }
            setTimeout(nextQuestion, 500);
          },
        });
      }

      function victory() {
        over = true;
        if (view) { view.destroy(); view = null; }
        B.Lesson.defeatBoss(params.sectionId);
        const xp = B.Reward.addXp(B.Reward.bossXp(boss.tier), 'boss');
        const coins = B.Reward.addCoins(isUnit ? 100 : 50, 'boss');
        B.Bus.emit(B.Events.BOSS_DEFEATED, { bossId: boss.id, tier: boss.tier });
        B.UI.overlay(
          '<div class="ov-big">' + boss.icon + '💥</div><h2>' + boss.name.toUpperCase() + ' DEVRİLDİ!</h2>' +
          '<p class="ov-xp">+' + xp + ' XP · +' + coins + ' 💰' + (isUnit ? ' · 🏆 Efsanevi zafer!' : ' · 💎 Epik zafer!') + '</p>' +
          '<p class="ov-quote">' + (B.Dialogue.pick('boss.win') || '') + '</p>',
          [{ label: 'HARİTAYA DÖN', onClick: () => B.UI.show('map') }]
        );
      }

      function retreat() {
        over = true;
        if (view) { view.destroy(); view = null; }
        // Emek boşa gitmez: verilen hasarın yarısı taşınır (boss yorgun başlar)
        prog.bossHpCarry = Math.round(dealt * (cfg.unitBoss.regroupHpCarry || 0.5));
        B.Bus.emit(B.Events.BOSS_RETREAT, {});
        B.UI.overlay(
          '<div class="ov-big">🏳️</div><h2>GERİ ÇEKİLME!</h2>' +
          '<p class="ov-quote">' + (B.Dialogue.pick('boss.retreat') || 'Yeniden toplan Komutan, kale hâlâ orada!') + '</p>' +
          '<p class="ov-xp">Boss yorgun: bir sonraki denemede ' + prog.bossHpCarry + ' hasarla başlıyorsun.</p>',
          [
            { label: 'TEKRAR SALDIR ⚔️', onClick: () => B.UI.show('boss', { sectionId: params.sectionId }) },
            { label: 'HARİTAYA DÖN', cls: 'btn-quiet', onClick: () => B.UI.show('map') },
          ]
        );
      }

      nextQuestion();
      this._view = () => view;
    },

    exit() {
      if (this._hud) this._hud.dispose();
      if (this._view) { const v = this._view(); if (v) v.destroy(); }
    },
  });
})(window.BOKUL = window.BOKUL || {});

/* === src/ui/screens/locker-screen.js === */
/* BOKUL — Dolap Ekranı: Avatar editörü + Altınla dükkân + Fotoğraf modu
 * Onboarding modunda ("İlk kayıt") isimden sonra buraya gelinir.
 * Kilitli parçalar altınla satın alınır; fiyatlar rewards.json'dan. */
(function (B) {
  const TABS = [
    { id: 'hair',  name: '💇 Saç' },
    { id: 'face',  name: '🙂 Yüz' },
    { id: 'color', name: '🎨 Renk' },
    { id: 'acc',   name: '🕶️ Aksesuar' },
    { id: 'ring',  name: '⭕ Çerçeve' },
    { id: 'photo', name: '📷 Fotoğraf' },
  ];

  B.UI.registerScreen('locker', {
    enter(root, params) {
      const onboarding = !!params.onboarding;
      const hud = onboarding ? null : B.UI.buildHud(root, { backTo: 'home' });
      this._hud = hud;
      const R = B.Content.get('rewards');
      const prices = R.shopPrices;
      const C = B.Avatar.CATALOG;
      let tab = 'hair';

      if (onboarding) {
        const t = document.createElement('div');
        t.className = 'map-title';
        t.textContent = '🎖️ Kendini tanıt: avatarını oluştur, ' + (B.State.data.player.name || 'asker') + '!';
        root.appendChild(t);
      }

      const layout = document.createElement('div');
      layout.className = 'locker-layout';
      root.appendChild(layout);

      const left = document.createElement('div');
      left.className = 'locker-left';
      layout.appendChild(left);

      const right = document.createElement('div');
      right.className = 'locker-right';
      layout.appendChild(right);

      const av = () => B.Avatar.normalize(B.State.data.player.avatar);

      function commit(a) {
        B.State.data.player.avatar = a;
        B.Save.saveSoon();
        render();
      }

      /* Kozmetik id'sinden katalog parçasını bul */
      function findPart(item) {
        const maps = { hair: C.hairs, hairColor: C.hairColors, eyes: C.eyes, mouth: C.mouths, acc: C.accs, ring: C.rings };
        return (maps[item.type] || []).find(p => p.cosmeticId === item.id);
      }

      function buy(item) {
        const price = prices[item.rarity] || 50;
        if (!B.Reward.spendCoins(price)) {
          B.UI.toast('💰 Altının yetmiyor! Görevlerden altın kazan.');
          return false;
        }
        B.State.data.inventory.cosmetics.push(item.id);
        B.Bus.emit(B.Events.COSMETIC_UNLOCKED, { itemId: item.id });
        B.Audio.play('chest');
        B.UI.toast('✨ ' + item.name + ' satın alındı!');
        return true;
      }

      /* Parça kartı: önizleme = o parça takılı mini avatar */
      function partCard(part, apply, isEquipped) {
        const a = av(); a.usePhoto = false; apply(a, part);
        const cosmetic = part.cosmeticId ? R.cosmetics.find(c => c.id === part.cosmeticId) : null;
        const unlocked = B.Avatar.isUnlocked(part);
        const card = document.createElement('button');
        card.className = 'part-card' + (isEquipped ? ' part-on' : '') + (unlocked ? '' : ' part-locked');
        card.innerHTML =
          '<span class="part-prev">' + B.Avatar.svg(a) + '</span>' +
          '<span class="part-name">' + (part.name || '') + '</span>' +
          (!unlocked && cosmetic ? '<span class="part-price">💰 ' + (prices[cosmetic.rarity] || 50) + '</span>' : '');
        card.onclick = () => {
          B.Audio.play('tick');
          if (!unlocked) {
            if (!buy(cosmetic)) return;
          }
          const cur = av(); cur.usePhoto = false; apply(cur, part);
          commit(cur);
        };
        return card;
      }

      function grid(parts, apply, equippedCheck) {
        const g = document.createElement('div');
        g.className = 'part-grid';
        parts.forEach(p => g.appendChild(partCard(p, apply, equippedCheck(p))));
        return g;
      }

      function renderTab() {
        const a = av();
        right.querySelector('.locker-parts').innerHTML = '';
        const host = right.querySelector('.locker-parts');

        if (tab === 'hair') {
          host.appendChild(grid(C.hairs, (x, p) => { x.hair = p.id; }, p => p.id === a.hair));
        } else if (tab === 'face') {
          host.appendChild(grid(C.eyes, (x, p) => { x.eyes = p.id; }, p => p.id === a.eyes));
          host.appendChild(grid(C.mouths, (x, p) => { x.mouth = p.id; }, p => p.id === a.mouth));
          host.appendChild(grid(C.skins.map(s => ({ ...s, name: 'Ten' })), (x, p) => { x.skin = p.id; }, p => p.id === a.skin));
        } else if (tab === 'color') {
          host.appendChild(grid(C.hairColors, (x, p) => { x.hairColor = p.id; }, p => p.id === a.hairColor));
        } else if (tab === 'acc') {
          host.appendChild(grid(C.accs, (x, p) => { x.acc = p.id; }, p => p.id === a.acc));
        } else if (tab === 'ring') {
          host.appendChild(grid(C.rings, (x, p) => { x.ring = p.id; }, p => p.id === a.ring));
        } else if (tab === 'photo') {
          host.innerHTML =
            '<div class="photo-panel">' +
              '<p>Fotoğrafın <b>sadece bu cihazda</b> kalır, hiçbir yere gönderilmez. 📵</p>' +
              '<input type="file" id="photo-input" accept="image/*" class="photo-input">' +
              '<div class="photo-btns">' +
                '<button class="btn btn-action" id="photo-pick">📷 Fotoğraf Seç</button>' +
                (a.photo ? '<button class="btn btn-quiet" id="photo-toggle">' + (a.usePhoto ? '🎨 Çizim avatara dön' : '🖼️ Fotoğrafı avatar yap') + '</button>' : '') +
                (a.photo ? '<button class="btn btn-quiet" id="photo-remove">🗑️ Fotoğrafı sil</button>' : '') +
              '</div>' +
            '</div>';
          const input = host.querySelector('#photo-input');
          host.querySelector('#photo-pick').onclick = () => input.click();
          input.onchange = () => {
            const file = input.files && input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = () => {
              const img = new Image();
              img.onload = () => {
                // Kare kırp + 160px küçült → localStorage şişmesin
                const cv = document.createElement('canvas');
                cv.width = cv.height = 160;
                const s = Math.min(img.width, img.height);
                cv.getContext('2d').drawImage(img, (img.width - s) / 2, (img.height - s) / 2, s, s, 0, 0, 160, 160);
                const cur = av();
                cur.photo = cv.toDataURL('image/jpeg', 0.82);
                cur.usePhoto = true;
                commit(cur);
                B.UI.toast('📷 Fotoğraf avatarın oldu!');
              };
              img.src = reader.result;
            };
            reader.readAsDataURL(file);
          };
          const tg = host.querySelector('#photo-toggle');
          if (tg) tg.onclick = () => { const cur = av(); cur.usePhoto = !cur.usePhoto; commit(cur); };
          const rm = host.querySelector('#photo-remove');
          if (rm) rm.onclick = () => { const cur = av(); cur.photo = null; cur.usePhoto = false; commit(cur); };
        }
      }

      function render() {
        const p = B.State.data.player;
        left.innerHTML =
          '<div class="locker-preview">' + B.Avatar.el(p.avatar, 'avatar-big') + '</div>' +
          '<div class="locker-name">' + (p.name || 'İsimsiz Asker') + '</div>' +
          '<div class="chip">💰 ' + (p.coins || 0) + ' Altın</div>' +
          (onboarding ? '<button class="btn btn-action locker-done">ÜSSE GİR ▶</button>' : '');
        if (onboarding) {
          left.querySelector('.locker-done').onclick = () => {
            B.Save.saveNow();
            B.UI.show('home');
          };
        }
        renderTab();
      }

      right.innerHTML =
        '<div class="locker-tabs">' +
        TABS.map(t => '<button class="chip tab-btn" data-tab="' + t.id + '">' + t.name + '</button>').join('') +
        '</div><div class="locker-parts"></div>';
      right.querySelectorAll('.tab-btn').forEach(b => {
        b.onclick = () => {
          tab = b.dataset.tab;
          right.querySelectorAll('.tab-btn').forEach(x => x.classList.toggle('tab-on', x === b));
          renderTab();
        };
      });
      right.querySelector('.tab-btn').classList.add('tab-on');

      render();
    },
    exit() { if (this._hud) this._hud.dispose(); },
  });
})(window.BOKUL = window.BOKUL || {});

/* === src/core/game-engine.js === */
/* BOKUL — GameEngine
 * Başlatma sırasının tek sahibi: kayıt → içerik → motorlar → arayüz. */
(function (B) {
  B.Engine = {
    async boot() {
      // 1) Kayıt
      B.Save.load();

      // 2) İçerik paketleri
      await B.Content.loadAll([
        'config', 'dialogues', 'rewards',
        'lessons/math-5-division',
      ]);
      B.Lesson.setActive(B.Content.get('lessons/math-5-division'));

      // 3) Eski kayıtları yeni alanlarla tamamla (v0.6 → v0.7 uyumu)
      const p = B.State.data.player;
      if (p.coins == null) p.coins = 0;
      p.avatar = B.Avatar.normalize(p.avatar);

      // 4) Motor başlatmaları (olay dinleyicileri bağlanır)
      B.Save.init();
      B.Audio.init();
      B.Progress.init();
      B.Reward.init();
      B.Chest.init();
      B.Anim.init();
      B.Commander.init();
      B.UI.init();
    },

    /* Splash'tan oyuna giriş (ilk dokunuş ses kilidini de açar) */
    start() {
      B.Audio.unlock();
      const name = (B.Save.settings.get().playerName || B.State.data.player.name || '').trim();
      if (!name) return B.Engine.askName();
      B.State.data.player.name = name;
      B.UI.show('home');
    },

    /* İlk açılış: kendini tanıt → avatarını oluştur → üsse gir */
    askName() {
      const ov = B.UI.overlay(
        '<div class="ov-big">🫡</div><h2>Üsse yeni asker geldi!</h2>' +
        '<p class="ov-quote">Kendini tanıt: adın ne?</p>' +
        '<input id="name-input" class="name-input" maxlength="14" placeholder="Adını yaz...">',
        [{
          label: 'DEVAM ▶',
          onClick: () => {
            const v = (document.getElementById('name-input') || {}).value || '';
            const nm = v.trim() || 'Asker';
            B.State.data.player.name = nm;
            B.Save.settings.set({ playerName: nm });
            B.Save.saveNow();
            // İsimden sonra avatar oluşturma (Dolap, onboarding modu)
            B.UI.show('locker', { onboarding: true });
          },
        }]
      );
      setTimeout(() => { const i = ov.querySelector('#name-input'); if (i) i.focus(); }, 100);
    },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/main.js === */
/* BOKUL — Giriş noktası */
(function (B) {
  window.addEventListener('DOMContentLoaded', async () => {
    try {
      await B.Engine.boot();
      const btn = document.getElementById('splash-start');
      btn.disabled = false;
      btn.onclick = () => B.Engine.start();
    } catch (e) {
      console.error('[BOKUL] Başlatma hatası:', e);
      const s = document.getElementById('splash');
      if (s) s.insertAdjacentHTML('beforeend',
        '<div class="splash-error">Bir şeyler ters gitti Komutan. Sayfayı yenile!<br><small>' + e.message + '</small></div>');
    }
  });
})(window.BOKUL = window.BOKUL || {});
