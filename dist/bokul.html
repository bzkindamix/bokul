/* === src/engines/dialogue-manager.js === */
/* BOKUL — DialogueManager
 * Baba Komutan'ın repliklerini bağlama göre seçer.
 * Yer tutucu doldurma + tekrar önleme burada. */
(function (B) {
  const recent = new Map(); // havuz adı -> son seçilen indexler

  function fill(text, vars) {
    return text.replace(/\{(\w+)\}/g, (m, k) => {
      if (vars && vars[k] != null) return vars[k];
      if (k === 'playerName' || k === 'name') return B.State.data.player.name || 'Komutan';
      return m;
    });
  }

  B.Dialogue = {
    /* Havuzdan tekrar etmeyen rastgele replik seç */
    pick(poolName, vars) {
      const pools = (B.Content.get('dialogues') || {}).pools || {};
      const pool = pools[poolName];
      if (!pool) return null;
      if (typeof pool === 'string') return fill(pool, vars);   // tekil ipucu metinleri
      if (!pool.length) return null;

      const memory = recent.get(poolName) || [];
      const banned = new Set(memory.slice(-Math.min(pool.length - 1, 3))); // son 3 tekrar etmesin
      let idx, guard = 20;
      do { idx = Math.floor(Math.random() * pool.length); } while (banned.has(idx) && --guard);
      memory.push(idx);
      recent.set(poolName, memory.slice(-6));
      return fill(pool[idx], vars);
    },

    /* İpucu anahtarı → metin (ders paketindeki hints haritasından gelen anahtarlar) */
    hint(key, vars) { return B.Dialogue.pick(key, vars) || 'Bir daha dene Komutan!'; },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/engines/progress-manager.js === */
/* BOKUL — ProgressManager (Adaptif Sistem)
 * Mikro-beceri başına kayan pencereli ustalık takibi.
 * Soru üreticiler zorluğu buradan sorar; boss kapısı ustalığa bakar. */
(function (B) {
  function cfg() { return (B.Content.get('config') || {}).adaptive || { window: 20, weakThreshold: 0.6, strongThreshold: 0.85 }; }

  B.Progress = {
    /* step:answered olayından beceri kaydı — sadece İLK deneme sayılır
     * (ipucu sonrası düzeltmeler ustalık sayılmaz ama ceza da değildir) */
    record(skill, correct) {
      const per = B.State.data.stats.perSkill;
      if (!per[skill]) per[skill] = [];
      per[skill].push(correct ? 1 : 0);
      if (per[skill].length > cfg().window) per[skill].shift();
    },

    /* 0..1 ustalık: son N denemenin doğruluk oranı (deneme azsa temkinli) */
    mastery(skill) {
      const arr = B.State.data.stats.perSkill[skill] || [];
      if (!arr.length) return 0;
      const ratio = arr.reduce((a, b) => a + b, 0) / arr.length;
      const confidence = Math.min(1, arr.length / 8); // az veriyle şişme olmasın
      return ratio * confidence;
    },

    /* Ders becerilerinin ortalama ustalığı (boss kapısı bunu kullanır) */
    overallMastery(skills) {
      if (!skills || !skills.length) return 0;
      return skills.reduce((t, s) => t + B.Progress.mastery(s), 0) / skills.length;
    },

    /* En zayıf beceri (görev üretimi ve ipucu vurgusu için) */
    weakestSkill(skills) {
      let weakest = skills[0], min = Infinity;
      skills.forEach(s => { const m = B.Progress.mastery(s); if (m < min) { min = m; weakest = s; } });
      return weakest;
    },

    /* Üreticiye zorluk çarpanı: usta ise 1 (tam parametre), zayıfsa 0 (kolay uç) */
    difficultyBias(skills) {
      const m = B.Progress.overallMastery(skills);
      const c = cfg();
      if (m >= c.strongThreshold) return 1;
      if (m <= c.weakThreshold) return 0;
      return (m - c.weakThreshold) / (c.strongThreshold - c.weakThreshold);
    },

    init() {
      B.Bus.on(B.Events.STEP_ANSWERED, p => {
        if (p.attempt === 1) B.Progress.record(p.stepType, p.correct);
        const st = B.State.data.stats;
        if (p.correct) st.correct++; else st.wrong++;
      });
    },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/engines/reward-engine.js === */
/* BOKUL — RewardEngine
 * XP, level, rütbe, seri (streak) ve günlük çalışma serisi ekonomisi.
 * Tüm sayılar content/rewards.json'dan gelir — kodda denge sabiti YOK. */
(function (B) {
  function R() { return B.Content.get('rewards'); }

  /* Level n'i geçmek için gereken XP: base + (n-1)*perLevel */
  function xpForLevel(n) { const L = R().levels; return L.base + (n - 1) * L.perLevel; }

  B.Reward = {
    /* ---- XP ---- */
    addXp(amount, source, opts) {
      opts = opts || {};
      let final = amount;
      if (opts.applyStreak) final = Math.round(final * B.Reward.streakMultiplier());
      final = Math.round(final * (1 + B.Reward.dailyBonus()));
      const p = B.State.data.player;
      p.xp += final;
      B.Bus.emit(B.Events.XP_GAINED, { amount: final, source });
      // Level kontrolü (tek olayda birden çok level atlanabilir)
      while (p.xp >= B.Reward.xpNeeded()) {
        p.xp -= B.Reward.xpNeeded();
        p.level++;
        const rank = B.Reward.rankFor(p.level);
        const rankChanged = rank.id !== p.rank;
        p.rank = rank.id;
        B.Bus.emit(B.Events.LEVEL_UP, { newLevel: p.level, newRank: rankChanged ? rank : null });
      }
      return final;
    },

    xpNeeded() { return xpForLevel(B.State.data.player.level); },

    rankFor(level) {
      const ranks = R().ranks;
      let cur = ranks[0];
      ranks.forEach(r => { if (level >= r.minLevel) cur = r; });
      return cur;
    },

    /* ---- Hatasız hedef serisi ---- */
    streakMultiplier() {
      const mults = R().xp.streakMultipliers;
      const s = B.State.data.streaks.current;
      let m = 1;
      Object.keys(mults).map(Number).sort((a, b) => a - b)
        .forEach(k => { if (s >= k) m = mults[k]; });
      return m;
    },

    onQuestionDone(flawless) {
      const st = B.State.data.streaks;
      if (flawless) {
        st.current++;
        if (st.current > st.best) st.best = st.current;
      } else st.current = 0;
      B.Bus.emit(B.Events.STREAK_CHANGED, { count: st.current, multiplier: B.Reward.streakMultiplier() });
    },

    /* ---- Günlük çalışma serisi (login değil, HAREKÂT bitirme serisi) ---- */
    dailyBonus() {
      const x = R().xp;
      return Math.min(B.State.data.streaks.dailyDays * x.dailyStreakBonusPerDay, x.dailyStreakBonusMax);
    },

    registerDailyPlay() {
      const st = B.State.data.streaks;
      const today = new Date(); today.setHours(0, 0, 0, 0);
      const todayStr = today.toISOString().slice(0, 10);
      if (st.lastPlayDate === todayStr) return;
      if (st.lastPlayDate) {
        const diff = Math.round((today - new Date(st.lastPlayDate)) / 86400000);
        if (diff === 1) st.dailyDays++;
        else if (diff > 1) st.dailyDays = Math.max(0, st.dailyDays - 2); // kırılınca sıfırlama YOK: 2 kademe düşer
      } else st.dailyDays = 1;
      st.lastPlayDate = todayStr;
    },

    /* ---- Altın (para) ---- */
    addCoins(amount, source) {
      if (B.Demo && B.Demo.isDemo()) return 0; // demo: altın kazanılamaz
      const p = B.State.data.player;
      p.coins = (p.coins || 0) + amount;
      B.Bus.emit(B.Events.COINS_CHANGED, { total: p.coins, delta: amount });
      return amount;
    },
    spendCoins(amount) {
      const p = B.State.data.player;
      if ((p.coins || 0) < amount) return false;
      p.coins -= amount;
      B.Bus.emit(B.Events.COINS_CHANGED, { total: p.coins, delta: -amount });
      B.Save.saveSoon();
      return true;
    },

    /* ---- Soru/görev ödül yardımcıları ---- */
    stepXp() { return R().xp.perStep; },
    questionXp(stars) { return R().xp.perQuestionByStars[String(stars)] || 0; },
    missionBonus() { return R().xp.missionBonus; },
    bossXp(tier) { return tier === 'unit' ? R().xp.bossUnit : R().xp.bossTopic; },

    init() {
      // Harekât bittiğinde günlük seri işlenir
      B.Bus.on(B.Events.MISSION_COMPLETED, () => B.Reward.registerDailyPlay());
    },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/engines/question-engine.js === */
/* BOKUL — QuestionEngine
 * Soru tipi plugin çatısı. Her tip registerType ile kaydolur:
 *   { generate(params, bias), getSteps(q), validateStep(q, step, answer) }
 * Motor tiplerin içini bilmez — Open/Closed. */
(function (B) {
  const types = new Map();
  const views = new Map(); // tip adı -> görünüm oluşturucu (container, q, opts) => ctl

  B.Question = {
    registerType(name, impl) {
      ['generate', 'getSteps', 'validateStep'].forEach(k => {
        if (typeof impl[k] !== 'function') throw new Error('Soru tipi eksik metod: ' + name + '.' + k);
      });
      types.set(name, impl);
    },

    registerView(name, createFn) { views.set(name, createFn); },
    view(name) {
      const v = views.get(name);
      if (!v) throw new Error('Kayıtsız soru görünümü: ' + name);
      return v;
    },

    type(name) {
      const t = types.get(name);
      if (!t) throw new Error('Kayıtsız soru tipi: ' + name);
      return t;
    },

    /* Üret: adaptif zorluk çarpanı ProgressManager'dan alınır */
    generate(typeName, params, skills) {
      const bias = skills ? B.Progress.difficultyBias(skills) : 0.5;
      const q = B.Question.type(typeName).generate(params || {}, bias);
      q._type = typeName;
      return q;
    },

    steps(q) { return B.Question.type(q._type).getSteps(q); },
    validate(q, step, answer) { return B.Question.type(q._type).validateStep(q, step, answer); },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/engines/lesson-engine.js === */
/* BOKUL — LessonEngine
 * Ders paketini (cephe) yorumlar: ünite → bölüm → harekât → boss akışı,
 * kilit kuralları ve ustalık kapısı. İçeriğin ANLAMINI bilmez. */
(function (B) {
  let lesson = null;       // aktif ders paketi
  const registry = [];     // yüklü tüm dersler (cepheler)

  function cfg() { return B.Content.get('config') || {}; }

  B.Lesson = {
    register(lessonData) { if (lessonData) registry.push(lessonData); },
    all() { return registry; },
    setActive(lessonData) { lesson = lessonData; },
    active() { return lesson; },

    /* İlgi-alanı kapısı: interestKey'i olan ders, yalnız çocuk o ilgi alanını
     * seçtiyse görünür (varsayılan gizli — kişiselleştirilmiş içerik). */
    interestOk(l) {
      if (!l || !l.interestKey) return true;
      const prof = (B.State.data.player && B.State.data.player.profile) || {};
      const v = prof[l.interestKey];
      return Array.isArray(v) ? v.length > 0 : !!v;
    },
    /* Bu oyuncuya görünecek dersler (ilgi-alanı süzgeçli) */
    forPlayer() { return registry.filter(l => B.Lesson.interestOk(l)); },

    sections() {
      const out = [];
      lesson.units.forEach(u => u.sections.forEach(s => out.push({ unit: u, section: s })));
      return out;
    },

    findSection(sectionId) {
      return B.Lesson.sections().find(x => x.section.id === sectionId) || null;
    },

    findMission(sectionId, missionId) {
      const s = B.Lesson.findSection(sectionId);
      return s ? s.section.missions.find(m => m.id === missionId) : null;
    },

    /* Üretici çözümleme: { pool: "sX" } gibi bölüm referanslarını
     * o bölümün soru bankasına çevirir (çoktan seçmeli dersler için). */
    resolveGenerator(sectionId, gen) {
      if (!gen || typeof gen.pool !== 'string') return gen;
      const ref = B.Lesson.findSection(gen.pool) || B.Lesson.findSection(sectionId);
      return { pool: (ref && ref.section.bank) || [] };
    },

    /* ---- Kilit kuralları ---- */

    /* Bölüm çocuğun sınıf seviyesine uygun mu? (değilse haritada "X. sınıfta açılır") */
    gradeLocked(sectionId) {
      const f = B.Lesson.findSection(sectionId);
      return !!(f && B.Curriculum && !B.Curriculum.gradeOk(f.section));
    },

    /* Bölüm açık mı? Sınıf uygun + önceki bölüm tamamlanmış olmalı */
    isSectionUnlocked(sectionId) {
      if (B.Lesson.gradeLocked(sectionId)) return false; // sınıf kilidi
      const list = B.Lesson.sections();
      const idx = list.findIndex(x => x.section.id === sectionId);
      if (B.Demo && B.Demo.isDemo() && idx >= B.Demo.sectionLimit) return false; // demo: 1 ders 1 bölüm
      if (idx <= 0) return true;
      const prev = list[idx - 1].section;
      const need = (list[idx].section.unlock || {}).starsRequired ?? (cfg().sectionUnlockStars || 16);
      const prevProg = B.State.sectionProgress(lesson.id, prev.id);
      return prevProg.bossDefeated && B.State.sectionStars(lesson.id, prev.id) >= need;
    },

    /* Harekât oynanabilir mi? Kendinden önceki harekât tamamlanmış olmalı (tekrar hep serbest) */
    isMissionUnlocked(sectionId, missionId) {
      if (!B.Lesson.isSectionUnlocked(sectionId)) return false;
      const sec = B.Lesson.findSection(sectionId).section;
      const idx = sec.missions.findIndex(m => m.id === missionId);
      if (idx <= 0) return true;
      const prevId = sec.missions[idx - 1].id;
      return !!B.State.sectionProgress(lesson.id, sectionId).missions[prevId];
    },

    /* Bölümün KENDİ becerileri: açıkça tanımlı (section.skills) → banka soru
     * becerileri → son çare dersin tüm becerileri. Boss kapısı bunu kullanır ki
     * bir bölümün boss'u, henüz kilitli sonraki bölümlerin becerilerini İSTEMESİN
     * (yoksa ilk boss asla açılmaz — kilitlenme). */
    sectionSkills(section) {
      if (section.skills && section.skills.length) return section.skills;
      if (section.bank && section.bank.length) {
        const set = [];
        section.bank.forEach(b => { if (b.skill && set.indexOf(b.skill) < 0) set.push(b.skill); });
        if (set.length) return set;
      }
      return lesson.skills || [];
    },

    /* Boss kapısı: tüm harekâtlar bitmiş VE (bölüm ustalığı yeterli VEYA
     * bölümü iyi yıldızla bitirmiş). Yıldız tabanlı geçiş, küçük banka +
     * güven katsayısı yüzünden oluşan kilitlenmeleri önler. */
    bossGate(sectionId) {
      const sec = B.Lesson.findSection(sectionId).section;
      const prog = B.State.sectionProgress(lesson.id, sectionId);
      const missionsDone = sec.missions.every(m => prog.missions[m.id]);
      const need = (sec.boss.unlock || {}).masteryRequired ?? (cfg().mastery || {}).bossGate ?? 0.8;
      const mastery = B.Progress.overallMastery(B.Lesson.sectionSkills(sec));
      // Yıldız oranı: teach hariç harekâtların topladığı yıldız / olası en yüksek
      const graded = sec.missions.filter(m => m.type !== 'teach');
      const earned = graded.reduce((t, m) => t + ((prog.missions[m.id] || {}).stars || 0), 0);
      const maxStars = graded.length * 3;
      const starRatio = maxStars ? earned / maxStars : 1;
      const open = missionsDone && (mastery >= need || starRatio >= 0.6);
      return { missionsDone, mastery, need, starRatio, open };
    },

    /* ---- Tamamlama kayıtları ---- */

    completeMission(sectionId, missionId, stars) {
      const prog = B.State.sectionProgress(lesson.id, sectionId);
      const prev = prog.missions[missionId];
      // Yıldız sadece yükselir, asla düşmez (tekrar oynama tamamlamacılığı besler)
      prog.missions[missionId] = { stars: Math.max(stars, prev ? prev.stars : 0) };
    },

    defeatBoss(sectionId) {
      const prog = B.State.sectionProgress(lesson.id, sectionId);
      prog.bossDefeated = true;
      prog.bossHpCarry = 0;
      const list = B.Lesson.sections();
      const idx = list.findIndex(x => x.section.id === sectionId);
      const next = list[idx + 1];
      if (next && B.Lesson.isSectionUnlocked(next.section.id)) {
        B.Bus.emit(B.Events.SECTION_UNLOCKED, { sectionId: next.section.id });
      }
    },

    /* Review harekâtı için: bu bölüme kadarki AYNI soru tipindeki üreticiler.
     * (Aritmetik ile uzun bölme karışmasın.) */
    reviewGenerators(sectionId) {
      const list = B.Lesson.sections();
      const idx = list.findIndex(x => x.section.id === sectionId);
      const curSec = idx >= 0 ? list[idx].section : null;
      const typeOf = sec => sec.interactionType || (lesson || {}).interactionType;
      const curType = curSec ? typeOf(curSec) : null;
      const gens = [];
      list.slice(0, idx + 1).forEach(x => {
        if (typeOf(x.section) !== curType) return; // yalnızca aynı tip
        x.section.missions.forEach(m => {
          if (m.generator && (m.type === 'practice' || m.type === 'guided')) {
            gens.push(B.Lesson.resolveGenerator(x.section.id, m.generator));
          }
        });
      });
      if (gens.length) return gens;
      // Yedek: tipe uygun basit varsayılan
      return [curType === 'arithmetic' ? { op: '+', a: [1, 10], b: [1, 10] } : { divisorRange: [2, 5], dividendDigits: 1 }];
    },

    /* Harekâtın ipucu anahtarını getir: hints[stepType][hataSeviyesi] → rastgele anahtar */
    hintKey(stepType, level) {
      const h = (lesson.hints || {})[stepType];
      if (!h) return null;
      const lv = Math.min(level, 3);
      const keys = h[String(lv)] || h['1'] || [];
      return keys[Math.floor(Math.random() * keys.length)] || null;
    },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/engines/chest-engine.js === */
/* BOKUL — Sandık Motoru (v0.31: 4 KATEGORİ)
 * 4 kategori, her biri FARKLI ödül tablosu:
 *   💰 altin   → bol altın
 *   👕 kiyafet → garanti kozmetik (kıyafet/saç/aksesuar)
 *   📦 esya    → craft/pet malzemeleri (eşya sistemine bağlı)
 *   💎 nadir   → yüksek nadirlikli kozmetik + büyük altın
 * Kazanma tetikleri olaylardan; içerik rewards.json.chestCats'ten. */
(function (B) {
  // Eski tip adlarını yeni kategorilere eşle (geriye dönük uyum)
  const ALIAS = { bronze: 'altin', silver: 'esya', gold: 'kiyafet', epic: 'esya', legendary: 'nadir' };
  function norm(t) { return ALIAS[t] || t; }

  function R() { return B.Content.get('rewards'); }
  function cats() { return R().chestCats || {}; }
  function tiers() { return R().chestTiers || [{ min: 1, name: '', frame: '#FFD52E', coinMult: 1, itemBonus: 0, rarityBoost: 0 }]; }
  // Sandık girişini normalize et: eski kayıtlar string, yenileri { type, tier }
  function entryOf(e) { return (typeof e === 'string') ? { type: norm(e), tier: 0 } : { type: norm(e && e.type), tier: (e && e.tier) || 0 }; }
  function meta(x) { const t = (typeof x === 'string') ? norm(x) : norm(x && x.type); return cats()[t] || { name: 'Sandık', icon: '🎁', color: '#FFD52E' }; }
  function tierMeta(x) { const tier = (x && typeof x === 'object') ? (x.tier || 0) : 0; return tiers()[tier] || tiers()[0]; }
  // Oyuncunun seviyesine göre sandık kademesi (aşama ilerledikçe daha iyi sandık)
  function tierIdx() {
    const lvl = (B.State.data.player && B.State.data.player.level) || 1;
    let idx = 0; tiers().forEach((t, i) => { if (lvl >= (t.min || 1)) idx = i; });
    return idx;
  }
  // Nadirlik dağılımını yükselt (üst kademede daha iyi kozmetik şansı)
  function boostDist(dist, boost) {
    if (!boost) return dist;
    const d = Object.assign({}, dist);
    let take = Math.min(d.common || 0, boost);
    if (take > 0) { d.common -= take; }
    else { take = Math.min(d.rare || 0, boost); d.rare = (d.rare || 0) - take; }
    if (take > 0) { d.epic = (d.epic || 0) + take * 0.7; d.legendary = (d.legendary || 0) + take * 0.3; }
    return d;
  }
  function ri(range) { const a = range[0], b = range[1]; return a + Math.floor(Math.random() * (b - a + 1)); }

  function inv() {
    const i = B.State.data.inventory;
    if (!i.chests) i.chests = [];
    if (i.starBank == null) i.starBank = 0;
    return i;
  }

  /* Nadirlik dağılımından açılmamış bir kozmetik çek (yoksa alta düş).
   * Kaynak: B.Avatar.cosmeticCatalog() — kilitli GİYİLEBİLİR parçalar (görünüm hariç,
   * çünkü saç/göz rengi vb. artık ücretsiz). Cinsiyete uygun olanlardan seçilir. */
  function rollCosmetic(dist) {
    let r = Math.random() * 100, rarity = null;
    for (const k of Object.keys(dist)) { r -= dist[k]; if (r <= 0) { rarity = k; break; } }
    if (!rarity) rarity = Object.keys(dist)[0];
    const order = ['legendary', 'epic', 'rare', 'common'];
    const owned = B.State.data.inventory.cosmetics;
    const gender = (B.State.data.player.avatar || {}).gender;
    const cat = (B.Avatar && B.Avatar.cosmeticCatalog) ? B.Avatar.cosmeticCatalog() : [];
    let idx = order.indexOf(rarity); if (idx < 0) idx = order.length - 1;
    for (let i = idx; i < order.length; i++) {
      const pool = cat.filter(c => c.rarity === order[i] && !owned.includes(c.id) && B.Avatar.genderOk(c.part, gender));
      if (pool.length) { const p = pool[Math.floor(Math.random() * pool.length)]; return { id: p.id, type: p.type, rarity: p.rarity, name: p.name }; }
    }
    return null; // her şey açık
  }

  /* Eşya havuzundan rastgele adetli eşyalar */
  function rollItems(cfg) {
    const pool = (cfg.pool || []).slice();
    const n = Math.min(pool.length, ri(cfg.count || [1, 2]));
    const out = [];
    for (let i = 0; i < n && pool.length; i++) {
      const pick = pool.splice(Math.floor(Math.random() * pool.length), 1)[0];
      const qty = ri(pick.n || [1, 1]);
      const it = B.Items ? B.Items.get(pick.id) : null;
      out.push({ id: pick.id, n: qty, name: it ? it.name : pick.id, icon: it ? it.icon : '📦' });
    }
    return out;
  }

  B.Chest = {
    meta, tierMeta,
    queue() { return inv().chests; },

    earn(type) {
      if (B.Demo && B.Demo.isDemo()) return; // demo: sandık kazanılamaz
      type = norm(type);
      const tier = tierIdx();
      inv().chests.push({ type: type, tier: tier });
      const m = meta(type), tm = tiers()[tier] || {};
      B.Bus.emit(B.Events.CHEST_EARNED, { chestType: type, tier: tier });
      B.UI.toast((tm.name ? tm.name + ' ' : '') + m.icon + ' ' + m.name + ' kazandın!');
      B.Save.saveSoon();
    },

    /* Kategoriye + kademeye göre ödül üret (üst kademe = daha çok altın/eşya/nadirlik) */
    roll(type, tier) {
      const t = tiers()[tier || 0] || tiers()[0] || { coinMult: 1, itemBonus: 0, rarityBoost: 0 };
      const cfg = cats()[norm(type)] || {};
      const out = { coins: Math.round(ri(cfg.coins || [20, 40]) * (t.coinMult || 1)), tier: tier || 0 };
      if (cfg.cosmetic) {
        const item = rollCosmetic(boostDist(cfg.cosmetic, t.rarityBoost || 0));
        if (item) out.item = item; else out.xpPack = 50 + (tier || 0) * 30; // her şey açıksa teselli (kademeyle artar)
      } else if (cfg.items) {
        const c = cfg.items.count || [1, 2];
        const boosted = Object.assign({}, cfg.items, { count: [c[0], (c[1] || c[0]) + (t.itemBonus || 0)] });
        out.items = rollItems(boosted);
      }
      return out;
    },

    /* Kuyruktaki ilk sandığı aç (tören ChestUI'da) */
    openNext() {
      const q = inv().chests;
      if (!q.length) return null;
      const e = entryOf(q.shift());
      const type = e.type, tier = e.tier;
      const result = B.Chest.roll(type, tier);
      B.Reward.addCoins(result.coins, 'chest');
      if (result.item) {
        B.State.data.inventory.cosmetics.push(result.item.id);
        B.Bus.emit(B.Events.COSMETIC_UNLOCKED, { itemId: result.item.id });
      }
      if (result.items) result.items.forEach(it => { if (B.Items) B.Items.add(it.id, it.n); });
      if (result.xpPack) B.Reward.addXp(result.xpPack, 'chest');
      B.Bus.emit(B.Events.CHEST_OPENED, { chestType: type, tier: tier, item: result.item || null });
      B.Save.saveSoon();
      return { type, tier, tierMeta: tierMeta({ tier: tier }), result };
    },

    init() {
      // 💰 Altın: toplanan her N yıldız
      B.Bus.on(B.Events.QUESTION_COMPLETED, p => {
        const i = inv();
        i.starBank += p.stars;
        const every = R().chestStarEvery || 10;
        while (i.starBank >= every) { i.starBank -= every; B.Chest.earn('altin'); }
      });
      // 👕 Kıyafet: level atlama (yeni görünüm ödülü)
      B.Bus.on(B.Events.LEVEL_UP, () => B.Chest.earn('kiyafet'));
      // 📦 Eşya (konu boss'u) / 💎 Nadir (ünite boss'u)
      B.Bus.on(B.Events.BOSS_DEFEATED, p => B.Chest.earn(p.tier === 'unit' ? 'nadir' : 'esya'));
    },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/engines/quest-engine.js === */
/* BOKUL — Quest Engine (Günün Emirleri)
 * Her gün 3 günlük görev üretir; ilerlemeyi olaylardan takip eder.
 * Görev bitince "TOPLA" ile ödül alınır; hepsi toplanınca Gümüş sandık gelir. */
(function (B) {
  function today() { return new Date().toISOString().slice(0, 10); }
  function Q() { return B.Content.get('quests') || { daily: [] }; }
  function rnd(a, b) { return a + Math.floor(Math.random() * (b - a + 1)); }

  /* Yeni günse 3 günlük görev seç ve sıfırla */
  function ensureDaily() {
    const st = B.State.data.quests;
    if (st.lastDailyReset === today() && st.daily && st.daily.length) return;
    const tpls = (Q().daily || []).slice();
    const picked = [];
    for (let i = 0; i < 3 && tpls.length; i++) {
      const t = tpls.splice(Math.floor(Math.random() * tpls.length), 1)[0];
      const target = t.n ? rnd(t.n[0], t.n[1]) : 1;
      picked.push({
        tpl: t.id, text: t.text.replace('{n}', target),
        target, progress: 0, done: false, claimed: false,
        xp: t.xp, coins: t.coins, track: t.track, filter: t.filter || null,
      });
    }
    st.daily = picked;
    st.lastDailyReset = today();
    B.Save.saveSoon();
  }

  function matches(q, event, payload) {
    if (q.track !== event) return false;
    if (q.filter) for (const k in q.filter) if (payload[k] !== q.filter[k]) return false;
    return true;
  }

  function bump(event, payload) {
    const st = B.State.data.quests;
    if (!st.daily) return;
    let changed = false;
    st.daily.forEach(q => {
      if (q.done || !matches(q, event, payload)) return;
      q.progress = Math.min(q.target, q.progress + 1);
      if (q.progress >= q.target) q.done = true;
      changed = true;
    });
    if (changed) { B.Bus.emit(B.Events.QUEST_PROGRESS, {}); B.Save.saveSoon(); }
  }

  B.Quest = {
    ensureDaily,
    daily() { ensureDaily(); return B.State.data.quests.daily; },
    /* Toplanmayı bekleyen (bitmiş ama ödülü alınmamış) görev sayısı */
    pending() { ensureDaily(); return B.State.data.quests.daily.filter(q => q.done && !q.claimed).length; },

    claim(q) {
      if (!q.done || q.claimed) return null;
      q.claimed = true;
      B.Reward.addXp(q.xp || 50, 'quest');
      B.Reward.addCoins(q.coins || 20, 'quest');
      B.Bus.emit(B.Events.QUEST_COMPLETED, {});
      // Tüm günlük görevler toplandıysa Gümüş sandık ödülü
      if (B.State.data.quests.daily.every(x => x.claimed)) B.Chest.earn('silver');
      B.Save.saveSoon();
      return { xp: q.xp, coins: q.coins };
    },

    init() {
      const E = B.Events;
      B.Bus.on(E.QUESTION_COMPLETED, p => bump('question:completed', p));
      B.Bus.on(E.MISSION_COMPLETED, p => bump('mission:completed', p));
      B.Bus.on(E.BOSS_DEFEATED, p => bump('boss:defeated', p));
      B.Bus.on(E.STEP_ANSWERED, p => bump('step:answered', p));
    },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/engines/wish-engine.js === */
/* BOKUL — Wish Engine (Dilek Kutusu + Ebeveyn Hedefleri)
 * Çocuk gerçek hayattan bir ödül ister (oyuncak vb.) veya oyuna fikir verir.
 * Ebeveyn konsolu bir isteğe oyun-içi HEDEF bağlar (ör. 30 hedef tamamla).
 * Çocuk hedefe ulaşınca istek "hak edildi" olur; ebeveyn gerçek ödülü verir.
 * Metrik hesapları hem aktif oyuncu hem admin (diğer kayıtlar) için ortaktır. */
(function (B) {

  /* Ebeveyn tarafından atanabilen, oyun-içi ölçülebilir hedefler */
  const METRICS = {
    targets: { name: 'Hedef tamamla', icon: '🎯' },
    level:   { name: 'Seviyeye ulaş', icon: '⭐' },
    stars:   { name: 'Yıldız topla',  icon: '🌟' },
    bosses:  { name: 'Boss yen',      icon: '🏰' },
  };

  function sumStars(save) {
    let s = 0;
    const L = (save.progress && save.progress.lessons) || {};
    Object.values(L).forEach(les => Object.values(les.sections || {}).forEach(sec =>
      Object.values(sec.missions || {}).forEach(m => { s += m.stars || 0; })));
    return s;
  }
  function countBosses(save) {
    let n = 0;
    const L = (save.progress && save.progress.lessons) || {};
    Object.values(L).forEach(les => Object.values(les.sections || {}).forEach(sec => { if (sec.bossDefeated) n++; }));
    return n;
  }

  function newId() { return 'w' + Date.now().toString(36) + Math.floor(Math.random() * 1000); }

  B.Wish = {
    METRICS,

    /* Bir kayıt (save-like) için metrik değeri */
    value(save, metric) {
      switch (metric) {
        case 'level':   return save.player.level || 1;
        case 'targets': return (save.stats && save.stats.questionsDone) || 0;
        case 'stars':   return sumStars(save);
        case 'bosses':  return countBosses(save);
        default:        return 0;
      }
    },

    /* Hedefli bir isteğin ilerlemesi */
    progress(save, wish) {
      if (!wish.goal) return null;
      const cur = B.Wish.value(save, wish.goal.metric);
      const target = wish.goal.target || 1;
      return { cur, target, pct: Math.min(100, Math.round(cur / target * 100)), done: cur >= target };
    },

    /* ---- Aktif oyuncu (çocuk) tarafı ---- */
    addWish(text) {
      text = String(text || '').trim();
      if (!text) return;
      B.State.data.wishes.push({ id: newId(), text, created: new Date().toISOString(), status: 'pending', goal: null, note: '' });
      B.Save.saveSoon();
    },
    /* Oyun fikri: çocuğun kendi listesine eklenir + GELİŞTİRİCİYE gönderilir (ebeveyne DEĞİL).
     * Döner: Promise<{ok, sent}> — sent=true ise bulut geliştirici kutusuna ulaştı. */
    addIdea(text) {
      text = String(text || '').trim();
      if (!text) return Promise.resolve({ ok: false });
      const rec = { id: newId(), text, created: new Date().toISOString(), status: 'sent', note: '' };
      B.State.data.ideas.push(rec);
      B.Save.saveSoon();
      // Geliştirici kutusuna gönder (merkezi Firestore koleksiyonu)
      if (B.Cloud && B.Cloud.sendDevIdea) {
        const player = (B.State.data.player && B.State.data.player.name) || '';
        const version = B.VERSION || '';
        return B.Cloud.sendDevIdea({ text: text, player: player, version: version })
          .then(r => { rec.status = r && r.ok ? 'delivered' : 'queued'; B.Save.saveSoon(); return { ok: true, sent: !!(r && r.ok) }; })
          .catch(() => ({ ok: true, sent: false }));
      }
      return Promise.resolve({ ok: true, sent: false });
    },
    myWishes() { return B.State.data.wishes || []; },
    myIdeas() { return B.State.data.ideas || []; },

    /* Atanmış hedefler tamamlandı mı? Tamamlandıysa "hak edildi" yap + müjde */
    checkEarned() {
      let changed = false;
      (B.State.data.wishes || []).forEach(w => {
        if (w.goal && w.status === 'assigned') {
          if (B.Wish.value(B.State.data, w.goal.metric) >= w.goal.target) {
            w.status = 'earned';
            changed = true;
            B.UI.toast('🎉 "' + w.text + '" ödülünü hak ettin! Baba\'na göster.');
            B.Bus.emit(B.Events.WISH_EARNED, {});
          }
        }
      });
      if (changed) B.Save.saveSoon();
    },

    init() {
      const E = B.Events;
      B.Bus.on(E.QUESTION_COMPLETED, p => {
        const st = B.State.data.stats;
        st.questionsDone = (st.questionsDone || 0) + 1;
        if (p && p.firstTry) st.firstTryCorrect = (st.firstTryCorrect || 0) + 1;
        if (p && typeof p.ms === 'number') st.timeSumMs = (st.timeSumMs || 0) + p.ms;
        B.Wish.checkEarned();
      });
      B.Bus.on(E.LEVEL_UP, () => B.Wish.checkEarned());
      B.Bus.on(E.BOSS_DEFEATED, () => B.Wish.checkEarned());
    },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/interactions/long-division/logic.js === */
/* BOKUL — Uzun Bölme Mantığı (saf — DOM YOK, test edilebilir)
 * Bir bölme işlemini 5 tip mikro-adıma çözümler:
 *   select   → ilk çalışma sayısı için kaç basamak alınacağı
 *   estimate → bölüm rakamı tahmini
 *   multiply → tahmin × bölen
 *   subtract → fark (kale kuralı: fark < bölen)
 *   bringdown→ sonraki basamağı indir
 * computePlan() tüm adım listesini ve beklenen cevapları üretir. */
(function (B) {

  /* İşlem planını çıkar: her adım { type, expected, ... } */
  function computePlan(dividend, divisor) {
    const digits = String(dividend).split('').map(Number);
    const steps = [];

    // İlk çalışma sayısı: bölenden küçük olmayan en kısa önek
    let idx = 0, current = 0;
    do { current = current * 10 + digits[idx]; idx++; }
    while (current < divisor && idx < digits.length);
    steps.push({ type: 'select', expected: idx });

    const qDigits = [];
    // İterasyon bilgileri görünüm katmanı için saklanır (kolon hizalama)
    while (true) {
      const q = Math.floor(current / divisor);
      qDigits.push(q);
      const endCol = idx - 1; // çalışma sayısının son basamağının kolonu
      steps.push({ type: 'estimate', expected: q, endCol });
      const p = q * divisor;
      steps.push({ type: 'multiply', expected: p, endCol, working: current });
      const r = current - p;
      steps.push({ type: 'subtract', expected: r, endCol, working: current, product: p });
      if (idx < digits.length) {
        steps.push({ type: 'bringdown', expected: digits[idx], digitIndex: idx, endCol });
        current = r * 10 + digits[idx];
        idx++;
      } else {
        return {
          dividend, divisor, steps,
          quotient: Number(qDigits.join('')),
          remainder: r,
        };
      }
    }
  }

  /* Rastgele soru üretici.
   * params: { divisorRange:[a,b], dividendDigits:n|[min,max], remainder:bool, context? }
   * bias 0..1: adaptif zorluk — 0 kolay uç, 1 zor uç */
  function generate(params, bias) {
    const rnd = (a, b) => a + Math.floor(Math.random() * (b - a + 1));
    const dr = params.divisorRange || [2, 9];
    // bias yüksekse bölen aralığın üst ucuna kayar
    const divisor = rnd(dr[0], Math.max(dr[0], Math.round(dr[0] + (dr[1] - dr[0]) * (0.4 + 0.6 * bias))));

    let dd = params.dividendDigits || 2;
    if (Array.isArray(dd)) dd = rnd(dd[0], Math.max(dd[0], Math.round(dd[0] + (dd[1] - dd[0]) * bias)));

    let dividend;
    if (params.remainder) {
      // Kalanlı: uygun basamakta, tam bölünmeyen sayı bul
      let guard = 200;
      do {
        dividend = rnd(Math.pow(10, dd - 1), Math.pow(10, dd) - 1);
      } while ((dividend % divisor === 0 || dividend < divisor) && --guard);
    } else {
      // Kalansız: bölümü kur, çarparak bölüneni üret (basamak sayısı tutana dek)
      let guard = 200;
      do {
        const qMin = Math.ceil(Math.pow(10, dd - 1) / divisor);
        const qMax = Math.floor((Math.pow(10, dd) - 1) / divisor);
        const q = rnd(Math.max(1, qMin), Math.max(1, qMax));
        dividend = q * divisor;
      } while ((String(dividend).length !== dd || dividend < divisor) && --guard);
    }

    const plan = computePlan(dividend, divisor);
    return { dividend, divisor, plan, params };
  }

  const impl = {
    generate,
    getSteps(q) { return q.plan.steps; },
    validateStep(q, step, answer) {
      const val = Number(answer);
      if (step.type === 'select') return { correct: val === step.expected };
      return { correct: val === step.expected };
    },
  };

  // Tarayıcıda plugin olarak kaydol; Node'da (test) modül olarak dışa aç
  if (B && B.Question) B.Question.registerType('long-division', impl);
  if (B) B.LongDivision = { computePlan, generate, impl };
  if (typeof module !== 'undefined' && module.exports) {
    module.exports = { computePlan, generate, impl };
  }
})(typeof window !== 'undefined' ? (window.BOKUL = window.BOKUL || {}) : null);

/* === src/interactions/long-division/teach-models.js === */
/* BOKUL — Öğretim Modelleri (CPA: Somut → Görsel → Soyut)
 * teach harekâtlarının senaryo oynatıcısı. Senaryo adımları ders paketindeki
 * teachScripts'ten gelir; buradaki motor sadece oynatır.
 *
 * Adım türleri:
 *   { say: "..." }                        → Komutan konuşur, DEVAM ile geçilir
 *   { deal: { total, groups } }           → somut: kutuları takımlara paylaştır
 *   { pv:   { number, divisor } }         → görsel: basamak (onluk/birlik) tablosu
 *   { ask:  "...", expect: n }            → mini soru (küçük ped ile)
 *   { guided: { dividend, divisor } }     → soyut: koçlu ilk uzun bölme
 */
(function (B) {

  function el(tag, cls, text) {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    if (text != null) e.textContent = text;
    return e;
  }

  function run(container, scriptSteps, api) {
    let i = -1;
    let cleanup = null;

    function next() {
      if (cleanup) { cleanup(); cleanup = null; }
      i++;
      const s = scriptSteps[i];
      if (!s) return api.onComplete();
      container.innerHTML = '';

      if (s.say) return doSay(s);
      if (s.objects) return doObjects(s.objects);
      if (s.groups) return doGroups(s.groups);
      if (s.deal) return doDeal(s.deal);
      if (s.pv) return doPv(s.pv);
      if (s.ask) return doAsk(s);
      if (s.guided) return doGuided(s.guided);
      next(); // bilinmeyen adım atlanır
    }

    /* --- GÖRSEL: nesnelerle toplama/çıkarma --- */
    function doObjects(cfg) {
      // cfg: { a, b, emoji, op:'+'|'-' }  → a nesne (op) b nesne = ?
      const em = cfg.emoji || '🍎';
      const stage = el('div', 'teach-stage');
      const row = el('div', 'obj-row');
      const g1 = el('div', 'obj-group');
      for (let k = 0; k < cfg.a; k++) g1.appendChild(el('span', 'obj', em));
      const opEl = el('div', 'obj-op', cfg.op === '-' ? '−' : '+');
      const g2 = el('div', 'obj-group' + (cfg.op === '-' ? ' obj-gone' : ''));
      for (let k = 0; k < cfg.b; k++) g2.appendChild(el('span', 'obj', em));
      const eq = el('div', 'obj-op', '=');
      const res = el('div', 'obj-res', '?');
      row.appendChild(g1); row.appendChild(opEl); row.appendChild(g2); row.appendChild(eq); row.appendChild(res);
      stage.appendChild(row);
      const total = cfg.op === '-' ? (cfg.a - cfg.b) : (cfg.a + cfg.b);
      const reveal = el('button', 'btn btn-action teach-next', 'CEVABI GÖSTER 👀');
      reveal.onclick = () => {
        res.textContent = total; res.classList.add('obj-lit');
        B.Audio.play('correct');
        reveal.textContent = 'DEVAM ▶';
        reveal.onclick = () => { B.Audio.play('tick'); next(); };
      };
      container.appendChild(stage);
      container.appendChild(reveal);
    }

    /* --- GÖRSEL: gruplarla çarpma --- */
    function doGroups(cfg) {
      // cfg: { n, per, emoji }  → n grup × per nesne
      const em = cfg.emoji || '⭐';
      const stage = el('div', 'teach-stage');
      stage.appendChild(el('div', 'grp-title', cfg.n + ' grup × ' + cfg.per + ' tane'));
      const wrap = el('div', 'grp-wrap');
      for (let g = 0; g < cfg.n; g++) {
        const box = el('div', 'grp-box');
        for (let k = 0; k < cfg.per; k++) box.appendChild(el('span', 'obj', em));
        wrap.appendChild(box);
      }
      stage.appendChild(wrap);
      const res = el('div', 'obj-res', cfg.n + ' × ' + cfg.per + ' = ?');
      stage.appendChild(res);
      const reveal = el('button', 'btn btn-action teach-next', 'CEVABI GÖSTER 👀');
      reveal.onclick = () => {
        res.textContent = cfg.n + ' × ' + cfg.per + ' = ' + (cfg.n * cfg.per); res.classList.add('obj-lit');
        B.Audio.play('correct');
        reveal.textContent = 'DEVAM ▶';
        reveal.onclick = () => { B.Audio.play('tick'); next(); };
      };
      container.appendChild(stage);
      container.appendChild(reveal);
    }

    /* --- Komutan anlatımı --- */
    function doSay(s) {
      api.say(s.say);
      const btn = el('button', 'btn btn-action teach-next', 'DEVAM ▶');
      btn.onclick = () => { B.Audio.play('tick'); next(); };
      container.appendChild(el('div', 'teach-stage teach-say', '🫡'));
      container.appendChild(btn);
    }

    /* --- SOMUT: kutu paylaştırma ---
     * Kural: bir takıma, en az kutusu olan takımdan fazlası verilemez (eşit paylaşım öğretisi) */
    function doDeal(cfg) {
      api.say(B.Dialogue.pick('teach.deal.intro', { total: cfg.total, groups: cfg.groups }) ||

      const stage = el('div', 'teach-stage');
      const supply = el('div', 'deal-supply');
      let left = cfg.total;
      const counts = new Array(cfg.groups).fill(0);
      const supplyLabel = el('div', 'deal-count', '📦 × ' + left);
      supply.appendChild(supplyLabel);
      stage.appendChild(supply);

      const groupsRow = el('div', 'deal-groups');
      const groupEls = [];
      for (let g = 0; g < cfg.groups; g++) {
        const box = el('div', 'deal-group');
        box.appendChild(el('div', 'deal-group-title', 'Takım ' + (g + 1)));
        const crates = el('div', 'deal-crates');
        box.appendChild(crates);
        box.onclick = () => {
          if (!left) return;
          const min = Math.min(...counts);
          if (counts[g] > min) { // eşitlik bozuluyor → nazik uyarı
            B.Audio.play('wrong');
            api.say(B.Dialogue.pick('teach.deal.unfair') || 'Eşit paylaştır Komutan — önce az olan takıma!');
            return;
          }
          counts[g]++; left--;
          B.Audio.play('tick');
          crates.appendChild(el('span', 'deal-crate', '📦'));
          supplyLabel.textContent = '📦 × ' + left;
          if (!left) {
            B.Audio.play('correct');
            api.say(B.Dialogue.pick('teach.deal.done', { each: counts[0] }) ||

    function doPv(cfg) {

      const stage = el('div', 'teach-stage');
      const table = el('div', 'pv-table');
      const colT = el('div', 'pv-col');
      colT.appendChild(el('div', 'pv-title', 'ONLUKLAR'));
      const tRow = el('div', 'pv-blocks');
      for (let i = 0; i < tens; i++) tRow.appendChild(el('span', 'pv-ten', '10'));
      colT.appendChild(tRow);
      const colO = el('div', 'pv-col');
      colO.appendChild(el('div', 'pv-title', 'BİRLİKLER'));
      const oRow = el('div', 'pv-blocks');
      for (let i = 0; i < ones; i++) oRow.appendChild(el('span', 'pv-one', '1'));
      colO.appendChild(oRow);
      table.appendChild(colT); table.appendChild(colO);
      stage.appendChild(el('div', 'pv-number', cfg.number + ' ÷ ' + cfg.divisor));
      stage.appendChild(table);
      container.appendChild(stage);
      const btn = el('button', 'btn btn-action teach-next', 'DEVAM ▶');
      btn.onclick = () => { B.Audio.play('tick'); next(); };
      container.appendChild(btn);

    /* --- Mini soru (küçük ped) --- */
    function doAsk(s) {

      const display = el('div', 'ask-display', '?');

      const pad = el('div', 'numpad numpad-mini');

        const b = el('button', 'key', k);
        b.onclick = () => { B.Audio.play('tick'); if (buf.length < 4) { buf += k; display.textContent = buf; } };
        pad.appendChild(b);

      back.onclick = () => { buf = buf.slice(0, -1); display.textContent = buf || '?'; };
      const ok = el('button', 'key key-go', '✔');
      ok.onclick = () => {

        if (Number(buf) === s.expect) {
          B.Audio.play('correct');
          api.say(B.Dialogue.pick('correct'));
          setTimeout(next, 1100);
        } else {
          B.Audio.play('wrong');
          buf = ''; display.textContent = '?';
          api.say(B.Dialogue.pick('wrong.soft'));
        }
      };
      pad.appendChild(back); pad.appendChild(ok);
      stage.appendChild(pad);

    }

    /* --- SOYUT: koçlu ilk uzun bölme --- */
    function doGuided(cfg) {

/* BOKUL — Uzun Bölme Tahtası (görünüm)
 * Türk okul notasyonu: bölünen solda, dikey çizgi, bölen sağ üstte,
 * bölüm bölenin altında. Adımlar logic.js planından sürülür.
 *
 * API:
 *   const ctl = B.LongDivisionView.create(container, question, {
 *     prefilled: Set<stepType>,      // guided: bu adımları Komutan yapar
 *     coach: bool,                    // teach: her adımda yönerge repliği
 *     problemText: string|null,       // challenge: problem metni
 *     onAnswer(step, correct, attempt),
 *     onComplete({ mistakes }),
 *     say(text),                      // Komutan balonuna yaz
 *   });
 */
(function (B) {

  function el(tag, cls, text) {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    if (text != null) e.textContent = text;
    return e;
  }

  function create(container, q, opts) {
    opts = opts || {};
    const plan = q.plan;
    const D = String(q.dividend).length;
    const steps = plan.steps;

    let stepIdx = 0;
    let attempt = 0;
    let mistakes = 0;
    let buffer = '';
    let selectCount = 0;   // select adımında seçili basamak sayısı
    let destroyed = false;

    /* ---------- DOM iskeleti ---------- */
    container.innerHTML = '';
    const root = el('div', 'ld-root');

    if (opts.problemText) root.appendChild(el('div', 'ld-problem', opts.problemText));

    const boardWrap = el('div', 'ld-board');
    const left = el('div', 'ld-left');           // bölünen + işlem satırları
    const right = el('div', 'ld-right');         // bölen + bölüm

    // Bölünen satırı (tıklanabilir basamaklar)
    const dividendRow = el('div', 'ld-row ld-dividend');
    const digitEls = [];
    dividendRow.appendChild(el('span', 'ld-cell ld-sign', ''));  // kolon 0: işaret kolonu
    String(q.dividend).split('').forEach((d, i) => {
      const c = el('span', 'ld-cell ld-digit', d);
      c.dataset.idx = i;
      digitEls.push(c);
      dividendRow.appendChild(c);
    });
    left.appendChild(dividendRow);

    const workArea = el('div', 'ld-work');        // işlem satırları buraya eklenir
    left.appendChild(workArea);

    // Sağ blok: bölen, çizgi, bölüm
    right.appendChild(el('div', 'ld-divisor', String(q.divisor)));
    right.appendChild(el('div', 'ld-qline'));
    const quotientRow = el('div', 'ld-quotient');
    right.appendChild(quotientRow);

    boardWrap.appendChild(left);
    boardWrap.appendChild(right);
    root.appendChild(boardWrap);

    // Sayı pedi
    const pad = el('div', 'numpad');
    '1234567890'.split('').forEach(k => {
      const b = el('button', 'key', k);
      b.dataset.key = k;
      pad.appendChild(b);
    });
    const back = el('button', 'key key-back', '⌫'); back.dataset.key = 'back';
    const ok = el('button', 'key key-go', '✔ ONAYLA'); ok.dataset.key = 'ok';
    pad.appendChild(back); pad.appendChild(ok);
    root.appendChild(pad);
    container.appendChild(root);

    /* ---------- Yardımcılar ---------- */
    function cellRow(cls) {
      const r = el('div', 'ld-row ' + (cls || ''));
      for (let c = 0; c <= D; c++) r.appendChild(el('span', 'ld-cell'));
      workArea.appendChild(r);
      return r;
    }
    function setCell(row, col, text, cls) {
      const c = row.children[col];
      c.textContent = text;
      if (cls) c.classList.add(cls);
      return c;
    }
    // plan endCol (0 tabanlı basamak indeksi) → görüntü kolonu (+1: işaret kolonu)
    const VC = i => i + 1;

    function say(t) { if (opts.say && t) opts.say(t); }

    /* ---------- Adım durumu ---------- */
    let activeCells = [];   // buffer'ın yazıldığı hücreler (sağdan sola)
    let currentRow = null;  // multiply/subtract için aktif satır
    let remRow = null;      // son kalan satırı (bringdown buraya ekler)

    function clearActive() {
      activeCells.forEach(c => { c.classList.remove('ld-active'); c.textContent = c.dataset.keep || ''; });
      activeCells = [];
    }

    function renderBuffer() {
      // buffer'ı aktif hücrelere sağa dayalı yaz
      const chars = buffer.split('');
      for (let i = 0; i < activeCells.length; i++) {
        const ch = chars[chars.length - activeCells.length + i];
        activeCells[i].textContent = ch || '';
      }
      // taşma: buffer hücre sayısını aşarsa son hücrede birden çok karakter göster
      if (chars.length > activeCells.length && activeCells.length) {
        activeCells[activeCells.length - 1].textContent = chars.slice(chars.length - 1).join('');
      }
    }

    /* Adımı başlat: giriş hücrelerini hazırla + koçluk repliği */
    function beginStep() {
      if (destroyed) return;
      buffer = ''; attempt = 0; selectCount = 0;
      const step = steps[stepIdx];
      if (!step) return finish();

      // Tek basamaklı bölünende SEÇ adımı otomatik: seçilecek tek şey var,
      // çocuğu anlamsız bir dokunuşla oyalama (UX düzeltmesi)
      if (step.type === 'select' && digitEls.length === 1) {
        digitEls[0].classList.add('ld-select');
        setTimeout(() => commitStep(step, true), 400);
        return;
      }

      if (opts.coach) {
        const key = 'teach.coach.' + step.type;
        const line = B.Dialogue.pick(key, { divisor: q.divisor });
        if (line) say(line);
      } else if (step.type === 'select') {
        // SEÇ adımı pedle değil dokunarak oynanır — bunu HER ZAMAN söyle
        say(B.Dialogue.pick('step.select.intro', { divisor: q.divisor }) ||
            'Kaç basamak alacağız? Sayının basamaklarına DOKUN, sonra ONAYLA!');
      }

      // Guided: Komutan bu adımı kendisi yapar
      if (opts.prefilled && opts.prefilled.has(step.type)) {
        setTimeout(() => autoFill(step), 700);
        prepareCells(step, true);

      prepareCells(step, false);
    }

    function prepareCells(step, ghost) {
      clearActive();
      digitEls.forEach(d => d.classList.remove('ld-select', 'ld-pulse'));

      if (step.type === 'select') {
        // Basamaklara dokunarak önek seç
        digitEls.forEach(d => d.classList.add('ld-pulse'));
        pad.classList.add('numpad-dim');
        return;
      }
      pad.classList.remove('numpad-dim');

      if (step.type === 'estimate') {
        const c = el('span', 'ld-cell ld-active', '');
        quotientRow.appendChild(c);
        activeCells = [c];
      }
      else if (step.type === 'multiply') {
        currentRow = cellRow('ld-product');
        const len = String(step.expected).length;
        const end = VC(step.endCol);
        setCell(currentRow, end - len, '−', 'ld-sign-cell'); // eksi işareti
        activeCells = [];
        for (let c = end - len + 1; c <= end; c++) {
          const cell = setCell(currentRow, c, '', null);
          cell.classList.add('ld-active');
          activeCells.push(cell);
        }
      }
      else if (step.type === 'subtract') {
        // ayraç çizgisi
        const sep = cellRow('ld-sep');
        const plen = String(step.product).length;
        const end = VC(step.endCol);
        for (let c = end - plen; c <= end; c++) setCell(sep, c, '─');
        // sonuç satırı
        remRow = cellRow('ld-rem');
        const rlen = String(step.expected).length;
        activeCells = [];
        for (let c = end - rlen + 1; c <= end; c++) {
          const cell = setCell(remRow, c, '');
          cell.classList.add('ld-active');
          activeCells.push(cell);
        }
      }
      else if (step.type === 'bringdown') {
        // İndirilecek basamak yanıp söner; dokunuş ya da ped ile
        const d = digitEls[step.digitIndex];
        d.classList.add('ld-pulse');
        const cell = setCell(remRow, VC(step.digitIndex), '');
        cell.classList.add('ld-active');
        activeCells = [cell];
      }
      if (ghost) activeCells.forEach(c => c.classList.add('ld-ghost'));
    }

    /* Guided otomatik doldurma */
    function autoFill(step) {
      if (destroyed) return;
      if (step.type === 'select') {
        for (let i = 0; i < step.expected; i++) digitEls[i].classList.add('ld-select');
        say(B.Dialogue.pick('teach.autofill.select', { n: step.expected }) || 'Bu kısmı ben aldım Komutan.');
      } else {
        buffer = String(step.expected);
        renderBuffer();
      }
      setTimeout(() => { commitStep(step, true); }, 650);
    }

    /* ---------- Doğrulama ---------- */
    function submit() {
      const step = steps[stepIdx];
      if (!step) return;
      let answer;
      if (step.type === 'select') {
        if (!selectCount) return; // henüz seçim yok
        answer = selectCount;
      } else {
        if (!buffer.length) return;
        answer = buffer;
      }
      attempt++;
      const { correct } = B.Question.validate(q, step, answer);
      if (opts.onAnswer) opts.onAnswer(step, correct, attempt);

      if (correct) { commitStep(step, false); }
      else {
        mistakes++;
        root.classList.remove('ld-shake'); void root.offsetWidth; // animasyonu tazele
        root.classList.add('ld-shake');
        const key = B.Lesson.active() ? B.Lesson.hintKey(step.type, attempt) : null;
        say(key ? B.Dialogue.hint(key, { divisor: q.divisor }) : 'Bir daha dene Komutan!');
        if (step.type === 'select') {
          digitEls.forEach(d => d.classList.remove('ld-select'));
          selectCount = 0;
        } else { buffer = ''; renderBuffer(); }
      }
    }

    /* Doğru adımı tahtaya işle ve sonrakine geç */
    function commitStep(step, wasAuto) {
      clearActiveKeep(step);
      digitEls.forEach(d => d.classList.remove('ld-pulse'));
      stepIdx++;
      setTimeout(beginStep, wasAuto ? 250 : 350);
    }

    function clearActiveKeep(step) {
      // Aktif hücrelere kesin değeri yaz, vurguyu kaldır
      const val = String(step.expected);
      if (step.type === 'select') {
        for (let i = 0; i < step.expected; i++) digitEls[i].classList.add('ld-select');
      } else {
        const chars = val.split('');
        activeCells.forEach((c, i) => {
          c.textContent = chars[i] != null ? chars[i] : '';
          c.classList.remove('ld-active', 'ld-ghost');
          c.classList.add('ld-done');
        });
      }
      activeCells = [];
    }

    function finish() {
      if (opts.onComplete) opts.onComplete({ mistakes });
    }

    /* ---------- Girdi bağlama ---------- */
    function onPad(e) {
      const b = e.target.closest('.key');
      if (!b) return;
      B.Audio.play('tick');
      const k = b.dataset.key;
      const step = steps[stepIdx];
      if (!step) return;

      if (k === 'ok') return submit();
      if (step.type === 'select') return; // seçim dokunuşla yapılır
      if (k === 'back') { buffer = buffer.slice(0, -1); renderBuffer(); return; }
      if (buffer.length < 6) { buffer += k; renderBuffer(); }
    }

    function onDigitTap(e) {
      const d = e.target.closest('.ld-digit');
      if (!d) return;
      const step = steps[stepIdx];
      if (!step) return;
      const idx = Number(d.dataset.idx);
      if (step.type === 'select') {
        B.Audio.play('tick');
        selectCount = idx + 1;
        digitEls.forEach((x, i) => x.classList.toggle('ld-select', i <= idx));
      } else if (step.type === 'bringdown') {
        B.Audio.play('tick');
        buffer = d.textContent; // dokunulan basamak cevaptır (yanlışsa yanlış sayılır)
        renderBuffer();
        submit();
      }
    }

    pad.addEventListener('click', onPad);
    dividendRow.addEventListener('click', onDigitTap);

    beginStep();

    return {
      destroy() { destroyed = true; container.innerHTML = ''; },
    };
  }

  B.LongDivisionView = { create };
  B.Question.registerView('long-division', create);
})(window.BOKUL = window.BOKUL || {});

/* === src/interactions/multiple-choice/logic.js === */
/* BOKUL — Çoktan Seçmeli Soru Tipi (mantık — DOM YOK)
 * Soru bankası tabanlı dersler için (Yapay Zekâ, Kişisel Bakım, Felsefe...).
 * Bank öğesi: { q, options: [...], correct: <doğru seçeneğin indeksi>,
 *               skill: "beceri-adı", hint: "yanlışta gösterilecek ipucu" } */
(function (B) {

  /* params: { pool: [bankItem...] } — havuzdan rastgele soru seçer.
   * Aynı sorunun art arda gelmemesi için son seçilenler hatırlanır. */
  const recent = [];
  function generate(params) {
    const pool = params.pool || [];
    if (!pool.length) throw new Error('Çoktan seçmeli havuz boş!');
    let item, guard = 40;
    do { item = pool[Math.floor(Math.random() * pool.length)]; }
    while (recent.includes(item.q) && --guard);
    recent.push(item.q);
    // Havuzun neredeyse tamamı dönmeden aynı soru tekrar gelmesin (tazelik hissi)
    const cap = Math.max(1, Math.min(pool.length - 1, 14));
    while (recent.length > cap) recent.shift();
    return { item, params };
  }

  const impl = {
    generate,
    /* Tek mikro-adım: cevap seçimi. skill, ustalık takibine gider. */
    getSteps(q) { return [{ type: q.item.skill || 'answer', expected: q.item.correct }]; },
    validateStep(q, step, answer) { return { correct: Number(answer) === q.item.correct }; },
  };

  if (B && B.Question) B.Question.registerType('multiple-choice', impl);
  if (typeof module !== 'undefined' && module.exports) module.exports = { generate, impl };
})(typeof window !== 'undefined' ? (window.BOKUL = window.BOKUL || {}) : null);

/* === src/interactions/multiple-choice/view.js === */
/* BOKUL — Çoktan Seçmeli Görünüm (TEK DENEME)
 * İlk cevap kesindir — rastgele/brute-force basma engellenir. Yanlışsa doğru
 * cevap yeşil işaretlenir ve Baba nedenini söyler (öğrenme anı), soru biter.
 * Aynı konu ileride aralıklı tekrarla geri gelir. */
(function (B) {

  function el(tag, cls, text) {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    if (text != null) e.textContent = text;
    return e;
  }

  function create(container, q, opts) {
    opts = opts || {};
    const item = q.item;
    const step = B.Question.steps(q)[0];
    let done = false;

    container.innerHTML = '';
    const root = el('div', 'mc-root');
    root.appendChild(el('div', 'mc-question', item.q));

    // Yaşa göre uyarla: küçük yaşlarda (band 1) daha az şık = daha kolay
    // (doğru cevap + 2 çeldirici). Orta/büyük yaşta tüm şıklar.
    let idxs = item.options.map((_, i) => i);
    const band = (B.Curriculum && B.Curriculum.ageBand) ? B.Curriculum.ageBand() : 3;
    if (band === 1 && idxs.length > 3) {
      const wrong = idxs.filter(i => i !== item.correct).sort(() => Math.random() - 0.5).slice(0, 2);
      idxs = [item.correct, ...wrong];
    }
    // Seçenekleri karıştır ama orijinal indeksleri koru
    const order = idxs.sort(() => Math.random() - 0.5);
    const grid = el('div', 'mc-options');
    order.forEach(origIdx => {
      const btn = el('button', 'mc-opt', item.options[origIdx]);
      btn.dataset.orig = origIdx;
      btn.onclick = () => {
        if (done) return;
        done = true;
        const { correct } = B.Question.validate(q, step, origIdx);
        if (opts.onAnswer) opts.onAnswer(step, correct, 1);
        // Tüm şıkları kilitle; doğruyu yeşil göster (öğrenme anı)
        grid.querySelectorAll('.mc-opt').forEach(b => { b.disabled = true; });
        const rightBtn = grid.querySelector('.mc-opt[data-orig="' + item.correct + '"]');
        if (rightBtn) rightBtn.classList.add('mc-right');
        if (correct) {
          if (opts.say) opts.say(B.Dialogue.pick('correct'));
          setTimeout(() => { if (opts.onComplete) opts.onComplete({ mistakes: 0 }); }, 650);
        } else {
          btn.classList.add('mc-wrong');
          root.classList.remove('ld-shake'); void root.offsetWidth;
          root.classList.add('ld-shake');
          if (opts.say) opts.say('Doğrusu: "' + item.options[item.correct] + '". ' + (item.hint || ''));
          setTimeout(() => { if (opts.onComplete) opts.onComplete({ mistakes: 1 }); }, 2200);
        }
      };
      grid.appendChild(btn);
    });
    root.appendChild(grid);
    container.appendChild(root);

    return { destroy() { done = true; container.innerHTML = ''; } };
  }

  B.MultipleChoiceView = { create };
  B.Question.registerView('multiple-choice', create);
})(window.BOKUL = window.BOKUL || {});

/* === src/interactions/arithmetic/logic.js === */
/* BOKUL — Aritmetik Soru Tipi (toplama, çıkarma, çarpma, basit bölme)
 * Tek cevaplı işlemler. Küçük sınıflar için MEB kademesine uygun.
 * params: { op:'+'|'-'|'*'|'/', a:[min,max], b:[min,max], q:[min,max] }
 * bias 0..1: adaptif zorluk (üst aralığa yaklaştırır) */
(function (B) {
  const SKILL = { '+': 'add', '-': 'sub', '*': 'mul', '/': 'div' };

  function rnd(a, b) { return a + Math.floor(Math.random() * (b - a + 1)); }

    if (!Array.isArray(r)) return r;

    return rnd(r[0], Math.max(r[0], hi));
  }

  function generate(params, bias) {

/* BOKUL — Aritmetik Görünüm: "a op b = [?]" + sayı pedi (tek cevap). */
(function (B) {
  const SYM = { '+': '+', '-': '−', '*': '×', '/': '÷' };

  function el(tag, cls, text) {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    if (text != null) e.textContent = text;
    return e;
  }

  function create(container, q, opts) {
    opts = opts || {};
    let buffer = '', attempt = 0, mistakes = 0, done = false;
    const step = B.Question.steps(q)[0];

    container.innerHTML = '';
    const root = el('div', 'ar-root');
    root.innerHTML =
      '<div class="ar-expr"><span>' + q.a + '</span><span class="ar-op">' + (SYM[q.op] || '?') +
      '</span><span>' + q.b + '</span><span class="ar-eq">=</span><span class="ar-box" id="ar-box">?</span></div>';

    const pad = el('div', 'numpad');
    '1234567890'.split('').forEach(k => { const b = el('button', 'key', k); b.dataset.key = k; pad.appendChild(b); });
    const back = el('button', 'key key-back', '⌫'); back.dataset.key = 'back';
    const ok = el('button', 'key key-go', '✔ ONAYLA'); ok.dataset.key = 'ok';
    pad.appendChild(back); pad.appendChild(ok);
    root.appendChild(pad);
    container.appendChild(root);
    const box = root.querySelector('#ar-box');

    function render() { box.textContent = buffer || '?'; box.classList.add('ld-active'); }

    function submit() {
      if (!buffer.length || done) return;
      done = true; // TEK DENEME: ilk onay kesindir
      const { correct } = B.Question.validate(q, step, buffer);
      if (opts.onAnswer) opts.onAnswer(step, correct, 1);
      if (correct) {
        box.classList.remove('ld-active'); box.classList.add('ok');
        if (opts.say) opts.say(B.Dialogue.pick('correct'));
        setTimeout(() => { if (opts.onComplete) opts.onComplete({ mistakes: 0 }); }, 550);
      } else {
        root.classList.remove('ld-shake'); void root.offsetWidth; root.classList.add('ld-shake');
        // Doğru cevabı göster (öğrenme anı)
        box.classList.remove('ld-active');
        box.textContent = q.answer; box.classList.add('ok');
        if (opts.say) opts.say('Doğrusu ' + q.answer + '. Bir dahakine yakalarsın ' + (B.State.data.player.name || 'Komutan') + '!');
        setTimeout(() => { if (opts.onComplete) opts.onComplete({ mistakes: 1 }); }, 1900);
      }
    }

    pad.addEventListener('click', e => {
      const b = e.target.closest('.key');
      if (!b || done) return;
      B.Audio.play('tick');
      const k = b.dataset.key;
      if (k === 'ok') return submit();
      if (k === 'back') { buffer = buffer.slice(0, -1); render(); return; }

/* BOKUL — AnimationEngine
 * XP damlası, konfeti ve küçük şölenler. Olayları dinler, kimse çağırmaz. */
(function (B) {

  /* Ekranda bir noktadan XP barına uçan altın çip */
  function xpDrop(amount) {
    const bar = document.querySelector('.hud-xpbar');
    const chip = document.createElement('div');
    chip.className = 'fx-xp';
    chip.textContent = '+' + amount + ' XP';
    document.body.appendChild(chip);
    const startX = window.innerWidth / 2, startY = window.innerHeight * 0.45;
    chip.style.left = startX + 'px'; chip.style.top = startY + 'px';
    requestAnimationFrame(() => {
      let tx = startX, ty = 60;
      if (bar) { const r = bar.getBoundingClientRect(); tx = r.left + r.width / 2; ty = r.top; }
      chip.style.transform = 'translate(' + (tx - startX) + 'px,' + (ty - startY) + 'px) scale(.6)';
      chip.style.opacity = '0';
    });
    setTimeout(() => chip.remove(), 900);
  }

  /* Basit konfeti patlaması (level-up, boss zaferi) */
  function confetti(n) {
    const colors = ['#FF4FD8', '#FFD52E', '#52E88C', '#9D6BFF', '#3DF2D2', '#FF9F1C'];
    for (let i = 0; i < (n || 40); i++) {
      const p = document.createElement('div');
      p.className = 'fx-confetti';
      p.style.background = colors[i % colors.length];
      p.style.left = (35 + Math.random() * 30) + 'vw';
      p.style.setProperty('--dx', (Math.random() * 60 - 30) + 'vw');
      p.style.setProperty('--dr', (Math.random() * 720 - 360) + 'deg');
      p.style.animationDelay = (Math.random() * 0.3) + 's';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 2200);
    }
  }

  /* Tüm ekranı bir an aydınlatan zafer parlaması */
  function flash() {
    const f = document.createElement('div');
    f.className = 'fx-flash';
    document.body.appendChild(f);
    setTimeout(() => f.remove(), 700);
  }

  function damageFloat(amount, el) {
    const d = document.createElement('div');
    d.className = 'fx-dmg';
    d.textContent = '-' + amount;
    document.body.appendChild(d);
    const r = el ? el.getBoundingClientRect() : { left: window.innerWidth / 2 - 20, top: window.innerHeight * 0.28, width: 40 };
    d.style.left = (r.left + r.width / 2 + (Math.random() * 40 - 20)) + 'px';
    d.style.top = (r.top + 24) + 'px';
    requestAnimationFrame(() => { d.style.transform = 'translateY(-46px)'; d.style.opacity = '0'; });

      B.Bus.on(B.Events.BOSS_DEFEATED, () => { confetti(130); flash(); });
    },
  };

/* BOKUL — Soru Süresi (geri sayım çubuğu)
 * Cömert ve nazik: süre dolunca cezalandırmaz, sadece o soruyu geçer.
 * B.Timer.create(host, saniye, onTimeout) → { stop() } */
(function (B) {
  B.Timer = {
    create(host, seconds, onTimeout) {
      const el = document.createElement('div');
      el.className = 'qtimer';

      host.appendChild(el);
      const bar = el.querySelector('i'), num = el.querySelector('.qtimer-num');
      const total = Math.max(1, seconds) * 10; // desisaniye
      let left = total, stopped = false;
      function render() {
        const pct = Math.max(0, left / total * 100);

      return { stop() { stopped = true; clearInterval(iv); if (el.parentNode) el.remove(); } };
    },
  };
})(window.BOKUL = window.BOKUL || {});

      /* Konuşma: harfler akarken ağız oynar + her 3 harfte bir mırıltı sesi */
      function say(text) {
        if (!text) return;
        clearInterval(typeTimer);
        stopTalking();
        textEl.textContent = '';
        let i = 0;

        talkTimer = setInterval(() => {
          face.mouthOpen = !face.mouthOpen;
          renderFaces();
        }, 120);

        typeTimer = setInterval(() => {
          textEl.textContent = text.slice(0, ++i);
          if (i % 3 === 0 && text[i - 1] !== ' ') B.Audio.play('blip');
          if (i >= text.length) {
            clearInterval(typeTimer);
            stopTalking();
          }
        }, 26); // ağız hareketi görünsün diye biraz yavaşlatıldı
      }

      function sayFrom(pool, vars) {
        const t = B.Dialogue.pick(pool, vars);
        if (t) say(t);
        return t;
      }

      renderFaces();
      return { say, sayFrom, el: wrap };
    },

    express,

    init() {
      scheduleBlink();
      B.Bus.on(B.Events.STEP_ANSWERED, p => express(p.correct ? 'happy' : 'surprised', 1200));
      B.Bus.on(B.Events.LEVEL_UP, () => express('proud', 2500));
      B.Bus.on(B.Events.BOSS_DEFEATED, () => express('proud', 3000));
      B.Bus.on(B.Events.BOSS_ATTACKED, () => express('stern', 1800));
    },
  };
})(window.BOKUL = window.BOKUL || {});

/* BOKUL — Sandık Açılış Töreni (CSS 3D)
 * Karartılmış sahne → sallanan 3D sandık → dokun → kapak açılır,
 * ışık patlar, ödül kartı dönerek gelir. */
(function (B) {
  const RARITY = {
    common:    { name: 'Yaygın',   color: '#A79BC8' },
    rare:      { name: 'Nadir',    color: '#6FA8FF' },
    epic:      { name: 'Epik',     color: '#9D6BFF' },
    legendary: { name: 'Efsanevi', color: '#3DF2D2' },
  };

  /* Kuyruktaki sandıkları sırayla aç; bitince onDone */
  function openCeremony(onDone) {
    if (!B.Chest.queue().length) { if (onDone) onDone(); return; }
    const entry = B.Chest.queue()[0];
    const meta = B.Chest.meta(entry);
    const tm = B.Chest.tierMeta ? B.Chest.tierMeta(entry) : null;
    const frame = (tm && tm.frame) || meta.color || '#FFD52E';
    const tierName = (tm && tm.name) ? tm.name : '';

    const ov = document.createElement('div');
    ov.className = 'overlay chest-overlay';
    ov.style.setProperty('--chest-frame', frame);
    ov.innerHTML =
      '<div class="chest-scene">' +
        (tierName ? '<div class="chest-tier" style="color:' + frame + ';border-color:' + frame + '">' + tierName + ' Kademe</div>' : '') +
        '<div class="chest-title">' + meta.name + '</div>' +
        '<div class="chest3d chest-shake">' +
          '<div class="chest-lid"></div>' +
          '<div class="chest-body">' + meta.icon + '</div>' +
          '<div class="chest-glow"></div>' +
        '</div>' +
        '<div class="chest-hint">Açmak için dokun!</div>' +
      '</div>';
    document.body.appendChild(ov);

    const chestEl = ov.querySelector('.chest3d');
    let opened = false;

    chestEl.parentElement.onclick = () => {
      if (opened) return;
      opened = true;
      const { result } = B.Chest.openNext();
      B.Audio.play('chest');
      chestEl.classList.remove('chest-shake');
      chestEl.classList.add('chest-open');

      setTimeout(() => {
        B.Anim.confetti(40);
        let cardHtml;
        if (result.item) { // kozmetik (kıyafet/nadir)
          const rar = RARITY[result.item.rarity] || RARITY.common;
          cardHtml =
            '<div class="loot-card" style="--rar:' + rar.color + '">' +
              '<div class="loot-rarity">' + rar.name.toUpperCase() + '</div>' +
              '<div class="loot-art">' + lootArt(result.item) + '</div>' +
              '<div class="loot-name">' + result.item.name + '</div>' +
            '</div>';
        } else if (result.items && result.items.length) { // eşya sandığı
          cardHtml =
            '<div class="loot-card" style="--rar:#52E88C">' +
              '<div class="loot-rarity">EŞYA</div>' +
              '<div class="loot-items">' + result.items.map(it =>
                '<span class="loot-item">' + it.icon + ' ' + it.name + ' ×' + it.n + '</span>').join('') + '</div>' +
            '</div>';
        } else if (result.xpPack) { // teselli
          cardHtml =
            '<div class="loot-card" style="--rar:#FFD52E">' +
              '<div class="loot-rarity">XP PAKETİ</div>' +
              '<div class="loot-art loot-xp">+' + result.xpPack + ' XP</div>' +
            '</div>';
        } else { // altın sandığı (sadece altın)
          cardHtml =
            '<div class="loot-card" style="--rar:#FFD52E">' +
              '<div class="loot-rarity">ALTIN</div>' +
              '<div class="loot-art loot-xp">💰</div>' +
            '</div>';
        }
        const scene = ov.querySelector('.chest-scene');
        scene.insertAdjacentHTML('beforeend',
          cardHtml + '<div class="loot-coins">+' + result.coins + ' 💰 Altın</div>');
        ov.querySelector('.chest-hint').textContent = '';

        setTimeout(() => {
          const btn = document.createElement('button');
          btn.className = 'btn btn-action';
          btn.textContent = B.Chest.queue().length ? ('SIRADAKİ SANDIK (' + B.Chest.queue().length + ') ▶') : 'DEVAM ▶';
          btn.onclick = () => { ov.remove(); openCeremony(onDone); };
          scene.appendChild(btn);
        }, 700);
      }, 550);
    };
  }

  /* Ödül kartındaki görsel: avatar parçasıysa o parçayla mini avatar önizlemesi */
  function lootArt(item) {
    const a = B.Avatar.normalize(B.State.data.player.avatar);
    a.usePhoto = false;
    const C = B.Avatar.CATALOG;
    const bind = {
      hair:      () => { const p = C.hairs.find(x => x.cosmeticId === item.id); if (p) a.hair = p.id; },
      hairColor: () => { const p = C.hairColors.find(x => x.cosmeticId === item.id); if (p) a.hairColor = p.id; },
      eyes:      () => { const p = C.eyes.find(x => x.cosmeticId === item.id); if (p) a.eyes = p.id; },
      mouth:     () => { const p = C.mouths.find(x => x.cosmeticId === item.id); if (p) a.mouth = p.id; },
      acc:       () => { const p = C.accs.find(x => x.cosmeticId === item.id); if (p) a.acc = p.id; },
      ring:      () => { const p = C.rings.find(x => x.cosmeticId === item.id); if (p) a.ring = p.id; },

/* === src/ui/ui-manager.js === */
/* BOKUL — UIManager
 * Ekran yönlendirici + ortak HUD + tören katmanları (overlay/toast).
 * Ekranlar registerScreen ile kaydolur: { enter(root, params), exit() } */
(function (B) {
  const screens = new Map();
  let current = null;
  let currentName = '';

  B.UI = {
    registerScreen(name, impl) { screens.set(name, impl); },

    show(name, params) {
      const next = screens.get(name);
      if (!next) { console.error('[BOKUL] Kayıtsız ekran:', name); return; }
      if (current && current.exit) current.exit();
      // Ekran değişiminde açık kalan overlay/toast'ları temizle
      document.querySelectorAll('.overlay').forEach(o => o.remove());
      const app = document.getElementById('app');
      app.innerHTML = '';
      const root = document.createElement('div');
      root.className = 'screen screen-' + name;
      app.appendChild(root);
      current = next; currentName = name;
      next.enter(root, params || {});
      B.Bus.emit(B.Events.SCREEN_CHANGED, { name });
    },

    currentScreen() { return currentName; },

    /* ---- Ortak HUD (üst şerit) ---- */
    buildHud(root, opts) {
      opts = opts || {};
      const p = B.State.data.player;
      const rank = B.Reward.rankFor(p.level);
      const hud = document.createElement('div');
      hud.className = 'hud';
      hud.innerHTML =
        (opts.backTo ? '<button class="chip hud-back">◀</button>' : '<div class="hud-avatar">' + B.Avatar.el(p.avatar) + '</div>') +
        '<div class="chip hud-rank">' + rank.icon + ' ' + rank.title + '</div>' +
        '<div class="hud-xpbar"><span class="hud-lvl">' + p.level + '</span><i></i></div>' +
        '<div class="chip hud-coins">' + (B.Icon ? B.Icon('coin', 'icn-coin') : '💰') + ' <span class="hud-coinval">' + (p.coins || 0) + '</span></div>' +
        (opts.extra || '') +
        '<button class="chip hud-sound">' + (B.Audio.isEnabled() ? '🔊' : '🔇') + '</button>';
      root.appendChild(hud);

      const fill = hud.querySelector('.hud-xpbar i');
      function refresh() {
        const pl = B.State.data.player;
        fill.style.width = Math.min(100, Math.round(pl.xp / B.Reward.xpNeeded() * 100)) + '%';
        hud.querySelector('.hud-lvl').textContent = pl.level;
        const r = B.Reward.rankFor(pl.level);
        hud.querySelector('.hud-rank').textContent = r.icon + ' ' + r.title;
      }
      refresh();
      const offXp = B.Bus.on(B.Events.XP_GAINED, refresh);
      const offLvl = B.Bus.on(B.Events.LEVEL_UP, refresh);
      const offCoin = B.Bus.on(B.Events.COINS_CHANGED, p2 => {
        const cv = hud.querySelector('.hud-coinval');
        if (cv) cv.textContent = p2.total;
      });

      if (opts.backTo) hud.querySelector('.hud-back').onclick = () => B.UI.show(opts.backTo, opts.backParams);
      hud.querySelector('.hud-sound').onclick = (e) => {
        const on = !B.Audio.isEnabled();
        B.Audio.setEnabled(on);
        B.Save.settings.set({ sound: on });
        e.target.textContent = on ? '🔊' : '🔇';
      };
      return { refresh, dispose() { offXp(); offLvl(); offCoin(); } };
    },

    /* ---- Tören katmanı: level-up, zafer, geri çekilme ---- */
    overlay(html, buttons) {
      const ov = document.createElement('div');
      ov.className = 'overlay';
      const card = document.createElement('div');
      card.className = 'overlay-card';
      card.innerHTML = html;
      const btnRow = document.createElement('div');
      btnRow.className = 'overlay-btns';
      (buttons || []).forEach(b => {
        const btn = document.createElement('button');
        btn.className = 'btn ' + (b.cls || 'btn-action');
        btn.textContent = b.label;
        // ÖNEMLİ: önce onClick, sonra kaldır — onClick overlay içindeki
        // form alanlarını (ör. isim inputu) okuyabilmeli
        btn.onclick = () => { if (b.onClick) b.onClick(); ov.remove(); };
        btnRow.appendChild(btn);
      });
      card.appendChild(btnRow);
      ov.appendChild(card);
      document.body.appendChild(ov);
      return ov;
    },

    /* Evet/Vazgeç onay kutusu (satın alma, satış, craft vb. için) */
    confirm(opts) {
      opts = opts || {};
      const ov = B.UI.overlay(
        '<div class="ov-big">' + (opts.icon || '❓') + '</div><h2>' + (opts.title || 'Emin misin?') + '</h2>' +
        (opts.body ? '<p class="ov-quote">' + opts.body + '</p>' : ''),
        [
          { label: opts.yes || 'Evet', onClick: null },
          { label: opts.no || 'Vazgeç', cls: 'btn-quiet', onClick: null },
        ]);
      const btns = ov.querySelectorAll('.overlay-btns .btn');
      btns[0].onclick = () => { ov.remove(); if (opts.onYes) opts.onYes(); };
      btns[1].onclick = () => { ov.remove(); if (opts.onNo) opts.onNo(); };
      return ov;
    },

    toast(text) {
      const t = document.createElement('div');
      t.className = 'toast';
      t.textContent = text;
      document.body.appendChild(t);
      setTimeout(() => t.classList.add('toast-show'), 20);
      setTimeout(() => { t.classList.remove('toast-show'); setTimeout(() => t.remove(), 400); }, 2600);
    },

    /* Level-up törenini merkezi bağla */
    init() {
      B.Bus.on(B.Events.LEVEL_UP, p => {
        const rankHtml = p.newRank
          ? '<div class="ov-rank">' + p.newRank.icon + '</div><div class="ov-ranktitle">Yeni rütbe: ' + p.newRank.title + '!</div>'
          : '';
        B.UI.overlay(
          '<div class="ov-big">⬆️</div><h2>LEVEL ' + p.newLevel + '!</h2>' + rankHtml +
          '<p class="ov-quote">' + (B.Dialogue.pick('levelup') || '') + '</p>',
          [{ label: 'DEVAM ▶' }]
        );
      });
    },
  };
})(window.BOKUL = window.BOKUL || {});
