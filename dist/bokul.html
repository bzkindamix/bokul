<script>
/* === src/core/events.js === */
/* BOKUL — Olay Sözlüğü
 * Modüller arası TÜM iletişimin isimli sözleşmesi.
 * Yeni olay eklerken buraya kaydet; EventBus bilinmeyen olaya uyarı basar. */
(function (B) {
  B.Events = Object.freeze({
    // Soru akışı
    QUESTION_STARTED:   'question:started',
    STEP_ANSWERED:      'step:answered',      // { stepType, correct, attempt, value }
    STEP_HINT:          'step:hint',          // { stepType, hintLevel }
    QUESTION_COMPLETED: 'question:completed', // { stars, mistakes }

    // Ödül akışı
    XP_GAINED:      'xp:gained',       // { amount, source }
    LEVEL_UP:       'level:up',        // { newLevel, newRank }
    STREAK_CHANGED: 'streak:changed',  // { count, multiplier }
    CHEST_EARNED:   'chest:earned',    // { chestType }
    CHEST_OPENED:   'chest:opened',    // { chestType, item }
    COSMETIC_UNLOCKED: 'cosmetic:unlocked', // { itemId }
    COSMETIC_SOLD:  'cosmetic:sold',   // { itemId, coins }
    COINS_CHANGED:  'coins:changed',   // { total, delta }

    // Görevler
    QUEST_PROGRESS:  'quest:progress',
    QUEST_COMPLETED: 'quest:completed',

    // Dilek / istek
    WISH_EARNED: 'wish:earned',   // ebeveyn hedefi tamamlandı

    // İlerleme
    MISSION_COMPLETED: 'mission:completed', // { missionId, stars, xp }
    SECTION_UNLOCKED:  'section:unlocked',
    BOSS_DAMAGED:      'boss:damaged',   // { amount, remaining }
    BOSS_ATTACKED:     'boss:attacked',  // { armorLeft } — sadece Ünite Boss'u
    BOSS_DEFEATED:     'boss:defeated',  // { bossId, tier }
    BOSS_RETREAT:      'boss:retreat',

    // Sistem
    GAME_SAVED:     'game:saved',
    GAME_LOADED:    'game:loaded',
    SCREEN_CHANGED: 'screen:changed',
  });

  // Hızlı doğrulama için ters küme
  B._eventSet = new Set(Object.values(B.Events));
})(window.BOKUL = window.BOKUL || {});

/* === src/core/event-bus.js === */
/* BOKUL — EventBus
 * Modüller birbirini asla doğrudan çağırmaz; buradan konuşur (pub/sub). */
(function (B) {
  const listeners = new Map(); // eventName -> Set<fn>

  B.Bus = {
    on(event, fn) {
      if (!B._eventSet.has(event)) console.warn('[BOKUL] Bilinmeyen olay dinleniyor:', event);
      if (!listeners.has(event)) listeners.set(event, new Set());
      listeners.get(event).add(fn);
      return () => B.Bus.off(event, fn);
    },
    off(event, fn) {
      const set = listeners.get(event);
      if (set) set.delete(fn);
    },
    emit(event, payload) {
      if (!B._eventSet.has(event)) console.warn('[BOKUL] Bilinmeyen olay yayınlanıyor:', event);
      const set = listeners.get(event);
      if (!set) return;
      // Kopya üzerinde dolaş: dinleyici kendini kaldırabilsin
      [...set].forEach(fn => {
        try { fn(payload); }
        catch (e) { console.error('[BOKUL] Olay dinleyicisi hata verdi (' + event + '):', e); }
      });
    },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/core/game-state.js === */
/* BOKUL — GameState
 * Tüm oyun durumunun tek sahibi. Motorlar state.data'yı okur;
 * değişiklikler motor metodlarıyla yapılır ve olaylarla duyurulur. */
(function (B) {
  const SCHEMA_VERSION = 1;

  function freshState() {
    return {
      meta: {
        schemaVersion: SCHEMA_VERSION,
        createdAt: new Date().toISOString(),
        lastPlayedAt: new Date().toISOString(),
        introSeen: false,          // giriş sinematiği bu profilde izlendi mi
      },
      player: { name: '', age: null, grade: null, profile: {}, xp: 0, level: 1, rank: 'rank1', title: '', coins: 0,
                avatar: { skin: 1, hair: 0, hairColor: 0, eyes: 0, mouth: 0, acc: 'none', ring: 'none', photo: null, usePhoto: false } },
      streaks: { current: 0, best: 0, dailyDays: 0, lastPlayDate: '' },
      stats: { correct: 0, wrong: 0, questionsDone: 0, firstTryCorrect: 0, timeSumMs: 0, perSkill: {} },
      progress: { lessons: {} }, // lessons[dersId].sections[sectionId] = { missions:{id:{stars}}, bossDefeated, bossHpCarry }
      inventory: { cosmetics: [], badges: [], titles: [] },
      quests: { daily: [], weekly: [], lastDailyReset: '', lastWeeklyReset: '' },
      wishes: [], // { id, text, created, status, goal:{metric,target}|null, note }
      ideas: [],  // { id, text, created, status, note }
      perms: { lessons: {}, features: {} }, // ebeveyn kilitleri (yoksa=serbest)
    };
  }

  B.State = {
    data: freshState(),
    SCHEMA_VERSION,
    fresh: freshState,

    /* Bir dersin bölüm kaydını getir (yoksa oluştur) */
    sectionProgress(lessonId, sectionId) {
      const lessons = this.data.progress.lessons;
      if (!lessons[lessonId]) lessons[lessonId] = { sections: {} };
      const secs = lessons[lessonId].sections;
      if (!secs[sectionId]) secs[sectionId] = { missions: {}, bossDefeated: false, bossHpCarry: 0 };
      return secs[sectionId];
    },

    /* Bölümün toplam yıldızı */
    sectionStars(lessonId, sectionId) {
      const sec = this.sectionProgress(lessonId, sectionId);
      return Object.values(sec.missions).reduce((t, m) => t + (m.stars || 0), 0);
    },

    touch() { this.data.meta.lastPlayedAt = new Date().toISOString(); },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/core/auth.js === */
/* BOKUL — Auth (Oyuncu Profilleri)
 * Çok oyunculu yerel profil sistemi: her oyuncunun kullanıcı adı + şifresi
 * ve kendi kayıt dosyası vardır. Tamamen çevrimdışı çalışır; sunucu YOKTUR.
 *
 * GÜVENLİK NOTU: Bu bir aile içi yerel profil kilididir, banka düzeyinde
 * güvenlik DEĞİLDİR. Şifreler basit bir karma (hash) ile saklanır — düz metin
 * tutulmaz — ama aynı cihaza fiziksel erişimi olan biri kayıtları görebilir.
 * Çocuk için "kim oynuyor + ilerlemem bana ait" hissini verir. */
(function (B) {
  const USERS_KEY = 'bokul.users';
  const SESSION_KEY = 'bokul.session';
  const ADMIN_KEY = 'bokul.admin';

  /* Basit, tersine çevrilemez karma (kriptografik değil) — düz metin saklamamak için */
  function hash(s) {
    let h = 5381;
    s = String(s);
    for (let i = 0; i < s.length; i++) h = ((h << 5) + h) ^ s.charCodeAt(i);
    return (h >>> 0).toString(16);
  }

  function readUsers() { try { return JSON.parse(localStorage.getItem(USERS_KEY)) || {}; } catch (e) { return {}; } }
  function writeUsers(u) { try { localStorage.setItem(USERS_KEY, JSON.stringify(u)); } catch (e) {} }
  function keyOf(name) { return String(name || '').trim().toLowerCase(); }

  let current = null; // aktif profilin anahtarı (küçük harf)

  B.Auth = {
    /* Kayıtlı profil anahtarları */
    users() { return Object.keys(readUsers()); },
    hasAny() { return B.Auth.users().length > 0; },
    exists(name) { return !!readUsers()[keyOf(name)]; },
    current() { return current; },
    displayName(key) { const u = readUsers()[key || current]; return u ? u.name : (key || ''); },
    saveKey() { return current ? 'bokul.save.' + current : null; },

    /* Profil kartında göstermek için kayıttan avatarı ve adı çek (tam yüklemeden) */
    peek(key) {
      try {
        const s = JSON.parse(localStorage.getItem('bokul.save.' + key));
        return { name: B.Auth.displayName(key), avatar: (s && s.player) ? s.player.avatar : null,
                 level: (s && s.player) ? s.player.level : 1 };
      } catch (e) { return { name: B.Auth.displayName(key), avatar: null, level: 1 }; }
    },

    register(name, pass) {
      name = String(name || '').trim();
      if (name.length < 2) return { ok: false, err: 'İsim en az 2 harf olmalı.' };
      const key = keyOf(name);
      const users = readUsers();
      if (users[key]) return { ok: false, err: 'Bu isim alınmış. Başka bir isim dene.' };
      // Çocuk profilleri şifresizdir (profile dokunarak girilir); ebeveyn PIN'i/e-postası korur.
      users[key] = { name, pass: pass ? hash(pass) : '', created: new Date().toISOString() };
      writeUsers(users);
      current = key;
      return { ok: true };
    },

    /* Profili yeniden adlandır (anahtar sabit kalır; yalnızca görünen ad + kayıttaki ad değişir) */
    renameUser(key, newName) {
      newName = String(newName || '').trim();
      if (newName.length < 2) return { ok: false, err: 'İsim en az 2 harf olmalı.' };
      const users = readUsers();
      if (!users[key]) return { ok: false, err: 'Profil bulunamadı.' };
      users[key].name = newName;
      writeUsers(users);
      try {
        const sk = 'bokul.save.' + key;
        const s = JSON.parse(localStorage.getItem(sk));
        if (s && s.player) { s.player.name = newName; localStorage.setItem(sk, JSON.stringify(s)); }
      } catch (e) {}
      return { ok: true };
    },

    /* Profili ve kaydını sil */
    deleteUser(key) {
      const users = readUsers();
      if (!users[key]) return { ok: false, err: 'Profil bulunamadı.' };
      delete users[key];
      writeUsers(users);
      try { localStorage.removeItem('bokul.save.' + key); } catch (e) {}
      try { localStorage.removeItem('bokul.save.' + key + '.corrupt'); } catch (e) {}
      if (current === key) current = null;
      if (B.Auth.remembered() === key) { try { localStorage.removeItem(SESSION_KEY); } catch (e) {} }
      return { ok: true };
    },

    /* Profile dokunarak giriş (şifresiz) — çocuk profilleri için */
    loginByKey(key) {
      if (!readUsers()[key]) return { ok: false, err: 'Profil bulunamadı.' };
      current = key;
      return { ok: true };
    },

    login(name, pass) {
      const key = keyOf(name);
      const u = readUsers()[key];
      if (!u) return { ok: false, err: 'Böyle bir oyuncu yok.' };
      if (u.pass && u.pass !== hash(pass)) return { ok: false, err: 'Şifre yanlış. Tekrar dene!' };
      current = key;
      return { ok: true };
    },

    /* "Beni hatırla": bir sonraki açılışta şifre sormadan devam */
    setRemember(on) {
      if (on && current) { try { localStorage.setItem(SESSION_KEY, current); } catch (e) {} }
      else { try { localStorage.removeItem(SESSION_KEY); } catch (e) {} }
    },
    remembered() { try { return localStorage.getItem(SESSION_KEY); } catch (e) { return null; } },
    resume(key) { if (readUsers()[key]) { current = key; return true; } return false; },

    logout() { current = null; try { localStorage.removeItem(SESSION_KEY); } catch (e) {} },

    /* ---- Ebeveyn (admin) PIN'i ---- */
    adminExists() { try { return !!localStorage.getItem(ADMIN_KEY); } catch (e) { return false; } },
    setAdminPin(pin) {
      if (String(pin || '').length < 4) return { ok: false, err: 'PIN en az 4 haneli olmalı.' };
      try { localStorage.setItem(ADMIN_KEY, JSON.stringify({ pin: hash(pin) })); } catch (e) {}
      return { ok: true };
    },
    checkAdmin(pin) {
      try { return JSON.parse(localStorage.getItem(ADMIN_KEY)).pin === hash(pin); }
      catch (e) { return false; }
    },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/core/curriculum.js === */
/* BOKUL — Curriculum (Yaş / Sınıf Uyarlaması)
 * Onboarding'de sorulan "kaç yaşındasın / kaçıncı sınıfı bitirdin" bilgisine göre
 * içeriği (özellikle matematik zorluğunu) çocuğun seviyesine göre ayarlar. */
(function (B) {

  /* Bitirilen sınıfa göre matematik üretici tavanları */
  function mathCaps(grade) {
    grade = grade == null ? 5 : grade;
    if (grade <= 2) return { maxDigits: 2, maxDivisor: 5 };
    if (grade === 3) return { maxDigits: 3, maxDivisor: 6 };
    if (grade === 4) return { maxDigits: 3, maxDivisor: 9 };
    return { maxDigits: 4, maxDivisor: 9 }; // 5 ve üzeri
  }

  /* Çocuğun ŞU AN bulunduğu sınıf (bitirdiği + 1). Bilinmiyorsa hepsi açık. */
  function currentGrade() {
    const g = B.State.data.player.grade;
    if (g == null) return 6;
    return g === 0 ? 1 : g + 1;
  }

  B.Curriculum = {
    mathCaps,
    currentGrade,

    /* Bölüm çocuğun sınıfına uygun mu? (section.minGrade) */
    gradeOk(section) {
      return !section || !section.minGrade || currentGrade() >= section.minGrade;
    },

    /* Soru tipine göre üreticiyi uyarla (uzun bölme sınıfa göre kısıtlanır) */
    forType(itype, gen) {
      return itype === 'long-division' ? B.Curriculum.forMath(gen) : gen;
    },

    /* Uzun bölme üreticisini sınıfa göre kısıtla (çok küçükler zorlanmasın) */
    forMath(gen) {
      if (!gen) return gen;
      const caps = mathCaps(B.State.data.player.grade);
      const g = Object.assign({}, gen);
      if (Array.isArray(g.dividendDigits))
        g.dividendDigits = [Math.min(g.dividendDigits[0], caps.maxDigits), Math.min(g.dividendDigits[1], caps.maxDigits)];
      else if (typeof g.dividendDigits === 'number')
        g.dividendDigits = Math.min(g.dividendDigits, caps.maxDigits);
      if (Array.isArray(g.divisorRange))
        g.divisorRange = [g.divisorRange[0], Math.min(g.divisorRange[1], caps.maxDivisor)];
      return g;
    },

    /* Etkin ders matematikse üreticiyi uyarlar, değilse dokunmaz */
    adjust(lesson, gen) {
      return (lesson && lesson.interactionType === 'long-division') ? B.Curriculum.forMath(gen) : gen;
    },

    gradeLabel() {
      const gr = B.State.data.player.grade;
      if (gr == null) return '';
      return gr === 0 ? 'okul öncesi' : (gr + '. sınıfı bitirmiş');
    },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/core/save-manager.js === */
/* BOKUL — SaveManager
 * LocalStorage kayıt: debounce'lu otomatik kayıt + şema migrasyonu.
 * Bozuk kayıt asla sessizce silinmez; yedeğe kopyalanır. */
(function (B) {
  // Kayıt anahtarı artık AKTİF PROFİLE göre (bkz. Auth.saveKey()).
  // Eski tek-oyunculu kayıt anahtarı (v0.10 öncesi) göç için okunur.
  const LEGACY_KEY = 'bokul.save.v1';
  const SETTINGS_KEY = 'bokul.settings';
  let timer = null;

  /* Eski şemaları yeniye taşıyan zincir: migrations[eskiSürüm] = fn(data) => data */
  const migrations = {
    // Örnek: 1: (d) => { d.yeniAlan = ...; d.meta.schemaVersion = 2; return d; }
  };

  function key() { return B.Auth ? B.Auth.saveKey() : LEGACY_KEY; }

  B.Save = {
    /* Aktif profilin kaydını yükle; yoksa taze durum. Eski tek kayıt varsa
     * ilk profile bir kez taşınır (legacyImport). */
    load() {
      const k = key();
      if (!k) { B.State.data = B.State.fresh(); return false; }
      let raw = null;
      try { raw = localStorage.getItem(k); } catch (e) { /* gizli mod vb. */ }
      if (!raw) { B.State.data = B.State.fresh(); return false; }
      try {
        let data = JSON.parse(raw);
        while (data.meta.schemaVersion < B.State.SCHEMA_VERSION) {
          const fn = migrations[data.meta.schemaVersion];
          if (!fn) throw new Error('Migrasyon eksik: ' + data.meta.schemaVersion);
          data = fn(data);
        }
        B.State.data = Object.assign(B.State.fresh(), data);
        B.Bus.emit(B.Events.GAME_LOADED, {});
        return true;
      } catch (e) {
        console.error('[BOKUL] Kayıt okunamadı, yedeğe alınıyor:', e);
        try { localStorage.setItem(k + '.corrupt', raw); localStorage.removeItem(k); } catch (e2) {}
        B.State.data = B.State.fresh();
        return false;
      }
    },

    /* v0.10 öncesi tek kayıt varsa, yeni bir profile içeriğini taşı */
    legacyImport() {
      try {
        const raw = localStorage.getItem(LEGACY_KEY);
        if (!raw) return false;
        B.State.data = Object.assign(B.State.fresh(), JSON.parse(raw));
        return true;
      } catch (e) { return false; }
    },
    hasLegacy() { try { return !!localStorage.getItem(LEGACY_KEY); } catch (e) { return false; } },

    saveNow() {
      const k = key();
      if (!k) return; // profil seçilmeden yazma
      B.State.touch();
      try {
        localStorage.setItem(k, JSON.stringify(B.State.data));
        B.Bus.emit(B.Events.GAME_SAVED, {});
      } catch (e) { console.error('[BOKUL] Kayıt yazılamadı:', e); }
    },

    /* Debounce: art arda olaylarda tek yazım (config: autoSaveDebounceMs) */
    saveSoon() {
      clearTimeout(timer);
      const ms = (B.Content && B.Content.get('config') || {}).autoSaveDebounceMs || 2000;
      timer = setTimeout(() => B.Save.saveNow(), ms);
    },

    settings: {
      get() {
        try { return JSON.parse(localStorage.getItem(SETTINGS_KEY)) || {}; }
        catch (e) { return {}; }
      },
      set(patch) {
        const cur = B.Save.settings.get();
        Object.assign(cur, patch);
        try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(cur)); } catch (e) {}
        return cur;
      },
    },

    /* Önemli olaylarda otomatik kayıt bağla */
    init() {
      const E = B.Events;
      [E.QUESTION_COMPLETED, E.MISSION_COMPLETED, E.LEVEL_UP,
       E.BOSS_DEFEATED, E.BOSS_RETREAT, E.XP_GAINED]
        .forEach(ev => B.Bus.on(ev, () => B.Save.saveSoon()));
      window.addEventListener('beforeunload', () => B.Save.saveNow());
    },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/core/cloud-sync.js === */
/* BOKUL — Bulut Senkron (Firebase Firestore REST)
 * Çok-aileli senkron: her aile bir "aile kodu" ile ayrılır.
 * - Çocuğun cihazı ilerlemeyi buluta yazar (fotoğraf HARİÇ — cihazda kalır).
 * - Ebeveyn kendi cihazından, aynı aile koduyla tüm çocukları görür ve
 *   dilek hedefi/not (directives) yazar; çocuğun cihazı bir sonraki açılışta çeker.
 * SDK yok; doğrudan Firestore REST (fetch). Anahtar istemci içindir (public).
 * Yapılandırma yoksa modül sessizce devre dışıdır (çevrimdışı tek dosya bozulmaz). */
(function (B) {
  // Firebase istemci yapılandırması (public — dağıtılan dosyada olması normaldir)
  const CFG = {
    projectId: 'bokul-bc2c4',
    apiKey: 'AIzaSyCe9-6Dl_fcx1q8WxiX_MoGM7dpHc7YJeY',
  };
  const CODE_KEY = 'bokul.familyCode'; // cihaz düzeyinde (tüm profiller ortak)

  function base() {
    return 'https://firestore.googleapis.com/v1/projects/' + CFG.projectId + '/databases/(default)/documents';
  }
  function configured() { return !!(CFG.projectId && CFG.apiKey); }

  function getCode() { try { return localStorage.getItem(CODE_KEY) || ''; } catch (e) { return ''; } }
  function setCode(c) { try { c ? localStorage.setItem(CODE_KEY, c) : localStorage.removeItem(CODE_KEY); } catch (e) {} }
  function enabled() { return configured() && !!getCode(); }

  /* Rastgele, tahmin edilemez aile kodu (karışabilen harfler yok) */
  function genCode() {
    const abc = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789';
    let s = '';
    const arr = new Uint32Array(10);
    (window.crypto || window.msCrypto).getRandomValues(arr);
    for (let i = 0; i < 10; i++) s += abc[arr[i] % abc.length];
    return s;
  }

  /* Firestore alanı: her şeyi stringValue olarak tutuyoruz (basit) */
  function sv(s) { return { stringValue: String(s == null ? '' : s) }; }

  /* Kaydı buluta uygun hale getir: fotoğrafı çıkar (gizlilik) */
  function stripForCloud(state) {
    const copy = JSON.parse(JSON.stringify(state));
    if (copy.player && copy.player.avatar) { copy.player.avatar.photo = null; copy.player.avatar.usePhoto = false; }
    return copy;
  }

  async function req(url, opts) {
    const res = await fetch(url + (url.includes('?') ? '&' : '?') + 'key=' + CFG.apiKey, opts);
    if (!res.ok) throw new Error('Firestore ' + res.status);
    return res.status === 200 ? res.json() : null;
  }

  function playerDoc(code, key) { return base() + '/families/' + encodeURIComponent(code) + '/players/' + encodeURIComponent(key); }

  B.Cloud = {
    configured, enabled, getCode, setCode, genCode,
    apiKey() { return CFG.apiKey; },
    projectId() { return CFG.projectId; },

    /* Aktif profilin kaydını buluta yaz (directives'e DOKUNMAZ) */
    async pushSave() {
      if (!enabled() || !B.Auth || !B.Auth.current()) return;
      const code = getCode(), key = B.Auth.current();
      const body = { fields: {
        name: sv(B.State.data.player.name),
        save: sv(JSON.stringify(stripForCloud(B.State.data))),
        updatedAt: sv(new Date().toISOString()),
      } };
      const mask = 'updateMask.fieldPaths=name&updateMask.fieldPaths=save&updateMask.fieldPaths=updatedAt';
      try {
        await req(playerDoc(code, key) + '?' + mask, {
          method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body),
        });
      } catch (e) { /* çevrimdışıysa sessiz geç, sonra tekrar denenir */ }
    },

    /* Ebeveyn direktiflerini çek ve yerel dileklere uygula */
    async pullDirectives() {
      if (!enabled() || !B.Auth || !B.Auth.current()) return;
      try {
        const doc = await req(playerDoc(getCode(), B.Auth.current()), { method: 'GET' });
        const d = doc && doc.fields && doc.fields.directives ? JSON.parse(doc.fields.directives.stringValue) : null;
        if (d) B.Cloud.applyDirectives(d);
      } catch (e) { /* yoksa/çevrimdışıysa geç */ }
    },

    /* Directives'i yerel wishes/ideas'e uygula (ebeveyn otoritedir) */
    applyDirectives(d) {
      let changed = false;
      (B.State.data.wishes || []).forEach(w => {
        const dw = d.wishes && d.wishes[w.id];
        if (dw) {
          if (dw.goal !== undefined) w.goal = dw.goal;
          if (dw.note !== undefined) w.note = dw.note;
          if (dw.status && dw.status !== w.status && !(w.status === 'earned' && dw.status === 'assigned')) w.status = dw.status;
          changed = true;
        }
      });
      (B.State.data.ideas || []).forEach(i => {
        const di = d.ideas && d.ideas[i.id];
        if (di) { if (di.status) i.status = di.status; if (di.note !== undefined) i.note = di.note; changed = true; }
      });
      // Ebeveyn izinleri (ders/özellik kilitleri) uzaktan uygulanır — ebeveyn otoritedir
      if (d.perms && typeof d.perms === 'object') {
        B.State.data.perms = { lessons: d.perms.lessons || {}, features: d.perms.features || {} };
        changed = true;
      }
      if (changed) { B.Save.saveSoon(); if (B.Wish) B.Wish.checkEarned(); }
    },

    /* Ebeveyn: aile kodundaki tüm oyuncuları listele (uzaktan görüntüleme) */
    async listPlayers() {
      if (!enabled()) return [];
      try {
        const res = await req(base() + '/families/' + encodeURIComponent(getCode()) + '/players', { method: 'GET' });
        const docs = (res && res.documents) || [];
        return docs.map(doc => {
          const key = doc.name.split('/').pop();
          const f = doc.fields || {};
          let save = null; try { save = JSON.parse(f.save.stringValue); } catch (e) {}
          return { key, name: f.name ? f.name.stringValue : key, save, updatedAt: f.updatedAt ? f.updatedAt.stringValue : '' };
        }).filter(p => p.save);
      } catch (e) { return []; }
    },

    /* Ebeveyn: bir oyuncuya directives yaz (save'e DOKUNMAZ) */
    async writeDirectives(playerKey, directives) {
      if (!enabled()) return false;
      const body = { fields: { directives: sv(JSON.stringify(directives)) } };
      try {
        await req(playerDoc(getCode(), playerKey) + '?updateMask.fieldPaths=directives', {
          method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body),
        });
        return true;
      } catch (e) { return false; }
    },

    /* Mevcut directives'i oku (ebeveyn düzenlerken üstüne eklesin diye) */
    async readDirectives(playerKey) {
      if (!enabled()) return {};
      try {
        const doc = await req(playerDoc(getCode(), playerKey), { method: 'GET' });
        return doc && doc.fields && doc.fields.directives ? JSON.parse(doc.fields.directives.stringValue) : {};
      } catch (e) { return {}; }
    },

    init() {
      if (!configured()) return;
      // Kaydedince buluta gönder (debounce'lu)
      let t = null;
      B.Bus.on(B.Events.GAME_SAVED, () => {
        if (!enabled()) return;
        clearTimeout(t); t = setTimeout(() => B.Cloud.pushSave(), 1500);
      });
    },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/core/auth-cloud.js === */
/* BOKUL — Ebeveyn E-posta Hesabı (Firebase Authentication, REST — SDK yok)
 * Ebeveyn kendi e-postasıyla kayıt olur; Firebase doğrulama ve "şifremi unuttum"
 * e-postalarını ücretsiz gönderir. Çocuklar e-postasız kalır (profillere dokunur).
 * Oturum bilgisi cihazda saklanır (bokul.parent). */
(function (B) {
  const SESS = 'bokul.parent';
  const IDT = 'https://identitytoolkit.googleapis.com/v1/accounts:';
  const TOK = 'https://securetoken.googleapis.com/v1/token';

  function key() { return B.Cloud ? B.Cloud.apiKey() : ''; }
  function available() { return !!key(); }

  function readSess() { try { return JSON.parse(localStorage.getItem(SESS)); } catch (e) { return null; } }
  function writeSess(s) { try { localStorage.setItem(SESS, JSON.stringify(s)); } catch (e) {} }

  const ERR = {
    EMAIL_EXISTS: 'Bu e-posta zaten kayıtlı. Giriş yapmayı dene.',
    INVALID_EMAIL: 'Geçersiz e-posta adresi.',
    MISSING_PASSWORD: 'Şifre gir.',
    WEAK_PASSWORD: 'Şifre en az 6 karakter olmalı.',
    EMAIL_NOT_FOUND: 'Bu e-posta kayıtlı değil.',
    INVALID_PASSWORD: 'Şifre yanlış.',
    INVALID_LOGIN_CREDENTIALS: 'E-posta veya şifre hatalı.',
    USER_DISABLED: 'Bu hesap devre dışı.',
    TOO_MANY_ATTEMPTS_TRY_LATER: 'Çok fazla deneme. Biraz sonra tekrar dene.',
  };
  function trErr(msg) { return ERR[(msg || '').split(' ')[0]] || ('Bir hata oldu: ' + (msg || '')); }

  async function post(url, body) {
    const res = await fetch(url + (url.includes('?') ? '&' : '?') + 'key=' + key(), {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body),
    });
    const data = await res.json();
    if (!res.ok) throw new Error((data.error && data.error.message) || 'HATA');
    return data;
  }

  /* idToken süresi dolduysa refresh et (1 saat) */
  async function freshToken() {
    const s = readSess();
    if (!s) return null;
    if (Date.now() < (s.expiresAt || 0) - 60000) return s.idToken;
    try {
      const r = await fetch(TOK + '?key=' + key(), {
        method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'grant_type=refresh_token&refresh_token=' + encodeURIComponent(s.refreshToken),
      });
      const d = await r.json();
      if (d.id_token) {
        s.idToken = d.id_token; s.refreshToken = d.refresh_token;
        s.expiresAt = Date.now() + (parseInt(d.expires_in) || 3600) * 1000;
        writeSess(s);
        return s.idToken;
      }
    } catch (e) {}
    return s.idToken;
  }

  function store(d, extra) {
    const s = Object.assign({
      idToken: d.idToken, refreshToken: d.refreshToken, localId: d.localId, email: d.email,
      expiresAt: Date.now() + (parseInt(d.expiresIn) || 3600) * 1000, emailVerified: false,
    }, extra || {});
    writeSess(s);
    return s;
  }

  /* Hesaba bağlı, deterministik DAVET KODU (uid'den türer; hep aynı) */
  function deriveCode(uid) {
    const abc = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789';
    let h1 = 5381, h2 = 52711;
    for (let i = 0; i < uid.length; i++) { const c = uid.charCodeAt(i); h1 = ((h1 << 5) + h1) ^ c; h2 = (h2 * 33 ^ c) >>> 0; }
    h1 = h1 >>> 0; h2 = h2 >>> 0;
    let s = '', a = h1, b = h2;
    for (let i = 0; i < 4; i++) { s += abc[a % abc.length]; a = Math.floor(a / abc.length); }
    for (let i = 0; i < 4; i++) { s += abc[b % abc.length]; b = Math.floor(b / abc.length); }
    return s;
  }
  /* Giriş yapan ebeveynin bu cihazını kendi ailesine bağla */
  function linkFamily() {
    const s = readSess();
    if (s && s.localId && B.Cloud) B.Cloud.setCode(deriveCode(s.localId));
  }

  B.AuthCloud = {
    available,
    current() { return readSess(); },
    email() { const s = readSess(); return s ? s.email : ''; },
    isVerified() { const s = readSess(); return !!(s && s.emailVerified); },
    inviteCode() { const s = readSess(); return s && s.localId ? deriveCode(s.localId) : ''; },
    logout() { try { localStorage.removeItem(SESS); } catch (e) {} },

    async register(email, pass) {
      try {
        const d = await post(IDT + 'signUp', { email: (email || '').trim(), password: pass, returnSecureToken: true });
        store(d);
        linkFamily(); // davet kodu = bu hesap
        await B.AuthCloud.sendVerify();
        return { ok: true, needVerify: true };
      } catch (e) { return { ok: false, err: trErr(e.message) }; }
    },

    async login(email, pass) {
      try {
        const d = await post(IDT + 'signInWithPassword', { email: (email || '').trim(), password: pass, returnSecureToken: true });
        store(d);
        linkFamily(); // davet kodu = bu hesap
        const v = await B.AuthCloud.refreshVerified();
        return { ok: true, verified: v };
      } catch (e) { return { ok: false, err: trErr(e.message) }; }
    },

    async sendVerify() {
      const t = await freshToken();
      if (!t) return { ok: false };
      try { await post(IDT + 'sendOobCode', { requestType: 'VERIFY_EMAIL', idToken: t }); return { ok: true }; }
      catch (e) { return { ok: false, err: trErr(e.message) }; }
    },

    async sendReset(email) {
      try { await post(IDT + 'sendOobCode', { requestType: 'PASSWORD_RESET', email: (email || '').trim() }); return { ok: true }; }
      catch (e) { return { ok: false, err: trErr(e.message) }; }
    },

    /* Ebeveyn hesabını Firebase'den kalıcı sil (yalnızca kullanıcının kendi isteğiyle) */
    async deleteAccount() {
      const t = await freshToken();
      if (!t) return { ok: false, err: 'Oturum bulunamadı.' };
      try {
        await post(IDT + 'delete', { idToken: t });
        B.AuthCloud.logout();
        return { ok: true };
      } catch (e) {
        const m = e.message || '';
        if (/CREDENTIAL_TOO_OLD|LOGIN_AGAIN|TOKEN_EXPIRED/i.test(m))
          return { ok: false, err: 'Güvenlik için önce çıkış yapıp tekrar giriş yap, sonra sil.' };
        return { ok: false, err: trErr(m) };
      }
    },

    /* Google ile giriş (Firebase Web SDK popup; talep anında yüklenir) */
    async googleSignIn() {
      try {
        const appMod = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js');
        const authMod = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js');
        const app = appMod.initializeApp({
          apiKey: key(), authDomain: B.Cloud.projectId() + '.firebaseapp.com', projectId: B.Cloud.projectId(),
        }, 'bokul-google');
        const auth = authMod.getAuth(app);
        const res = await authMod.signInWithPopup(auth, new authMod.GoogleAuthProvider());
        const u = res.user;
        const idToken = await u.getIdToken();
        writeSess({ idToken, refreshToken: u.refreshToken, localId: u.uid, email: u.email,
          emailVerified: !!u.emailVerified, expiresAt: Date.now() + 3600000 });
        linkFamily();
        return { ok: true };
      } catch (e) {
        const c = e && (e.code || e.message) || '';
        if (/popup-closed|cancelled/i.test(c)) return { ok: false, err: 'Google penceresi kapatıldı.' };
        return { ok: false, err: 'Google girişi olmadı: ' + c };
      }
    },

    /* E-posta doğrulandı mı? (kullanıcı linke tıkladıysa) */
    async refreshVerified() {
      const t = await freshToken();
      if (!t) return false;
      try {
        const d = await post(IDT + 'lookup', { idToken: t });
        const v = !!(d.users && d.users[0] && d.users[0].emailVerified);
        const s = readSess(); if (s) { s.emailVerified = v; writeSess(s); }
        return v;
      } catch (e) { return B.AuthCloud.isVerified(); }
    },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/core/consent.js === */
/* BOKUL — KVKK / Sözleşme Onayı
 * Kayıt işleminden ÖNCE zorunlu onay. Onaylamayan kayıt olamaz.
 * Onay cihazda saklanır (bokul.consent); metin sürümü değişirse yeniden istenir. */
(function (B) {
  const KEY = 'bokul.consent';
  function legal() { return B.Content.get('legal') || { version: 1, kvkk: '', terms: '', items: [] }; }

  B.Consent = {
    accepted() {
      try { const c = JSON.parse(localStorage.getItem(KEY)); return !!(c && c.version === legal().version); }
      catch (e) { return false; }
    },
    store() {
      try { localStorage.setItem(KEY, JSON.stringify({ version: legal().version, ts: new Date().toISOString() })); } catch (e) {}
    },
    /* Kayıtlı onay bilgisi (tarih/sürüm) veya null */
    info() { try { return JSON.parse(localStorage.getItem(KEY)) || null; } catch (e) { return null; } },
    /* Rızayı geri çek — bir sonraki kayıt yeniden onay ister */
    withdraw() { try { localStorage.removeItem(KEY); } catch (e) {} },
    /* Onay varsa hemen devam; yoksa metni göster, onayda çalıştır */
    require(onAccepted) {
      if (B.Consent.accepted()) return onAccepted();
      B.Consent.show(onAccepted);
    },
    show(onAccepted) {
      const L = legal();
      const ov = document.createElement('div');
      ov.className = 'overlay consent-ov';
      ov.innerHTML =

/* BOKUL — İzinler (Ebeveyn Kilitleri)

 * bulutta "directives" ile uzaktan da ayarlanabilir.
 * Kural: KAYIT YOKSA = SERBEST (varsayılan açık). Yalnızca engellenenler saklanır. */
(function (B) {
  function P(save) {
    const s = save || (B.State && B.State.data) || {};
    if (!s.perms) s.perms = {};
    if (!s.perms.lessons) s.perms.lessons = {};

  B.Perms = {

      { key: 'shop', icon: '🏠', name: 'Evim / Kıyafet Dükkânı' },
      { key: 'quests', icon: '📋', name: 'Günlük Görevler' },
      { key: 'wishes', icon: '🎁', name: 'Dilek Kutusu' },
      { key: 'story', icon: '🎬', name: 'Hikâye Sineması' },
    ],

    /* Ders erişilebilir mi? (kayıt yoksa serbest) */

    /* Özellik erişilebilir mi? */

    /* Ebeveyn: dersi aç/kapa (açıksa kaydı sil — varsayılan açık kalsın) */

/* === src/core/content-registry.js === */
/* BOKUL — ContentRegistry
 * JSON içerik paketlerini yükler: önce sayfaya gömülü blok (dist/tek dosya modu),
 * yoksa fetch (geliştirme modu). Hafif şema doğrulaması yapar. */
(function (B) {
  const store = new Map(); // ad -> veri

  /* İçerik adı → gömülü blok id'si: lessons/math-5-division → bokul-content-lessons-math-5-division */
  function embedId(name) { return 'bokul-content-' + name.replace(/\//g, '-'); }

  /* Zorunlu alan kontrolü — hatalı paket oyunu kırmasın, atlansın */
  const validators = {
    'config':    d => ['starThresholds', 'adaptive', 'unitBoss'].every(k => k in d),
    'dialogues': d => d.pools && typeof d.pools === 'object',
    'rewards':   d => d.xp && d.levels && Array.isArray(d.ranks),
    'lesson':    d => d.id && Array.isArray(d.units) && Array.isArray(d.skills),
  };

  B.Content = {
    async load(name) {
      if (store.has(name)) return store.get(name);
      let data = null;
      const el = document.getElementById(embedId(name));
      if (el) {
        data = JSON.parse(el.textContent);
      } else {
        const res = await fetch('content/' + name + '.json');
        if (!res.ok) throw new Error('İçerik yüklenemedi: ' + name);
        data = await res.json();
      }
      const kind = name.startsWith('lessons/') ? 'lesson' : name;
      const check = validators[kind];
      if (check && !check(data)) {
        console.error('[BOKUL] İçerik paketi şemaya uymuyor, atlanıyor: ' + name);
        return null;
      }
      store.set(name, data);
      return data;
    },

    async loadAll(names) {
      for (const n of names) await B.Content.load(n); // sıralı: hata ayıklaması kolay
    },

    get(name) { return store.get(name) || null; },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/engines/audio-manager.js === */
/* BOKUL — AudioManager
 * Harici ses dosyası YOK: tüm efektler Web Audio API ile sentezlenir.
 * Olayları dinler; kimse "ses çal" demez. */
(function (B) {
  let ctx = null;
  let enabled = true;

  function ac() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }

  /* Tek nota: tip, frekans, süre, ses düzeyi, gecikme */
  function tone(type, freq, dur, vol, delay) {
    if (!enabled) return;
    try {
      const a = ac(), t = a.currentTime + (delay || 0);
      const o = a.createOscillator(), g = a.createGain();
      o.type = type; o.frequency.setValueAtTime(freq, t);
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(vol, t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.connect(g); g.connect(a.destination);
      o.start(t); o.stop(t + dur + 0.05);
    } catch (e) { /* ses yoksa oyun devam */ }
  }

  const sfx = {
    tick:    () => tone('square', 720, 0.06, 0.05),
    correct: () => { tone('sine', 660, 0.12, 0.14); tone('sine', 880, 0.16, 0.12, 0.07); },
    wrong:   () => tone('triangle', 220, 0.25, 0.12),               // yumuşak, cezasız
    star:    (n) => tone('sine', 780 + n * 160, 0.22, 0.16, n * 0.18), // yıldız başına perde yükselir
    fanfare: () => [523, 659, 784, 1047].forEach((f, i) => tone('sine', f, 0.3, 0.16, i * 0.12)),
    hit:     () => { tone('sawtooth', 160, 0.15, 0.14); tone('square', 90, 0.2, 0.1, 0.03); },
    shield:  () => tone('triangle', 340, 0.18, 0.1),
    chest:   () => [440, 554, 659].forEach((f, i) => tone('sine', f, 0.25, 0.14, i * 0.1)),
    blip:    () => tone('square', 260 + Math.random() * 220, 0.045, 0.05), // Komutan mırıltısı
  };

  B.Audio = {
    unlock() { ac(); },                             // ilk kullanıcı dokunuşunda çağrılır
    setEnabled(v) { enabled = v; },
    isEnabled() { return enabled; },
    play(name, arg) { if (sfx[name]) sfx[name](arg); },

    init() {
      enabled = B.Save.settings.get().sound !== false;
      const E = B.Events;
      B.Bus.on(E.STEP_ANSWERED, p => sfx[p.correct ? 'correct' : 'wrong']());
      B.Bus.on(E.QUESTION_COMPLETED, p => { for (let i = 0; i < p.stars; i++) sfx.star(i); });
      B.Bus.on(E.LEVEL_UP, () => sfx.fanfare());
      B.Bus.on(E.BOSS_DAMAGED, () => sfx.hit());
      B.Bus.on(E.BOSS_ATTACKED, () => sfx.shield());
      B.Bus.on(E.BOSS_DEFEATED, () => sfx.fanfare());
    },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/engines/dialogue-manager.js === */
/* BOKUL — DialogueManager
 * Baba Komutan'ın repliklerini bağlama göre seçer.
 * Yer tutucu doldurma + tekrar önleme burada. */
(function (B) {
  const recent = new Map(); // havuz adı -> son seçilen indexler

  function fill(text, vars) {
    return text.replace(/\{(\w+)\}/g, (m, k) => {
      if (vars && vars[k] != null) return vars[k];
      if (k === 'playerName' || k === 'name') return B.State.data.player.name || 'Komutan';
      return m;
    });
  }

  B.Dialogue = {
    /* Havuzdan tekrar etmeyen rastgele replik seç */
    pick(poolName, vars) {
      const pools = (B.Content.get('dialogues') || {}).pools || {};
      const pool = pools[poolName];
      if (!pool) return null;
      if (typeof pool === 'string') return fill(pool, vars);   // tekil ipucu metinleri
      if (!pool.length) return null;

      const memory = recent.get(poolName) || [];
      const banned = new Set(memory.slice(-Math.min(pool.length - 1, 3))); // son 3 tekrar etmesin
      let idx, guard = 20;
      do { idx = Math.floor(Math.random() * pool.length); } while (banned.has(idx) && --guard);
      memory.push(idx);
      recent.set(poolName, memory.slice(-6));
      return fill(pool[idx], vars);
    },

    /* İpucu anahtarı → metin (ders paketindeki hints haritasından gelen anahtarlar) */
    hint(key, vars) { return B.Dialogue.pick(key, vars) || 'Bir daha dene Komutan!'; },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/engines/progress-manager.js === */
/* BOKUL — ProgressManager (Adaptif Sistem)
 * Mikro-beceri başına kayan pencereli ustalık takibi.
 * Soru üreticiler zorluğu buradan sorar; boss kapısı ustalığa bakar. */
(function (B) {
  function cfg() { return (B.Content.get('config') || {}).adaptive || { window: 20, weakThreshold: 0.6, strongThreshold: 0.85 }; }

  B.Progress = {
    /* step:answered olayından beceri kaydı — sadece İLK deneme sayılır
     * (ipucu sonrası düzeltmeler ustalık sayılmaz ama ceza da değildir) */
    record(skill, correct) {
      const per = B.State.data.stats.perSkill;
      if (!per[skill]) per[skill] = [];
      per[skill].push(correct ? 1 : 0);
      if (per[skill].length > cfg().window) per[skill].shift();
    },

    /* 0..1 ustalık: son N denemenin doğruluk oranı (deneme azsa temkinli) */
    mastery(skill) {
      const arr = B.State.data.stats.perSkill[skill] || [];
      if (!arr.length) return 0;
      const ratio = arr.reduce((a, b) => a + b, 0) / arr.length;
      const confidence = Math.min(1, arr.length / 8); // az veriyle şişme olmasın
      return ratio * confidence;
    },

    /* Ders becerilerinin ortalama ustalığı (boss kapısı bunu kullanır) */
    overallMastery(skills) {
      if (!skills || !skills.length) return 0;
      return skills.reduce((t, s) => t + B.Progress.mastery(s), 0) / skills.length;
    },

    /* En zayıf beceri (görev üretimi ve ipucu vurgusu için) */
    weakestSkill(skills) {
      let weakest = skills[0], min = Infinity;
      skills.forEach(s => { const m = B.Progress.mastery(s); if (m < min) { min = m; weakest = s; } });
      return weakest;
    },

    /* Üreticiye zorluk çarpanı: usta ise 1 (tam parametre), zayıfsa 0 (kolay uç) */
    difficultyBias(skills) {
      const m = B.Progress.overallMastery(skills);
      const c = cfg();
      if (m >= c.strongThreshold) return 1;
      if (m <= c.weakThreshold) return 0;
      return (m - c.weakThreshold) / (c.strongThreshold - c.weakThreshold);
    },

    init() {
      B.Bus.on(B.Events.STEP_ANSWERED, p => {
        if (p.attempt === 1) B.Progress.record(p.stepType, p.correct);
        const st = B.State.data.stats;
        if (p.correct) st.correct++; else st.wrong++;
      });
    },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/engines/reward-engine.js === */
/* BOKUL — RewardEngine
 * XP, level, rütbe, seri (streak) ve günlük çalışma serisi ekonomisi.
 * Tüm sayılar content/rewards.json'dan gelir — kodda denge sabiti YOK. */
(function (B) {
  function R() { return B.Content.get('rewards'); }

  /* Level n'i geçmek için gereken XP: base + (n-1)*perLevel */
  function xpForLevel(n) { const L = R().levels; return L.base + (n - 1) * L.perLevel; }

  B.Reward = {
    /* ---- XP ---- */
    addXp(amount, source, opts) {
      opts = opts || {};
      let final = amount;
      if (opts.applyStreak) final = Math.round(final * B.Reward.streakMultiplier());
      final = Math.round(final * (1 + B.Reward.dailyBonus()));
      const p = B.State.data.player;
      p.xp += final;
      B.Bus.emit(B.Events.XP_GAINED, { amount: final, source });
      // Level kontrolü (tek olayda birden çok level atlanabilir)
      while (p.xp >= B.Reward.xpNeeded()) {
        p.xp -= B.Reward.xpNeeded();
        p.level++;
        const rank = B.Reward.rankFor(p.level);
        const rankChanged = rank.id !== p.rank;
        p.rank = rank.id;
        B.Bus.emit(B.Events.LEVEL_UP, { newLevel: p.level, newRank: rankChanged ? rank : null });
      }
      return final;
    },

    xpNeeded() { return xpForLevel(B.State.data.player.level); },

    rankFor(level) {
      const ranks = R().ranks;
      let cur = ranks[0];
      ranks.forEach(r => { if (level >= r.minLevel) cur = r; });
      return cur;
    },

    /* ---- Hatasız hedef serisi ---- */
    streakMultiplier() {
      const mults = R().xp.streakMultipliers;
      const s = B.State.data.streaks.current;
      let m = 1;
      Object.keys(mults).map(Number).sort((a, b) => a - b)
        .forEach(k => { if (s >= k) m = mults[k]; });
      return m;
    },

    onQuestionDone(flawless) {
      const st = B.State.data.streaks;
      if (flawless) {
        st.current++;
        if (st.current > st.best) st.best = st.current;
      } else st.current = 0;
      B.Bus.emit(B.Events.STREAK_CHANGED, { count: st.current, multiplier: B.Reward.streakMultiplier() });
    },

    /* ---- Günlük çalışma serisi (login değil, HAREKÂT bitirme serisi) ---- */
    dailyBonus() {
      const x = R().xp;
      return Math.min(B.State.data.streaks.dailyDays * x.dailyStreakBonusPerDay, x.dailyStreakBonusMax);
    },

    registerDailyPlay() {
      const st = B.State.data.streaks;
      const today = new Date(); today.setHours(0, 0, 0, 0);
      const todayStr = today.toISOString().slice(0, 10);
      if (st.lastPlayDate === todayStr) return;
      if (st.lastPlayDate) {
        const diff = Math.round((today - new Date(st.lastPlayDate)) / 86400000);
        if (diff === 1) st.dailyDays++;
        else if (diff > 1) st.dailyDays = Math.max(0, st.dailyDays - 2); // kırılınca sıfırlama YOK: 2 kademe düşer
      } else st.dailyDays = 1;
      st.lastPlayDate = todayStr;
    },

    /* ---- Altın (para) ---- */
    addCoins(amount, source) {
      const p = B.State.data.player;
      p.coins = (p.coins || 0) + amount;
      B.Bus.emit(B.Events.COINS_CHANGED, { total: p.coins, delta: amount });
      return amount;
    },
    spendCoins(amount) {
      const p = B.State.data.player;
      if ((p.coins || 0) < amount) return false;
      p.coins -= amount;
      B.Bus.emit(B.Events.COINS_CHANGED, { total: p.coins, delta: -amount });
      B.Save.saveSoon();
      return true;
    },

    /* ---- Soru/görev ödül yardımcıları ---- */
    stepXp() { return R().xp.perStep; },
    questionXp(stars) { return R().xp.perQuestionByStars[String(stars)] || 0; },
    missionBonus() { return R().xp.missionBonus; },
    bossXp(tier) { return tier === 'unit' ? R().xp.bossUnit : R().xp.bossTopic; },

    init() {
      // Harekât bittiğinde günlük seri işlenir
      B.Bus.on(B.Events.MISSION_COMPLETED, () => B.Reward.registerDailyPlay());
    },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/engines/question-engine.js === */
/* BOKUL — QuestionEngine
 * Soru tipi plugin çatısı. Her tip registerType ile kaydolur:
 *   { generate(params, bias), getSteps(q), validateStep(q, step, answer) }
 * Motor tiplerin içini bilmez — Open/Closed. */
(function (B) {
  const types = new Map();
  const views = new Map(); // tip adı -> görünüm oluşturucu (container, q, opts) => ctl

  B.Question = {
    registerType(name, impl) {
      ['generate', 'getSteps', 'validateStep'].forEach(k => {
        if (typeof impl[k] !== 'function') throw new Error('Soru tipi eksik metod: ' + name + '.' + k);
      });
      types.set(name, impl);
    },

    registerView(name, createFn) { views.set(name, createFn); },
    view(name) {
      const v = views.get(name);
      if (!v) throw new Error('Kayıtsız soru görünümü: ' + name);
      return v;
    },

    type(name) {
      const t = types.get(name);
      if (!t) throw new Error('Kayıtsız soru tipi: ' + name);
      return t;
    },

    /* Üret: adaptif zorluk çarpanı ProgressManager'dan alınır */
    generate(typeName, params, skills) {
      const bias = skills ? B.Progress.difficultyBias(skills) : 0.5;
      const q = B.Question.type(typeName).generate(params || {}, bias);
      q._type = typeName;
      return q;
    },

    steps(q) { return B.Question.type(q._type).getSteps(q); },
    validate(q, step, answer) { return B.Question.type(q._type).validateStep(q, step, answer); },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/engines/lesson-engine.js === */
/* BOKUL — LessonEngine
 * Ders paketini (cephe) yorumlar: ünite → bölüm → harekât → boss akışı,
 * kilit kuralları ve ustalık kapısı. İçeriğin ANLAMINI bilmez. */
(function (B) {
  let lesson = null;       // aktif ders paketi
  const registry = [];     // yüklü tüm dersler (cepheler)

  function cfg() { return B.Content.get('config') || {}; }

  B.Lesson = {
    register(lessonData) { if (lessonData) registry.push(lessonData); },
    all() { return registry; },
    setActive(lessonData) { lesson = lessonData; },
    active() { return lesson; },

    sections() {
      const out = [];
      lesson.units.forEach(u => u.sections.forEach(s => out.push({ unit: u, section: s })));
      return out;
    },

    findSection(sectionId) {
      return B.Lesson.sections().find(x => x.section.id === sectionId) || null;
    },

    findMission(sectionId, missionId) {
      const s = B.Lesson.findSection(sectionId);
      return s ? s.section.missions.find(m => m.id === missionId) : null;
    },

    /* Üretici çözümleme: { pool: "sX" } gibi bölüm referanslarını
     * o bölümün soru bankasına çevirir (çoktan seçmeli dersler için). */
    resolveGenerator(sectionId, gen) {
      if (!gen || typeof gen.pool !== 'string') return gen;
      const ref = B.Lesson.findSection(gen.pool) || B.Lesson.findSection(sectionId);
      return { pool: (ref && ref.section.bank) || [] };
    },

    /* ---- Kilit kuralları ---- */

    /* Bölüm çocuğun sınıf seviyesine uygun mu? (değilse haritada "X. sınıfta açılır") */
    gradeLocked(sectionId) {
      const f = B.Lesson.findSection(sectionId);
      return !!(f && B.Curriculum && !B.Curriculum.gradeOk(f.section));
    },

    /* Bölüm açık mı? Sınıf uygun + önceki bölüm tamamlanmış olmalı */
    isSectionUnlocked(sectionId) {
      if (B.Lesson.gradeLocked(sectionId)) return false; // sınıf kilidi
      const list = B.Lesson.sections();
      const idx = list.findIndex(x => x.section.id === sectionId);
      if (idx <= 0) return true;
      const prev = list[idx - 1].section;
      const need = (list[idx].section.unlock || {}).starsRequired ?? (cfg().sectionUnlockStars || 16);
      const prevProg = B.State.sectionProgress(lesson.id, prev.id);
      return prevProg.bossDefeated && B.State.sectionStars(lesson.id, prev.id) >= need;
    },

    /* Harekât oynanabilir mi? Kendinden önceki harekât tamamlanmış olmalı (tekrar hep serbest) */
    isMissionUnlocked(sectionId, missionId) {
      if (!B.Lesson.isSectionUnlocked(sectionId)) return false;
      const sec = B.Lesson.findSection(sectionId).section;
      const idx = sec.missions.findIndex(m => m.id === missionId);
      if (idx <= 0) return true;
      const prevId = sec.missions[idx - 1].id;
      return !!B.State.sectionProgress(lesson.id, sectionId).missions[prevId];
    },

    /* Boss kapısı: tüm harekâtlar bitmiş + kazanım ustalığı yeterli */
    bossGate(sectionId) {
      const sec = B.Lesson.findSection(sectionId).section;
      const prog = B.State.sectionProgress(lesson.id, sectionId);
      const missionsDone = sec.missions.every(m => prog.missions[m.id]);
      const need = (sec.boss.unlock || {}).masteryRequired ?? (cfg().mastery || {}).bossGate ?? 0.8;
      const mastery = B.Progress.overallMastery(lesson.skills);
      return { missionsDone, mastery, need, open: missionsDone && mastery >= need };
    },

    /* ---- Tamamlama kayıtları ---- */

    completeMission(sectionId, missionId, stars) {
      const prog = B.State.sectionProgress(lesson.id, sectionId);
      const prev = prog.missions[missionId];
      // Yıldız sadece yükselir, asla düşmez (tekrar oynama tamamlamacılığı besler)
      prog.missions[missionId] = { stars: Math.max(stars, prev ? prev.stars : 0) };
    },

    defeatBoss(sectionId) {
      const prog = B.State.sectionProgress(lesson.id, sectionId);
      prog.bossDefeated = true;
      prog.bossHpCarry = 0;
      const list = B.Lesson.sections();
      const idx = list.findIndex(x => x.section.id === sectionId);
      const next = list[idx + 1];
      if (next && B.Lesson.isSectionUnlocked(next.section.id)) {
        B.Bus.emit(B.Events.SECTION_UNLOCKED, { sectionId: next.section.id });
      }
    },

    /* Review harekâtı için: bu bölüme kadarki AYNI soru tipindeki üreticiler.
     * (Aritmetik ile uzun bölme karışmasın.) */
    reviewGenerators(sectionId) {
      const list = B.Lesson.sections();
      const idx = list.findIndex(x => x.section.id === sectionId);
      const curSec = idx >= 0 ? list[idx].section : null;
      const typeOf = sec => sec.interactionType || (lesson || {}).interactionType;
      const curType = curSec ? typeOf(curSec) : null;
      const gens = [];
      list.slice(0, idx + 1).forEach(x => {
        if (typeOf(x.section) !== curType) return; // yalnızca aynı tip
        x.section.missions.forEach(m => {
          if (m.generator && (m.type === 'practice' || m.type === 'guided')) {
            gens.push(B.Lesson.resolveGenerator(x.section.id, m.generator));
          }
        });
      });
      if (gens.length) return gens;
      // Yedek: tipe uygun basit varsayılan
      return [curType === 'arithmetic' ? { op: '+', a: [1, 10], b: [1, 10] } : { divisorRange: [2, 5], dividendDigits: 1 }];
    },

    /* Harekâtın ipucu anahtarını getir: hints[stepType][hataSeviyesi] → rastgele anahtar */
    hintKey(stepType, level) {
      const h = (lesson.hints || {})[stepType];
      if (!h) return null;
      const lv = Math.min(level, 3);
      const keys = h[String(lv)] || h['1'] || [];
      return keys[Math.floor(Math.random() * keys.length)] || null;
    },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/engines/chest-engine.js === */
/* BOKUL — Sandık Motoru
 * Kazanma tetikleri olaylardan; içerik rewards.json'dan.
 * Kopya koruması: açılmamış kozmetik bitmeden aynı şey çıkmaz;
 * her şey açıldıysa XP paketi düşer. */
(function (B) {
  const TYPE_META = {
    bronze:    { name: 'Bronz Sandık',    icon: '🥉' },
    silver:    { name: 'Gümüş Sandık',    icon: '🥈' },
    gold:      { name: 'Altın Sandık',    icon: '🥇' },
    epic:      { name: 'Epik Sandık',     icon: '💎' },
    legendary: { name: 'Efsanevi Sandık', icon: '🏆' },
  };

  function R() { return B.Content.get('rewards'); }

  function inv() {
    const i = B.State.data.inventory;
    if (!i.chests) i.chests = [];
    if (i.starBank == null) i.starBank = 0;
    return i;
  }

  B.Chest = {
    meta(type) { return TYPE_META[type]; },
    queue() { return inv().chests; },

    earn(type) {
      inv().chests.push(type);
      B.Bus.emit(B.Events.CHEST_EARNED, { chestType: type });
      B.UI.toast(TYPE_META[type].icon + ' ' + TYPE_META[type].name + ' kazandın!');
      B.Save.saveSoon();
    },

    /* Nadirlik çek: drops yüzdelerinden; o nadirlikte açılmamış kozmetik yoksa alta düş */
    roll(type) {
      const drops = R().chests[type].drops;
      let r = Math.random() * 100, rarity = 'common';
      for (const k of Object.keys(drops)) { r -= drops[k]; if (r <= 0) { rarity = k; break; } }
      if (rarity === 'xpPack') return { xpPack: 50 };

      const order = ['legendary', 'epic', 'rare', 'common'];
      const owned = B.State.data.inventory.cosmetics;
      let idx = order.indexOf(rarity);
      if (idx < 0) idx = 3;
      for (let i = idx; i < order.length; i++) {
        const pool = R().cosmetics.filter(c => c.rarity === order[i] && !owned.includes(c.id));
        if (pool.length) return { item: pool[Math.floor(Math.random() * pool.length)] };
      }
      // her nadirlikte de her şey açık → tatlı teselli
      return { xpPack: 50 };
    },

    /* Kuyruktaki ilk sandığı aç, sonucu döndür (tören ChestUI'da) */
    openNext() {
      const q = inv().chests;
      if (!q.length) return null;
      const type = q.shift();
      const result = B.Chest.roll(type);
      // Her sandıktan taban altın da çıkar (dükkân ekonomisini besler)
      const baseCoins = { bronze: 20, silver: 30, gold: 50, epic: 80, legendary: 150 }[type] || 20;
      result.coins = baseCoins;
      B.Reward.addCoins(baseCoins, 'chest');
      if (result.item) {
        B.State.data.inventory.cosmetics.push(result.item.id);
        B.Bus.emit(B.Events.COSMETIC_UNLOCKED, { itemId: result.item.id });
      } else {
        B.Reward.addXp(result.xpPack, 'chest');
      }
      B.Bus.emit(B.Events.CHEST_OPENED, { chestType: type, item: result.item || null });
      B.Save.saveSoon();
      return { type, result };
    },

    init() {
      // Bronz: toplanan her 10 yıldız
      B.Bus.on(B.Events.QUESTION_COMPLETED, p => {
        const i = inv();
        i.starBank += p.stars;
        const every = R().chests.bronze.every || 10;
        while (i.starBank >= every) { i.starBank -= every; B.Chest.earn('bronze'); }
      });
      // Altın: level atlama
      B.Bus.on(B.Events.LEVEL_UP, () => B.Chest.earn('gold'));
      // Epik/Efsanevi: boss zaferleri
      B.Bus.on(B.Events.BOSS_DEFEATED, p => B.Chest.earn(p.tier === 'unit' ? 'legendary' : 'epic'));
      // Gümüş: günlük görevler v0.8'de — tetik orada bağlanacak
    },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/engines/quest-engine.js === */
/* BOKUL — Quest Engine (Günün Emirleri)
 * Her gün 3 günlük görev üretir; ilerlemeyi olaylardan takip eder.
 * Görev bitince "TOPLA" ile ödül alınır; hepsi toplanınca Gümüş sandık gelir. */
(function (B) {
  function today() { return new Date().toISOString().slice(0, 10); }
  function Q() { return B.Content.get('quests') || { daily: [] }; }
  function rnd(a, b) { return a + Math.floor(Math.random() * (b - a + 1)); }

  /* Yeni günse 3 günlük görev seç ve sıfırla */
  function ensureDaily() {
    const st = B.State.data.quests;
    if (st.lastDailyReset === today() && st.daily && st.daily.length) return;
    const tpls = (Q().daily || []).slice();
    const picked = [];
    for (let i = 0; i < 3 && tpls.length; i++) {
      const t = tpls.splice(Math.floor(Math.random() * tpls.length), 1)[0];
      const target = t.n ? rnd(t.n[0], t.n[1]) : 1;
      picked.push({
        tpl: t.id, text: t.text.replace('{n}', target),
        target, progress: 0, done: false, claimed: false,
        xp: t.xp, coins: t.coins, track: t.track, filter: t.filter || null,
      });
    }
    st.daily = picked;
    st.lastDailyReset = today();
    B.Save.saveSoon();
  }

  function matches(q, event, payload) {
    if (q.track !== event) return false;
    if (q.filter) for (const k in q.filter) if (payload[k] !== q.filter[k]) return false;
    return true;
  }

  function bump(event, payload) {
    const st = B.State.data.quests;
    if (!st.daily) return;
    let changed = false;
    st.daily.forEach(q => {
      if (q.done || !matches(q, event, payload)) return;
      q.progress = Math.min(q.target, q.progress + 1);
      if (q.progress >= q.target) q.done = true;
      changed = true;
    });
    if (changed) { B.Bus.emit(B.Events.QUEST_PROGRESS, {}); B.Save.saveSoon(); }
  }

  B.Quest = {
    ensureDaily,
    daily() { ensureDaily(); return B.State.data.quests.daily; },
    /* Toplanmayı bekleyen (bitmiş ama ödülü alınmamış) görev sayısı */
    pending() { ensureDaily(); return B.State.data.quests.daily.filter(q => q.done && !q.claimed).length; },

    claim(q) {
      if (!q.done || q.claimed) return null;
      q.claimed = true;
      B.Reward.addXp(q.xp || 50, 'quest');
      B.Reward.addCoins(q.coins || 20, 'quest');
      B.Bus.emit(B.Events.QUEST_COMPLETED, {});
      // Tüm günlük görevler toplandıysa Gümüş sandık ödülü
      if (B.State.data.quests.daily.every(x => x.claimed)) B.Chest.earn('silver');
      B.Save.saveSoon();
      return { xp: q.xp, coins: q.coins };
    },

    init() {
      const E = B.Events;
      B.Bus.on(E.QUESTION_COMPLETED, p => bump('question:completed', p));
      B.Bus.on(E.MISSION_COMPLETED, p => bump('mission:completed', p));
      B.Bus.on(E.BOSS_DEFEATED, p => bump('boss:defeated', p));
      B.Bus.on(E.STEP_ANSWERED, p => bump('step:answered', p));
    },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/engines/wish-engine.js === */
/* BOKUL — Wish Engine (Dilek Kutusu + Ebeveyn Hedefleri)
 * Çocuk gerçek hayattan bir ödül ister (oyuncak vb.) veya oyuna fikir verir.
 * Ebeveyn konsolu bir isteğe oyun-içi HEDEF bağlar (ör. 30 hedef tamamla).
 * Çocuk hedefe ulaşınca istek "hak edildi" olur; ebeveyn gerçek ödülü verir.
 * Metrik hesapları hem aktif oyuncu hem admin (diğer kayıtlar) için ortaktır. */
(function (B) {

  /* Ebeveyn tarafından atanabilen, oyun-içi ölçülebilir hedefler */
  const METRICS = {
    targets: { name: 'Hedef tamamla', icon: '🎯' },
    level:   { name: 'Seviyeye ulaş', icon: '⭐' },
    stars:   { name: 'Yıldız topla',  icon: '🌟' },
    bosses:  { name: 'Boss yen',      icon: '🏰' },
  };

  function sumStars(save) {
    let s = 0;
    const L = (save.progress && save.progress.lessons) || {};
    Object.values(L).forEach(les => Object.values(les.sections || {}).forEach(sec =>
      Object.values(sec.missions || {}).forEach(m => { s += m.stars || 0; })));
    return s;
  }
  function countBosses(save) {
    let n = 0;
    const L = (save.progress && save.progress.lessons) || {};
    Object.values(L).forEach(les => Object.values(les.sections || {}).forEach(sec => { if (sec.bossDefeated) n++; }));
    return n;
  }

  function newId() { return 'w' + Date.now().toString(36) + Math.floor(Math.random() * 1000); }

  B.Wish = {
    METRICS,

    /* Bir kayıt (save-like) için metrik değeri */
    value(save, metric) {
      switch (metric) {
        case 'level':   return save.player.level || 1;
        case 'targets': return (save.stats && save.stats.questionsDone) || 0;
        case 'stars':   return sumStars(save);
        case 'bosses':  return countBosses(save);
        default:        return 0;
      }
    },

    /* Hedefli bir isteğin ilerlemesi */
    progress(save, wish) {
      if (!wish.goal) return null;
      const cur = B.Wish.value(save, wish.goal.metric);
      const target = wish.goal.target || 1;
      return { cur, target, pct: Math.min(100, Math.round(cur / target * 100)), done: cur >= target };
    },

    /* ---- Aktif oyuncu (çocuk) tarafı ---- */
    addWish(text) {
      text = String(text || '').trim();
      if (!text) return;
      B.State.data.wishes.push({ id: newId(), text, created: new Date().toISOString(), status: 'pending', goal: null, note: '' });
      B.Save.saveSoon();
    },
    addIdea(text) {
      text = String(text || '').trim();
      if (!text) return;
      B.State.data.ideas.push({ id: newId(), text, created: new Date().toISOString(), status: 'new', note: '' });
      B.Save.saveSoon();
    },
    myWishes() { return B.State.data.wishes || []; },
    myIdeas() { return B.State.data.ideas || []; },

    /* Atanmış hedefler tamamlandı mı? Tamamlandıysa "hak edildi" yap + müjde */
    checkEarned() {
      let changed = false;
      (B.State.data.wishes || []).forEach(w => {
        if (w.goal && w.status === 'assigned') {
          if (B.Wish.value(B.State.data, w.goal.metric) >= w.goal.target) {
            w.status = 'earned';
            changed = true;
            B.UI.toast('🎉 "' + w.text + '" ödülünü hak ettin! Baba\'na göster.');
            B.Bus.emit(B.Events.WISH_EARNED, {});
          }
        }
      });
      if (changed) B.Save.saveSoon();
    },

    init() {
      const E = B.Events;
      B.Bus.on(E.QUESTION_COMPLETED, p => {
        const st = B.State.data.stats;
        st.questionsDone = (st.questionsDone || 0) + 1;
        if (p && p.firstTry) st.firstTryCorrect = (st.firstTryCorrect || 0) + 1;
        if (p && typeof p.ms === 'number') st.timeSumMs = (st.timeSumMs || 0) + p.ms;
        B.Wish.checkEarned();
      });
      B.Bus.on(E.LEVEL_UP, () => B.Wish.checkEarned());
      B.Bus.on(E.BOSS_DEFEATED, () => B.Wish.checkEarned());
    },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/interactions/long-division/logic.js === */
/* BOKUL — Uzun Bölme Mantığı (saf — DOM YOK, test edilebilir)
 * Bir bölme işlemini 5 tip mikro-adıma çözümler:
 *   select   → ilk çalışma sayısı için kaç basamak alınacağı
 *   estimate → bölüm rakamı tahmini
 *   multiply → tahmin × bölen
 *   subtract → fark (kale kuralı: fark < bölen)
 *   bringdown→ sonraki basamağı indir
 * computePlan() tüm adım listesini ve beklenen cevapları üretir. */
(function (B) {

  /* İşlem planını çıkar: her adım { type, expected, ... } */
  function computePlan(dividend, divisor) {
    const digits = String(dividend).split('').map(Number);
    const steps = [];

    // İlk çalışma sayısı: bölenden küçük olmayan en kısa önek
    let idx = 0, current = 0;
    do { current = current * 10 + digits[idx]; idx++; }
    while (current < divisor && idx < digits.length);
    steps.push({ type: 'select', expected: idx });

    const qDigits = [];
    // İterasyon bilgileri görünüm katmanı için saklanır (kolon hizalama)
    while (true) {
      const q = Math.floor(current / divisor);
      qDigits.push(q);
      const endCol = idx - 1; // çalışma sayısının son basamağının kolonu
      steps.push({ type: 'estimate', expected: q, endCol });
      const p = q * divisor;
      steps.push({ type: 'multiply', expected: p, endCol, working: current });
      const r = current - p;
      steps.push({ type: 'subtract', expected: r, endCol, working: current, product: p });
      if (idx < digits.length) {
        steps.push({ type: 'bringdown', expected: digits[idx], digitIndex: idx, endCol });
        current = r * 10 + digits[idx];
        idx++;
      } else {
        return {
          dividend, divisor, steps,
          quotient: Number(qDigits.join('')),
          remainder: r,
        };
      }
    }
  }

  /* Rastgele soru üretici.
   * params: { divisorRange:[a,b], dividendDigits:n|[min,max], remainder:bool, context? }
   * bias 0..1: adaptif zorluk — 0 kolay uç, 1 zor uç */
  function generate(params, bias) {
    const rnd = (a, b) => a + Math.floor(Math.random() * (b - a + 1));
    const dr = params.divisorRange || [2, 9];
    // bias yüksekse bölen aralığın üst ucuna kayar
    const divisor = rnd(dr[0], Math.max(dr[0], Math.round(dr[0] + (dr[1] - dr[0]) * (0.4 + 0.6 * bias))));

    let dd = params.dividendDigits || 2;
    if (Array.isArray(dd)) dd = rnd(dd[0], Math.max(dd[0], Math.round(dd[0] + (dd[1] - dd[0]) * bias)));

    let dividend;
    if (params.remainder) {
      // Kalanlı: uygun basamakta, tam bölünmeyen sayı bul
      let guard = 200;
      do {
        dividend = rnd(Math.pow(10, dd - 1), Math.pow(10, dd) - 1);
      } while ((dividend % divisor === 0 || dividend < divisor) && --guard);
    } else {
      // Kalansız: bölümü kur, çarparak bölüneni üret (basamak sayısı tutana dek)
      let guard = 200;
      do {
        const qMin = Math.ceil(Math.pow(10, dd - 1) / divisor);
        const qMax = Math.floor((Math.pow(10, dd) - 1) / divisor);
        const q = rnd(Math.max(1, qMin), Math.max(1, qMax));
        dividend = q * divisor;
      } while ((String(dividend).length !== dd || dividend < divisor) && --guard);
    }

    const plan = computePlan(dividend, divisor);
    return { dividend, divisor, plan, params };
  }

  const impl = {
    generate,
    getSteps(q) { return q.plan.steps; },
    validateStep(q, step, answer) {
      const val = Number(answer);
      if (step.type === 'select') return { correct: val === step.expected };
      return { correct: val === step.expected };
    },
  };

  // Tarayıcıda plugin olarak kaydol; Node'da (test) modül olarak dışa aç
  if (B && B.Question) B.Question.registerType('long-division', impl);
  if (B) B.LongDivision = { computePlan, generate, impl };
  if (typeof module !== 'undefined' && module.exports) {
    module.exports = { computePlan, generate, impl };
  }
})(typeof window !== 'undefined' ? (window.BOKUL = window.BOKUL || {}) : null);

/* === src/interactions/long-division/teach-models.js === */
/* BOKUL — Öğretim Modelleri (CPA: Somut → Görsel → Soyut)
 * teach harekâtlarının senaryo oynatıcısı. Senaryo adımları ders paketindeki
 * teachScripts'ten gelir; buradaki motor sadece oynatır.
 *
 * Adım türleri:
 *   { say: "..." }                        → Komutan konuşur, DEVAM ile geçilir
 *   { deal: { total, groups } }           → somut: kutuları takımlara paylaştır
 *   { pv:   { number, divisor } }         → görsel: basamak (onluk/birlik) tablosu
 *   { ask:  "...", expect: n }            → mini soru (küçük ped ile)
 *   { guided: { dividend, divisor } }     → soyut: koçlu ilk uzun bölme
 */
(function (B) {

  function el(tag, cls, text) {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    if (text != null) e.textContent = text;
    return e;
  }

  function run(container, scriptSteps, api) {
    let i = -1;
    let cleanup = null;

    function next() {
      if (cleanup) { cleanup(); cleanup = null; }
      i++;
      const s = scriptSteps[i];
      if (!s) return api.onComplete();
      container.innerHTML = '';

      if (s.say) return doSay(s);
      if (s.objects) return doObjects(s.objects);
      if (s.groups) return doGroups(s.groups);
      if (s.deal) return doDeal(s.deal);
      if (s.pv) return doPv(s.pv);
      if (s.ask) return doAsk(s);
      if (s.guided) return doGuided(s.guided);
      next(); // bilinmeyen adım atlanır
    }

    /* --- GÖRSEL: nesnelerle toplama/çıkarma --- */
    function doObjects(cfg) {
      // cfg: { a, b, emoji, op:'+'|'-' }  → a nesne (op) b nesne = ?
      const em = cfg.emoji || '🍎';
      const stage = el('div', 'teach-stage');
      const row = el('div', 'obj-row');
      const g1 = el('div', 'obj-group');
      for (let k = 0; k < cfg.a; k++) g1.appendChild(el('span', 'obj', em));
      const opEl = el('div', 'obj-op', cfg.op === '-' ? '−' : '+');
      const g2 = el('div', 'obj-group' + (cfg.op === '-' ? ' obj-gone' : ''));
      for (let k = 0; k < cfg.b; k++) g2.appendChild(el('span', 'obj', em));
      const eq = el('div', 'obj-op', '=');
      const res = el('div', 'obj-res', '?');
      row.appendChild(g1); row.appendChild(opEl); row.appendChild(g2); row.appendChild(eq); row.appendChild(res);
      stage.appendChild(row);
      const total = cfg.op === '-' ? (cfg.a - cfg.b) : (cfg.a + cfg.b);
      const reveal = el('button', 'btn btn-action teach-next', 'CEVABI GÖSTER 👀');
      reveal.onclick = () => {
        res.textContent = total; res.classList.add('obj-lit');
        B.Audio.play('correct');
        reveal.textContent = 'DEVAM ▶';
        reveal.onclick = () => { B.Audio.play('tick'); next(); };
      };
      container.appendChild(stage);
      container.appendChild(reveal);
    }

    /* --- GÖRSEL: gruplarla çarpma --- */
    function doGroups(cfg) {
      // cfg: { n, per, emoji }  → n grup × per nesne
      const em = cfg.emoji || '⭐';
      const stage = el('div', 'teach-stage');
      stage.appendChild(el('div', 'grp-title', cfg.n + ' grup × ' + cfg.per + ' tane'));
      const wrap = el('div', 'grp-wrap');
      for (let g = 0; g < cfg.n; g++) {
        const box = el('div', 'grp-box');
        for (let k = 0; k < cfg.per; k++) box.appendChild(el('span', 'obj', em));
        wrap.appendChild(box);
      }
      stage.appendChild(wrap);
      const res = el('div', 'obj-res', cfg.n + ' × ' + cfg.per + ' = ?');
      stage.appendChild(res);
      const reveal = el('button', 'btn btn-action teach-next', 'CEVABI GÖSTER 👀');
      reveal.onclick = () => {
        res.textContent = cfg.n + ' × ' + cfg.per + ' = ' + (cfg.n * cfg.per); res.classList.add('obj-lit');
        B.Audio.play('correct');
        reveal.textContent = 'DEVAM ▶';
        reveal.onclick = () => { B.Audio.play('tick'); next(); };
      };
      container.appendChild(stage);
      container.appendChild(reveal);
    }

    /* --- Komutan anlatımı --- */
    function doSay(s) {
      api.say(s.say);
      const btn = el('button', 'btn btn-action teach-next', 'DEVAM ▶');
      btn.onclick = () => { B.Audio.play('tick'); next(); };
      container.appendChild(el('div', 'teach-stage teach-say', '🫡'));
      container.appendChild(btn);
    }

    /* --- SOMUT: kutu paylaştırma ---
     * Kural: bir takıma, en az kutusu olan takımdan fazlası verilemez (eşit paylaşım öğretisi) */
    function doDeal(cfg) {
      api.say(B.Dialogue.pick('teach.deal.intro', { total: cfg.total, groups: cfg.groups }) ||
              cfg.total + ' kutuyu ' + cfg.groups + ' takıma EŞİT paylaştır. Takımlara dokun!');
      const stage = el('div', 'teach-stage');
      const supply = el('div', 'deal-supply');
      let left = cfg.total;
      const counts = new Array(cfg.groups).fill(0);
      const supplyLabel = el('div', 'deal-count', '📦 × ' + left);
      supply.appendChild(supplyLabel);
      stage.appendChild(supply);

      const groupsRow = el('div', 'deal-groups');
      const groupEls = [];
      for (let g = 0; g < cfg.groups; g++) {

        box.appendChild(el('div', 'deal-group-title', 'Takım ' + (g + 1)));
        const crates = el('div', 'deal-crates');
        box.appendChild(crates);
        box.onclick = () => {
          if (!left) return;
          const min = Math.min(...counts);
          if (counts[g] > min) { // eşitlik bozuluyor → nazik uyarı
            B.Audio.play('wrong');
            api.say(B.Dialogue.pick('teach.deal.unfair') || 'Eşit paylaştır Komutan — önce az olan takıma!');
            return;
          }
          counts[g]++; left--;
          B.Audio.play('tick');
          crates.appendChild(el('span', 'deal-crate', '📦'));
          supplyLabel.textContent = '📦 × ' + left;
          if (!left) {
            B.Audio.play('correct');
            api.say(B.Dialogue.pick('teach.deal.done', { each: counts[0] }) ||
                    'Paylaştırma tamam! Her takıma ' + counts[0] + ' kutu düştü. İşte BÖLME budur.');
            setTimeout(next, 1600);

        groupsRow.appendChild(box);

      stage.appendChild(groupsRow);

    function doPv(cfg) {

      const stage = el('div', 'teach-stage');
      const table = el('div', 'pv-table');
      const colT = el('div', 'pv-col');
      colT.appendChild(el('div', 'pv-title', 'ONLUKLAR'));
      const tRow = el('div', 'pv-blocks');
      for (let i = 0; i < tens; i++) tRow.appendChild(el('span', 'pv-ten', '10'));
      colT.appendChild(tRow);
      const colO = el('div', 'pv-col');
      colO.appendChild(el('div', 'pv-title', 'BİRLİKLER'));
      const oRow = el('div', 'pv-blocks');
      for (let i = 0; i < ones; i++) oRow.appendChild(el('span', 'pv-one', '1'));
      colO.appendChild(oRow);
      table.appendChild(colT); table.appendChild(colO);
      stage.appendChild(el('div', 'pv-number', cfg.number + ' ÷ ' + cfg.divisor));
      stage.appendChild(table);
      container.appendChild(stage);
      const btn = el('button', 'btn btn-action teach-next', 'DEVAM ▶');
      btn.onclick = () => { B.Audio.play('tick'); next(); };
      container.appendChild(btn);

    /* --- Mini soru (küçük ped) --- */
    function doAsk(s) {

      const display = el('div', 'ask-display', '?');
      stage.appendChild(display);
      const pad = el('div', 'numpad numpad-mini');
      let buf = '';
      '1234567890'.split('').forEach(k => {
        const b = el('button', 'key', k);
        b.onclick = () => { B.Audio.play('tick'); if (buf.length < 4) { buf += k; display.textContent = buf; } };
        pad.appendChild(b);
      });
      const back = el('button', 'key key-back', '⌫');
      back.onclick = () => { buf = buf.slice(0, -1); display.textContent = buf || '?'; };
      const ok = el('button', 'key key-go', '✔');
      ok.onclick = () => {
        if (!buf) return;
        if (Number(buf) === s.expect) {
          B.Audio.play('correct');
          api.say(B.Dialogue.pick('correct'));
          setTimeout(next, 1100);
        } else {
          B.Audio.play('wrong');
          buf = ''; display.textContent = '?';
          api.say(B.Dialogue.pick('wrong.soft'));
        }
      };
      pad.appendChild(back); pad.appendChild(ok);
      stage.appendChild(pad);
      container.appendChild(stage);
    }

    /* --- SOYUT: koçlu ilk uzun bölme --- */
    function doGuided(cfg) {
      const q = {
        dividend: cfg.dividend, divisor: cfg.divisor,
        plan: B.LongDivision.computePlan(cfg.dividend, cfg.divisor),
        _type: 'long-division',

      const view = B.LongDivisionView.create(container, q, {
        coach: true,

        },
        onComplete() {
          api.say(B.Dialogue.pick('teach.guided.done') || 'İlk uzun bölmeni bitirdin Komutan! Artık hazırsın.');
          setTimeout(next, 1600);
        },
      });
      cleanup = () => view.destroy();
    }

    next();
    return { destroy() { if (cleanup) cleanup(); container.innerHTML = ''; } };
  }

  B.TeachModels = { run };
