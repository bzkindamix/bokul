          '<div class="gender-row">' +
            '<button class="gender-card" data-g="kiz"><span class="gender-prev">' + B.Avatar.svg(kiz) + '</span><span class="gender-name">KIZ</span></button>' +
            '<button class="gender-card" data-g="erkek"><span class="gender-prev">' + B.Avatar.svg(erkek) + '</span><span class="gender-name">ERKEK</span></button>' +
          '</div>';
        root.querySelectorAll('.gender-card').forEach(c => {
          c.onclick = () => {
            B.Audio.play('correct');
            B.State.data.player.avatar = B.Avatar.preset(c.dataset.g);
            stepAgeGrade();
          };
        });
      }

      /* ---- Adım 2: Yaş & Sınıf (müfredatı belirler) ---- */
      function stepAgeGrade() {
        let age = B.State.data.player.age || 10;
        let grade = B.State.data.player.grade;
        const ages = [];
        for (let i = 5; i <= 14; i++) ages.push(i);
        const grades = [{ v: 0, l: 'Henüz' }, { v: 1, l: '1.' }, { v: 2, l: '2.' }, { v: 3, l: '3.' },
                        { v: 4, l: '4.' }, { v: 5, l: '5.' }, { v: 6, l: '6.' }, { v: 7, l: '7.' }, { v: 8, l: '8.' }];
        function draw() {
          root.innerHTML =
            '<h2 class="creator-title">🎓 Seni tanıyalım</h2>' +
            '<p class="creator-sub">Bu bilgiler dersleri senin seviyene göre ayarlar.</p>' +
            '<div class="ag-q">Kaç yaşındasın?</div>' +
            '<div class="ag-row">' + ages.map(a => '<button class="chip ag-age' + (a === age ? ' ag-on' : '') + '" data-a="' + a + '">' + a + '</button>').join('') + '</div>' +
            '<div class="ag-q">Kaçıncı sınıfı bitirdin?</div>' +
            '<div class="ag-row">' + grades.map(g => '<button class="chip ag-grade' + (g.v === grade ? ' ag-on' : '') + '" data-g="' + g.v + '">' + g.l + '</button>').join('') + '</div>' +
            '<button class="btn btn-action creator-go"' + (grade == null ? ' disabled' : '') + '>DEVAM ▶</button>';
          root.querySelectorAll('.ag-age').forEach(b => b.onclick = () => { age = +b.dataset.a; draw(); });
          root.querySelectorAll('.ag-grade').forEach(b => b.onclick = () => { grade = +b.dataset.g; draw(); });
          const go = root.querySelector('.creator-go');
          go.onclick = () => {
            if (grade == null) return;
            B.State.data.player.age = age;
            B.State.data.player.grade = grade;
            B.Save.saveNow();
            B.Audio.play('tick');
            B.UI.show('locker', { onboarding: true });
          };
        }
        draw();
      }

      stepGender();
    },
    exit() {},
  });
})(window.BOKUL = window.BOKUL || {});

/* === src/ui/screens/login-screen.js === */
/* BOKUL — Giriş / Oyuncu Seçimi
 * Çocuklar profillerine DOKUNARAK girer (şifre yok — kilitlenme olmaz).
 * Ebeveyn konsolu e-posta hesabı (Firebase Auth: doğrulama + şifremi unuttum)
 * veya yerel PIN ile açılır. Aile kodu ile cihazlar buluta bağlanır. */
(function (B) {

  /* ---------- Ebeveyn: e-posta hesabı akışı ---------- */
  function parentEmailFlow() {
    const savedEmail = B.AuthCloud.email();
    const ov = B.UI.overlay(
      '<div class="ov-big">👨‍👧</div><h2>Ebeveyn Girişi</h2>' +
      '<div class="google-row">' +
        '<button class="btn google-btn" id="pe-gsignin">🔵 Google ile Giriş Yap</button>' +
        '<button class="btn google-btn google-signup" id="pe-gsignup">🟢 Google ile Kayıt Ol</button>' +
      '</div>' +
      '<div class="consent-or">— veya e-posta ile —</div>' +
      '<input id="pe-email" type="email" class="name-input" placeholder="E-posta" value="' + (savedEmail || '') + '">' +
      '<input id="pe-pass" type="password" class="name-input" placeholder="Şifre (en az 6 karakter)">' +
      '<div class="login-err" id="pe-msg"></div>',
      [{ label: 'GİRİŞ ▶', onClick: null }, { label: 'Kayıt ol', cls: 'btn-quiet', onClick: null }, { label: 'Şifremi unuttum', cls: 'btn-quiet', onClick: null }]);
    const btns = ov.querySelectorAll('.overlay-btns .btn');
    const emailEl = ov.querySelector('#pe-email'), passEl = ov.querySelector('#pe-pass'), msg = ov.querySelector('#pe-msg');
    function busy(t) { msg.style.color = ''; msg.textContent = t; }
    function err(t) { msg.style.color = 'var(--warn)'; msg.textContent = '⚠️ ' + t; }

    // Google giriş/kayıt: her ikisi de tek popup akışıdır (Google yeni hesabı otomatik oluşturur).
    // Onay (KVKK/sözleşme) alınmadan devam edilmez; onay verilmişse pencere görünmeden geçilir.
    function googleFlow(label) {
      B.Consent.require(async () => {
        busy(label + '… Google penceresi açılıyor');
        const r = await B.AuthCloud.googleSignIn();
        if (!r.ok) return err(r.err);
        ov.remove(); B.UI.show('admin');
      });
    }
    ov.querySelector('#pe-gsignin').onclick = () => googleFlow('Giriş yapılıyor');
    ov.querySelector('#pe-gsignup').onclick = () => googleFlow('Hesap oluşturuluyor');

    btns[0].onclick = async () => { // GİRİŞ
      busy('Giriş yapılıyor…');
      const r = await B.AuthCloud.login(emailEl.value, passEl.value);
      if (!r.ok) return err(r.err);
      ov.remove();
      if (!r.verified) B.UI.toast('📧 E-postanı doğrulaman önerilir (şifre kurtarma için).');
      B.UI.show('admin');
    };
    btns[1].onclick = () => B.Consent.require(async () => { // KAYIT OL (onay şart)
      busy('Hesap oluşturuluyor…');
      const r = await B.AuthCloud.register(emailEl.value, passEl.value);
      if (!r.ok) return err(r.err);
      msg.style.color = 'var(--success)';
      msg.innerHTML = '✓ Doğrulama e-postası gönderildi! Gelen kutunu (ve spam) kontrol et, linke tıkla, sonra "GİRİŞ"e bas.';
    });
    btns[2].onclick = async () => { // ŞİFREMİ UNUTTUM
      if (!emailEl.value.trim()) return err('Önce e-posta adresini yaz.');
      busy('Sıfırlama e-postası gönderiliyor…');
      const r = await B.AuthCloud.sendReset(emailEl.value);
      if (!r.ok) return err(r.err);
      msg.style.color = 'var(--success)';
      msg.textContent = '✓ Şifre sıfırlama e-postası gönderildi. E-postandaki linkten yeni şifre belirle.';
    };
    setTimeout(() => emailEl.focus(), 100);
  }

  /* ---------- Ebeveyn: yerel PIN akışı (çevrimdışı) ---------- */
  function parentPinFlow() {
    if (!B.Auth.adminExists()) {
      const ov = B.UI.overlay(
        '<div class="ov-big">👨‍👧</div><h2>Ebeveyn PIN\'i Oluştur</h2>' +
        '<p class="ov-quote">Çevrimdışı erişim için bir PIN belirle (çocuklar bilmesin).</p>' +
        '<input id="pin-new" type="password" class="name-input" placeholder="En az 4 hane"><div class="login-err" id="pin-err"></div>',
        [{ label: 'OLUŞTUR ▶', onClick: null }]);
      ov.querySelector('.overlay-btns .btn').onclick = () => {
        const r = B.Auth.setAdminPin(ov.querySelector('#pin-new').value);
        if (!r.ok) { ov.querySelector('#pin-err').textContent = r.err; return; }
        ov.remove(); B.UI.show('admin');
      };
    } else {
      const ov = B.UI.overlay(
        '<div class="ov-big">🔒</div><h2>Ebeveyn PIN</h2>' +
        '<input id="pin-in" type="password" class="name-input" placeholder="PIN"><div class="login-err" id="pin-err"></div>',
        [{ label: 'GİR ▶', onClick: null }]);
      const input = ov.querySelector('#pin-in');
      function go() {
        if (!B.Auth.checkAdmin(input.value)) { ov.querySelector('#pin-err').textContent = '⚠️ PIN yanlış.'; input.value = ''; return; }
        ov.remove(); B.UI.show('admin');
      }
      ov.querySelector('.overlay-btns .btn').onclick = go;
      input.addEventListener('keydown', e => { if (e.key === 'Enter') go(); });
      setTimeout(() => input.focus(), 100);
    }
  }

  /* Ebeveyn erişimi: e-posta mı PIN mi? */
  function openParent() {
    const emailOpt = B.AuthCloud && B.AuthCloud.available();
    const ov = B.UI.overlay(
      '<div class="ov-big">👨‍👧</div><h2>Ebeveyn Konsolu</h2>' +
      '<p class="ov-quote">Nasıl gireceksin?</p>',
      (emailOpt ? [{ label: '📧 E-posta ile', onClick: null }, { label: '🔑 PIN ile', cls: 'btn-quiet', onClick: null }]
                : [{ label: '🔑 PIN ile', onClick: null }]));
    const btns = ov.querySelectorAll('.overlay-btns .btn');
    if (emailOpt) {
      btns[0].onclick = () => { ov.remove(); parentEmailFlow(); };
      btns[1].onclick = () => { ov.remove(); parentPinFlow(); };
    } else {
      btns[0].onclick = () => { ov.remove(); parentPinFlow(); };
    }
  }

  /* Bu cihaz için davet kodu (ebeveynin hesabından gelen kod) */
  function openFamilyCode() {
    const cur = B.Cloud.getCode();
    const ov = B.UI.overlay(
      '<div class="ov-big">🎟️</div><h2>Davet Kodu</h2>' +
      '<p class="ov-quote">Ebeveyninin verdiği davet kodunu gir. İlerlemen buluta bu aileye kaydolur.</p>' +
      '<input id="fam-in" class="name-input" maxlength="14" placeholder="Davet kodu" value="' + (cur || '') + '" style="text-transform:uppercase">' +
      '<div class="login-err" id="fam-msg">' + (cur ? '✓ Bağlı: ' + cur : '') + '</div>',
      [{ label: 'KAYDET', onClick: null }, { label: 'Bağlantıyı kaldır', cls: 'btn-quiet', onClick: () => { B.Cloud.setCode(''); B.UI.toast('Bağlantı kaldırıldı'); } }]);
    const btn = ov.querySelector('.overlay-btns .btn');
    btn.onclick = () => {
      const v = (ov.querySelector('#fam-in').value || '').trim().toUpperCase();
      if (v.length < 6) { ov.querySelector('#fam-msg').textContent = '⚠️ Kod en az 6 karakter.'; return; }
      B.Cloud.setCode(v); ov.remove(); B.UI.toast('🎟️ Aileye bağlandın: ' + v);
    };
  }

  /* İlk açılış: Ebeveyn mi Oyuncu mu? */
  function renderWelcome(root) {
    root.innerHTML =
      '<div class="login-box"><div class="login-logo">🌌</div>' +
      '<h2 class="login-title">BOKUL Eğitim Üssü</h2>' +
      '<p class="login-sub">Kim kuruyor?</p>' +
      '<div class="welcome-choices">' +
        '<button class="btn welcome-card wc-parent">👨‍👧<br>EBEVEYNİM<small>E-posta ile hesap aç, çocuklarımı davet et</small></button>' +
        '<button class="btn welcome-card wc-kid">🎮<br>OYUNCUYUM<small>Davet kodum var / hemen oyna</small></button>' +
      '</div></div>';
    root.querySelector('.wc-parent').onclick = () => { B.Audio.play('tick'); parentEmailFlow(); };
    root.querySelector('.wc-kid').onclick = () => { B.Audio.play('tick'); renderInvite(root); };
  }

  /* Oyuncu: davet kodu (varsa) → profil oluştur */
  function renderInvite(root) {
    root.innerHTML =
      '<div class="login-box"><div class="login-logo">🎟️</div>' +
      '<h2 class="login-title">Davet Kodu</h2>' +
      '<p class="login-sub">Ebeveyninin verdiği davet kodunu gir (ilerlemen ailene kaydolsun). Kodun yoksa "Kodsuz oyna".</p>' +
      '<input id="inv-code" class="name-input" maxlength="14" placeholder="Davet kodu" style="text-transform:uppercase">' +
      '<div class="login-err" id="inv-err"></div>' +
      '<button class="btn btn-action" id="inv-go">KATIL ▶</button>' +
      '<button class="btn btn-quiet" id="inv-skip">Kodsuz oyna</button>' +
      '<button class="btn btn-quiet" id="inv-back">◀ Geri</button></div>';
    setTimeout(() => root.querySelector('#inv-code').focus(), 100);
    root.querySelector('#inv-go').onclick = () => {
      const v = (root.querySelector('#inv-code').value || '').trim().toUpperCase();
      if (v.length < 6) { root.querySelector('#inv-err').textContent = '⚠️ Kod en az 6 karakter (ya da "Kodsuz oyna").'; return; }
      B.Cloud.setCode(v); B.UI.toast('🎟️ Aileye bağlandın: ' + v);
      renderRegister(root, false);
    };
    root.querySelector('#inv-skip').onclick = () => renderRegister(root, false);
    root.querySelector('#inv-back').onclick = () => renderWelcome(root);
  }

  /* ---------- Çocuk profilleri: dokun ve gir ---------- */
  function renderSelect(root) {
    const keys = B.Auth.users();
    let cards = keys.map(k => {
      const info = B.Auth.peek(k);
      const av = info.avatar ? B.Avatar.el(info.avatar) : '<span class="login-anon">🧑</span>';
      return '<button class="login-card" data-key="' + k + '"><span class="login-av">' + av + '</span>' +
        '<span class="login-cardname">' + info.name + '</span><span class="login-lvl">Seviye ' + (info.level || 1) + '</span></button>';
    }).join('');
    cards += '<button class="login-card login-new"><span class="login-av"><span class="login-anon">➕</span></span><span class="login-cardname">Yeni Oyuncu</span></button>';
    root.innerHTML =
      '<div class="login-box login-box-wide"><div class="login-logo">🌌</div>' +
      '<h2 class="login-title">Kim oynuyor?</h2>' +
      '<p class="login-sub">Profiline dokun ve oyna!</p>' +
      '<div class="login-cards">' + cards + '</div></div>';
    root.querySelectorAll('.login-card').forEach(c => {
      c.onclick = () => {
        B.Audio.play('tick');
        if (c.classList.contains('login-new')) return renderRegister(root, false);
        B.Auth.loginByKey(c.dataset.key);
        B.Engine.enterAs();
      };
    });
  }

  function renderRegister(root, firstEver) {
    root.innerHTML =
      '<div class="login-box"><div class="login-logo">🌌</div>' +
      '<h2 class="login-title">' + (firstEver ? 'Üsse hoş geldin!' : 'Yeni Oyuncu') + '</h2>' +
      '<p class="login-sub">Kendine bir ad seç. İlerlemen bu ada kaydolur (şifre gerekmez).</p>' +
      '<input id="reg-name" class="name-input" maxlength="14" placeholder="Adın">' +
      '<div class="login-err" id="reg-err"></div>' +
      '<button class="btn btn-action" id="reg-go">🎖️ BAŞLA</button>' +
      (firstEver ? '' : '<button class="btn btn-quiet" id="reg-back">◀ Geri</button>') + '</div>';
    const nameEl = root.querySelector('#reg-name');
    setTimeout(() => nameEl.focus(), 100);
    root.querySelector('#reg-go').onclick = () => {
      const nm = (nameEl.value || '').trim();
      if (nm.length < 2) { root.querySelector('#reg-err').textContent = '⚠️ Adın en az 2 harf olmalı.'; return; }
      B.Consent.require(() => { // KVKK/Sözleşme onayı olmadan kayıt yok
        const res = B.Auth.register(nm, '');
        if (!res.ok) { root.querySelector('#reg-err').textContent = '⚠️ ' + res.err; return; }
        B.Audio.play('fanfare');
        B.Engine.enterAs();
      });
    };
    const back = root.querySelector('#reg-back');
    if (back) back.onclick = () => renderSelect(root);
  }

  B.UI.registerScreen('login', {
    enter(root) {
      root.classList.add('login-root');
      root.innerHTML = '<div class="login-content"></div>';
      const content = root.querySelector('.login-content');

      const foot = document.createElement('div');
      foot.className = 'login-foot';
      foot.innerHTML =
        '<button class="chip login-parent">👨‍👧 Ebeveyn</button>' +
        (B.Cloud.configured() ? '<button class="chip login-fam">🎟️ Davet Kodu' + (B.Cloud.getCode() ? ' ✓' : '') + '</button>' : '');
      root.appendChild(foot);
      foot.querySelector('.login-parent').onclick = openParent;
      const fam = foot.querySelector('.login-fam');
      if (fam) fam.onclick = openFamilyCode;

      // İlk açılış (hiç profil, hesap veya kod yok) → Ebeveyn/Oyuncu seçimi
      const fresh = !B.Auth.hasAny() && !(B.AuthCloud && B.AuthCloud.current()) && !B.Cloud.getCode();
      if (fresh) renderWelcome(content);
      else if (!B.Auth.hasAny()) renderInvite(content);
      else renderSelect(content);
    },
    exit() {},
  });
})(window.BOKUL = window.BOKUL || {});

/* === src/ui/screens/wishes-screen.js === */
/* BOKUL — Dilek Kutusu (çocuk tarafı)
 * Çocuk gerçek ödül ister (🎁) veya oyuna fikir verir (💡).
 * İstek durumunu görür: bekliyor / hedef verildi / HAK EDİLDİ. */
(function (B) {
  const WISH_STATUS = {
    pending:  { label: '⏳ Baba görecek', cls: '' },
    assigned: { label: '🎯 Hedef verildi', cls: 'wish-assigned' },
    earned:   { label: '🎉 HAK ETTİN!',   cls: 'wish-earned' },
    granted:  { label: '✅ Ödül verildi',  cls: 'wish-granted' },
  };
  const IDEA_STATUS = {
    new:     '💡 Yeni',
    seen:    '👀 Baba gördü',
    planned: '🛠️ Yapılacak',
    done:    '✅ Eklendi',
  };

  B.UI.registerScreen('wishes', {
    enter(root) {
      const hud = B.UI.buildHud(root, { backTo: 'home' });
      this._hud = hud;

      const wrap = document.createElement('div');
      wrap.className = 'wishes-wrap';
      root.appendChild(wrap);

      function render() {
        wrap.innerHTML =
          '<div class="wish-col">' +
            '<h3 class="wish-h">🎁 Ödül İsteklerim</h3>' +
            '<p class="wish-hint">Gerçek hayattan ne istersin? (oyuncak, kitap, gezme...) Baba görecek. Verdiği görevleri bitirince ödülü senin!</p>' +
            '<div class="wish-add"><input id="wish-input" class="name-input" maxlength="60" placeholder="Örn: Lego uzay seti"><button class="btn btn-action" id="wish-go">İSTE</button></div>' +
            '<div id="wish-list"></div>' +
          '</div>' +
          '<div class="wish-col">' +
            '<h3 class="wish-h">💡 Oyun Fikirlerim</h3>' +
            '<p class="wish-hint">Oyuna ne eklensin istersin? Fikrini yaz, Baba okusun!</p>' +
            '<div class="wish-add"><input id="idea-input" class="name-input" maxlength="80" placeholder="Örn: Uzay cephesi olsun"><button class="btn btn-action" id="idea-go">GÖNDER</button></div>' +
            '<div id="idea-list"></div>' +
          '</div>';

        // Ödül istekleri
        const wl = wrap.querySelector('#wish-list');
        const wishes = B.Wish.myWishes();
        wl.innerHTML = wishes.length ? '' : '<div class="wish-empty">Henüz istek yok. Yukarıdan ekle!</div>';
        wishes.slice().reverse().forEach(w => {
          const st = WISH_STATUS[w.status] || WISH_STATUS.pending;
          let prog = '';
          if (w.goal) {
            const pr = B.Wish.progress(B.State.data, w);
            const m = B.Wish.METRICS[w.goal.metric];
            prog = '<div class="wish-goal">' + m.icon + ' ' + m.name + ': ' + pr.cur + '/' + pr.target +
                   '<div class="quest-bar"><i style="width:' + pr.pct + '%"></i></div></div>';
          }
          wl.insertAdjacentHTML('beforeend',
            '<div class="wish-card ' + st.cls + '"><div class="wish-top"><b>' + w.text + '</b>' +
            '<span class="wish-badge">' + st.label + '</span></div>' + prog +
            (w.note ? '<div class="wish-note">📝 Baba: ' + w.note + '</div>' : '') + '</div>');
        });

        // Fikirler
        const il = wrap.querySelector('#idea-list');
        const ideas = B.Wish.myIdeas();
        il.innerHTML = ideas.length ? '' : '<div class="wish-empty">Henüz fikir yok. Hayal et!</div>';
        ideas.slice().reverse().forEach(i => {
          il.insertAdjacentHTML('beforeend',
            '<div class="wish-card"><div class="wish-top"><b>' + i.text + '</b>' +
            '<span class="wish-badge">' + (IDEA_STATUS[i.status] || IDEA_STATUS.new) + '</span></div>' +
            (i.note ? '<div class="wish-note">📝 Baba: ' + i.note + '</div>' : '') + '</div>');
        });

        wrap.querySelector('#wish-go').onclick = () => {
          const el = wrap.querySelector('#wish-input');
          if (el.value.trim()) { B.Wish.addWish(el.value); B.Audio.play('chest'); render(); }
        };
        wrap.querySelector('#idea-go').onclick = () => {
          const el = wrap.querySelector('#idea-input');
          if (el.value.trim()) { B.Wish.addIdea(el.value); B.Audio.play('correct'); render(); }
        };
      }
      render();
    },
    exit() { if (this._hud) this._hud.dispose(); },
  });
})(window.BOKUL = window.BOKUL || {});

/* === src/ui/screens/admin-screen.js === */
/* BOKUL — Ebeveyn Konsolu (Admin)
 * İki kaynak: 📱 Bu cihaz (yerel kayıtlar) ve ☁️ Bulut (aile kodundaki tüm çocuklar).
 * Bulut modunda ilerleme uzaktan okunur; dilek hedefleri "directives" olarak yazılır. */
(function (B) {

  function localPlayers() {
    return B.Auth.users().map(key => {
      let save = null;
      try { save = JSON.parse(localStorage.getItem('bokul.save.' + key)); } catch (e) {}
      return { key, name: B.Auth.displayName(key), save, source: 'local' };
    }).filter(p => p.save);
  }
  function writeLocal(key, save) {
    try { localStorage.setItem('bokul.save.' + key, JSON.stringify(save)); } catch (e) {}
    if (B.Auth.current() === key) B.State.data = save;
  }
  /* Kaydın dilek/fikir durumlarını directives paketine çevir (bulut için) */
  function buildDirectives(save) {
    const d = { wishes: {}, ideas: {} };
    (save.wishes || []).forEach(w => { d.wishes[w.id] = { goal: w.goal || null, note: w.note || '', status: w.status }; });
    (save.ideas || []).forEach(i => { d.ideas[i.id] = { status: i.status, note: i.note || '' }; });
    d.perms = save.perms || { lessons: {}, features: {} }; // ders/özellik kilitleri (uzaktan)
    return d;
  }
  const PROFILE_META = {
    hobiler: '🎨 Hobiler', muzik: '🎵 Müzik', sanatcilar: '🎤 Sanatçılar', oyuncaklar: '🧸 Oyuncaklar',
    kiyafetler: '👕 Kıyafetler', aburcubur: '🍫 Abur cubur', saglikli: '🥗 Sağlıklı', sporlar: '⚽ Spor', icecekler: '🥤 İçecek',
  };
  function profileHtml(profile) {
    if (!profile) return '';
    const rows = Object.keys(PROFILE_META)
      .filter(k => Array.isArray(profile[k]) && profile[k].length)
      .map(k => '<div class="adm-int"><b>' + PROFILE_META[k] + ':</b> ' + esc(profile[k].join(', ')) + '</div>');
    return rows.length ? '<div class="adm-ints"><div class="adm-int-h">🎯 İlgi Alanları</div>' + rows.join('') + '</div>' : '';
  }
  function xpNeeded(level) { const L = B.Content.get('rewards').levels; return L.base + (level - 1) * L.perLevel; }
  function esc(s) { return String(s || '').replace(/[<>&]/g, c => ({ '<': '&lt;', '>': '&gt;', '&': '&amp;' }[c])); }

  B.UI.registerScreen('admin', {
    enter(root) {
      let tab = 'players';
      let source = B.Cloud.enabled() ? 'cloud' : 'local';
      let players = [];
      root.classList.add('admin-root');

      /* Bir oyuncunun değişikliğini uygun yere yaz */
      async function persist(player) {
        if (player.source === 'cloud') await B.Cloud.writeDirectives(player.key, buildDirectives(player.save));
        else writeLocal(player.key, player.save);
      }

      function findPlayer(key) { return players.find(p => p.key === key); }

      async function load() {
        const body = root.querySelector('.admin-body');
        if (body) body.innerHTML = '<div class="wish-empty">Yükleniyor…</div>';
        if (source === 'cloud') {
          const list = await B.Cloud.listPlayers();
          players = list.map(p => Object.assign({ source: 'cloud' }, p));
        } else {
          players = localPlayers();
        }
        renderBody();
      }

      function shell() {
        // Davet kodu öncelikle e-posta hesabından (hesaba bağlı, hep aynı)
        const emailCode = (B.AuthCloud && B.AuthCloud.current()) ? B.AuthCloud.inviteCode() : '';
        if (emailCode && B.Cloud.getCode() !== emailCode) B.Cloud.setCode(emailCode);
        const code = emailCode || B.Cloud.getCode();
        const famRow = B.Cloud.configured()
          ? '<div class="adm-fam">' +
              (code
                ? '<div>🎟️ Davet Kodun: <b class="adm-code">' + code + '</b> <button class="chip adm-copy">Kopyala</button>' +
                  '<div class="adm-fam-hint">Bu kodu çocuklarının cihazında giriş ekranı → "🎮 Oyuncuyum" / "🎟️ Davet Kodu" bölümüne gir. Sonra "☁️ Bulut (aile)" sekmesinden hepsini görürsün.</div></div>'
                : '<button class="chip adm-gencode">🎟️ Davet kodu oluştur</button>' +
                  '<span class="adm-fam-hint"> — çocukların cihazlarını bağlamak için (veya e-posta ile giriş yap, kod otomatik gelsin)</span>') +
            '</div>'
          : '';
        root.innerHTML =
          '<div class="admin-head">' +
            '<button class="chip admin-back">◀ Çıkış</button>' +
            '<b>👨‍👧 Ebeveyn Konsolu</b>' +
            '<button class="chip admin-pin">🔑 PIN</button>' +
          '</div>' +
          famRow +
          '<div class="admin-tabs">' +
            (B.Cloud.configured()
              ? '<button class="chip asrc" data-s="cloud">☁️ Bulut (aile)</button><button class="chip asrc" data-s="local">📱 Bu cihaz</button>' : '') +
            '<span class="adm-sep"></span>' +
            '<button class="chip atab" data-t="players">📊 Oyuncular</button>' +
            '<button class="chip atab" data-t="perms">🔒 İzinler</button>' +
            '<button class="chip atab" data-t="wishes">🎁 İstekler</button>' +
            '<button class="chip atab" data-t="ideas">💡 Fikirler</button>' +
            '<button class="chip atab" data-t="account">⚙️ Hesap</button>' +
            '<button class="chip adm-refresh">🔄</button>' +
          '</div>' +
          '<div class="admin-body"></div>';
        root.querySelector('.admin-back').onclick = () => B.UI.show('login');
        root.querySelector('.admin-pin').onclick = changePin;
        root.querySelector('.adm-refresh').onclick = load;
        root.querySelectorAll('.atab').forEach(b => b.onclick = () => {
          tab = b.dataset.t;
          root.querySelectorAll('.atab').forEach(x => x.classList.toggle('tab-on', x === b));
          renderBody();
        });
        root.querySelectorAll('.asrc').forEach(b => b.onclick = () => {
          source = b.dataset.s;
          root.querySelectorAll('.asrc').forEach(x => x.classList.toggle('tab-on', x === b));
          load();
        });
        const cp = root.querySelector('.adm-copy');
        if (cp) cp.onclick = () => { try { navigator.clipboard.writeText(code); B.UI.toast('Kod kopyalandı'); } catch (e) {} };
        const gc = root.querySelector('.adm-gencode');
        if (gc) gc.onclick = () => { B.Cloud.setCode(B.Cloud.genCode()); source = 'cloud'; shell(); load(); };

        const activeTab = root.querySelector('.atab[data-t="' + tab + '"]'); if (activeTab) activeTab.classList.add('tab-on');
        const activeSrc = root.querySelector('.asrc[data-s="' + source + '"]'); if (activeSrc) activeSrc.classList.add('tab-on');
        load();
      }

      function renderBody() {
        const body = root.querySelector('.admin-body');
        if (!body) return;
        if (tab === 'account') return renderAccount(body); // ebeveyn ayarları — oyuncu gerekmez
        if (source === 'cloud' && !B.Cloud.enabled()) { body.innerHTML = '<div class="wish-empty">Önce yukarıdan bir aile kodu oluştur.</div>'; return; }
        if (!players.length) {
          body.innerHTML = '<div class="wish-empty">' + (source === 'cloud'
            ? 'Bu aile kodunda henüz oyuncu yok. Çocukların cihazlarına aile kodunu girip biraz oynamalarını sağla.'
            : 'Bu cihazda kayıtlı oyuncu yok.') + '</div>';
          return;
        }
        if (tab === 'players') renderPlayers(body);
        else if (tab === 'perms') renderPerms(body);
        else if (tab === 'wishes') renderWishes(body);
        else if (tab === 'ideas') renderIdeas(body);
        else renderAccount(body);
      }

      /* ---- 📊 Oyuncular ---- */
      function renderPlayers(body) {
        const lessons = B.Lesson.all();
        body.innerHTML = players.map(p => {
          const s = p.save, pl = s.player, st = s.stats || {};
          const acc = (st.correct + st.wrong) ? Math.round(st.correct / (st.correct + st.wrong) * 100) : 0;
          const firstTry = st.questionsDone ? Math.round((st.firstTryCorrect || 0) / st.questionsDone * 100) : 0;
          const avgSec = st.questionsDone ? Math.round((st.timeSumMs || 0) / st.questionsDone / 1000) : 0;
          const rank = B.Reward.rankFor(pl.level);
          const xpPct = Math.min(100, Math.round((pl.xp || 0) / xpNeeded(pl.level) * 100));
          const lessonRows = lessons.map(les => {
            let earned = 0, max = 0, bd = 0, bt = 0;
            les.units.forEach(u => u.sections.forEach(sec => {
              max += sec.missions.length * 3; bt++;
              const sp = (s.progress.lessons[les.id] || { sections: {} }).sections[sec.id];
              if (sp) { earned += Object.values(sp.missions || {}).reduce((t, m) => t + (m.stars || 0), 0); if (sp.bossDefeated) bd++; }
            }));
            return '<div class="adm-lesson"><span>' + les.icon + ' ' + esc(les.title) + '</span><span>⭐ ' + earned + '/' + max + ' · 🏰 ' + bd + '/' + bt + '</span></div>';
          }).join('');
          const last = s.meta && s.meta.lastPlayedAt ? new Date(s.meta.lastPlayedAt).toLocaleDateString('tr-TR') : '—';
          return '<div class="adm-card">' +
            '<div class="adm-p-head"><span class="adm-av">' + B.Avatar.el(pl.avatar) + '</span>' +
              '<div><b>' + esc(pl.name) + '</b><div class="adm-rank">' + rank.icon + ' ' + rank.title + ' · Sv.' + pl.level +
                (pl.age ? ' · 🎂 ' + pl.age : '') + (pl.grade != null ? ' · 🎓 ' + (pl.grade === 0 ? 'okul öncesi' : pl.grade + '. sınıf') : '') + '</div></div></div>' +
            '<div class="hud-xpbar adm-xp"><i style="width:' + xpPct + '%"></i></div>' +
            '<div class="adm-stats"><span>💰 ' + (pl.coins || 0) + '</span><span>✅ ' + (st.correct || 0) + '</span><span>❌ ' + (st.wrong || 0) +
              '</span><span>🎯 %' + acc + '</span><span>🔥 en iyi ' + ((s.streaks && s.streaks.best) || 0) + '</span><span>📅 ' + last + '</span></div>' +
            '<div class="adm-stats adm-stats2"><span title="İlk denemede doğru bilme oranı — düşükse tahmin ediyor olabilir">🥇 İlk deneme: %' + firstTry + ' (' + (st.questionsDone || 0) + ' soru)</span>' +
              '<span title="Soru başına ortalama yanıt süresi">⏱️ ~' + avgSec + ' sn/soru</span></div>' +
            '<div class="adm-lessons">' + lessonRows + '</div>' +
            profileHtml(pl.profile) + '</div>';
        }).join('');
      }

      /* ---- 🎁 İstekler ---- */
      function renderWishes(body) {
        const metricOpts = Object.keys(B.Wish.METRICS).map(m =>
          '<option value="' + m + '">' + B.Wish.METRICS[m].icon + ' ' + B.Wish.METRICS[m].name + '</option>').join('');
        let any = false;
        body.innerHTML = players.map(p => {
          const wishes = (p.save.wishes || []);
          if (!wishes.length) return '';
          any = true;
          return '<div class="adm-card"><div class="adm-p-head"><span class="adm-av">' + B.Avatar.el(p.save.player.avatar) + '</span><b>' + esc(p.save.player.name) + '</b></div>' +
            wishes.slice().reverse().map(w => {
              const pr = w.goal ? B.Wish.progress(p.save, w) : null;
              const progHtml = pr ? '<div class="quest-bar"><i style="width:' + pr.pct + '%"></i><span class="quest-count">' + pr.cur + '/' + pr.target + '</span></div>' : '';
              const badge = { pending: '⏳ Yeni', assigned: '🎯 Hedefli', earned: '🎉 Hak etti!', granted: '✅ Verildi' }[w.status] || w.status;
              return '<div class="adm-wish" data-key="' + p.key + '" data-id="' + w.id + '">' +
                '<div class="wish-top"><b>' + esc(w.text) + '</b><span class="wish-badge">' + badge + '</span></div>' + progHtml +
                '<div class="adm-wish-ctl"><select class="adm-metric">' + metricOpts + '</select>' +
                '<input class="adm-target" type="number" min="1" value="' + (w.goal ? w.goal.target : 10) + '">' +
                '<button class="chip adm-assign">🎯 Hedef ata</button><button class="chip adm-grant">✅ Ödülü verdim</button></div>' +
                '<input class="adm-note name-input" placeholder="Çocuğa not" value="' + esc(w.note) + '"></div>';
            }).join('') + '</div>';
        }).join('');
        if (!any) body.innerHTML = '<div class="wish-empty">Henüz istek yok.</div>';

        body.querySelectorAll('.adm-wish').forEach(el => {
          const p = findPlayer(el.dataset.key); if (!p) return;
          const w = p.save.wishes.find(x => x.id === el.dataset.id);
          if (w && w.goal) el.querySelector('.adm-metric').value = w.goal.metric;
          el.querySelector('.adm-assign').onclick = async () => {
            w.goal = { metric: el.querySelector('.adm-metric').value, target: Math.max(1, parseInt(el.querySelector('.adm-target').value) || 10) };
            w.note = el.querySelector('.adm-note').value;
            if (w.status === 'pending' || w.status === 'assigned')
              w.status = B.Wish.value(p.save, w.goal.metric) >= w.goal.target ? 'earned' : 'assigned';
            await persist(p); renderBody(); B.UI.toast('Hedef atandı 🎯');
          };
          el.querySelector('.adm-grant').onclick = async () => {
            w.status = 'granted'; w.note = el.querySelector('.adm-note').value;
            await persist(p); renderBody(); B.UI.toast('Ödül verildi olarak işaretlendi ✅');
          };
        });
      }

      /* ---- 💡 Fikirler ---- */
      function renderIdeas(body) {
        const opts = { new: 'Yeni', seen: 'Gördüm', planned: 'Yapılacak', done: 'Eklendi' };
        let any = false;
        body.innerHTML = players.map(p => {
          const ideas = (p.save.ideas || []);
          if (!ideas.length) return '';
          any = true;
          return '<div class="adm-card"><div class="adm-p-head"><span class="adm-av">' + B.Avatar.el(p.save.player.avatar) + '</span><b>' + esc(p.save.player.name) + '</b></div>' +
            ideas.slice().reverse().map(i => {
              const o = Object.keys(opts).map(k => '<option value="' + k + '"' + (i.status === k ? ' selected' : '') + '>' + opts[k] + '</option>').join('');
              return '<div class="adm-wish" data-key="' + p.key + '" data-id="' + i.id + '"><div class="wish-top"><b>💡 ' + esc(i.text) + '</b></div>' +
                '<div class="adm-wish-ctl"><select class="adm-istatus">' + o + '</select><button class="chip adm-isave">💾 Kaydet</button></div>' +
                '<input class="adm-inote name-input" placeholder="Çocuğa not" value="' + esc(i.note) + '"></div>';
            }).join('') + '</div>';
        }).join('');
        if (!any) body.innerHTML = '<div class="wish-empty">Henüz fikir yok.</div>';

        body.querySelectorAll('.adm-wish').forEach(el => {
          el.querySelector('.adm-isave').onclick = async () => {
            const p = findPlayer(el.dataset.key); if (!p) return;
            const idea = p.save.ideas.find(x => x.id === el.dataset.id);
            idea.status = el.querySelector('.adm-istatus').value;
            idea.note = el.querySelector('.adm-inote').value;
            await persist(p); B.UI.toast('Kaydedildi 💾');
          };
        });
      }

      /* ---- 🔒 İzinler (ders + özellik kilitleri) ---- */
      function swRow(kind, key, id, label, on) {
        return '<label class="adm-perm-row"><span class="adm-perm-lbl">' + label + '</span>' +
          '<span class="adm-switch"><input type="checkbox" class="adm-perm" data-kind="' + kind + '" data-key="' + key + '" data-id="' + esc(id) + '"' + (on ? ' checked' : '') + '><span class="adm-slider"></span></span></label>';
      }
      function renderPerms(body) {
        const lessons = B.Lesson.all();
        body.innerHTML =
          '<div class="adm-hint">Kapatılan ders veya bölüm çocuğun ekranında 🔒 kilitli görünür. Bulut modunda değişiklik çocuğun cihazına bir sonraki açılışta yansır.</div>' +
          players.map(p => {
            B.Perms.ensure(p.save);
            const lessonRows = lessons.map(l => swRow('L', p.key, l.id, l.icon + ' ' + esc(l.title), B.Perms.lesson(l.id, p.save))).join('');
            const featRows = B.Perms.FEATURES.map(f => swRow('F', p.key, f.key, f.icon + ' ' + f.name, B.Perms.feature(f.key, p.save))).join('');
            return '<div class="adm-card"><div class="adm-p-head"><span class="adm-av">' + B.Avatar.el(p.save.player.avatar) + '</span><b>' + esc(p.save.player.name) + '</b></div>' +
              '<div class="adm-perm-h">📚 Dersler (Cepheler)</div>' + lessonRows +
              '<div class="adm-perm-h">🎮 Oyun Bölümleri</div>' + featRows + '</div>';
          }).join('');
        body.querySelectorAll('.adm-perm').forEach(inp => {
          inp.onchange = async () => {
            const p = findPlayer(inp.dataset.key); if (!p) return;
            const on = inp.checked;
            if (inp.dataset.kind === 'L') B.Perms.setLesson(inp.dataset.id, on, p.save);
            else B.Perms.setFeature(inp.dataset.id, on, p.save);
            await persist(p);
            B.UI.toast(on ? 'Açıldı ✓' : 'Kapatıldı 🔒');
          };
        });
      }

      /* ---- ⚙️ Hesap (ebeveyn ayarları — farklı menüler) ---- */
      function renderAccount(body) {
        const hasEmail = !!(B.AuthCloud && B.AuthCloud.current());
        const email = hasEmail ? B.AuthCloud.email() : '';
        const items = [];
        if (hasEmail) items.push({ ic: '👤', tt: 'Hesap Bilgileri', sub: email, fn: accountInfo });
        items.push({ ic: '👨‍👧', tt: 'Çocuk Profilleri', sub: B.Auth.users().length + ' profil · ekle, adlandır, sil', fn: manageProfiles });
        if (B.Cloud.configured()) items.push({ ic: '🎟️', tt: 'Aile & Davet Kodu', sub: 'Kodu paylaş, bağlantıyı yönet', fn: familyMenu });
        items.push({ ic: '🔒', tt: 'Gizlilik & KVKK', sub: 'Metinleri gör, rızayı yönet', fn: privacyMenu });
        items.push({ ic: '🔑', tt: 'Çevrimdışı PIN', sub: B.Auth.adminExists() ? 'PIN değiştir' : 'PIN belirle', fn: changePin });
        items.push({ ic: '🔊', tt: 'Uygulama', sub: 'Ses ayarı', fn: appPrefs });
        body.innerHTML = '<div class="acc-menu">' + items.map((it, i) =>
          '<button class="acc-item" data-i="' + i + '"><span class="acc-ic">' + it.ic + '</span>' +
          '<span class="acc-tt"><b>' + it.tt + '</b><small>' + esc(it.sub) + '</small></span><span class="acc-go">▶</span></button>'
        ).join('') + '</div>';
        body.querySelectorAll('.acc-item').forEach(b => b.onclick = () => items[+b.dataset.i].fn());
      }

      function accountInfo() {
        const verified = B.AuthCloud.isVerified();
        const ov = B.UI.overlay(
          '<div class="ov-big">👤</div><h2>Hesap Bilgileri</h2>' +
          '<div class="acc-info"><div><b>E-posta:</b> ' + esc(B.AuthCloud.email()) + '</div>' +
          '<div><b>Durum:</b> ' + (verified ? '✅ Doğrulanmış' : '⚠️ Doğrulanmamış') + '</div></div>' +
          '<div class="acc-actions">' +
            (verified ? '' : '<button class="btn btn-quiet" id="ai-verify">📧 E-postamı doğrula</button>') +
            '<button class="btn btn-quiet" id="ai-pass">🔑 Şifremi değiştir</button>' +
            '<button class="btn btn-quiet" id="ai-out">🚪 Çıkış yap</button>' +
            '<button class="btn btn-danger" id="ai-del">🗑️ Hesabı sil</button>' +
          '</div><div class="login-err" id="ai-msg"></div>',
          [{ label: 'Kapat', cls: 'btn-quiet', onClick: null }]);
        const msg = ov.querySelector('#ai-msg');
        const ok = t => { msg.style.color = 'var(--success)'; msg.textContent = t; };
        const bad = t => { msg.style.color = 'var(--warn)'; msg.textContent = '⚠️ ' + t; };
        const vb = ov.querySelector('#ai-verify');
        if (vb) vb.onclick = async () => { const r = await B.AuthCloud.sendVerify(); r.ok ? ok('Doğrulama e-postası gönderildi.') : bad(r.err || 'Olmadı.'); };
        ov.querySelector('#ai-pass').onclick = async () => { const r = await B.AuthCloud.sendReset(B.AuthCloud.email()); r.ok ? ok('Şifre sıfırlama e-postası gönderildi.') : bad(r.err || 'Olmadı.'); };
        ov.querySelector('#ai-out').onclick = () => { B.AuthCloud.logout(); ov.remove(); B.UI.toast('Çıkış yapıldı'); B.UI.show('login'); };
        ov.querySelector('#ai-del').onclick = () => {
          const c = B.UI.overlay('<div class="ov-big">⚠️</div><h2>Hesabı Sil</h2><p class="ov-quote">Ebeveyn hesabın Firebase\'den kalıcı silinecek. Çocuk profilleri ve ilerlemeleri bu cihazda kalır. Emin misin?</p>',
            [{ label: 'Evet, sil', cls: 'btn-danger', onClick: null }, { label: 'Vazgeç', cls: 'btn-quiet', onClick: () => c.remove() }]);
          c.querySelectorAll('.overlay-btns .btn')[0].onclick = async () => {
            const r = await B.AuthCloud.deleteAccount();
            c.remove();
            if (!r.ok) return bad(r.err || 'Silinemedi.');
            ov.remove(); B.UI.toast('Hesap silindi'); B.UI.show('login');
          };
        };
      }

      function manageProfiles() {
        const rows = B.Auth.users().map(k => {
          const nm = B.Auth.displayName(k);
          return '<div class="acc-prof" data-k="' + k + '"><span class="acc-prof-nm">🧒 ' + esc(nm) + '</span>' +
            '<span class="acc-prof-ctl"><button class="chip acc-ren">✏️ Adlandır</button><button class="chip acc-del">🗑️ Sil</button></span></div>';
        }).join('') || '<div class="wish-empty">Bu cihazda profil yok.</div>';
        const ov = B.UI.overlay('<div class="ov-big">👨‍👧</div><h2>Çocuk Profilleri</h2><div class="acc-profs">' + rows + '</div>',
          [{ label: 'Kapat', cls: 'btn-quiet', onClick: null }]);
        ov.querySelectorAll('.acc-prof').forEach(row => {
          const k = row.dataset.k;
          row.querySelector('.acc-ren').onclick = () => {
            const r2 = B.UI.overlay('<div class="ov-big">✏️</div><h2>Yeni Ad</h2><input id="rn" class="name-input" maxlength="14" value="' + esc(B.Auth.displayName(k)) + '"><div class="login-err" id="rn-e"></div>',
              [{ label: 'KAYDET', onClick: null }, { label: 'Vazgeç', cls: 'btn-quiet', onClick: () => r2.remove() }]);
            r2.querySelectorAll('.overlay-btns .btn')[0].onclick = () => {
              const res = B.Auth.renameUser(k, r2.querySelector('#rn').value);
              if (!res.ok) { r2.querySelector('#rn-e').textContent = '⚠️ ' + res.err; return; }
              r2.remove(); ov.remove(); B.UI.toast('Ad güncellendi ✏️'); manageProfiles();
            };
          };
          row.querySelector('.acc-del').onclick = () => {
            const d = B.UI.overlay('<div class="ov-big">⚠️</div><h2>Profili Sil</h2><p class="ov-quote">"' + esc(B.Auth.displayName(k)) + '" profili ve tüm ilerlemesi bu cihazdan silinecek. Emin misin?</p>',
              [{ label: 'Evet, sil', cls: 'btn-danger', onClick: null }, { label: 'Vazgeç', cls: 'btn-quiet', onClick: () => d.remove() }]);
            d.querySelectorAll('.overlay-btns .btn')[0].onclick = () => {
              B.Auth.deleteUser(k); d.remove(); ov.remove(); B.UI.toast('Profil silindi 🗑️');
              if (source === 'local') load();
              manageProfiles();
            };
          };
        });
      }

      function familyMenu() {
        const code = (B.AuthCloud && B.AuthCloud.current()) ? B.AuthCloud.inviteCode() : B.Cloud.getCode();
        const ov = B.UI.overlay('<div class="ov-big">🎟️</div><h2>Aile & Davet Kodu</h2>' +
          (code ? '<div class="acc-info"><b>Davet Kodun:</b> <span class="adm-code">' + code + '</span></div>' : '<p class="ov-quote">Henüz kod yok. E-posta ile giriş yaparsan otomatik gelir.</p>') +
          '<div class="acc-actions">' +
            (code ? '<button class="btn btn-quiet" id="fm-copy">📋 Kopyala</button><button class="btn btn-quiet" id="fm-share">📤 Paylaş</button>' : '') +
            (B.Cloud.getCode() ? '<button class="btn btn-quiet" id="fm-unlink">🔌 Bağlantıyı kaldır</button>' : '') +
          '</div>',
          [{ label: 'Kapat', cls: 'btn-quiet', onClick: null }]);
        const cp = ov.querySelector('#fm-copy');
        if (cp) cp.onclick = () => { try { navigator.clipboard.writeText(code); B.UI.toast('Kod kopyalandı'); } catch (e) {} };
        const sh = ov.querySelector('#fm-share');
        if (sh) sh.onclick = async () => {
          const txt = 'BOKUL davet kodum: ' + code + ' — Giriş ekranında "🎮 Oyuncuyum → 🎟️ Davet Kodu" ile gir.';
          try { if (navigator.share) await navigator.share({ title: 'BOKUL Davet Kodu', text: txt }); else { navigator.clipboard.writeText(txt); B.UI.toast('Panoya kopyalandı'); } } catch (e) {}
        };
        const ul = ov.querySelector('#fm-unlink');
        if (ul) ul.onclick = () => { B.Cloud.setCode(''); ov.remove(); B.UI.toast('Bağlantı kaldırıldı'); };
      }

      function privacyMenu() {
        const info = B.Consent.info();
        const when = info && info.ts ? new Date(info.ts).toLocaleString('tr-TR') : null;
        const ov = B.UI.overlay('<div class="ov-big">🔒</div><h2>Gizlilik & KVKK</h2>' +
          '<div class="acc-info">' + (when ? '✅ Onay verildi: ' + when + ' (v' + (info.version || 1) + ')' : '⚠️ Henüz onay kaydı yok.') + '</div>' +
          '<div class="acc-actions">' +
            '<button class="btn btn-quiet" id="pv-kvkk">📄 KVKK Aydınlatma Metni</button>' +
            '<button class="btn btn-quiet" id="pv-terms">📜 Kullanıcı Sözleşmesi</button>' +
            (when ? '<button class="btn btn-danger" id="pv-wd">↩️ Rızayı geri çek</button>' : '') +
          '</div>',
          [{ label: 'Kapat', cls: 'btn-quiet', onClick: null }]);
        function viewLegal(which) {
          const L = B.Content.get('legal') || {};
          const v = B.UI.overlay('<div class="legal-view">' + (which === 'terms' ? L.terms : L.kvkk) + '</div>', [{ label: 'Kapat', cls: 'btn-quiet', onClick: null }]);
          const box = v.querySelector('.legal-view'); if (box) box.scrollTop = 0;
        }
        ov.querySelector('#pv-kvkk').onclick = () => viewLegal('kvkk');
        ov.querySelector('#pv-terms').onclick = () => viewLegal('terms');
        const wd = ov.querySelector('#pv-wd');
        if (wd) wd.onclick = () => { B.Consent.withdraw(); ov.remove(); B.UI.toast('Rıza geri çekildi. Sonraki kayıt yeniden onay ister.'); };
      }

      function appPrefs() {
        const on = B.Save.settings.get().sound !== false;
        const ov = B.UI.overlay('<div class="ov-big">🔊</div><h2>Uygulama Ayarları</h2>' +
          '<label class="adm-perm-row"><span class="adm-perm-lbl">🔊 Ses efektleri</span>' +
          '<span class="adm-switch"><input type="checkbox" id="ap-sound"' + (on ? ' checked' : '') + '><span class="adm-slider"></span></span></label>',
          [{ label: 'Kapat', cls: 'btn-quiet', onClick: null }]);
        ov.querySelector('#ap-sound').onchange = e => {
          const v = e.target.checked;
          B.Save.settings.set({ sound: v });
          if (B.Audio && B.Audio.setEnabled) B.Audio.setEnabled(v);
          B.UI.toast(v ? 'Ses açık 🔊' : 'Ses kapalı 🔇');
        };
      }

      function changePin() {
        const ov = B.UI.overlay('<div class="ov-big">🔑</div><h2>Yeni Ebeveyn PIN\'i</h2><input id="new-pin" type="password" class="name-input" placeholder="En az 4 hane"><div class="login-err" id="pin-err"></div>',
          [{ label: 'KAYDET', onClick: null }]);
        ov.querySelector('.overlay-btns .btn').onclick = () => {
          const res = B.Auth.setAdminPin(ov.querySelector('#new-pin').value);
          if (!res.ok) { ov.querySelector('#pin-err').textContent = res.err; return; }
          ov.remove(); B.UI.toast('PIN güncellendi 🔑');
        };
      }

      shell();
    },
    exit() {},
  });
})(window.BOKUL = window.BOKUL || {});

/* === src/ui/screens/interests-screen.js === */
/* BOKUL — İlgi Alanları (kişiselleştirme)
 * Çocuğun hobileri, sevdiği müzik/oyuncak/yiyecek/spor vb. — İSTEĞE BAĞLI.
 * Amaç: oyunu kişiselleştirmek ve ebeveynin çocuğunun neleri sevdiğini görmesi
 * (dilek/hediye fikirleri). Aile-içi kullanım; ticari profilleme için değildir. */
(function (B) {
  const CATS = [
    { id: 'hobiler',    icon: '🎨', label: 'Hobilerim',                  opts: ['Resim', 'Müzik', 'Dans', 'Lego', 'Kitap okuma', 'Video oyunu', 'Bisiklet', 'Bilim deneyleri', 'El işi', 'Doğa gezisi'] },
    { id: 'muzik',      icon: '🎵', label: 'Sevdiğim müzik türleri',      opts: ['Pop', 'Rock', 'Rap', 'Çocuk şarkıları', 'Türkü', 'Klasik', 'Elektronik'] },
    { id: 'sanatcilar', icon: '🎤', label: 'Sevdiğim sanatçılar',         opts: [] },
    { id: 'oyuncaklar', icon: '🧸', label: 'Sevdiğim oyuncaklar',         opts: ['Lego', 'Bebek', 'Araba', 'Peluş', 'Puzzle', 'Robot', 'Kart oyunu', 'Top'] },
    { id: 'kiyafetler', icon: '👕', label: 'Sevdiğim kıyafetler',         opts: ['Tişört', 'Elbise', 'Spor giyim', 'Kapüşonlu', 'Etek', 'Kot', 'Kostüm'] },
    { id: 'aburcubur',  icon: '🍫', label: 'Sevdiğim abur cuburlar',      opts: ['Çikolata', 'Cips', 'Dondurma', 'Şeker', 'Bisküvi', 'Kek', 'Kraker'] },
    { id: 'saglikli',   icon: '🥗', label: 'Sevdiğim sağlıklı yiyecekler', opts: ['Meyve', 'Sebze', 'Yoğurt', 'Yumurta', 'Balık', 'Kuruyemiş', 'Salata'] },
    { id: 'sporlar',    icon: '⚽', label: 'Sevdiğim sporlar',            opts: ['Futbol', 'Basketbol', 'Voleybol', 'Yüzme', 'Jimnastik', 'Tenis', 'Koşu', 'Bisiklet'] },
    { id: 'icecekler',  icon: '🥤', label: 'Sevdiğim içecekler',          opts: ['Su', 'Süt', 'Meyve suyu', 'Ayran', 'Limonata', 'Smoothie'] },
  ];

  B.UI.registerScreen('interests', {
    enter(root, params) {
      const onboarding = !!params.onboarding;
      const hud = onboarding ? null : B.UI.buildHud(root, { backTo: 'evim' });
      this._hud = hud;
      const P = B.State.data.player;
      if (!P.profile) P.profile = {};
      const has = id => Array.isArray(P.profile[id]) ? P.profile[id] : (P.profile[id] = []);

      const title = document.createElement('div');
      title.className = 'map-title';
      title.textContent = '🎯 İlgi Alanların — ' + (P.name || 'asker') + ' (istediğini seç, geçebilirsin)';
      root.appendChild(title);

      const scroll = document.createElement('div');
      scroll.className = 'int-scroll';
      root.appendChild(scroll);

      CATS.forEach(cat => {
        const sel = has(cat.id);
        const box = document.createElement('div');
        box.className = 'int-cat';
        box.innerHTML = '<div class="int-catlabel">' + cat.icon + ' ' + cat.label + '</div><div class="int-chips"></div>' +
          '<div class="int-add"><input class="int-input" maxlength="20" placeholder="Başka bir şey ekle..."><button class="chip int-addbtn">+ Ekle</button></div>';
        const chips = box.querySelector('.int-chips');

        function drawChips() {
          chips.innerHTML = '';
          // önce hazır seçenekler
          cat.opts.forEach(o => {
            const on = sel.includes(o);
            const c = document.createElement('button');
            c.className = 'chip int-chip' + (on ? ' int-on' : '');
            c.textContent = o;
            c.onclick = () => { toggle(o); };
            chips.appendChild(c);
          });
          // kullanıcının eklediği özel değerler (opts'ta olmayanlar)
          sel.filter(v => !cat.opts.includes(v)).forEach(v => {
            const c = document.createElement('button');
            c.className = 'chip int-chip int-on int-custom';
            c.textContent = v + ' ✕';
            c.onclick = () => { toggle(v); };
            chips.appendChild(c);
          });
        }
        function toggle(v) {
          const i = sel.indexOf(v);
          if (i >= 0) sel.splice(i, 1); else sel.push(v);
          B.Save.saveSoon();
          drawChips();
        }
        drawChips();

        const input = box.querySelector('.int-input');
        const add = () => {
          const v = (input.value || '').trim();
          if (v && !sel.includes(v)) { sel.push(v); B.Save.saveSoon(); drawChips(); }
          input.value = '';
        };
        box.querySelector('.int-addbtn').onclick = add;
        input.addEventListener('keydown', e => { if (e.key === 'Enter') add(); });

        scroll.appendChild(box);
      });

      const done = document.createElement('button');
      done.className = 'btn btn-action int-done';
      done.textContent = onboarding ? 'DEVAM ▶' : '✔ KAYDET';
      done.onclick = () => {
        B.Save.saveNow();
        if (onboarding) {
          if (!B.State.data.meta.introSeen) B.UI.show('intro', {});
          else B.UI.show('home');
        } else B.UI.show('evim');
      };
      root.appendChild(done);
    },
    exit() { if (this._hud) this._hud.dispose(); },
  });
})(window.BOKUL = window.BOKUL || {});

/* === src/core/game-engine.js === */
/* BOKUL — GameEngine
 * Başlatma sırasının tek sahibi: kayıt → içerik → motorlar → arayüz. */
(function (B) {
  B.Engine = {
    async boot() {
      // 1) İçerik paketleri (kayıt YÜKLENMEZ — önce profil seçilir)
      const LESSONS = [
        'lessons/math-core',
        'lessons/eng-101',
        'lessons/ai-101',
        'lessons/care-101',
        'lessons/philo-101',
      ];
      await B.Content.loadAll(['config', 'dialogues', 'rewards', 'story', 'quests', 'legal', ...LESSONS]);
      LESSONS.forEach(l => B.Lesson.register(B.Content.get(l)));
      B.Lesson.setActive(B.Content.get('lessons/math-core'));

      // 2) Motor başlatmaları (olay dinleyicileri bağlanır)
      B.Save.init();
      B.Audio.init();
      B.Progress.init();
      B.Reward.init();
      B.Chest.init();
      B.Quest.init();
      B.Wish.init();
      B.Cloud.init();
      B.Anim.init();
      B.Commander.init();
      B.UI.init();
    },

    /* Splash'tan giriş: hatırlanan profil varsa devam, yoksa giriş ekranı */
    start() {
      B.Audio.unlock();
      const rem = B.Auth.remembered();
      if (rem && B.Auth.resume(rem)) return B.Engine.enterAs();
      B.UI.show('login');
    },

    /* Profil seçildikten sonra: kaydı yükle ve doğru ekrana yönlendir */
    enterAs() {
      const loaded = B.Save.load();
      // İlk profil + v0.10 öncesi tek kayıt varsa eski ilerlemeyi taşı
      if (!loaded && B.Save.hasLegacy() && B.Auth.users().length === 1) {
        B.Save.legacyImport();
        B.Save.saveNow();
      }
      // Sürüm uyumu: eksik alanları tamamla
      const p = B.State.data.player;
      if (p.coins == null) p.coins = 0;
      p.avatar = B.Avatar.normalize(p.avatar);
      if (!B.State.data.quests) B.State.data.quests = { daily: [], weekly: [], lastDailyReset: '', lastWeeklyReset: '' };
      if (!B.State.data.wishes) B.State.data.wishes = [];
      if (!B.State.data.ideas) B.State.data.ideas = [];
      B.Perms.ensure(B.State.data); // perms alanını garanti et
      if (B.State.data.stats.questionsDone == null) B.State.data.stats.questionsDone = 0;
      if (B.State.data.stats.firstTryCorrect == null) B.State.data.stats.firstTryCorrect = 0;
      if (B.State.data.stats.timeSumMs == null) B.State.data.stats.timeSumMs = 0;

      // Bulut senkron: ebeveyn hedeflerini çek, bu cihazın ilerlemesini gönder
      if (B.Cloud.enabled()) {
        B.Cloud.pullDirectives().then(() => B.Cloud.pushSave());
      }

      // Yeni profil (henüz karakteri yok) → kullanıcı adını varsayılan yap, karakter yaratmaya git
      if (!p.name) {
        p.name = B.Auth.displayName();
        B.Save.saveNow();
        return B.UI.show('creator', {});
      }
      if (!B.State.data.meta.introSeen) return B.UI.show('intro', {});
      B.UI.show('home');
    },

    /* Sinematik bitince üsse geç */
    afterIntro() {
      B.State.data.meta.introSeen = true;
      B.Save.saveNow();
      B.UI.show('home');
    },

    /* Oyuncu değiştir / çıkış */
    logout() {
      B.Save.saveNow();
      B.Auth.logout();
      B.UI.show('login');
    },
  };
})(window.BOKUL = window.BOKUL || {});

/* === src/main.js === */
/* BOKUL — Giriş noktası */
(function (B) {
  window.addEventListener('DOMContentLoaded', async () => {
    try {
      await B.Engine.boot();
      const btn = document.getElementById('splash-start');
      btn.disabled = false;
      btn.onclick = () => B.Engine.start();
    } catch (e) {
      console.error('[BOKUL] Başlatma hatası:', e);
      const s = document.getElementById('splash');
      if (s) s.insertAdjacentHTML('beforeend',
        '<div class="splash-error">Bir şeyler ters gitti Komutan. Sayfayı yenile!<br><small>' + e.message + '</small></div>');
    }
  });
})(window.BOKUL = window.BOKUL || {});

</script>
</body>
