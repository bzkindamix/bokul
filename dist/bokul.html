/* === src/interactions/long-division/view.js === */
/* BOKUL — Uzun Bölme Tahtası (görünüm)
 * Türk okul notasyonu: bölünen solda, dikey çizgi, bölen sağ üstte,
 * bölüm bölenin altında. Adımlar logic.js planından sürülür.
 *
 * API:
 *   const ctl = B.LongDivisionView.create(container, question, {
 *     prefilled: Set<stepType>,      // guided: bu adımları Komutan yapar
 *     coach: bool,                    // teach: her adımda yönerge repliği
 *     problemText: string|null,       // challenge: problem metni
 *     onAnswer(step, correct, attempt),
 *     onComplete({ mistakes }),
 *     say(text),                      // Komutan balonuna yaz
 *   });
 */
(function (B) {

  function el(tag, cls, text) {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    if (text != null) e.textContent = text;
    return e;
  }

  function create(container, q, opts) {
    opts = opts || {};
    const plan = q.plan;
    const D = String(q.dividend).length;
    const steps = plan.steps;

    let stepIdx = 0;
    let attempt = 0;
    let mistakes = 0;
    let buffer = '';
    let selectCount = 0;   // select adımında seçili basamak sayısı
    let destroyed = false;

    /* ---------- DOM iskeleti ---------- */
    container.innerHTML = '';
    const root = el('div', 'ld-root');

    if (opts.problemText) root.appendChild(el('div', 'ld-problem', opts.problemText));

    const boardWrap = el('div', 'ld-board');
    const left = el('div', 'ld-left');           // bölünen + işlem satırları
    const right = el('div', 'ld-right');         // bölen + bölüm

    // Bölünen satırı (tıklanabilir basamaklar)
    const dividendRow = el('div', 'ld-row ld-dividend');
    const digitEls = [];
    dividendRow.appendChild(el('span', 'ld-cell ld-sign', ''));  // kolon 0: işaret kolonu
    String(q.dividend).split('').forEach((d, i) => {
      const c = el('span', 'ld-cell ld-digit', d);
      c.dataset.idx = i;
      digitEls.push(c);
      dividendRow.appendChild(c);
    });
    left.appendChild(dividendRow);

    const workArea = el('div', 'ld-work');        // işlem satırları buraya eklenir
    left.appendChild(workArea);

    // Sağ blok: bölen, çizgi, bölüm
    right.appendChild(el('div', 'ld-divisor', String(q.divisor)));
    right.appendChild(el('div', 'ld-qline'));
    const quotientRow = el('div', 'ld-quotient');
    right.appendChild(quotientRow);

    boardWrap.appendChild(left);
    boardWrap.appendChild(right);
    root.appendChild(boardWrap);

    // Sayı pedi
    const pad = el('div', 'numpad');
    '1234567890'.split('').forEach(k => {
      const b = el('button', 'key', k);
      b.dataset.key = k;
      pad.appendChild(b);
    });
    const back = el('button', 'key key-back', '⌫'); back.dataset.key = 'back';
    const ok = el('button', 'key key-go', '✔ ONAYLA'); ok.dataset.key = 'ok';
    pad.appendChild(back); pad.appendChild(ok);
    root.appendChild(pad);
    container.appendChild(root);

    /* ---------- Yardımcılar ---------- */
    function cellRow(cls) {
      const r = el('div', 'ld-row ' + (cls || ''));
      for (let c = 0; c <= D; c++) r.appendChild(el('span', 'ld-cell'));
      workArea.appendChild(r);
      return r;
    }
    function setCell(row, col, text, cls) {
      const c = row.children[col];
      c.textContent = text;
      if (cls) c.classList.add(cls);
      return c;
    }
    // plan endCol (0 tabanlı basamak indeksi) → görüntü kolonu (+1: işaret kolonu)
    const VC = i => i + 1;

    function say(t) { if (opts.say && t) opts.say(t); }

    /* ---------- Adım durumu ---------- */
    let activeCells = [];   // buffer'ın yazıldığı hücreler (sağdan sola)
    let currentRow = null;  // multiply/subtract için aktif satır
    let remRow = null;      // son kalan satırı (bringdown buraya ekler)

    function clearActive() {
      activeCells.forEach(c => { c.classList.remove('ld-active'); c.textContent = c.dataset.keep || ''; });
      activeCells = [];
    }

    function renderBuffer() {
      // buffer'ı aktif hücrelere sağa dayalı yaz
      const chars = buffer.split('');
      for (let i = 0; i < activeCells.length; i++) {
        const ch = chars[chars.length - activeCells.length + i];
        activeCells[i].textContent = ch || '';
      }
      // taşma: buffer hücre sayısını aşarsa son hücrede birden çok karakter göster
      if (chars.length > activeCells.length && activeCells.length) {
        activeCells[activeCells.length - 1].textContent = chars.slice(chars.length - 1).join('');
      }
    }

    /* Adımı başlat: giriş hücrelerini hazırla + koçluk repliği */
    function beginStep() {
      if (destroyed) return;
      buffer = ''; attempt = 0; selectCount = 0;
      const step = steps[stepIdx];
      if (!step) return finish();

      // Tek basamaklı bölünende SEÇ adımı otomatik: seçilecek tek şey var,
      // çocuğu anlamsız bir dokunuşla oyalama (UX düzeltmesi)
      if (step.type === 'select' && digitEls.length === 1) {
        digitEls[0].classList.add('ld-select');
        setTimeout(() => commitStep(step, true), 400);
        return;
      }

      if (opts.coach) {
        const key = 'teach.coach.' + step.type;
        const line = B.Dialogue.pick(key, { divisor: q.divisor });
        if (line) say(line);
      } else if (step.type === 'select') {
        // SEÇ adımı pedle değil dokunarak oynanır — bunu HER ZAMAN söyle
        say(B.Dialogue.pick('step.select.intro', { divisor: q.divisor }) ||
            'Kaç basamak alacağız? Sayının basamaklarına DOKUN, sonra ONAYLA!');
      }

      // Guided: Komutan bu adımı kendisi yapar
      if (opts.prefilled && opts.prefilled.has(step.type)) {
        setTimeout(() => autoFill(step), 700);
        prepareCells(step, true);
        return;
      }
      prepareCells(step, false);
    }

    function prepareCells(step, ghost) {
      clearActive();
      digitEls.forEach(d => d.classList.remove('ld-select', 'ld-pulse'));

      if (step.type === 'select') {
        // Basamaklara dokunarak önek seç
        digitEls.forEach(d => d.classList.add('ld-pulse'));
        pad.classList.add('numpad-dim');
        return;
      }
      pad.classList.remove('numpad-dim');

      if (step.type === 'estimate') {
        const c = el('span', 'ld-cell ld-active', '');
        quotientRow.appendChild(c);
        activeCells = [c];
      }
      else if (step.type === 'multiply') {
        currentRow = cellRow('ld-product');
        const len = String(step.expected).length;
        const end = VC(step.endCol);
        setCell(currentRow, end - len, '−', 'ld-sign-cell'); // eksi işareti
        activeCells = [];
        for (let c = end - len + 1; c <= end; c++) {
          const cell = setCell(currentRow, c, '', null);
          cell.classList.add('ld-active');
          activeCells.push(cell);
        }
      }
      else if (step.type === 'subtract') {
        // ayraç çizgisi
        const sep = cellRow('ld-sep');
        const plen = String(step.product).length;
        const end = VC(step.endCol);
        for (let c = end - plen; c <= end; c++) setCell(sep, c, '─');
        // sonuç satırı
        remRow = cellRow('ld-rem');
        const rlen = String(step.expected).length;
        activeCells = [];
        for (let c = end - rlen + 1; c <= end; c++) {
          const cell = setCell(remRow, c, '');
          cell.classList.add('ld-active');
          activeCells.push(cell);
        }
      }
      else if (step.type === 'bringdown') {
        // İndirilecek basamak yanıp söner; dokunuş ya da ped ile
        const d = digitEls[step.digitIndex];
        d.classList.add('ld-pulse');
        const cell = setCell(remRow, VC(step.digitIndex), '');
        cell.classList.add('ld-active');
        activeCells = [cell];
      }
      if (ghost) activeCells.forEach(c => c.classList.add('ld-ghost'));
    }

    /* Guided otomatik doldurma */
    function autoFill(step) {
      if (destroyed) return;
      if (step.type === 'select') {
        for (let i = 0; i < step.expected; i++) digitEls[i].classList.add('ld-select');
        say(B.Dialogue.pick('teach.autofill.select', { n: step.expected }) || 'Bu kısmı ben aldım Komutan.');
      } else {
        buffer = String(step.expected);
        renderBuffer();
      }
      setTimeout(() => { commitStep(step, true); }, 650);
    }

    /* ---------- Doğrulama ---------- */
    function submit() {
      const step = steps[stepIdx];
      if (!step) return;
      let answer;
      if (step.type === 'select') {
        if (!selectCount) return; // henüz seçim yok
        answer = selectCount;
      } else {
        if (!buffer.length) return;
        answer = buffer;
      }
      attempt++;
      const { correct } = B.Question.validate(q, step, answer);
      if (opts.onAnswer) opts.onAnswer(step, correct, attempt);

      if (correct) { commitStep(step, false); }
      else {
        mistakes++;
        root.classList.remove('ld-shake'); void root.offsetWidth; // animasyonu tazele
        root.classList.add('ld-shake');
        const key = B.Lesson.active() ? B.Lesson.hintKey(step.type, attempt) : null;
        say(key ? B.Dialogue.hint(key, { divisor: q.divisor }) : 'Bir daha dene Komutan!');
        if (step.type === 'select') {
          digitEls.forEach(d => d.classList.remove('ld-select'));
          selectCount = 0;
        } else { buffer = ''; renderBuffer(); }
      }
    }

    /* Doğru adımı tahtaya işle ve sonrakine geç */
    function commitStep(step, wasAuto) {
      clearActiveKeep(step);
      digitEls.forEach(d => d.classList.remove('ld-pulse'));
      stepIdx++;
      setTimeout(beginStep, wasAuto ? 250 : 350);
    }

    function clearActiveKeep(step) {
      // Aktif hücrelere kesin değeri yaz, vurguyu kaldır
      const val = String(step.expected);
      if (step.type === 'select') {
        for (let i = 0; i < step.expected; i++) digitEls[i].classList.add('ld-select');
      } else {
        const chars = val.split('');
        activeCells.forEach((c, i) => {
          c.textContent = chars[i] != null ? chars[i] : '';
          c.classList.remove('ld-active', 'ld-ghost');
          c.classList.add('ld-done');
        });
      }
      activeCells = [];
    }

    function finish() {
      if (opts.onComplete) opts.onComplete({ mistakes });
    }

    /* ---------- Girdi bağlama ---------- */
    function onPad(e) {
      const b = e.target.closest('.key');
      if (!b) return;
      B.Audio.play('tick');
      const k = b.dataset.key;
      const step = steps[stepIdx];
      if (!step) return;

      if (k === 'ok') return submit();
      if (step.type === 'select') return; // seçim dokunuşla yapılır
      if (k === 'back') { buffer = buffer.slice(0, -1); renderBuffer(); return; }
      if (buffer.length < 6) { buffer += k; renderBuffer(); }
    }

    function onDigitTap(e) {
      const d = e.target.closest('.ld-digit');
      if (!d) return;
      const step = steps[stepIdx];
      if (!step) return;
      const idx = Number(d.dataset.idx);
      if (step.type === 'select') {
        B.Audio.play('tick');
        selectCount = idx + 1;
        digitEls.forEach((x, i) => x.classList.toggle('ld-select', i <= idx));
      } else if (step.type === 'bringdown') {
        B.Audio.play('tick');
        buffer = d.textContent; // dokunulan basamak cevaptır (yanlışsa yanlış sayılır)
        renderBuffer();
        submit();
      }
    }

    pad.addEventListener('click', onPad);
    dividendRow.addEventListener('click', onDigitTap);

    beginStep();

    return {
      destroy() { destroyed = true; container.innerHTML = ''; },
    };
  }

  B.LongDivisionView = { create };
  B.Question.registerView('long-division', create);
})(window.BOKUL = window.BOKUL || {});

/* === src/interactions/multiple-choice/logic.js === */
/* BOKUL — Çoktan Seçmeli Soru Tipi (mantık — DOM YOK)
 * Soru bankası tabanlı dersler için (Yapay Zekâ, Kişisel Bakım, Felsefe...).
 * Bank öğesi: { q, options: [...], correct: <doğru seçeneğin indeksi>,
 *               skill: "beceri-adı", hint: "yanlışta gösterilecek ipucu" } */
(function (B) {

  /* params: { pool: [bankItem...] } — havuzdan rastgele soru seçer.
   * Aynı sorunun art arda gelmemesi için son seçilenler hatırlanır. */
  const recent = [];
  function generate(params) {
    const pool = params.pool || [];
    if (!pool.length) throw new Error('Çoktan seçmeli havuz boş!');
    let item, guard = 30;
    do { item = pool[Math.floor(Math.random() * pool.length)]; }
    while (recent.includes(item.q) && --guard);
    recent.push(item.q);
    if (recent.length > Math.min(6, pool.length - 1)) recent.shift();
    return { item, params };
  }

  const impl = {
    generate,
    /* Tek mikro-adım: cevap seçimi. skill, ustalık takibine gider. */
    getSteps(q) { return [{ type: q.item.skill || 'answer', expected: q.item.correct }]; },
    validateStep(q, step, answer) { return { correct: Number(answer) === q.item.correct }; },
  };

  if (B && B.Question) B.Question.registerType('multiple-choice', impl);
  if (typeof module !== 'undefined' && module.exports) module.exports = { generate, impl };
})(typeof window !== 'undefined' ? (window.BOKUL = window.BOKUL || {}) : null);

/* BOKUL — Çoktan Seçmeli Görünüm (TEK DENEME)
 * İlk cevap kesindir — rastgele/brute-force basma engellenir. Yanlışsa doğru
 * cevap yeşil işaretlenir ve Baba nedenini söyler (öğrenme anı), soru biter.
 * Aynı konu ileride aralıklı tekrarla geri gelir. */
(function (B) {

  function el(tag, cls, text) {

    if (text != null) e.textContent = text;
    return e;
  }

  function create(container, q, opts) {
    opts = opts || {};

    const root = el('div', 'mc-root');
    root.appendChild(el('div', 'mc-question', item.q));

        grid.querySelectorAll('.mc-opt').forEach(b => { b.disabled = true; });

/* === src/interactions/arithmetic/logic.js === */
/* BOKUL — Aritmetik Soru Tipi (toplama, çıkarma, çarpma, basit bölme)
 * Tek cevaplı işlemler. Küçük sınıflar için MEB kademesine uygun.
 * params: { op:'+'|'-'|'*'|'/', a:[min,max], b:[min,max], q:[min,max] }
 * bias 0..1: adaptif zorluk (üst aralığa yaklaştırır) */
(function (B) {
  const SKILL = { '+': 'add', '-': 'sub', '*': 'mul', '/': 'div' };

  function rnd(a, b) { return a + Math.floor(Math.random() * (b - a + 1)); }
  function rng(r, bias) {
    if (!Array.isArray(r)) return r;
    const hi = Math.round(r[0] + (r[1] - r[0]) * (0.45 + 0.55 * (bias || 0)));
    return rnd(r[0], Math.max(r[0], hi));
  }

  function generate(params, bias) {
    const op = params.op || '+';
    let a, b, answer;
    if (op === '+') { a = rng(params.a || [1, 20], bias); b = rng(params.b || [1, 20], bias); answer = a + b; }
    else if (op === '-') { a = rng(params.a || [2, 20], bias); b = rnd(0, a); answer = a - b; }
    else if (op === '*') { a = rng(params.a || [1, 10], bias); b = rng(params.b || [1, 10], bias); answer = a * b; }
    else { // '/' — tam bölünen (paylaştırma): a = b × q
      b = rng(params.b || [2, 5], bias);
      const q = rng(params.q || [1, 10], bias);
      a = b * q; answer = q;
    }
    return { a, b, op, answer };
  }

  const impl = {

/* BOKUL — Aritmetik Görünüm: "a op b = [?]" + sayı pedi (tek cevap). */
(function (B) {
  const SYM = { '+': '+', '-': '−', '*': '×', '/': '÷' };

  function el(tag, cls, text) {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    if (text != null) e.textContent = text;
    return e;
  }

  function create(container, q, opts) {
    opts = opts || {};
    let buffer = '', attempt = 0, mistakes = 0, done = false;
    const step = B.Question.steps(q)[0];

    container.innerHTML = '';
    const root = el('div', 'ar-root');
    root.innerHTML =
      '<div class="ar-expr"><span>' + q.a + '</span><span class="ar-op">' + (SYM[q.op] || '?') +
      '</span><span>' + q.b + '</span><span class="ar-eq">=</span><span class="ar-box" id="ar-box">?</span></div>';

    const pad = el('div', 'numpad');
    '1234567890'.split('').forEach(k => { const b = el('button', 'key', k); b.dataset.key = k; pad.appendChild(b); });
    const back = el('button', 'key key-back', '⌫'); back.dataset.key = 'back';
    const ok = el('button', 'key key-go', '✔ ONAYLA'); ok.dataset.key = 'ok';
    pad.appendChild(back); pad.appendChild(ok);
    root.appendChild(pad);
    container.appendChild(root);
    const box = root.querySelector('#ar-box');

    function render() { box.textContent = buffer || '?'; box.classList.add('ld-active'); }

    function submit() {
      if (!buffer.length || done) return;
      done = true; // TEK DENEME: ilk onay kesindir
      const { correct } = B.Question.validate(q, step, buffer);
      if (opts.onAnswer) opts.onAnswer(step, correct, 1);
      if (correct) {
        box.classList.remove('ld-active'); box.classList.add('ok');
        if (opts.say) opts.say(B.Dialogue.pick('correct'));
        setTimeout(() => { if (opts.onComplete) opts.onComplete({ mistakes: 0 }); }, 550);
      } else {
        root.classList.remove('ld-shake'); void root.offsetWidth; root.classList.add('ld-shake');
        // Doğru cevabı göster (öğrenme anı)
        box.classList.remove('ld-active');
        box.textContent = q.answer; box.classList.add('ok');
        if (opts.say) opts.say('Doğrusu ' + q.answer + '. Bir dahakine yakalarsın ' + (B.State.data.player.name || 'Komutan') + '!');
        setTimeout(() => { if (opts.onComplete) opts.onComplete({ mistakes: 1 }); }, 1900);
      }
    }

      const b = e.target.closest('.key');
      if (!b || done) return;

/* BOKUL — AnimationEngine
 * XP damlası, konfeti ve küçük şölenler. Olayları dinler, kimse çağırmaz. */
(function (B) {

  /* Ekranda bir noktadan XP barına uçan altın çip */
  function xpDrop(amount) {
    const bar = document.querySelector('.hud-xpbar');
    const chip = document.createElement('div');
    chip.className = 'fx-xp';
    chip.textContent = '+' + amount + ' XP';
    document.body.appendChild(chip);
    const startX = window.innerWidth / 2, startY = window.innerHeight * 0.45;
    chip.style.left = startX + 'px'; chip.style.top = startY + 'px';
    requestAnimationFrame(() => {
      let tx = startX, ty = 60;
      if (bar) { const r = bar.getBoundingClientRect(); tx = r.left + r.width / 2; ty = r.top; }
      chip.style.transform = 'translate(' + (tx - startX) + 'px,' + (ty - startY) + 'px) scale(.6)';
      chip.style.opacity = '0';
    });
    setTimeout(() => chip.remove(), 900);
  }

  /* Basit konfeti patlaması (level-up, boss zaferi) */
  function confetti(n) {
    const colors = ['#FF4FD8', '#FFD52E', '#52E88C', '#9D6BFF', '#3DF2D2', '#FF9F1C'];
    for (let i = 0; i < (n || 40); i++) {
      const p = document.createElement('div');
      p.className = 'fx-confetti';
      p.style.background = colors[i % colors.length];
      p.style.left = (35 + Math.random() * 30) + 'vw';
      p.style.setProperty('--dx', (Math.random() * 60 - 30) + 'vw');
      p.style.setProperty('--dr', (Math.random() * 720 - 360) + 'deg');
      p.style.animationDelay = (Math.random() * 0.3) + 's';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 2200);
    }
  }

  B.Anim = {
    xpDrop, confetti,
    init() {
      B.Bus.on(B.Events.XP_GAINED, p => { if (p.source !== 'step') xpDrop(p.amount); });
      B.Bus.on(B.Events.LEVEL_UP, () => confetti(60));
      B.Bus.on(B.Events.BOSS_DEFEATED, () => confetti(80));
    },
  };
})(window.BOKUL = window.BOKUL || {});

/* BOKUL — Soru Süresi (geri sayım çubuğu)
 * Cömert ve nazik: süre dolunca cezalandırmaz, sadece o soruyu geçer.
 * B.Timer.create(host, saniye, onTimeout) → { stop() } */
(function (B) {
  B.Timer = {
    create(host, seconds, onTimeout) {
      const el = document.createElement('div');
      el.className = 'qtimer';
      el.innerHTML = '<span class="qtimer-icon">⏱️</span><div class="qtimer-bar"><i></i></div><span class="qtimer-num"></span>';
      host.appendChild(el);
      const bar = el.querySelector('i'), num = el.querySelector('.qtimer-num');
      const total = Math.max(1, seconds) * 10; // desisaniye
      let left = total, stopped = false;
      function render() {
        const pct = Math.max(0, left / total * 100);
        bar.style.width = pct + '%';
        num.textContent = Math.ceil(left / 10);
        el.classList.toggle('qtimer-low', pct < 34);
      }
      render();
      const iv = setInterval(() => {
        if (stopped) return;
        left--;
        render();
        if (left <= 0) { clearInterval(iv); stopped = true; if (onTimeout) onTimeout(); }
      }, 100);
      return { stop() { stopped = true; clearInterval(iv); if (el.parentNode) el.remove(); } };
    },
  };
})(window.BOKUL = window.BOKUL || {});

  function star(cx, cy, r, fill) {
    let p = '';

  /* ---------- Ana çizici ---------- */
  function svg(a) {

    return gender === 'kiz'
      ? Object.assign(base, { hair: 6, outfit: 'elbise-pembe' })
      : Object.assign(base, { hair: 0, outfit: 'tee-mavi' });
  }

  /* Kozmetik id → avatar slotundaki parça id'si */
  function partIdFor(item) {
    const maps = { hair: CATALOG.hairs, hairColor: CATALOG.hairColors, eyes: CATALOG.eyes,
                   mouth: CATALOG.mouths, outfit: CATALOG.outfits, acc: CATALOG.accs, ring: CATALOG.rings };
    const p = (maps[item.type] || []).find(x => x.cosmeticId === item.id);
    return p ? p.id : null;
  }

  function unequipCosmetic(avatar, item) {
    const a = normalize(avatar);
    const pid = partIdFor(item);
    if (pid == null) return a;
    const def = { hair: 0, hairColor: 0, eyes: 0, mouth: 0, outfit: DEFAULT_OUTFIT, acc: 'none', ring: 'none' };
    if (a[item.type] === pid) a[item.type] = def[item.type];
    return a;
  }

  /* Bir parçanın kilit anahtarı ve satın alınabilirliği */
  function unlockKey(part) { return part.cosmeticId || part.id; }
  function isGated(part) { return !part.free && !!(part.cosmeticId || part.rarity); }

  /* Envanterdeki bir id'ye karşılık gelen katalog parçasını bul (satış için) */
  function findByUnlock(key) {
    const groups = [['hair', CATALOG.hairs], ['hairColor', CATALOG.hairColors], ['eyes', CATALOG.eyes],
                    ['mouth', CATALOG.mouths], ['outfit', CATALOG.outfits], ['acc', CATALOG.accs], ['ring', CATALOG.rings]];
    for (const [type, list] of groups) {
      const p = list.find(x => isGated(x) && unlockKey(x) === key);
      if (p) return { type, part: p, name: p.name, rarity: p.rarity || 'common' };
    }
    return null;
  }

  B.Avatar = { CATALOG, normalize, svg, el, isUnlocked, preset, partIdFor, unequipCosmetic,
               genderOk, hairsFor, outfitsFor, unlockKey, isGated, findByUnlock };

/* === src/ui/components/commander.js === */
/* BOKUL — Baba Komutan bileşeni (CANLI karakter)
 * - Sürekli: nefes alma (CSS) + rastgele göz kırpma (kare değişimi)
 * - Konuşurken: yazı-makinesi + ağız aç/kapa + Animal Crossing tarzı sesli mırıltı
 * - İfadeler olaylara bağlı: doğru → mutlu, yanlış → şaşkın, level → gururlu */
(function (B) {
  let typeTimer = null;   // yazı makinesi
  let talkTimer = null;   // ağız aç/kapa döngüsü
  let blinkTimer = null;  // göz kırpma zamanlayıcısı
  let exprTimer = null;   // ifade geri dönüş zamanlayıcısı

  // Tek gerçek durum: tüm .commander-face'ler bundan çizilir
  const face = { expr: 'normal', mouthOpen: false, blink: false };

  function renderFaces() {
    document.querySelectorAll('.commander-face').forEach(f => {
      f.innerHTML = B.SvgArt.commander(face.expr, { mouthOpen: face.mouthOpen, blink: face.blink });
    });
  }

  /* Rastgele aralıklarla göz kırp (2.5-5.5 sn) */
  function scheduleBlink() {
    clearTimeout(blinkTimer);
    blinkTimer = setTimeout(() => {
      face.blink = true; renderFaces();
      setTimeout(() => { face.blink = false; renderFaces(); scheduleBlink(); }, 130);
    }, 2500 + Math.random() * 3000);
  }

  /* İfadeyi kısa süreliğine değiştir, sonra normale dön */
  function express(expr, ms) {
    clearTimeout(exprTimer);
    face.expr = expr; renderFaces();
    exprTimer = setTimeout(() => { face.expr = 'normal'; renderFaces(); }, ms || 1600);
  }

  function stopTalking() {
    clearInterval(talkTimer); talkTimer = null;
    face.mouthOpen = false; renderFaces();
  }

  B.Commander = {
    mount(container, opts) {
      opts = opts || {};
      const wrap = document.createElement('div');
      wrap.className = 'commander-wrap' + (opts.compact ? ' commander-compact' : '');
      wrap.innerHTML =
        '<div class="commander-face commander-idle">' +
          B.SvgArt.commander(face.expr, face) +
        '</div>' +
        '<div class="commander-balloon"><span class="commander-text"></span></div>';
      container.appendChild(wrap);
      const textEl = wrap.querySelector('.commander-text');

      /* Konuşma: harfler akarken ağız oynar + her 3 harfte bir mırıltı sesi */
      function say(text) {
        if (!text) return;
        clearInterval(typeTimer);
        stopTalking();
        textEl.textContent = '';
        let i = 0;

        talkTimer = setInterval(() => {
          face.mouthOpen = !face.mouthOpen;
          renderFaces();
        }, 120);

        typeTimer = setInterval(() => {
          textEl.textContent = text.slice(0, ++i);
          if (i % 3 === 0 && text[i - 1] !== ' ') B.Audio.play('blip');
          if (i >= text.length) {
            clearInterval(typeTimer);
            stopTalking();
          }
        }, 26); // ağız hareketi görünsün diye biraz yavaşlatıldı
      }

      function sayFrom(pool, vars) {
        const t = B.Dialogue.pick(pool, vars);
        if (t) say(t);
        return t;
      }

      renderFaces();
      return { say, sayFrom, el: wrap };
    },

    express,

    init() {
      scheduleBlink();
      B.Bus.on(B.Events.STEP_ANSWERED, p => express(p.correct ? 'happy' : 'surprised', 1200));
      B.Bus.on(B.Events.LEVEL_UP, () => express('proud', 2500));
      B.Bus.on(B.Events.BOSS_DEFEATED, () => express('proud', 3000));
      B.Bus.on(B.Events.BOSS_ATTACKED, () => express('stern', 1800));
    },
  };
})(window.BOKUL = window.BOKUL || {});

/* BOKUL — Sandık Açılış Töreni (CSS 3D)
 * Karartılmış sahne → sallanan 3D sandık → dokun → kapak açılır,
 * ışık patlar, ödül kartı dönerek gelir. */
(function (B) {
  const RARITY = {
    common:    { name: 'Yaygın',   color: '#A79BC8' },
    rare:      { name: 'Nadir',    color: '#6FA8FF' },
    epic:      { name: 'Epik',     color: '#9D6BFF' },
    legendary: { name: 'Efsanevi', color: '#3DF2D2' },
  };

  /* Kuyruktaki sandıkları sırayla aç; bitince onDone */
  function openCeremony(onDone) {
    if (!B.Chest.queue().length) { if (onDone) onDone(); return; }
    const meta = B.Chest.meta(B.Chest.queue()[0]);

    const ov = document.createElement('div');
    ov.className = 'overlay chest-overlay';
    ov.innerHTML =
      '<div class="chest-scene">' +
        '<div class="chest-title">' + meta.name + '</div>' +
        '<div class="chest3d chest-shake">' +
          '<div class="chest-lid"></div>' +
          '<div class="chest-body">' + meta.icon + '</div>' +
          '<div class="chest-glow"></div>' +
        '</div>' +
        '<div class="chest-hint">Açmak için dokun!</div>' +
      '</div>';
    document.body.appendChild(ov);

    const chestEl = ov.querySelector('.chest3d');
    let opened = false;

    chestEl.parentElement.onclick = () => {
      if (opened) return;
      opened = true;
      const { result } = B.Chest.openNext();
      B.Audio.play('chest');
      chestEl.classList.remove('chest-shake');
      chestEl.classList.add('chest-open');

      setTimeout(() => {
        B.Anim.confetti(40);
        let cardHtml;
        if (result.item) {
          const rar = RARITY[result.item.rarity] || RARITY.common;
          cardHtml =
            '<div class="loot-card" style="--rar:' + rar.color + '">' +
              '<div class="loot-rarity">' + rar.name.toUpperCase() + '</div>' +
              '<div class="loot-art">' + lootArt(result.item) + '</div>' +
              '<div class="loot-name">' + result.item.name + '</div>' +
            '</div>';
        } else {
          cardHtml =
            '<div class="loot-card" style="--rar:#FFD52E">' +
              '<div class="loot-rarity">XP PAKETİ</div>' +
              '<div class="loot-art loot-xp">+50 XP</div>' +
            '</div>';
        }
        const scene = ov.querySelector('.chest-scene');
        scene.insertAdjacentHTML('beforeend',
          cardHtml + '<div class="loot-coins">+' + result.coins + ' 💰 Altın</div>');
        ov.querySelector('.chest-hint').textContent = '';

        setTimeout(() => {
          const btn = document.createElement('button');
          btn.className = 'btn btn-action';
          btn.textContent = B.Chest.queue().length ? ('SIRADAKİ SANDIK (' + B.Chest.queue().length + ') ▶') : 'DEVAM ▶';
          btn.onclick = () => { ov.remove(); openCeremony(onDone); };
          scene.appendChild(btn);
        }, 700);
      }, 550);
    };
  }

  /* Ödül kartındaki görsel: avatar parçasıysa o parçayla mini avatar önizlemesi */
  function lootArt(item) {
    const a = B.Avatar.normalize(B.State.data.player.avatar);
    a.usePhoto = false;
    const C = B.Avatar.CATALOG;
    const bind = {
      hair:      () => { const p = C.hairs.find(x => x.cosmeticId === item.id); if (p) a.hair = p.id; },
      hairColor: () => { const p = C.hairColors.find(x => x.cosmeticId === item.id); if (p) a.hairColor = p.id; },
      eyes:      () => { const p = C.eyes.find(x => x.cosmeticId === item.id); if (p) a.eyes = p.id; },
      mouth:     () => { const p = C.mouths.find(x => x.cosmeticId === item.id); if (p) a.mouth = p.id; },
      acc:       () => { const p = C.accs.find(x => x.cosmeticId === item.id); if (p) a.acc = p.id; },
      ring:      () => { const p = C.rings.find(x => x.cosmeticId === item.id); if (p) a.ring = p.id; },
    };
    if (bind[item.type]) { bind[item.type](); return B.Avatar.svg(a); }
    if (item.type === 'title') return '<div class="loot-title-art">🎖️</div>';
    return '<div class="loot-title-art">✨</div>';
  }

  B.ChestUI = { openCeremony };
})(window.BOKUL = window.BOKUL || {});

/* === src/ui/ui-manager.js === */
/* BOKUL — UIManager
 * Ekran yönlendirici + ortak HUD + tören katmanları (overlay/toast).
 * Ekranlar registerScreen ile kaydolur: { enter(root, params), exit() } */
(function (B) {
  const screens = new Map();
  let current = null;
  let currentName = '';

  B.UI = {
    registerScreen(name, impl) { screens.set(name, impl); },

    show(name, params) {
      const next = screens.get(name);
      if (!next) { console.error('[BOKUL] Kayıtsız ekran:', name); return; }
      if (current && current.exit) current.exit();
      // Ekran değişiminde açık kalan overlay/toast'ları temizle
      document.querySelectorAll('.overlay').forEach(o => o.remove());
      const app = document.getElementById('app');
      app.innerHTML = '';
      const root = document.createElement('div');
      root.className = 'screen screen-' + name;
      app.appendChild(root);
      current = next; currentName = name;
      next.enter(root, params || {});
      B.Bus.emit(B.Events.SCREEN_CHANGED, { name });
    },

    currentScreen() { return currentName; },

    /* ---- Ortak HUD (üst şerit) ---- */
    buildHud(root, opts) {
      opts = opts || {};
      const p = B.State.data.player;
      const rank = B.Reward.rankFor(p.level);
      const hud = document.createElement('div');
      hud.className = 'hud';
      hud.innerHTML =
        (opts.backTo ? '<button class="chip hud-back">◀</button>' : '<div class="hud-avatar">' + B.Avatar.el(p.avatar) + '</div>') +
        '<div class="chip hud-rank">' + rank.icon + ' ' + rank.title + '</div>' +
        '<div class="hud-xpbar"><span class="hud-lvl">' + p.level + '</span><i></i></div>' +
        '<div class="chip hud-coins">💰 ' + (p.coins || 0) + '</div>' +
        (opts.extra || '') +
        '<button class="chip hud-sound">' + (B.Audio.isEnabled() ? '🔊' : '🔇') + '</button>';
      root.appendChild(hud);

      const fill = hud.querySelector('.hud-xpbar i');
      function refresh() {
        const pl = B.State.data.player;
        fill.style.width = Math.min(100, Math.round(pl.xp / B.Reward.xpNeeded() * 100)) + '%';
        hud.querySelector('.hud-lvl').textContent = pl.level;
        const r = B.Reward.rankFor(pl.level);
        hud.querySelector('.hud-rank').textContent = r.icon + ' ' + r.title;
      }
      refresh();
      const offXp = B.Bus.on(B.Events.XP_GAINED, refresh);
      const offLvl = B.Bus.on(B.Events.LEVEL_UP, refresh);
      const offCoin = B.Bus.on(B.Events.COINS_CHANGED, p2 => {
        const c = hud.querySelector('.hud-coins');
        if (c) c.textContent = '💰 ' + p2.total;
      });

      if (opts.backTo) hud.querySelector('.hud-back').onclick = () => B.UI.show(opts.backTo, opts.backParams);
      hud.querySelector('.hud-sound').onclick = (e) => {
        const on = !B.Audio.isEnabled();
        B.Audio.setEnabled(on);
        B.Save.settings.set({ sound: on });
        e.target.textContent = on ? '🔊' : '🔇';
      };
      return { refresh, dispose() { offXp(); offLvl(); offCoin(); } };
    },

    /* ---- Tören katmanı: level-up, zafer, geri çekilme ---- */
    overlay(html, buttons) {
      const ov = document.createElement('div');
      ov.className = 'overlay';
      const card = document.createElement('div');
      card.className = 'overlay-card';
      card.innerHTML = html;
      const btnRow = document.createElement('div');
      btnRow.className = 'overlay-btns';
      (buttons || []).forEach(b => {
        const btn = document.createElement('button');
        btn.className = 'btn ' + (b.cls || 'btn-action');
        btn.textContent = b.label;
        // ÖNEMLİ: önce onClick, sonra kaldır — onClick overlay içindeki
        // form alanlarını (ör. isim inputu) okuyabilmeli
        btn.onclick = () => { if (b.onClick) b.onClick(); ov.remove(); };
        btnRow.appendChild(btn);
      });
      card.appendChild(btnRow);
      ov.appendChild(card);
      document.body.appendChild(ov);
      return ov;
    },

    toast(text) {
      const t = document.createElement('div');
      t.className = 'toast';
      t.textContent = text;
      document.body.appendChild(t);
      setTimeout(() => t.classList.add('toast-show'), 20);
      setTimeout(() => { t.classList.remove('toast-show'); setTimeout(() => t.remove(), 400); }, 2600);
    },

    /* Level-up törenini merkezi bağla */
    init() {
      B.Bus.on(B.Events.LEVEL_UP, p => {
        const rankHtml = p.newRank
          ? '<div class="ov-rank">' + p.newRank.icon + '</div><div class="ov-ranktitle">Yeni rütbe: ' + p.newRank.title + '!</div>'
          : '';
        B.UI.overlay(
          '<div class="ov-big">⬆️</div><h2>LEVEL ' + p.newLevel + '!</h2>' + rankHtml +
          '<p class="ov-quote">' + (B.Dialogue.pick('levelup') || '') + '</p>',
          [{ label: 'DEVAM ▶' }]
        );
      });
    },
  };
})(window.BOKUL = window.BOKUL || {});

            (unlocked ? '' : '<span class="map-lock">🔒</span>') + '</div>' +
            (gradeLocked ? '<div class="map-gradelock">🎓 Bu bölümü ' + section.minGrade + '. sınıfta açacaksın. Şimdilik seviyene uygun bölümlere odaklan!</div>' : '');

          if (unlocked) {
            const path = document.createElement('div');
            path.className = 'map-path';

            section.missions.forEach(m => {
              const done = prog.missions[m.id];
              const open = B.Lesson.isMissionUnlocked(section.id, m.id);
              const node = document.createElement('button');
              node.className = 'map-node' +
                (done ? ' node-done' : open ? ' node-active' : ' node-locked');
              node.innerHTML = (TYPE_ICON[m.type] || '⚔️') +
                (done ? '<small>' + '★'.repeat(done.stars) + '☆'.repeat(3 - done.stars) + '</small>' : '');
              node.title = m.title;
              if (open) node.onclick = () => {
                B.Audio.play('tick');
                B.UI.show('mission', { sectionId: section.id, missionId: m.id });
              };
              path.appendChild(node);
            });

            // Boss düğümü + ustalık kapısı
            const gate = B.Lesson.bossGate(section.id);
            const boss = document.createElement('button');
            const isUnit = section.boss.tier === 'unit';
            boss.className = 'map-node map-boss' + (isUnit ? ' map-uboss' : '') +
              (prog.bossDefeated ? ' node-done' : gate.open ? ' node-active' : ' node-locked');
            boss.innerHTML = section.boss.icon +
              '<small>' + (prog.bossDefeated ? 'FETHEDİLDİ'
                : gate.open ? 'SAVAŞ!'
                : gate.missionsDone ? ('Ustalık %' + Math.round(gate.mastery * 100) + ' / %' + Math.round(gate.need * 100))
                : 'Harekâtlar sürüyor') + '</small>';
            if (gate.open || prog.bossDefeated) boss.onclick = () => {
              B.Audio.play('tick');
              B.UI.show('boss', { sectionId: section.id });
            };
            path.appendChild(boss);
            card.appendChild(path);
          }
          scroll.appendChild(card);
        });
      });

      // Ünite 2 içerik notu (v0.8'de gelecek bölümler için dürüst ilan)
      if (lesson.comingSoon) {
        const note = document.createElement('div');
        note.className = 'map-soon';
        note.textContent = '🛰️ ' + lesson.comingSoon;
        scroll.appendChild(note);
      }

      this._hud = hud;
    },
    exit() { if (this._hud) this._hud.dispose(); },
  });
})(window.BOKUL = window.BOKUL || {});

/* === src/ui/screens/mission-screen.js === */
/* BOKUL — Harekât Ekranı
 * Tüm harekât tiplerini oynatır: teach / guided / practice / challenge / review.
 * Hedef döngüsü: soru üret → tahtada çöz → yıldız + XP → sonraki hedef → harekât sonu. */
(function (B) {
  const AD = { teach: '🎓 Keşif Brifingi', guided: '🤝 Ortak Harekât', practice: '⚔️ Saha Görevi',
               challenge: '🧠 Yeni Nesil Operasyon', review: '🔄 Devriye' };

  B.UI.registerScreen('mission', {
    enter(root, params) {
      const lesson = B.Lesson.active();
      const mission = B.Lesson.findMission(params.sectionId, params.missionId);
      const sectionObj = (B.Lesson.findSection(params.sectionId) || {}).section || {};
      const itype = sectionObj.interactionType || lesson.interactionType; // bölüm bazlı soru tipi
      const singleAttempt = (itype === 'multiple-choice' || itype === 'arithmetic'); // tek deneme tipleri
      const cfg = B.Content.get('config');
      const self = this;

      const hud = B.UI.buildHud(root, {
        backTo: 'map',
        extra: '<div class="chip hud-target"></div><div class="chip hud-streak"></div>',
      });
      this._hud = hud;

      const streakChip = root.querySelector('.hud-streak');
      const targetChip = root.querySelector('.hud-target');
      function refreshStreak() {
        const s = B.State.data.streaks.current;
        const m = B.Reward.streakMultiplier();
        streakChip.textContent = s >= 2 ? ('🔥 Seri x' + s + (m > 1 ? ' → XP ×' + m : '')) : '';
      }
      this._offStreak = B.Bus.on(B.Events.STREAK_CHANGED, refreshStreak);
      refreshStreak();

      const title = document.createElement('div');
      title.className = 'mission-title';
      title.textContent = (AD[mission.type] || mission.type) + ' — ' + mission.title;
      root.appendChild(title);

      const layout = document.createElement('div');
      layout.className = 'mission-layout';
      root.appendChild(layout);

      const leftCol = document.createElement('div');
      leftCol.className = 'mission-left';
      layout.appendChild(leftCol);
      const cmd = B.Commander.mount(leftCol, { compact: true });

      const stageWrap = document.createElement('div');
      stageWrap.className = 'mission-stagewrap';
      layout.appendChild(stageWrap);
      const timerHost = document.createElement('div');
      timerHost.className = 'qtimer-host';
      stageWrap.appendChild(timerHost);
      const stage = document.createElement('div');
      stage.className = 'mission-stage';
      stageWrap.appendChild(stage);

      // Soru süresi (config.timer): teach hariç soru bazlı tipler için
      const tcfg = cfg.timer || {};
      const timerSec = tcfg.enabled ? (tcfg[itype] || tcfg.default || 0) : 0;
      let timerCtl = null;

      /* ---------- TEACH: senaryo oynatıcı ---------- */
      if (mission.type === 'teach') {
        targetChip.textContent = '🎓 Brifing';
        const scriptSteps = [];
        (mission.segments || []).forEach(seg => {
          const s = (lesson.teachScripts || {})[seg.script];
          if (s) scriptSteps.push(...s);
        });
        cmd.sayFrom('teach.intro');
        this._teach = B.TeachModels.run(stage, scriptSteps, {
          say: t => cmd.say(t),
          onComplete() {
            // Brifing tamam: 3 yıldız sabit + görev XP'si
            finishMission([3]);
          },
        });
        return;
      }

      /* ---------- Soru bazlı tipler ---------- */
      const total = mission.targetCount || 3;
      let qIndex = 0;
      const starList = [];
      let view = null;

      // Review: önceki bölümlerin üreticilerinden karışık havuz
      const reviewGens = mission.source === 'spaced-repetition'
        ? B.Lesson.reviewGenerators(params.sectionId) : null;

      function nextQuestion() {
        if (view) { view.destroy(); view = null; }
        if (timerCtl) { timerCtl.stop(); timerCtl = null; }
        if (qIndex >= total) return finishMission(starList);
        targetChip.textContent = '🎯 Hedef ' + (qIndex + 1) + '/' + total;

        let gen = reviewGens
          ? reviewGens[Math.floor(Math.random() * reviewGens.length)]
          : B.Lesson.resolveGenerator(params.sectionId, mission.generator);
        gen = B.Curriculum.forType(itype, gen); // yaş/sınıfa göre zorluk (uzun bölme)
        const q = B.Question.generate(itype, gen, lesson.skills);
        B.Bus.emit(B.Events.QUESTION_STARTED, { questionId: qIndex, lessonId: lesson.id, type: mission.type });

        // Guided iskelesi: fadeOut ile her soruda bir adım daha oyuncuya bırakılır
        let prefilled = null;
        if (mission.scaffold) {
          let list = mission.scaffold.prefilledSteps || [];
          if (mission.scaffold.fadeOut) list = list.slice(0, Math.max(0, list.length - qIndex));
          if (list.length) prefilled = new Set(list);
        }

        // Challenge: problem metni şablondan
        let problemText = null;
        if (mission.problemTemplates && mission.problemTemplates.length) {
          const t = mission.problemTemplates[Math.floor(Math.random() * mission.problemTemplates.length)];
          problemText = t.replace('{dividend}', q.dividend).replace('{divisor}', q.divisor)
                         .replace('{name}', B.State.data.player.name || 'Komutan');
        }

        cmd.sayFrom(qIndex === 0 ? 'mission.start' : 'mission.next');
        let mistakes = 0;
        let settled = false;
        const qStart = Date.now();

        // Soruyu bitir: normal (timedOut=false) veya süre doldu (true)
        function completeCurrent(timedOut) {
          if (settled) return; settled = true;
          if (timerCtl) { timerCtl.stop(); timerCtl = null; }
          if (view) { view.destroy(); view = null; }
          const th = cfg.starThresholds;
          // Tek deneme tiplerinde: doğru→3★, yanlış→1★. Uzun bölme: adım eşiklerine göre.
          const stars = timedOut ? 1
            : singleAttempt ? (mistakes === 0 ? 3 : 1)
            : (mistakes <= th.three ? 3 : mistakes <= th.two ? 2 : 1);
          starList.push(stars);
          B.Reward.onQuestionDone(stars === 3);
          B.Reward.addCoins(stars * 2, 'question');
          const xp = B.Reward.addXp(B.Reward.questionXp(stars), 'question', { applyStreak: true });
          B.Bus.emit(B.Events.QUESTION_COMPLETED, {
            stars, mistakes, ms: Date.now() - qStart, firstTry: !timedOut && mistakes === 0,
          });
          if (timedOut) cmd.sayFrom('timeUp');
          showStars(stars, xp, () => { qIndex++; nextQuestion(); });
        }

        view = B.Question.view(itype)(stage, q, {
          prefilled, problemText,
          say: t => cmd.say(t),
          onAnswer(step, correct, attempt) {
            B.Bus.emit(B.Events.STEP_ANSWERED, { stepType: step.type, correct, attempt, value: null });
            if (correct) {
              B.Reward.addXp(B.Reward.stepXp(), 'step');
              if (Math.random() < 0.25) cmd.sayFrom('correct');
            } else mistakes++;
          },
          onComplete() { completeCurrent(false); },
        });

        // Süre başlat (varsa)
        if (timerSec > 0) timerCtl = B.Timer.create(timerHost, timerSec, () => completeCurrent(true));
      }

      /* Hedef sonu yıldız töreni */
      function showStars(stars, xp, then) {
        const quip = stars === 3 ? B.Dialogue.pick('correct.streak3') || B.Dialogue.pick('correct')
                                 : B.Dialogue.pick(stars === 2 ? 'correct' : 'wrong.retry');
        B.UI.overlay(
          '<div class="ov-stars">' +
            [1, 2, 3].map(i => '<span class="ov-star' + (i <= stars ? ' lit' : '') + '" style="animation-delay:' + (i * 0.18) + 's">★</span>').join('') +
          '</div><p class="ov-xp">+' + xp + ' XP</p><p class="ov-quote">' + (quip || '') + '</p>',
          [{ label: 'DEVAM ▶', onClick: then }]
        );
      }

      /* Harekât sonu */
      function finishMission(starsArr) {
        const best = starsArr.length ? Math.round(starsArr.reduce((a, b) => a + b, 0) / starsArr.length) : 3;
        const stars = Math.max(1, Math.min(3, best));
        B.Lesson.completeMission(params.sectionId, params.missionId, stars);
        const bonus = B.Reward.addXp(B.Reward.missionBonus(), 'mission');
        const coins = B.Reward.addCoins(10, 'mission');
        B.Bus.emit(B.Events.MISSION_COMPLETED, { missionId: params.missionId, stars, xp: bonus });

        B.UI.overlay(
          '<div class="ov-big">🎖️</div><h2>HAREKÂT TAMAM!</h2>' +
          '<div class="ov-stars">' +
            [1, 2, 3].map(i => '<span class="ov-star' + (i <= stars ? ' lit' : '') + '">★</span>').join('') +
          '</div><p class="ov-xp">Görev bonusu: +' + bonus + ' XP · +' + coins + ' 💰</p>' +
          '<p class="ov-quote">' + (B.Dialogue.pick('mission.done') || '') + '</p>',
          [{ label: 'HARİTAYA DÖN', onClick: () => B.UI.show('map') }]
        );
      }

      nextQuestion();
      this._view = () => view;
      this._stopTimer = () => { if (timerCtl) { timerCtl.stop(); timerCtl = null; } };
    },

    exit() {
      if (this._hud) this._hud.dispose();
      if (this._offStreak) this._offStreak();
      if (this._stopTimer) this._stopTimer();
      if (this._teach) { this._teach.destroy(); this._teach = null; }
      if (this._view) { const v = this._view(); if (v) v.destroy(); }
    },
  });
})(window.BOKUL = window.BOKUL || {});

/* === src/ui/screens/boss-screen.js === */
/* BOKUL — Boss Ekranı
 * Konu Boss'u: can barı var, VURAMAZ (hata sadece kalkan verir).
 * Ünite Boss'u: VURUR — oyuncunun 3 zırh plakası var; yanlış cevap zırh kırar,
 * 3 ardışık doğru 1 zırh onarır; zırh biterse "geri çekilme" (kayıp yok). */
(function (B) {
  B.UI.registerScreen('boss', {
    enter(root, params) {
      const lesson = B.Lesson.active();
      const section = B.Lesson.findSection(params.sectionId).section;
      const boss = section.boss;
      const itype = section.interactionType || lesson.interactionType; // bölüm bazlı soru tipi
      const cfg = B.Content.get('config');
      const isUnit = boss.tier === 'unit';
      const prog = B.State.sectionProgress(lesson.id, params.sectionId);

      const hud = B.UI.buildHud(root, { backTo: 'map' });
      this._hud = hud;

      /* ---- Boss durumu ---- */
      const maxHp = boss.hp;
      let hp = Math.max(1, maxHp - (prog.bossHpCarry || 0)); // geri çekilme taşıması: yorgun başlar
      let shield = 0;                                        // konu boss'u kalkanı
      let armor = isUnit ? (cfg.unitBoss.armor || 3) : 0;    // ünite boss'unda oyuncu zırhı
      let repairStreak = 0;
      let dealt = maxHp - hp;
      let over = false;

      /* ---- Boss başlığı ---- */
      const head = document.createElement('div');
      head.className = 'boss-head' + (isUnit ? ' boss-unit' : '');
      head.innerHTML =
        '<div class="boss-face boss-enter">' +
          (B.SvgArt.boss(boss.id) || '<span class="boss-emoji">' + boss.icon + '</span>') + '</div>' +
        '<div class="boss-info"><div class="boss-name">' + boss.name.toUpperCase() +
        (isUnit ? ' — ⚔️ ÜNİTE BOSS\'U' : ' — KONU BOSS\'U') + '</div>' +
        '<div class="boss-hp"><i></i></div></div>' +
        '<div class="boss-shield"></div>';
      root.appendChild(head);
      const hpFill = head.querySelector('.boss-hp i');
      const shieldEl = head.querySelector('.boss-shield');

      /* ---- Zırh göstergesi (sadece ünite) ---- */
      let armorEl = null;
      if (isUnit) {
        armorEl = document.createElement('div');
        armorEl.className = 'boss-armor';
        root.appendChild(armorEl);
      }

      function refresh() {
        hpFill.style.width = Math.max(0, Math.round(hp / maxHp * 100)) + '%';
        shieldEl.textContent = shield > 0 ? '🛡️ Boss kalkanı!' : '';
        if (armorEl) {
          armorEl.innerHTML = 'ZIRHIN: ' +
            Array.from({ length: cfg.unitBoss.armor }, (_, i) =>
              '<span class="armor-plate' + (i < armor ? '' : ' broken') + '">🛡️</span>').join('') +
            '<small>3 doğru adım = 1 zırh onarımı</small>';
        }
      }
      refresh();

      const layout = document.createElement('div');
      layout.className = 'mission-layout';
      root.appendChild(layout);
      const leftCol = document.createElement('div');
      leftCol.className = 'mission-left';
      layout.appendChild(leftCol);
      const cmd = B.Commander.mount(leftCol, { compact: true });
      const stageWrap = document.createElement('div');
      stageWrap.className = 'mission-stagewrap';
      layout.appendChild(stageWrap);
      const timerHost = document.createElement('div');
      timerHost.className = 'qtimer-host';
      stageWrap.appendChild(timerHost);
      const stage = document.createElement('div');
      stage.className = 'mission-stage';
      stageWrap.appendChild(stage);

      const tcfg = cfg.timer || {};
      const timerSec = tcfg.enabled ? (tcfg[itype] || tcfg.default || 0) : 0;
      let timerCtl = null;

      cmd.sayFrom(isUnit ? 'boss.intro.unit' : 'boss.intro.topic', { bossName: boss.name });

      let view = null;
      const self = this;

      function nextQuestion() {
        if (over) return;
        if (view) { view.destroy(); view = null; }
        if (timerCtl) { timerCtl.stop(); timerCtl = null; }
        const q = B.Question.generate(itype,
          B.Curriculum.forType(itype, B.Lesson.resolveGenerator(params.sectionId, boss.generator)), lesson.skills);
        let mistakes = 0;

        view = B.Question.view(itype)(stage, q, {
          say: t => cmd.say(t),
          onAnswer(step, correct, attempt) {
            B.Bus.emit(B.Events.STEP_ANSWERED, { stepType: step.type, correct, attempt, value: null });
            if (correct) {
              // Hasar: kalkan varsa önce kalkan kırılır
              if (shield > 0) { shield--; cmd.sayFrom('boss.shieldBreak'); }
              else {
                const dmg = 3;
                hp -= dmg; dealt += dmg;
                B.Bus.emit(B.Events.BOSS_DAMAGED, { amount: dmg, remaining: hp });
                head.classList.remove('boss-hit'); void head.offsetWidth;
                head.classList.add('boss-hit');
                // Baba düşmanla dalga geçer (bazen)
                if (Math.random() < 0.45) cmd.sayFrom('boss.taunt', { bossName: boss.name });
              }
              // Zırh onarımı
              if (isUnit) {
                repairStreak++;
                if (repairStreak >= (cfg.unitBoss.repairStreak || 3) && armor < cfg.unitBoss.armor) {
                  armor++; repairStreak = 0;
                  cmd.sayFrom('boss.armorRepair');
                }
              }
              refresh();
              if (hp <= 0) return victory();
            } else {
              mistakes++;
              if (isUnit) {
                // ÜNİTE BOSS'U VURUR: yanlış cevabını sana fırlatır
                armor--; repairStreak = 0;
                B.Bus.emit(B.Events.BOSS_ATTACKED, { armorLeft: armor });
                root.classList.remove('boss-quake'); void root.offsetWidth;
                root.classList.add('boss-quake');
                cmd.sayFrom('boss.playerHit', { wrongAnswer: '' });
                refresh();
                if (armor <= 0) return retreat();
              } else {
                shield++;
                cmd.sayFrom('boss.shieldUp');
                refresh();
              }
            }
          },
          onComplete() {
            if (over) return;
            if (timerCtl) { timerCtl.stop(); timerCtl = null; }
            // Hatasız hedef = kritik vuruş bonusu
            if (mistakes === 0 && hp > 0) {
              hp -= 6; dealt += 6;
              B.Bus.emit(B.Events.BOSS_DAMAGED, { amount: 6, remaining: hp });
              cmd.sayFrom('boss.crit');
              refresh();
              if (hp <= 0) return victory();
            }
            setTimeout(nextQuestion, 500);
          },
        });

        // Süre dolunca: hasarsız, sonraki soruya geç (nazik)
        if (timerSec > 0) timerCtl = B.Timer.create(timerHost, timerSec, () => {
          if (over) return;
          if (view) { view.destroy(); view = null; }
          cmd.sayFrom('timeUp');
          setTimeout(nextQuestion, 400);
        });
      }

      function victory() {
        over = true;
        if (timerCtl) { timerCtl.stop(); timerCtl = null; }
        if (view) { view.destroy(); view = null; }
        B.Lesson.defeatBoss(params.sectionId);
        const xp = B.Reward.addXp(B.Reward.bossXp(boss.tier), 'boss');
        const coins = B.Reward.addCoins(isUnit ? 100 : 50, 'boss');
        B.Bus.emit(B.Events.BOSS_DEFEATED, { bossId: boss.id, tier: boss.tier });
        B.UI.overlay(
          '<div class="ov-big">' + boss.icon + '💥</div><h2>' + boss.name.toUpperCase() + ' DEVRİLDİ!</h2>' +
          '<p class="ov-xp">+' + xp + ' XP · +' + coins + ' 💰' + (isUnit ? ' · 🏆 Efsanevi zafer!' : ' · 💎 Epik zafer!') + '</p>' +
          '<p class="ov-crystal">💠 Bir Sayı Kristali parçası daha kurtarıldı!</p>' +
          '<p class="ov-quote">' + (B.Dialogue.pick('boss.win') || '') + '</p>',
          [{ label: 'HARİTAYA DÖN', onClick: () => B.UI.show('map') }]
        );
      }

      function retreat() {
        over = true;
        if (timerCtl) { timerCtl.stop(); timerCtl = null; }
        if (view) { view.destroy(); view = null; }
        // Emek boşa gitmez: verilen hasarın yarısı taşınır (boss yorgun başlar)
        prog.bossHpCarry = Math.round(dealt * (cfg.unitBoss.regroupHpCarry || 0.5));
        B.Bus.emit(B.Events.BOSS_RETREAT, {});
        B.UI.overlay(
          '<div class="ov-big">🏳️</div><h2>GERİ ÇEKİLME!</h2>' +
          '<p class="ov-quote">' + (B.Dialogue.pick('boss.retreat') || 'Yeniden toplan Komutan, kale hâlâ orada!') + '</p>' +
          '<p class="ov-xp">Boss yorgun: bir sonraki denemede ' + prog.bossHpCarry + ' hasarla başlıyorsun.</p>',
          [
            { label: 'TEKRAR SALDIR ⚔️', onClick: () => B.UI.show('boss', { sectionId: params.sectionId }) },
            { label: 'HARİTAYA DÖN', cls: 'btn-quiet', onClick: () => B.UI.show('map') },
          ]
        );
      }

      nextQuestion();
      this._view = () => view;
      this._stopTimer = () => { if (timerCtl) { timerCtl.stop(); timerCtl = null; } };
    },

    exit() {
      if (this._hud) this._hud.dispose();
      if (this._stopTimer) this._stopTimer();
      if (this._view) { const v = this._view(); if (v) v.destroy(); }
    },
  });
})(window.BOKUL = window.BOKUL || {});

/* === src/ui/screens/locker-screen.js === */
/* BOKUL — Ben / Dolap Ekranı
 * Evim'in iki bölümü tek ekranda:
 *   section 'ben'   → görünüm/tip (saç modeli, yüz, renkler, fotoğraf)
 *   section 'dolap' → kıyafet (aksesuar, çerçeve) + AL / SAT
 * Onboarding (ilk kayıt) modunda 'ben' bölümüyle açılır, "ÜSSE GİR" ile devam eder.
 * Kilitli parça altınla alınır; sahip olunan kıyafet daha ucuza satılabilir. */
(function (B) {
  const TABSETS = {
    ben: [
      { id: 'hair',  name: '💇 Saç' },
      { id: 'face',  name: '🙂 Yüz' },
      { id: 'color', name: '🎨 Renk' },
    ],
    dolap: [
      { id: 'outfit', name: '👕 Kıyafet' },
      { id: 'acc',    name: '🕶️ Aksesuar' },
      { id: 'ring',   name: '⭕ Çerçeve' },
      { id: 'sell',   name: '💰 Sat' },
    ],
  };

  B.UI.registerScreen('locker', {
    enter(root, params) {
      const onboarding = !!params.onboarding;
      const section = onboarding ? 'ben' : (params.section || 'ben');
      const hud = onboarding ? null : B.UI.buildHud(root, { backTo: 'evim' });
      this._hud = hud;
      const R = B.Content.get('rewards');
      const prices = R.shopPrices;
      const sellRatio = R.sellRatio || 0.4;
      const C = B.Avatar.CATALOG;
      const TABS = TABSETS[section];
      let tab = TABS[0].id;

      if (onboarding) {
        const t = document.createElement('div');
        t.className = 'map-title';
        t.textContent = '🎨 Görünümünü ayarla, ' + (B.State.data.player.name || 'asker') + '! (Saç, göz rengi, yüz...)';
        root.appendChild(t);
      }

      const layout = document.createElement('div');
      layout.className = 'locker-layout';
      root.appendChild(layout);
      const left = document.createElement('div'); left.className = 'locker-left'; layout.appendChild(left);
      const right = document.createElement('div'); right.className = 'locker-right'; layout.appendChild(right);

      const av = () => B.Avatar.normalize(B.State.data.player.avatar);
      function commit(a) { B.State.data.player.avatar = a; B.Save.saveSoon(); render(); }

      const priceOf = part => prices[part.rarity] || 50;

      /* Katalog parçasını satın al (kilit anahtarı envantere eklenir) */
      function buyPart(part) {
        if (!B.Reward.spendCoins(priceOf(part))) { B.UI.toast('💰 Altının yetmiyor! Görev ve harekâtlardan kazan.'); return false; }
        B.State.data.inventory.cosmetics.push(B.Avatar.unlockKey(part));
        B.Bus.emit(B.Events.COSMETIC_UNLOCKED, { itemId: B.Avatar.unlockKey(part) });
        B.Audio.play('chest');
        B.UI.toast('✨ ' + part.name + ' satın alındı!');
        return true;
      }

      /* Sahip olunan bir parçayı sat (alış fiyatının bir kısmı geri döner) */
      function sellPart(part) {
        const price = Math.round(priceOf(part) * sellRatio);
        const inv = B.State.data.inventory;
        const key = B.Avatar.unlockKey(part);
        const i = inv.cosmetics.indexOf(key);
        if (i < 0) return;
        inv.cosmetics.splice(i, 1);
        B.State.data.player.avatar = B.Avatar.unequipCosmetic(B.State.data.player.avatar, { id: key, type: part.type });
        B.Reward.addCoins(price, 'sell');
        B.Bus.emit(B.Events.COSMETIC_SOLD, { itemId: key, coins: price });
        B.Audio.play('tick');
        B.UI.toast('💰 ' + part.name + ' satıldı: +' + price + ' Altın');
        B.Save.saveSoon();
        render();
      }

      /* Parça kartı: önizleme = o parça takılı mini avatar */
      function partCard(part, apply, isEquipped) {
        const a = av(); a.usePhoto = false; apply(a, part);
        const unlocked = B.Avatar.isUnlocked(part);
        const card = document.createElement('button');
        card.className = 'part-card' + (isEquipped ? ' part-on' : '') + (unlocked ? '' : ' part-locked');
        card.innerHTML =
          '<span class="part-prev">' + B.Avatar.svg(a) + '</span>' +
          '<span class="part-name">' + (part.name || '') + '</span>' +
          (!unlocked ? '<span class="part-price">💰 ' + priceOf(part) + '</span>' : '');
        card.onclick = () => {
          B.Audio.play('tick');
          if (!unlocked) { if (!buyPart(part)) return; }
          const cur = av(); cur.usePhoto = false; apply(cur, part);
          commit(cur);
        };
        return card;
      }

      function grid(parts, apply, equippedCheck) {
        const g = document.createElement('div'); g.className = 'part-grid';
        parts.forEach(p => g.appendChild(partCard(p, apply, equippedCheck(p))));
        return g;
      }

      function renderTab() {
        const a = av();
        const host = right.querySelector('.locker-parts');
        host.innerHTML = '';

        if (tab === 'hair') {
          // Saç modelleri oyuncunun cinsiyetine göre süzülür
          host.appendChild(grid(B.Avatar.hairsFor(a.gender), (x, p) => { x.hair = p.id; }, p => p.id === a.hair));
        } else if (tab === 'outfit') {
          // Kıyafetler cinsiyete göre süzülür
          host.appendChild(grid(B.Avatar.outfitsFor(a.gender), (x, p) => { x.outfit = p.id; }, p => p.id === a.outfit));
        } else if (tab === 'face') {
          host.appendChild(grid(C.eyes, (x, p) => { x.eyes = p.id; }, p => p.id === a.eyes));
          host.appendChild(grid(C.mouths, (x, p) => { x.mouth = p.id; }, p => p.id === a.mouth));
          host.appendChild(grid(C.skins.map(s => ({ ...s, name: 'Ten' })), (x, p) => { x.skin = p.id; }, p => p.id === a.skin));
        } else if (tab === 'color') {
          const l1 = document.createElement('div'); l1.className = 'part-label'; l1.textContent = '💇 SAÇ RENGİ'; host.appendChild(l1);
          host.appendChild(grid(C.hairColors, (x, p) => { x.hairColor = p.id; }, p => p.id === a.hairColor));
          const l2 = document.createElement('div'); l2.className = 'part-label'; l2.textContent = '👁️ GÖZ RENGİ'; host.appendChild(l2);
          host.appendChild(grid(C.eyeColors, (x, p) => { x.eyeColor = p.id; }, p => p.id === a.eyeColor));
        } else if (tab === 'acc') {
          host.appendChild(grid(C.accs, (x, p) => { x.acc = p.id; }, p => p.id === a.acc));
        } else if (tab === 'ring') {
          host.appendChild(grid(C.rings, (x, p) => { x.ring = p.id; }, p => p.id === a.ring));
        } else if (tab === 'sell') {
          renderSell(host);
        }
      }

      /* Satış: envanterdeki sahip olunan parçalar (katalogdan çözümlenir) */
      function renderSell(host) {
        const owned = (B.State.data.inventory.cosmetics || [])
          .map(key => B.Avatar.findByUnlock(key)).filter(Boolean);
        if (!owned.length) {
          host.innerHTML = '<div class="photo-panel"><p>Henüz satılık kıyafetin yok Komutan. Sandıklardan ve dükkândan kazan, sonra satarsın!</p></div>';
          return;
        }
        const g = document.createElement('div'); g.className = 'part-grid';
        owned.forEach(found => {
          const part = Object.assign({ type: found.type, rarity: found.rarity }, found.part);
          const a = av(); a.usePhoto = false;
          const pid = found.part.id;
          if (pid != null) a[found.type] = pid;
          const price = Math.round((prices[found.rarity] || 50) * sellRatio);
          const card = document.createElement('button');
          card.className = 'part-card part-sell';
          card.innerHTML =
            '<span class="part-prev">' + B.Avatar.svg(a) + '</span>' +
            '<span class="part-name">' + found.name + '</span>' +
            '<span class="part-price">Sat: 💰 ' + price + '</span>';
          card.onclick = () => sellPart(part);
          g.appendChild(card);
        });
        host.appendChild(g);
      }

      function render() {
        const p = B.State.data.player;
        left.innerHTML =
          '<div class="locker-preview">' + B.Avatar.el(p.avatar, 'avatar-big') + '</div>' +
          '<div class="locker-name">' + (p.name || 'İsimsiz Asker') + '</div>' +
          '<div class="chip">💰 ' + (p.coins || 0) + ' Altın</div>' +
          (onboarding ? '<button class="btn btn-action locker-done">DEVAM ▶</button>' : '');
        if (onboarding) {
          left.querySelector('.locker-done').onclick = () => {
            B.Save.saveNow();
            B.UI.show('interests', { onboarding: true }); // görünüm → ilgi alanları → hikâye
          };
        }
        renderTab();
      }

      right.innerHTML =
        '<div class="locker-tabs">' +
        TABS.map(t => '<button class="chip tab-btn" data-tab="' + t.id + '">' + t.name + '</button>').join('') +
        '</div><div class="locker-parts"></div>';
      right.querySelectorAll('.tab-btn').forEach(b => {
        b.onclick = () => {
          tab = b.dataset.tab;
          right.querySelectorAll('.tab-btn').forEach(x => x.classList.toggle('tab-on', x === b));
          renderTab();
        };
      });
      right.querySelector('.tab-btn').classList.add('tab-on');

      render();
    },
    exit() { if (this._hud) this._hud.dispose(); },
  });
})(window.BOKUL = window.BOKUL || {});

        clearInterval(typeTimer);
        if (params.replay) return B.UI.show('home');
        B.Engine.afterIntro();   // meta.introSeen = true + kaydet + üs
      }

      function show(i) {
        clearInterval(typeTimer);
        idx = i;
        if (idx >= slides.length) return finish();
        const s = slides[idx];
        dots.forEach((d, k) => d.classList.toggle('on', k <= idx));
        stage.innerHTML = ART[s.art] || '';
        stage.classList.remove('cine-in'); void stage.offsetWidth;
        stage.classList.add('cine-in');
        B.Audio.play(s.art === 'villain' || s.art === 'broken' ? 'hit' : s.art === 'hero' ? 'fanfare' : 'tick');

        // Yazı-makinesi anlatım + mırıltı
        textEl.textContent = '';
        let c = 0;
        typeTimer = setInterval(() => {
          textEl.textContent = s.text.slice(0, ++c);
          if (c % 4 === 0) B.Audio.play('blip');
          if (c >= s.text.length) clearInterval(typeTimer);
        }, 22);

        nextBtn.textContent = idx === slides.length - 1 ? '⚔️ GÖREVE HAZIRIM!' : 'DEVAM ▶';
      }

      nextBtn.onclick = () => {
        // Yazı hâlâ akıyorsa önce tamamla, ikinci dokunuşta ilerle
        if (textEl.textContent.length < slides[idx].text.length) {
          clearInterval(typeTimer);
          textEl.textContent = slides[idx].text;
          return;
        }
        show(idx + 1);
      };
      root.querySelector('.cine-skip').onclick = finish;

      show(0);
      this._cleanup = () => clearInterval(typeTimer);
    },
    exit() { if (this._cleanup) this._cleanup(); },
  });
})(window.BOKUL = window.BOKUL || {});
